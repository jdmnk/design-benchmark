<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jupiter — Zonal Flow</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  #app { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import * as THREE from 'three';

try {
  // ---------- renderer / scene / camera ----------
  const container = document.getElementById('app');
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(1);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x020308, 1);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020308);

  // Sphere radius 1; diameter should be ~78% of viewport height.
  const FOV = 38;
  const camDist = 1 / (0.78 * Math.tan(THREE.MathUtils.degToRad(FOV / 2)));
  const camera = new THREE.PerspectiveCamera(FOV, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, camDist);
  camera.lookAt(0, 0, 0);

  // Start the loop immediately so a partial failure still shows space.
  const clockUniform = { value: 0 };
  renderer.setAnimationLoop((ts) => {
    clockUniform.value = ts * 0.001;
    renderer.render(scene, camera);
  });

  // ---------- procedural Jupiter texture (canvas) ----------
  const TW = 1024, TH = 512;

  // seeded PRNG + periodic value-noise lattice
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const rand = mulberry32(1337);
  const GP = 256;
  const grid = new Float32Array(GP * GP);
  for (let i = 0; i < grid.length; i++) grid[i] = rand();

  // value noise, periodic in x with period px
  function vn(x, y, px) {
    let xi = Math.floor(x), yi = Math.floor(y);
    const fx = x - xi, fy = y - yi;
    const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
    const x0 = ((xi % px) + px) % px & 255, x1 = (((xi + 1) % px) + px) % px & 255;
    const y0 = yi & 255, y1 = (yi + 1) & 255;
    const a = grid[y0 * GP + x0], b = grid[y0 * GP + x1];
    const c = grid[y1 * GP + x0], d = grid[y1 * GP + x1];
    return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
  }
  // fBm, seamless horizontally (u in [0,1))
  function fbm(u, y, fx0, fy0, oct) {
    let sum = 0, amp = 0.5, fx = fx0, fy = fy0, tot = 0;
    for (let o = 0; o < oct; o++) {
      sum += amp * vn(u * fx, y * fy, fx);
      tot += amp; amp *= 0.5; fx *= 2; fy *= 2;
    }
    return sum / tot;
  }

  // band color stops, north (0) -> south (1): zones cream/ivory, belts tan/ochre/rust
  const stops = [
    [0.00, 0xa08a68], [0.06, 0xbaa686], [0.115, 0xeadec2], [0.175, 0xbe9066],
    [0.235, 0xf1e7cd], [0.30, 0xa25c3c], [0.36, 0xe9d9b9], [0.425, 0xb06a44],
    [0.475, 0xf3e9d1], [0.545, 0xd9c59b], [0.60, 0x9c5a38], [0.66, 0xe5d5b5],
    [0.72, 0xb27a50], [0.78, 0xebdabc], [0.845, 0xae8b62], [0.91, 0xc2ab86],
    [1.00, 0x93805f]
  ];
  const LUT = 1024, lut = new Float32Array(LUT * 3);
  for (let i = 0; i < LUT; i++) {
    const y = i / (LUT - 1);
    let s = 0;
    while (s < stops.length - 2 && y > stops[s + 1][0]) s++;
    const [p0, c0] = stops[s], [p1, c1] = stops[s + 1];
    let t = (y - p0) / (p1 - p0);
    t = Math.min(1, Math.max(0, (t - 0.5) * 2.4 + 0.5));   // sharpen: flat band cores
    t = t * t * (3 - 2 * t);
    const r0 = (c0 >> 16) & 255, g0 = (c0 >> 8) & 255, b0 = c0 & 255;
    const r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
    lut[i * 3] = r0 + (r1 - r0) * t;
    lut[i * 3 + 1] = g0 + (g1 - g0) * t;
    lut[i * 3 + 2] = b0 + (b1 - b0) * t;
  }

  const cnv = document.createElement('canvas');
  cnv.width = TW; cnv.height = TH;
  const ctx = cnv.getContext('2d');
  const img = ctx.createImageData(TW, TH);
  const px = img.data;
  for (let y = 0; y < TH; y++) {
    const yy = y / TH;
    for (let x = 0; x < TW; x++) {
      const u = x / TW;
      // turbulent warp of band boundaries: eddies, festoons, wisps
      const warp = (fbm(u, yy, 5, 10, 4) - 0.5) * 0.13
                 + (fbm(u, yy, 19, 42, 3) - 0.5) * 0.038;
      let yW = yy + warp;
      if (yW < 0) yW = 0; else if (yW > 0.9995) yW = 0.9995;
      const li = (yW * (LUT - 1)) | 0;
      // horizontally-streaked detail: clumps + fine wisps
      const d1 = fbm(u, yy, 22, 88, 4) - 0.5;
      const d2 = fbm(u, yy, 58, 190, 3) - 0.5;
      const shade = 1 + d1 * 0.32 + d2 * 0.16;
      const o = (y * TW + x) * 4;
      px[o]     = Math.min(255, Math.max(0, lut[li * 3] * shade));
      px[o + 1] = Math.min(255, Math.max(0, lut[li * 3 + 1] * shade));
      px[o + 2] = Math.min(255, Math.max(0, lut[li * 3 + 2] * shade));
      px[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(cnv);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;

  // ---------- planet shader: differential zonal flow + Great Red Spot ----------
  const planetMat = new THREE.ShaderMaterial({
    uniforms: { map: { value: tex }, uTime: clockUniform },
    vertexShader: `
      varying vec2 vUv; varying vec3 vN; varying vec3 vVp;
      void main() {
        vUv = uv;
        vN = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vVp = mv.xyz;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform sampler2D map; uniform float uTime;
      varying vec2 vUv; varying vec3 vN; varying vec3 vVp;

      // zonal jet profile: adjacent bands flow in opposite directions
      float flow(float v) {
        return 0.009 * sin(v * 44.0 - 1.1)
             + 0.004 * sin(v * 13.0 + 2.0)
             + 0.009 * exp(-pow((v - 0.485) * 9.0, 2.0));
      }

      void main() {
        vec2 uv = vUv;
        float t = uTime;
        float sp = flow(uv.y);

        // turbulent shimmer along band boundaries
        float wob  = 0.0030 * sin(uv.x * 130.0 + t * 1.8 + 5.0 * sin(uv.y * 80.0 + t * 0.7));
        float wobY = 0.0022 * sin(uv.x * 170.0 - t * 1.3 + 4.0 * sin(uv.y * 120.0));

        // two advected layers moving at different rates within each band
        vec2 uvA = vec2(uv.x + t * sp + wob,        uv.y + wobY);
        vec2 uvB = vec2(uv.x + t * sp * 0.55 - wob * 0.7, uv.y - wobY * 0.8);
        vec3 col = mix(texture2D(map, uvA).rgb, texture2D(map, uvB).rgb, 0.35);

        // ---- Great Red Spot: southern hemisphere, left of centre, drifting + churning ----
        float spotV = 0.365;
        float spotU = 0.205 + t * flow(spotV) * 0.3;
        vec2 d = vec2(uv.x - spotU, uv.y - spotV);
        d.x = mod(d.x + 0.5, 1.0) - 0.5;
        d = vec2(d.x / 0.040, d.y / 0.036);
        float r = length(d);
        if (r < 1.4) {
          float fall = 1.0 - smoothstep(0.0, 1.15, r);
          float ang = -(t * 0.5) * fall - 1.4 * fall * fall;  // CCW churn + static spiral
          float ca = cos(ang), sa = sin(ang);
          vec2 rd = vec2(ca * d.x - sa * d.y, sa * d.x + ca * d.y);
          vec3 cs = texture2D(map, vec2(spotU + rd.x * 0.040, spotV + rd.y * 0.036)).rgb;
          float lum = dot(cs, vec3(0.3333));
          vec3 sc = mix(vec3(0.72, 0.25, 0.13), vec3(0.95, 0.85, 0.68), smoothstep(0.45, 0.92, r));
          sc *= 0.62 + 0.75 * lum;
          sc *= 0.93 + 0.12 * sin(r * 16.0 - t * 0.9);        // internal spiral banding
          float mask = 1.0 - smoothstep(0.82, 1.12, r);
          col = mix(col, sc, mask * 0.96);
        }

        // ---- lighting: upper-left key, soft terminator, limb darkening ----
        vec3 N = normalize(vN);
        vec3 V = normalize(-vVp);
        vec3 L = normalize(vec3(-0.55, 0.62, 0.56));
        float dif = pow(clamp(dot(N, L) * 0.5 + 0.5, 0.0, 1.0), 2.0);
        float mu = clamp(dot(N, V), 0.0, 1.0);
        float limb = 0.32 + 0.68 * pow(mu, 0.55);
        gl_FragColor = vec4(col * (dif * 1.22 * limb + 0.018), 1.0);
      }`
  });
  const planet = new THREE.Mesh(new THREE.SphereGeometry(1, 96, 64), planetMat);
  scene.add(planet);

  // ---------- soft atmospheric halo (fake glow, additive back-facing shell) ----------
  const haloMat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `
      varying vec3 vN; varying vec3 vVp;
      void main() {
        vN = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vVp = mv.xyz;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying vec3 vN; varying vec3 vVp;
      void main() {
        vec3 N = normalize(vN);
        vec3 V = normalize(-vVp);
        vec3 L = normalize(vec3(-0.55, 0.62, 0.56));
        float g = pow(clamp(-dot(N, V) * 3.4, 0.0, 1.0), 1.7);
        float lit = 0.18 + 0.82 * clamp(dot(N, L), 0.0, 1.0);
        gl_FragColor = vec4(vec3(1.0, 0.83, 0.62) * g * lit * 0.55, 1.0);
      }`,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.045, 64, 48), haloMat));

  // ---------- sparse dim starfield ----------
  const NSTARS = 900;
  const sPos = new Float32Array(NSTARS * 3);
  const sCol = new Float32Array(NSTARS * 3);
  for (let i = 0; i < NSTARS; i++) {
    const th = rand() * Math.PI * 2, ph = Math.acos(rand() * 2 - 1), R = 60;
    sPos[i * 3]     = R * Math.sin(ph) * Math.cos(th);
    sPos[i * 3 + 1] = R * Math.cos(ph);
    sPos[i * 3 + 2] = R * Math.sin(ph) * Math.sin(th);
    const b = 0.12 + rand() * rand() * 0.55;
    const w = rand();
    sCol[i * 3] = b * (0.9 + 0.1 * w); sCol[i * 3 + 1] = b * 0.95; sCol[i * 3 + 2] = b * (1.05 - 0.1 * w);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(sCol, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    size: 1.6, sizeAttenuation: false, vertexColors: true,
    transparent: true, opacity: 0.9, depthWrite: false
  })));

  // ---------- one tiny bright moon ----------
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(0.035, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0xd8d2c6 })
  );
  moon.position.set(1.62, 0.98, -2.0);
  scene.add(moon);

  // ---------- resize ----------
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
