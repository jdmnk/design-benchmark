<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jupiter</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#05060a;}
  #c{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
try {
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x05060a, 1);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05060a);

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 3.1);

  // ---- Jupiter ----
  const jupMat = new THREE.ShaderMaterial({
    uniforms:{
      uTime:{value:0},
      uLightDir:{value:new THREE.Vector3(-0.5,0.6,0.45).normalize()}
    },
    vertexShader:`
      varying vec3 vWorldNormal;
      varying vec3 vWorldPos;
      void main(){
        vWorldNormal = normalize(mat3(modelMatrix) * normal);
        vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader:`
      precision highp float;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPos;
      uniform float uTime;
      uniform vec3 uLightDir;

      float hash21(vec2 p){
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
      }
      float vnoise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        vec2 u = f*f*(3.0-2.0*f);
        float a = hash21(i);
        float b = hash21(i + vec2(1.0,0.0));
        float c = hash21(i + vec2(0.0,1.0));
        float d = hash21(i + vec2(1.0,1.0));
        return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
      }
      float fbm(vec2 p){
        float v = 0.0, a = 0.5;
        for(int i=0;i<6;i++){ v += a*vnoise(p); p *= 2.03; a *= 0.5; }
        return v;
      }

      vec4 bandAt(float t){
        float b[11];
        b[0]=0.00; b[1]=0.09; b[2]=0.17; b[3]=0.26; b[4]=0.35;
        b[5]=0.45; b[6]=0.54; b[7]=0.64; b[8]=0.74; b[9]=0.86; b[10]=1.00;
        vec3 c[11];
        c[0]=vec3(0.30,0.21,0.15);   // south polar
        c[1]=vec3(0.82,0.72,0.54);   // zone cream
        c[2]=vec3(0.52,0.36,0.22);   // belt ochre
        c[3]=vec3(0.88,0.82,0.66);   // zone ivory
        c[4]=vec3(0.46,0.30,0.18);   // belt tan-brown
        c[5]=vec3(0.93,0.87,0.71);   // equatorial cream
        c[6]=vec3(0.56,0.40,0.25);   // belt tan
        c[7]=vec3(0.86,0.78,0.60);   // zone pale tan
        c[8]=vec3(0.44,0.26,0.14);   // belt rust
        c[9]=vec3(0.84,0.75,0.57);   // zone cream
        c[10]=vec3(0.34,0.25,0.19);  // north polar
        float s[11];
        s[0]=-0.014; s[1]=0.026; s[2]=-0.030; s[3]=0.034; s[4]=-0.022;
        s[5]=0.050; s[6]=-0.034; s[7]=0.028; s[8]=-0.040; s[9]=0.022; s[10]=-0.016;
        vec3 col = c[0]; float sp = s[0];
        float tw = 0.022;
        for(int i=1;i<11;i++){
          float k = smoothstep(b[i]-tw, b[i]+tw, t);
          col = mix(col, c[i], k);
          sp  = mix(sp,  s[i], k);
        }
        return vec4(col, sp);
      }

      void main(){
        vec3 N = normalize(vWorldNormal);
        vec3 V = normalize(cameraPosition - vWorldPos);

        float lat = asin(clamp(N.y, -1.0, 1.0));
        float lon = atan(N.z, N.x);
        float latN = lat / 1.5707963;
        float lonN = lon / 6.2831853;
        float t = (latN + 1.0) * 0.5;

        // turbulent, slowly drifting band boundaries
        float warp = fbm(vec2(lonN*5.0 + uTime*0.03, latN*4.0)) * 0.05 - 0.025;
        float tt = clamp(t + warp, 0.0, 1.0);
        vec4 band = bandAt(tt);
        vec3 base = band.rgb;
        float speed = band.w;

        // zonal flow: streaks elongated in longitude, shearing per band
        float lonF = lonN + speed * uTime * 2.2;
        float streak = fbm(vec2(lonF*4.0, latN*9.0 + 3.0));
        streak += 0.5 * fbm(vec2(lonF*9.0, latN*18.0 + 7.0));
        streak = clamp(streak*0.7, 0.0, 1.0);
        float clumps = fbm(vec2(lonF*2.2 + 11.0, latN*3.0 + 5.0));
        vec3 col = mix(base*0.62, mix(base, vec3(1.0), 0.18), streak);
        col = mix(col, col*1.18, clumps*0.5);
        float fine = vnoise(vec2(lonF*45.0, latN*70.0));
        col *= (0.93 + 0.07*fine);

        // Great Red Spot — southern belt, drifts with its band, counter-clockwise churn
        float grsLat = -0.28;
        float grsLon0 = 0.16;
        float grsSpeed = -0.022;
        float grsLon = fract(grsLon0 + grsSpeed*uTime*2.2 + 0.5) - 0.5;
        float dx = fract(lonN - grsLon + 0.5) - 0.5;
        float dy = latN - grsLat;
        vec2 d = vec2(dx/0.20, dy/0.10);
        float r = length(d);
        float ang = atan(d.y, d.x);
        float spiral = ang + r*5.5 + uTime*0.5;
        float sw = fbm(vec2(cos(spiral), sin(spiral))*2.2 + vec2(r*3.0, 0.0));
        float spotMask = smoothstep(1.0, 0.82, r);
        float ring = smoothstep(0.95,0.82,r) * smoothstep(0.62,0.74,r);
        float eye = smoothstep(0.34,0.12,r);
        vec3 spotCol = mix(vec3(0.58,0.20,0.11), vec3(0.82,0.46,0.24), sw);
        spotCol = mix(spotCol, vec3(0.95,0.80,0.58), ring*0.65);
        spotCol = mix(spotCol, vec3(0.36,0.10,0.05), eye*0.55);
        col = mix(col, spotCol, spotMask);

        // lighting: soft terminator + limb darkening + faint rim
        float diff = max(dot(N, uLightDir), 0.0);
        float amb = 0.10;
        float ndv = max(dot(N, V), 0.0);
        float limb = mix(0.32, 1.0, pow(ndv, 0.55));
        vec3 lit = col * (amb + 1.0*diff) * limb;
        float rim = pow(1.0 - ndv, 3.0);
        lit += vec3(0.18,0.12,0.07) * rim * diff * 0.6;

        gl_FragColor = vec4(lit, 1.0);
      }
    `
  });

  const jupGeo = new THREE.SphereGeometry(1, 128, 128);
  const jupiter = new THREE.Mesh(jupGeo, jupMat);
  scene.add(jupiter);

  // ---- Starfield ----
  const starCount = 1200;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount*3);
  const starCol = new Float32Array(starCount*3);
  for(let i=0;i<starCount;i++){
    const r = 40 + Math.random()*30;
    const th = Math.random()*Math.PI*2;
    const ph = Math.acos(2*Math.random()-1);
    starPos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    starPos[i*3+1] = r*Math.cos(ph);
    starPos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
    const b = 0.25 + Math.random()*0.75;
    starCol[i*3]   = b;
    starCol[i*3+1] = b*(0.9+Math.random()*0.1);
    starCol[i*3+2] = b*(0.85+Math.random()*0.15);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starCol,3));
  const starMat = new THREE.PointsMaterial({
    size:0.12, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.9, depthWrite:false
  });
  scene.add(new THREE.Points(starGeo, starMat));

  // ---- Tiny moon ----
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 24, 24),
    new THREE.MeshStandardMaterial({color:0x9a8f7a, roughness:1.0, metalness:0.0})
  );
  moon.position.set(2.6, 1.0, 0.8);
  scene.add(moon);

  scene.add(new THREE.AmbientLight(0x202028, 0.35));
  const dir = new THREE.DirectionalLight(0xfff0e0, 1.0);
  dir.position.set(-5, 6, 4);
  scene.add(dir);

  function resize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  window.addEventListener('resize', resize);

  const clock = new THREE.Clock();
  function animate(){
    const t = clock.getElapsedTime();
    jupMat.uniforms.uTime.value = t;
    moon.position.x = 2.6 + Math.sin(t*0.1)*0.08;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();
} catch(e){
  console.error(e);
}
</script>
</body>
</html>
