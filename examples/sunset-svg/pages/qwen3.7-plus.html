<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}</style>
</head>
<body>
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1550"/>
      <stop offset="25%" stop-color="#4a2a6b"/>
      <stop offset="50%" stop-color="#c24a7a"/>
      <stop offset="75%" stop-color="#f28a5a"/>
      <stop offset="100%" stop-color="#ffd27f"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5c2" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffd98a" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ff9a5a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff7a5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#fff0b8"/>
      <stop offset="100%" stop-color="#ffb86a"/>
    </radialGradient>
    <linearGradient id="mountBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a3a6a"/>
      <stop offset="100%" stop-color="#3a1f4a"/>
    </linearGradient>
    <linearGradient id="mountMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1a4a"/>
      <stop offset="100%" stop-color="#1a0a2a"/>
    </linearGradient>
    <linearGradient id="mountFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a28"/>
      <stop offset="100%" stop-color="#05020a"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb070"/>
      <stop offset="40%" stop-color="#d96a8a"/>
      <stop offset="100%" stop-color="#2a1a3a"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5c2" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffd98a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff9a5a" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="cloudWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd0a8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e06a7a" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a28"/>
      <stop offset="100%" stop-color="#05020a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1280" height="800" fill="url(#sky)"/>

  <!-- Horizon haze band -->
  <rect x="0" y="400" width="1280" height="80" fill="#ffd27f" opacity="0.25"/>

  <!-- Clouds -->
  <g opacity="0.9">
    <ellipse cx="220" cy="160" rx="180" ry="14" fill="url(#cloudWarm)">
      <animate attributeName="cx" values="220;260;220" dur="40s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="180" rx="120" ry="9" fill="#ffb088" opacity="0.6">
      <animate attributeName="cx" values="300;340;300" dur="40s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="900" cy="130" rx="220" ry="16" fill="url(#cloudWarm)">
      <animate attributeName="cx" values="900;860;900" dur="55s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1050" cy="220" rx="160" ry="11" fill="#ffb088" opacity="0.55">
      <animate attributeName="cx" values="1050;1010;1050" dur="55s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="640" cy="100" rx="260" ry="12" fill="#f28a7a" opacity="0.35">
      <animate attributeName="cx" values="640;680;640" dur="70s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="150" cy="280" rx="140" ry="8" fill="#e06a7a" opacity="0.5">
      <animate attributeName="cx" values="150;180;150" dur="45s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1150" cy="300" rx="150" ry="9" fill="#e06a7a" opacity="0.45">
      <animate attributeName="cx" values="1150;1120;1150" dur="50s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Sun glow (behind mountains) -->
  <circle cx="640" cy="430" r="260" fill="url(#sunGlow)"/>
  <circle cx="640" cy="430" r="140" fill="url(#sunGlow)"/>
  <!-- Sun core -->
  <circle cx="640" cy="430" r="62" fill="url(#sunCore)"/>

  <!-- Back mountain range -->
  <path d="M0,470 L120,420 L220,445 L340,380 L460,430 L580,395 L720,420 L860,370 L980,425 L1100,400 L1200,440 L1280,420 L1280,500 L0,500 Z" fill="url(#mountBack)"/>

  <!-- Mid mountain range with tallest central peak -->
  <path d="M0,500 L100,470 L200,485 L320,440 L440,470 L560,420 L640,380 L720,420 L840,455 L960,430 L1080,470 L1200,450 L1280,475 L1280,540 L0,540 Z" fill="url(#mountMid)"/>

  <!-- Front mountain range -->
  <path d="M0,540 L140,510 L260,530 L380,500 L500,525 L620,495 L740,520 L860,505 L1000,530 L1140,510 L1280,535 L1280,580 L0,580 Z" fill="url(#mountFront)"/>

  <!-- Ground/foreground base -->
  <rect x="0" y="560" width="1280" height="240" fill="url(#ground)"/>

  <!-- River (widening toward viewer) -->
  <path d="M560,560 L720,560 L820,800 L460,800 Z" fill="url(#river)"/>

  <!-- River shimmer reflection -->
  <path d="M625,560 L655,560 L720,800 L560,800 Z" fill="url(#shimmer)" opacity="0.8">
    <animate attributeName="opacity" values="0.55;0.9;0.55" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M635,560 L645,560 L680,800 L600,800 Z" fill="#fff5c2" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- River shimmer streaks -->
  <g opacity="0.6">
    <rect x="620" y="600" width="40" height="2" fill="#fff5c2">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="600" y="650" width="80" height="3" fill="#ffd98a">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="580" y="710" width="120" height="3" fill="#fff5c2">
      <animate attributeName="opacity" values="0.2;0.85;0.2" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="560" y="760" width="160" height="4" fill="#ffd98a">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtle sun pulse -->
  <circle cx="640" cy="430" r="62" fill="url(#sunCore)" opacity="0.4">
    <animate attributeName="r" values="62;68;62" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
</body>
</html>
