<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Landscape</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        svg {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Sky gradient: deep blue/indigo to magenta/pink to orange/gold -->
        <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#0a1856;stop-opacity:1" />
            <stop offset="25%" style="stop-color:#2d1b4e;stop-opacity:1" />
            <stop offset="45%" style="stop-color:#8b3a62;stop-opacity:1" />
            <stop offset="65%" style="stop-color:#e07a5f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffc966;stop-opacity:1" />
        </linearGradient>

        <!-- Sun radial glow -->
        <radialGradient id="sunGlow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" style="stop-color:#ffeb99;stop-opacity:0.9" />
            <stop offset="40%" style="stop-color:#ff9d4d;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0" />
        </radialGradient>

        <!-- Sun core -->
        <radialGradient id="sunCore" cx="45%" cy="45%" r="50%">
            <stop offset="0%" style="stop-color:#fffaf0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffeb99;stop-opacity:1" />
        </radialGradient>

        <!-- Cloud gradient -->
        <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.7" />
            <stop offset="100%" style="stop-color:#ffcc99;stop-opacity:0.5" />
        </linearGradient>

        <!-- River surface gradient -->
        <linearGradient id="riverGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0d0610;stop-opacity:0.8" />
            <stop offset="50%" style="stop-color:#ff9d4d;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#0d0610;stop-opacity:0.8" />
        </linearGradient>

        <!-- River shimmer -->
        <linearGradient id="riverShimmer" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffeb99;stop-opacity:0.8" />
            <stop offset="50%" style="stop-color:#ff9d4d;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#ffeb99;stop-opacity:0.05" />
        </linearGradient>

        <!-- Filter for soft cloud blur -->
        <filter id="cloudBlur">
            <feGaussianBlur in="SourceGraphic" stdDeviation="12" />
        </filter>

        <!-- Filter for sun glow -->
        <filter id="glowFilter">
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
        </filter>
    </defs>

    <!-- Full canvas sky gradient (FIRST ELEMENT) -->
    <rect width="1280" height="800" fill="url(#skyGradient)" />

    <!-- Soft clouds in upper sky -->
    <g id="clouds" opacity="0.65">
        <!-- Left cloud -->
        <ellipse cx="180" cy="140" rx="100" ry="45" fill="url(#cloudGradient)" filter="url(#cloudBlur)">
            <animate attributeName="cx" from="180" to="220" dur="16s" repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="280" cy="130" rx="85" ry="40" fill="url(#cloudGradient)" filter="url(#cloudBlur)">
            <animate attributeName="cx" from="280" to="310" dur="16s" repeatCount="indefinite" />
        </ellipse>

        <!-- Right cloud -->
        <ellipse cx="1050" cy="110" rx="110" ry="48" fill="url(#cloudGradient)" filter="url(#cloudBlur)">
            <animate attributeName="cx" from="1050" to="1100" dur="18s" repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="950" cy="125" rx="90" ry="42" fill="url(#cloudGradient)" filter="url(#cloudBlur)">
            <animate attributeName="cx" from="950" to="990" dur="18s" repeatCount="indefinite" />
        </ellipse>
    </g>

    <!-- Sun glow halo behind mountains -->
    <circle cx="640" cy="400" r="200" fill="url(#sunGlow)" opacity="0.5" />

    <!-- Mountain back layer (far, subtle) -->
    <path d="M 0 480 Q 300 320 640 350 Q 960 320 1280 480 L 1280 800 L 0 800 Z" fill="#0a0f1a" opacity="0.25" />

    <!-- Mountain middle layer -->
    <path d="M 0 520 Q 200 380 420 300 Q 640 240 860 320 Q 1080 440 1280 520 L 1280 800 L 0 800 Z" fill="#0f0a15" opacity="0.45" />

    <!-- Mountain front layer (tallest peak at center) -->
    <path d="M 0 560 L 280 420 L 420 310 L 640 280 L 840 360 L 1050 450 L 1280 560 L 1280 800 L 0 800 Z" fill="#080308" opacity="0.75" />

    <!-- Sun core -->
    <circle cx="640" cy="400" r="85" fill="url(#sunCore)" filter="url(#glowFilter)" />

    <!-- Sun reflection glow on mountain -->
    <ellipse cx="640" cy="560" rx="140" ry="35" fill="#ff9d4d" opacity="0.12" />

    <!-- River in foreground with gentle widening -->
    <path d="M 520 560 Q 600 600 640 630 Q 720 680 850 720 L 1000 780 L 1280 800 L 1280 750 L 1000 740 Q 750 680 650 640 Q 580 610 450 560 Z" fill="url(#riverGradient)" opacity="0.75" />

    <!-- River shine/shimmer reflection -->
    <path d="M 630 560 Q 660 600 680 630 Q 730 680 800 720 L 880 760 L 950 790 L 1050 800 L 1000 750 Q 850 680 780 640 Q 720 610 620 560 Z" fill="url(#riverShimmer)" opacity="0.55">
        <animate attributeName="opacity" from="0.35" to="0.70" dur="3s" repeatCount="indefinite" />
    </path>

</svg>
</body>
</html>
