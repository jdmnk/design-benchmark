<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Landscape</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
    </style>
</head>
<body>
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
    <defs>
        <!-- Sky gradient: deep indigo to magenta to warm orange -->
        <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
            <stop offset="35%" style="stop-color:#3d1b4d;stop-opacity:1" />
            <stop offset="65%" style="stop-color:#8b3a62;stop-opacity:1" />
            <stop offset="85%" style="stop-color:#ff8c42;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffa84d;stop-opacity:1" />
        </linearGradient>
        
        <!-- Sun glow gradient -->
        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#ffee99;stop-opacity:0.8" />
            <stop offset="50%" style="stop-color:#ffcc33;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#ff9933;stop-opacity:0" />
        </radialGradient>
        
        <!-- Sun core -->
        <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#ffff99;stop-opacity:1" />
            <stop offset="70%" style="stop-color:#ffdd66;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffaa33;stop-opacity:1" />
        </radialGradient>
        
        <!-- River gradient with shimmer -->
        <linearGradient id="riverShimmer" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" style="stop-color:#1a3a5f;stop-opacity:1" />
            <stop offset="40%" style="stop-color:#0f2a4f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#162d4a;stop-opacity:1" />
        </linearGradient>

        <!-- Cloud gradient -->
        <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffcc99;stop-opacity:0" />
            <stop offset="30%" style="stop-color:#ffbb88;stop-opacity:0.7" />
            <stop offset="50%" style="stop-color:#ffaa77;stop-opacity:0.8" />
            <stop offset="70%" style="stop-color:#ffbb88;stop-opacity:0.7" />
            <stop offset="100%" style="stop-color:#ffcc99;stop-opacity:0" />
        </linearGradient>
    </defs>
    
    <!-- Full canvas background sky -->
    <rect width="1280" height="800" fill="url(#skyGradient)"/>
    
    <!-- Far clouds (back layer) -->
    <ellipse cx="150" cy="120" rx="140" ry="50" fill="#ff9966" opacity="0.15">
        <animateTransform attributeName="transform" type="translate" 
            values="0 0; 30 0; 0 0" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1050" cy="100" rx="180" ry="60" fill="#ff9966" opacity="0.12">
        <animateTransform attributeName="transform" type="translate" 
            values="0 0; -40 0; 0 0" dur="15s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Sun glow (large soft corona) -->
    <circle cx="640" cy="380" r="140" fill="url(#sunGlow)"/>
    
    <!-- Sun core -->
    <circle cx="640" cy="380" r="85" fill="url(#sunCore)"/>
    
    <!-- Soft clouds (middle layer, warm tinted) -->
    <ellipse cx="200" cy="180" rx="160" ry="70" fill="url(#cloudGradient)"/>
    <ellipse cx="900" cy="150" rx="200" ry="80" fill="url(#cloudGradient)"/>
    <ellipse cx="500" cy="210" rx="120" ry="55" fill="#ffbb99" opacity="0.25">
        <animateTransform attributeName="transform" type="translate" 
            values="0 0; 25 0; 0 0" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Back mountain layer (darkest, furthest) -->
    <polygon points="0,450 200,350 450,420 700,280 900,400 1100,350 1280,420 1280,800 0,800" 
        fill="#1a1a2e" opacity="0.4"/>
    
    <!-- Middle mountain layer -->
    <polygon points="0,500 150,400 380,480 640,350 900,460 1100,400 1280,500 1280,800 0,800" 
        fill="#2d1b4d" opacity="0.65"/>
    
    <!-- Front mountain layer (tallest peak center, darkest) -->
    <polygon points="0,550 120,480 280,520 450,420 640,320 820,460 950,500 1100,480 1280,570 1280,800 0,800" 
        fill="#1a0f2e" opacity="0.9"/>
    
    <!-- River base (widening toward viewer) -->
    <polygon points="600,480 680,480 750,650 810,800 470,800 540,650" fill="url(#riverShimmer)"/>
    
    <!-- River shimmer (reflection of sun) -->
    <polygon points="610,480 670,480 730,630 780,800 520,800 580,630" fill="#ffdd99" opacity="0.25"/>
    
    <!-- River highlight shimmer with animation -->
    <polygon points="630,500 650,500 700,620 720,800 580,800 610,620" fill="#ffff99" opacity="0">
        <animate attributeName="opacity" values="0; 0.4; 0.2; 0; 0" dur="6s" repeatCount="indefinite"/>
    </polygon>
</svg>
</body>
</html>
