<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunset Landscape</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#0a0612;overflow:hidden;}
  svg{display:block;width:100%;height:100%;}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <!-- Sky sunset gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#160d3a"/>
      <stop offset="22%" stop-color="#2c1657"/>
      <stop offset="45%" stop-color="#7a2566"/>
      <stop offset="68%" stop-color="#d24a3e"/>
      <stop offset="88%" stop-color="#f4a73b"/>
      <stop offset="100%" stop-color="#ffd982"/>
    </linearGradient>

    <!-- Sun core + glow -->
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6dc"/>
      <stop offset="35%" stop-color="#ffe39a"/>
      <stop offset="70%" stop-color="#ffb155" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff7a3c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffcf7a" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f2763a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f2763a" stop-opacity="0"/>
    </radialGradient>

    <!-- Cloud warm tint -->
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffd9a0" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#f6a273" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c25a4e" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Mountain gradient fills (subtle vertical for atmospheric depth) -->
    <linearGradient id="mtnBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3f6e"/>
      <stop offset="100%" stop-color="#5a2c5c"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d1f47"/>
      <stop offset="100%" stop-color="#271232"/>
    </linearGradient>
    <linearGradient id="mtnFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#170b22"/>
      <stop offset="100%" stop-color="#0a0512"/>
    </linearGradient>

    <!-- River gradient -->
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a1d3f"/>
      <stop offset="50%" stop-color="#1f1030"/>
      <stop offset="100%" stop-color="#0c0618"/>
    </linearGradient>

    <!-- Reflection shimmer gradient (warm vertical beam) -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffe6a8" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ffb15a" stop-opacity="0.65"/>
      <stop offset="75%" stop-color="#d96a3c" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7a2a3a" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Foreground bank -->
    <linearGradient id="bank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0512"/>
      <stop offset="100%" stop-color="#050208"/>
    </linearGradient>

    <!-- Soft blur for clouds (gentle) -->
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Reusable cloud shape -->
    <g id="cloudShape">
      <ellipse cx="0" cy="0" rx="120" ry="14" fill="url(#cloud)" opacity="0.9"/>
      <ellipse cx="-50" cy="6" rx="70" ry="9" fill="url(#cloud)" opacity="0.7"/>
      <ellipse cx="60" cy="-4" rx="80" ry="10" fill="url(#cloud)" opacity="0.8"/>
    </g>
  </defs>

  <!-- SKY -->
  <rect x="0" y="0" width="1280" height="800" fill="url(#sky)"/>

  <!-- Soft horizon haze band -->
  <rect x="0" y="380" width="1280" height="120" fill="#f4a73b" opacity="0.18"/>
  <rect x="0" y="410" width="1280" height="70" fill="#ffd982" opacity="0.22"/>

  <!-- Sun outer glow -->
  <circle cx="640" cy="392" r="220" fill="url(#sunGlow)"/>

  <!-- Clouds (upper sky, drifting) -->
  <g filter="url(#soft)">
    <g>
      <use href="#cloudShape" transform="translate(220,150) scale(1.1,1)"/>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 40 0; 0 0" dur="26s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </g>
    <g>
      <use href="#cloudShape" transform="translate(720,110) scale(1.4,1.1)"/>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -50 0; 0 0" dur="32s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </g>
    <g>
      <use href="#cloudShape" transform="translate(1080,180) scale(0.9,0.9)"/>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 30 0; 0 0" dur="30s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </g>
    <g>
      <use href="#cloudShape" transform="translate(460,220) scale(1.2,0.8)" opacity="0.7"/>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -35 0; 0 0" dur="36s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </g>
  </g>

  <!-- Sun disk -->
  <circle cx="640" cy="392" r="58" fill="url(#sun)"/>

  <!-- BACK mountain ridge (lightest, furthest) -->
  <path d="M0,440 L90,392 L210,410 L330,372 L450,392 L560,360 L640,372 L720,358 L830,382 L950,360 L1070,388 L1180,370 L1280,392 L1280,440 Z"
        fill="url(#mtnBack)"/>

  <!-- MID mountain ridge (tallest peak centered, in front of sun) -->
  <path d="M0,440 L70,418 L180,425 L300,392 L420,408 L520,382 L580,370 L640,360 L700,372 L790,392 L900,372 L1010,400 L1130,382 L1230,398 L1280,388 L1280,440 Z"
        fill="url(#mtnMid)"/>

  <!-- FRONT mountain ridge (darkest, closest, lower hills) -->
  <path d="M0,440 L0,470 L120,452 L260,468 L400,450 L540,462 L680,452 L820,466 L960,454 L1100,466 L1220,458 L1280,462 L1280,440 Z"
        fill="url(#mtnFront)"/>

  <!-- Foreground bank/meadow strip -->
  <path d="M0,470 L1280,470 L1280,648 L0,648 Z" fill="url(#bank)"/>
  <!-- subtle bank rim warm light -->
  <path d="M0,470 L1280,470 L1280,478 L0,478 Z" fill="#3a1a32" opacity="0.6"/>

  <!-- RIVER -->
  <path d="M0,648 L1280,648 L1280,800 L0,800 Z" fill="url(#river)"/>

  <!-- River far edge highlight (where it meets bank) -->
  <path d="M0,648 L1280,648 L1280,652 L0,652 Z" fill="#5a2a4a" opacity="0.5"/>

  <!-- Sun reflection beam on river (vertical warm shimmer, widening downward) -->
  <g>
    <path d="M624,648 L656,648 L700,800 L580,800 Z" fill="url(#shimmer)" opacity="0.85"/>
    <!-- inner brighter core -->
    <path d="M632,648 L648,648 L676,800 L604,800 Z" fill="url(#shimmer)" opacity="0.7">
      <animate attributeName="opacity"
        values="0.55;0.85;0.55" dur="5s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
    <!-- shimmer ripples -->
    <g opacity="0.6">
      <ellipse cx="640" cy="690" rx="22" ry="2.2" fill="#ffe6a8">
        <animate attributeName="rx" values="18;28;18" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="640" cy="725" rx="34" ry="2.6" fill="#ffc278">
        <animate attributeName="rx" values="28;42;28" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;0.7;0.35" dur="5s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="640" cy="765" rx="52" ry="3" fill="#ff9a5a">
        <animate attributeName="rx" values="44;62;44" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="6s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- Subtle distant water sheen on either side -->
  <path d="M0,660 L300,660 L420,800 L0,800 Z" fill="#2a1530" opacity="0.25"/>
  <path d="M980,660 L1280,660 L1280,800 L860,800 Z" fill="#2a1530" opacity="0.25"/>

  <!-- Faint stars in deep upper sky -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="120" cy="60" r="1"/>
    <circle cx="310" cy="40" r="0.8"/>
    <circle cx="520" cy="80" r="1.1"/>
    <circle cx="880" cy="50" r="0.9"/>
    <circle cx="1050" cy="90" r="1"/>
    <circle cx="1180" cy="55" r="0.8"/>
    <circle cx="700" cy="35" r="0.7"/>
  </g>
</svg>
</body>
</html>
