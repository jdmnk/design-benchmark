<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fireworks Finale</title>
<style>html,body{margin:0;padding:0;overflow:hidden;background:#000;}canvas{display:block;width:100vw;height:100vh;}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
try {
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, skyH, groundY;
function resize(){
  W = cv.width = innerWidth;
  H = cv.height = innerHeight;
  groundY = H * 0.82;
  skyH = H;
  buildSkyline();
  buildStars();
}
addEventListener('resize', resize);

// Stars
let stars = [];
function buildStars(){
  stars = [];
  const n = Math.floor((W*H)/12000);
  for(let i=0;i<n;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*groundY*0.9,
      r: Math.random()*1.1+0.2,
      tw: Math.random()*Math.PI*2,
      sp: 0.5+Math.random()*2
    });
  }
}

// Skyline
let buildings = [];
function buildSkyline(){
  buildings = [];
  let x = -10;
  while(x < W+20){
    const w = 30 + Math.random()*80;
    const h = 40 + Math.random()*(H*0.16);
    const b = {x, w, h, y: groundY - h, windows:[]};
    const cols = Math.max(1, Math.floor(w/10));
    const rows = Math.max(1, Math.floor(h/14));
    for(let i=0;i<cols;i++){
      for(let j=0;j<rows;j++){
        if(Math.random()<0.55){
          b.windows.push({
            x: b.x + 3 + i*(w-6)/cols,
            y: b.y + 4 + j*(h-8)/rows,
            w: (w-6)/cols*0.55,
            h: (h-8)/rows*0.45,
            on: Math.random()<0.7,
            c: Math.random()<0.5 ? '#ffd97a' : '#ffb347'
          });
        }
      }
    }
    buildings.push(b);
    x += w + Math.random()*4 - 2;
  }
}

// Fireworks
const COLORS = [
  [255,220,120], // gold
  [255,90,90],   // red
  [120,220,255], // cyan
  [210,140,255], // violet
  [130,255,160]  // green
];
const TYPES = ['peony','ring','willow'];

const fireworks = []; // active bursts (rockets + explosions)
let nextBurstAt = 0;
const MAX_PARTICLES = 2300;

function totalParticles(){
  let s=0;
  for(const f of fireworks){
    if(f.rocket) s++;
    s += f.sparks.length;
  }
  return s;
}

function createRocket(targetX, targetY, color, type, birthTime){
  const startX = targetX + (Math.random()-0.5)*W*0.15;
  const startY = H + 10;
  // choose velocity so it arcs to targetY in ~0.9s under gravity
  const g = 320;
  const T = 0.85 + Math.random()*0.25;
  const vy = (targetY - startY - 0.5*g*T*T)/T;
  return {
    kind:'rocket',
    x: startX, y: startY,
    vx: (targetX - startX)/T,
    vy: vy,
    g: g,
    color, type,
    targetY,
    birth: birthTime,
    trail: [],
    alive: true
  };
}

function createBurst(x, y, color, type, t){
  const sparks = [];
  const baseSpeed = 140 + Math.random()*80;
  let count;
  if(type==='peony'){ count = 130; }
  else if(type==='ring'){ count = 110; }
  else { count = 90; } // willow
  for(let i=0;i<count;i++){
    let angle, speed, life, drag, grav;
    if(type==='peony'){
      angle = Math.random()*Math.PI*2;
      speed = baseSpeed * (0.7 + Math.random()*0.6);
      life = 1.4 + Math.random()*0.8;
      drag = 0.985;
      grav = 90;
    } else if(type==='ring'){
      angle = (i/count)*Math.PI*2 + (Math.random()-0.5)*0.05;
      speed = baseSpeed * (0.95 + Math.random()*0.1);
      life = 1.3 + Math.random()*0.5;
      drag = 0.99;
      grav = 70;
    } else { // willow
      angle = Math.random()*Math.PI*2;
      speed = baseSpeed * (0.5 + Math.random()*0.7);
      life = 2.2 + Math.random()*1.0;
      drag = 0.975;
      grav = 160;
    }
    sparks.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life, age:0,
      drag, grav,
      color,
      trail: []
    });
  }
  return {
    kind:'burst',
    x, y, color, type,
    birth: t,
    flash: 1.0,
    sparks
  };
}

function spawnFinaleBurst(t){
  const color = COLORS[(Math.random()*COLORS.length)|0];
  const type = TYPES[(Math.random()*TYPES.length)|0];
  const x = W*0.1 + Math.random()*W*0.8;
  const y = H*0.12 + Math.random()*H*0.45;
  fireworks.push(createRocket(x, y, color, type, t));
}

// Seed show
function seedShow(t0){
  // Several mid-flight rockets
  for(let i=0;i<3;i++){
    const color = COLORS[(Math.random()*COLORS.length)|0];
    const type = TYPES[(Math.random()*TYPES.length)|0];
    const x = W*0.1 + Math.random()*W*0.8;
    const y = H*0.15 + Math.random()*H*0.4;
    const r = createRocket(x, y, color, type, t0 - 0.3 - Math.random()*0.4);
    // advance rocket to mid-ascent
    const adv = 0.3 + Math.random()*0.35;
    r.x += r.vx*adv;
    r.y += r.vy*adv + 0.5*r.g*adv*adv;
    r.vy += r.g*adv;
    fireworks.push(r);
  }
  // Two already-bursting peonies/rings mid-expansion
  for(let i=0;i<2;i++){
    const color = COLORS[(Math.random()*COLORS.length)|0];
    const type = Math.random()<0.6?'peony':'ring';
    const x = W*0.15 + Math.random()*W*0.7;
    const y = H*0.18 + Math.random()*H*0.35;
    const b = createBurst(x,y,color,type,t0 - 0.3 - Math.random()*0.5);
    const adv = 0.35 + Math.random()*0.5;
    for(const s of b.sparks){
      const dt = adv;
      // simulate
      const steps = 10;
      for(let k=0;k<steps;k++){
        const h = dt/steps;
        s.vx *= Math.pow(s.drag, h*60);
        s.vy *= Math.pow(s.drag, h*60);
        s.vy += s.grav*h;
        s.x += s.vx*h;
        s.y += s.vy*h;
      }
      s.age = adv;
      s.trail.length = 0;
    }
    b.flash = Math.max(0, 1 - adv*2.5);
    fireworks.push(b);
  }
  // One willow fading
  const color = COLORS[(Math.random()*COLORS.length)|0];
  const x = W*0.15 + Math.random()*W*0.7;
  const y = H*0.2 + Math.random()*H*0.3;
  const b = createBurst(x,y,color,'willow',t0 - 1.1);
  const adv = 1.1;
  for(const s of b.sparks){
    const steps = 20;
    for(let k=0;k<steps;k++){
      const h = adv/steps;
      s.vx *= Math.pow(s.drag, h*60);
      s.vy *= Math.pow(s.drag, h*60);
      s.vy += s.grav*h;
      s.x += s.vx*h;
      s.y += s.vy*h;
    }
    s.age = adv;
    s.trail.length = 0;
  }
  b.flash = 0;
  fireworks.push(b);

  nextBurstAt = t0 + 0.15;
}

// Drawing
function drawSky(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#02030a');
  g.addColorStop(0.55,'#050816');
  g.addColorStop(1,'#0a0a1a');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function drawStars(t){
  ctx.save();
  for(const s of stars){
    const a = 0.4 + 0.4*Math.sin(t*s.sp + s.tw);
    ctx.fillStyle = 'rgba(220,230,255,'+a*0.8+')';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawSkyline(reflections){
  // buildings
  ctx.save();
  for(const b of buildings){
    ctx.fillStyle = '#05060c';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // subtle top edge
    ctx.fillStyle = 'rgba(40,50,80,0.4)';
    ctx.fillRect(b.x, b.y, b.w, 1);
  }
  // windows
  for(const b of buildings){
    for(const w of b.windows){
      if(!w.on) continue;
      ctx.fillStyle = w.c;
      ctx.globalAlpha = 0.85;
      ctx.fillRect(w.x, w.y, w.w, w.h);
    }
  }
  ctx.globalAlpha = 1;
  // reflection glow on rooftops
  if(reflections && reflections.length){
    ctx.globalCompositeOperation = 'lighter';
    for(const r of reflections){
      const grd = ctx.createRadialGradient(r.x, groundY, 0, r.x, groundY, r.rad);
      const [cr,cg,cb] = r.color;
      grd.addColorStop(0, 'rgba('+cr+','+cg+','+cb+','+(0.35*r.a)+')');
      grd.addColorStop(1, 'rgba('+cr+','+cg+','+cb+',0)');
      ctx.fillStyle = grd;
      ctx.fillRect(r.x-r.rad, groundY-r.rad*0.3, r.rad*2, r.rad*0.6);
    }
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.restore();
}

function drawFireworks(t){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for(const f of fireworks){
    if(f.kind==='rocket'){
      // trail
      for(let i=0;i<f.trail.length;i++){
        const p = f.trail[i];
        const a = (i/f.trail.length)*0.8;
        ctx.fillStyle = 'rgba(255,220,160,'+a+')';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
      // head
      const [cr,cg,cb] = f.color;
      const grd = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,8);
      grd.addColorStop(0,'rgba(255,255,240,1)');
      grd.addColorStop(0.4,'rgba('+cr+','+cg+','+cb+',0.9)');
      grd.addColorStop(1,'rgba('+cr+','+cg+','+cb+',0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 8, 0, Math.PI*2);
      ctx.fill();
    } else if(f.kind==='burst'){
      // flash
      if(f.flash > 0.02){
        const [cr,cg,cb] = f.color;
        const r = 40 + (1-f.flash)*60;
        const grd = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r);
        grd.addColorStop(0,'rgba(255,255,255,'+(f.flash*0.9)+')');
        grd.addColorStop(0.3,'rgba('+cr+','+cg+','+cb+','+(f.flash*0.6)+')');
        grd.addColorStop(1,'rgba('+cr+','+cg+','+cb+',0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(f.x, f.y, r, 0, Math.PI*2);
        ctx.fill();
      }
      // sparks + trails
      const [cr,cg,cb] = f.color;
      for(const s of f.sparks){
        const lifeT = 1 - s.age/s.life;
        if(lifeT <= 0) continue;
        const a = Math.max(0, lifeT);
        // trail line
        if(s.trail.length > 1){
          ctx.strokeStyle = 'rgba('+cr+','+cg+','+cb+','+(a*0.5)+')';
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(s.trail[0].x, s.trail[0].y);
          for(let i=1;i<s.trail.length;i++){
            ctx.lineTo(s.trail[i].x, s.trail[i].y);
          }
          ctx.lineTo(s.x, s.y);
          ctx.stroke();
        }
        // head
        ctx.fillStyle = 'rgba('+Math.min(255,cr+60)+','+Math.min(255,cg+60)+','+Math.min(255,cb+60)+','+a+')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, 1.6, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

// Main loop
let lastT = 0;
let started = false;
let startTime = 0;

function frame(ts){
  if(!started){
    startTime = ts;
    lastT = ts;
    resize();
    seedShow(ts/1000);
    started = true;
  }
  const tNow = ts/1000;
  let dt = (ts - lastT)/1000;
  if(dt > 0.05) dt = 0.05;
  lastT = ts;

  // Fade trail
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(2,3,10,0.22)';
  ctx.fillRect(0,0,W,H);

  // Redraw sky subtly (keep stars alive through fade)
  // We redraw sky + stars each frame on top of fade so they don't vanish
  // Actually fade dims them; re-draw stars faintly each frame for twinkle
  drawStars(tNow);

  // Spawn new bursts
  if(tNow >= nextBurstAt){
    const tp = totalParticles();
    if(tp < MAX_PARTICLES - 150){
      spawnFinaleBurst(tNow);
      // finale rhythm: bursts come fast, sometimes in pairs
      const interval = 0.28 + Math.random()*0.42;
      nextBurstAt = tNow + interval;
      if(Math.random() < 0.35){
        // bonus burst soon
        nextBurstAt = Math.min(nextBurstAt, tNow + 0.08 + Math.random()*0.15);
      }
    } else {
      nextBurstAt = tNow + 0.1;
    }
  }

  // Update fireworks
  const reflections = [];
  for(let i=fireworks.length-1;i>=0;i--){
    const f = fireworks[i];
    if(f.kind==='rocket'){
      f.vy += f.g*dt;
      f.x += f.vx*dt;
      f.y += f.vy*dt;
      f.trail.push({x:f.x, y:f.y});
      if(f.trail.length > 10) f.trail.shift();
      // burst when reaches targetY or starts descending
      if(f.y <= f.targetY || f.vy > 0){
        const b = createBurst(f.x, f.y, f.color, f.type, tNow);
        fireworks.push(b);
        fireworks.splice(i,1);
        continue;
      }
    } else if(f.kind==='burst'){
      f.flash *= Math.pow(0.02, dt); // fast decay
      let alive = 0;
      for(const s of f.sparks){
        s.age += dt;
        if(s.age >= s.life) continue;
        s.vx *= Math.pow(s.drag, dt*60);
        s.vy *= Math.pow(s.drag, dt*60);
        s.vy += s.grav*dt;
        s.x += s.vx*dt;
        s.y += s.vy*dt;
        s.trail.push({x:s.x, y:s.y});
        if(s.trail.length > 6) s.trail.shift();
        alive++;
      }
      if(alive === 0 && f.flash < 0.02){
        fireworks.splice(i,1);
        continue;
      }
      // reflection
      if(f.flash > 0.05 || alive > 30){
        const strength = f.flash>0.1 ? f.flash : Math.min(0.5, alive/150);
        reflections.push({x:f.x, color:f.color, a:strength, rad: 120 + (1-f.flash)*80});
      }
    }
  }

  // Draw skyline on top (so glow reflects on rooftops)
  drawSkyline(reflections);

  // Draw fireworks (above skyline for sky portion, but we already drew skyline)
  // Actually fireworks should be drawn BEFORE skyline reflection overlay but AFTER sky.
  // Reorder: we drew skyline already. Let's draw fireworks now; they'll appear in front of skyline.
  // That's fine since bursts are in upper sky.
  drawFireworks(tNow);

  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
} catch(e){
  document.body.innerHTML = '<pre style="color:#fff;font:12px monospace;padding:10px">'+e.stack+'</pre>';
}
</script>
</body>
</html>
