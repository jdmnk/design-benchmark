<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script type="module">
import * as THREE from 'three';
try {
  // ---------- helpers ----------
  const clamp = (x,a,b)=>Math.max(a,Math.min(b,x));
  const smooth = (a,b,x)=>{ x=clamp((x-a)/(b-a),0,1); return x*x*(3-2*x); };
  const mix = (a,b,t)=>a+(b-a)*t;
  const mixC = (c1,c2,t)=>[mix(c1[0],c2[0],t),mix(c1[1],c2[1],t),mix(c1[2],c2[2],t)];

  // ---------- constants ----------
  const R = 1.4;                 // planet radius
  const RIN = 1.75, ROUT = 3.08; // ring radii (~1.25R .. 2.2R)
  const INFRAC = RIN/ROUT;       // 0.568
  const GAP = 0.855;             // Cassini gap fraction (~2/3 out)

  // ---------- planet texture (warm bands + swirls + storm) ----------
  function planetTexture(){
    const W=1024,H=512, cv=document.createElement('canvas');
    cv.width=W; cv.height=H; const ctx=cv.getContext('2d');
    const img=ctx.createImageData(W,H), d=img.data;
    const dark=[150,105,55], tan=[201,154,91], cream=[243,230,196];
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        let t=y/H;
        const u=x/W;
        // wavy belts: perturb latitude by longitude
        const warp=0.012*Math.sin(u*Math.PI*2*3 + 6*Math.sin(t*Math.PI*7))
                  +0.006*Math.sin(u*Math.PI*2*7 + t*30);
        const tt=t+warp;
        let sh=0.5
          +0.30*Math.sin(tt*Math.PI*9)
          +0.15*Math.sin(tt*Math.PI*23+1.3)
          +0.08*Math.sin(tt*Math.PI*41);
        sh+=0.20*Math.exp(-Math.pow((tt-0.5)/0.10,2)); // lighter equatorial zone
        sh=clamp(sh,0,1);
        let col = sh<0.5 ? mixC(dark,tan,sh*2) : mixC(tan,cream,(sh-0.5)*2);
        // storm oval
        const dxo=(u-0.34), dyo=(t-0.60);
        const ov=Math.exp(-(Math.pow(dxo/0.055,2)+Math.pow(dyo/0.032,2)));
        col=mixC(col,[176,96,58],ov*0.75);
        const dx2=(u-0.66), dy2=(t-0.40);
        const ov2=Math.exp(-(Math.pow(dx2/0.03,2)+Math.pow(dy2/0.02,2)));
        col=mixC(col,[248,236,205],ov2*0.6);
        // fine noise
        const n=(Math.sin(x*12.9+y*78.2)*43758.5)%1;
        const nn=(n-Math.floor(n)-0.5)*10;
        const i=(y*W+x)*4;
        d[i]=clamp(col[0]+nn,0,255); d[i+1]=clamp(col[1]+nn,0,255);
        d[i+2]=clamp(col[2]+nn,0,255); d[i+3]=255;
      }
    }
    ctx.putImageData(img,0,0);
    const tex=new THREE.CanvasTexture(cv);
    tex.colorSpace=THREE.SRGBColorSpace; tex.anisotropy=4;
    tex.wrapS=THREE.RepeatWrapping;
    return tex;
  }

  // ---------- ring texture (radial bands, Cassini gap, clumps, edge alpha) ----------
  function ringTexture(){
    const S=512, cv=document.createElement('canvas');
    cv.width=S; cv.height=S; const ctx=cv.getContext('2d');
    const img=ctx.createImageData(S,S), d=img.data, c=S/2;
    for(let y=0;y<S;y++){
      for(let x=0;x<S;x++){
        const dx=x-c, dy=y-c, dist=Math.hypot(dx,dy);
        const rn=dist/c; // 0..1 == radius/ROUT
        const i=(y*S+x)*4;
        if(rn<INFRAC-0.01 || rn>1){ d[i+3]=0; continue; }
        let bri=0.65+0.18*Math.sin(rn*80)+0.10*Math.sin(rn*205+1.0)
                +0.06*Math.sin(rn*400+2.0);
        const ang=Math.atan2(dy,dx);
        let clump=0.86+0.10*Math.sin(ang*6)+0.06*Math.sin(ang*13+0.5)
                 +0.08*Math.exp(-Math.pow(((ang+2.2)%(Math.PI*2)-0)/0.5,2));
        bri=clamp(bri*clump,0,1.2);
        const icy=[214,200,172];
        let edge=smooth(INFRAC,INFRAC+0.06,rn)*(1-smooth(0.95,1.0,rn));
        const gap=smooth(0.0,0.02,Math.abs(rn-GAP)); // dark division
        const a=clamp(edge*gap*(0.45+0.55*bri)*0.95,0,0.95);
        d[i]=clamp(icy[0]*bri,0,255); d[i+1]=clamp(icy[1]*bri,0,255);
        d[i+2]=clamp(icy[2]*bri,0,255); d[i+3]=a*255;
      }
    }
    ctx.putImageData(img,0,0);
    const tex=new THREE.CanvasTexture(cv);
    tex.colorSpace=THREE.SRGBColorSpace; tex.anisotropy=4;
    return tex;
  }

  // ---------- static ring overlay: left-bright (darken right) + planet shadow wedge ----------
  function ringOverlay(){
    const S=512, cv=document.createElement('canvas');
    cv.width=S; cv.height=S; const ctx=cv.getContext('2d');
    const img=ctx.createImageData(S,S), d=img.data, c=S/2;
    for(let y=0;y<S;y++){
      for(let x=0;x<S;x++){
        const px=(x-c)/c, py=(y-c)/c; // px ~ x_world/ROUT, py ~ -z_world/ROUT
        const rn=Math.hypot(px,py);
        const i=(y*S+x)*4;
        if(rn<INFRAC-0.01 || rn>1){ d[i+3]=0; continue; }
        const mask=smooth(INFRAC,INFRAC+0.06,rn)*(1-smooth(0.96,1.0,rn));
        const darkRight=clamp(px,0,1)*0.35;           // right side dimmer -> left brighter
        const a=Math.atan2(py,px);
        const wedge=0.6*Math.exp(-Math.pow((a-0.6)/0.45,2)); // planet shadow to back/right
        const alpha=clamp((darkRight+wedge)*mask,0,0.65);
        d[i]=0; d[i+1]=0; d[i+2]=0; d[i+3]=alpha*255;
      }
    }
    ctx.putImageData(img,0,0);
    return new THREE.CanvasTexture(cv);
  }

  // ---------- ring shadow band on planet ----------
  function shellTexture(){
    const W=512,H=256, cv=document.createElement('canvas');
    cv.width=W; cv.height=H; const ctx=cv.getContext('2d');
    const img=ctx.createImageData(W,H), d=img.data;
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const u=x/W, v=y/H;
        const band=Math.exp(-Math.pow((v-0.5)/0.06,2));
        const side=0.30+0.70*(0.5+0.5*Math.cos((u-1.0)*Math.PI*2)); // darker on +x (shadow) side
        const i=(y*W+x)*4;
        d[i]=0; d[i+1]=0; d[i+2]=0; d[i+3]=clamp(band*side*0.5,0,1)*255;
      }
    }
    ctx.putImageData(img,0,0);
    return new THREE.CanvasTexture(cv);
  }

  // ---------- renderer / scene / camera ----------
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0x05060a,1);
  document.body.style.margin='0'; document.body.style.overflow='hidden';
  document.body.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x05060a);
  const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,3.42,9.40);   // ~20deg above the equatorial plane
  camera.lookAt(0,0,0);

  // ---------- lights (upper-left) ----------
  scene.add(new THREE.AmbientLight(0x2a3346,0.9));
  const sun=new THREE.DirectionalLight(0xfff2dc,2.1);
  sun.position.set(-7,5,4);
  scene.add(sun);

  // ---------- planet ----------
  const planet=new THREE.Mesh(
    new THREE.SphereGeometry(R,96,64),
    new THREE.MeshStandardMaterial({map:planetTexture(),roughness:1,metalness:0,
      emissive:new THREE.Color(0x140f07)})
  );
  scene.add(planet);

  // ring-shadow shell on planet (static)
  const shell=new THREE.Mesh(
    new THREE.SphereGeometry(R*1.004,64,40),
    new THREE.MeshBasicMaterial({map:shellTexture(),transparent:true,
      depthWrite:false, opacity:1})
  );
  shell.renderOrder=2; scene.add(shell);

  // ---------- rings ----------
  const rgeo=new THREE.RingGeometry(RIN,ROUT,160,1);
  rgeo.rotateX(-Math.PI/2);
  const rings=new THREE.Mesh(rgeo,new THREE.MeshBasicMaterial({
    map:ringTexture(),transparent:true,side:THREE.DoubleSide,
    depthWrite:false, opacity:1}));
  rings.renderOrder=1; scene.add(rings);

  const ogeo=new THREE.RingGeometry(RIN,ROUT,160,1);
  ogeo.rotateX(-Math.PI/2);
  const overlay=new THREE.Mesh(ogeo,new THREE.MeshBasicMaterial({
    map:ringOverlay(),transparent:true,side:THREE.DoubleSide,depthWrite:false}));
  overlay.position.y=0.008; overlay.renderOrder=2; scene.add(overlay);

  // ---------- starfield ----------
  const N=1600, pos=new Float32Array(N*3), col=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const th=Math.acos(2*((i*0.61803)%1)-1);
    const ph=i*2.399963;
    const r=60+((i*97)%30);
    pos[i*3]=r*Math.sin(th)*Math.cos(ph);
    pos[i*3+1]=r*Math.sin(th)*Math.sin(ph);
    pos[i*3+2]=r*Math.cos(th);
    const b=0.4+0.6*((i*53)%10)/10;
    col[i*3]=b; col[i*3+1]=b; col[i*3+2]=b*0.95+0.05;
  }
  const sg=new THREE.BufferGeometry();
  sg.setAttribute('position',new THREE.BufferAttribute(pos,3));
  sg.setAttribute('color',new THREE.BufferAttribute(col,3));
  const stars=new THREE.Points(sg,new THREE.PointsMaterial({
    size:0.18,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:0.85}));
  scene.add(stars);

  // ---------- animation (timestamp-driven) ----------
  const PLANET_RATE=25*Math.PI/180; // deg/s -> rad/s
  const RING_RATE  =20*Math.PI/180;
  function animate(t){
    t=(t||0)/1000;
    planet.rotation.y = t*PLANET_RATE;
    rings.rotation.y  = t*RING_RATE;
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
} catch(e){ console.error(e); }
</script>
</body>
</html>
