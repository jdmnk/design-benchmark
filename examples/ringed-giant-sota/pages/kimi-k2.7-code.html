<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturn-like Ringed Gas Giant</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
  function smoothstep(min, max, value) {
    const x = Math.max(0, Math.min(1, (value - min) / (max - min)));
    return x * x * (3 - 2 * x);
  }

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function createPlanetTexture() {
    const w = 1024, h = 512;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(w, h);
    const data = imgData.data;

    const stops = [
      { t: 0.00, c: hexToRgb('#a87d4a') },
      { t: 0.15, c: hexToRgb('#c99a5b') },
      { t: 0.30, c: hexToRgb('#e6c88f') },
      { t: 0.42, c: hexToRgb('#f3e6c4') },
      { t: 0.50, c: hexToRgb('#f8f0d8') },
      { t: 0.58, c: hexToRgb('#f3e6c4') },
      { t: 0.70, c: hexToRgb('#e6c88f') },
      { t: 0.85, c: hexToRgb('#c99a5b') },
      { t: 1.00, c: hexToRgb('#a87d4a') }
    ];

    function bandColor(v) {
      for (let i = 0; i < stops.length - 1; i++) {
        if (v <= stops[i+1].t) {
          const t = (v - stops[i].t) / (stops[i+1].t - stops[i].t);
          const c0 = stops[i].c, c1 = stops[i+1].c;
          return [
            c0[0] + (c1[0]-c0[0])*t,
            c0[1] + (c1[1]-c0[1])*t,
            c0[2] + (c1[2]-c0[2])*t
          ];
        }
      }
      return stops[stops.length-1].c;
    }

    const rows = new Array(h);
    for (let y = 0; y < h; y++) rows[y] = bandColor(y / (h - 1));

    for (let y = 0; y < h; y++) {
      const v = y / (h - 1);
      const base = rows[y];
      for (let x = 0; x < w; x++) {
        const u = x / w;
        let r = base[0], g = base[1], b = base[2];

        const turb = (Math.sin(u*24.0 + v*16.0) + Math.cos(u*37.0 - v*22.0))*0.5 + 0.5;
        const tv = (turb - 0.5)*14.0;
        r += tv; g += tv; b += tv;

        const swirl = Math.sin(u*18.0 + Math.sin(v*12.0)*4.0) * Math.cos(v*20.0);
        r += swirl*4.0; g += swirl*4.0; b += swirl*4.0;

        const du = u - 0.55, dv = v - 0.38;
        const storm = Math.sqrt(du*du*9.0 + dv*dv*36.0);
        if (storm < 0.12) {
          const dark = (1.0 - storm/0.12)*26.0;
          r -= dark; g -= dark; b -= dark;
        }

        const du2 = u - 0.78, dv2 = v - 0.62;
        const spot = Math.sqrt(du2*du2*16.0 + dv2*dv2*64.0);
        if (spot < 0.06) {
          const dark = (1.0 - spot/0.06)*18.0;
          r -= dark; g -= dark; b -= dark;
        }

        const idx = (y*w + x)*4;
        data[idx] = Math.max(0, Math.min(255, r));
        data[idx+1] = Math.max(0, Math.min(255, g));
        data[idx+2] = Math.max(0, Math.min(255, b));
        data[idx+3] = 255;
      }
    }

    ctx.putImageData(imgData, 0, 0);
    const tex = new THREE.CanvasTexture(canvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }

  function createRingTexture() {
    const w = 1024, h = 256;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(w, h);
    const data = imgData.data;

    for (let y = 0; y < h; y++) {
      const v = y / (h - 1);
      let r = 210, g = 200, b = 180;

      const band1 = Math.sin(v*30.0)*8.0;
      const band2 = Math.sin(v*55.0 + 1.0)*5.0;
      r += band1 + band2; g += band1 + band2; b += band1 + band2;

      const cassini = smoothstep(0.66, 0.67, v) * smoothstep(0.69, 0.68, v);
      const dark = cassini*160.0;
      r -= dark; g -= dark; b -= dark;

      const innerFade = smoothstep(0.0, 0.08, v);
      const outerFade = smoothstep(1.0, 0.92, v);
      const alpha = innerFade * outerFade;

      for (let x = 0; x < w; x++) {
        const u = x / w;
        const clump1 = Math.sin(u*6.28318530718*4.0 + v*20.0)*0.5 + 0.5;
        const clump2 = Math.sin(u*6.28318530718*9.0 - v*30.0)*0.5 + 0.5;
        const bright = 1.0 + clump1*0.10 + clump2*0.06;
        const noise = (Math.random() - 0.5)*10.0;

        const idx = (y*w + x)*4;
        data[idx] = Math.max(0, Math.min(255, (r+noise)*bright));
        data[idx+1] = Math.max(0, Math.min(255, (g+noise)*bright));
        data[idx+2] = Math.max(0, Math.min(255, (b+noise)*bright));
        data[idx+3] = Math.floor(alpha*255);
      }
    }

    ctx.putImageData(imgData, 0, 0);
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050508);

  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x050508);
  document.body.appendChild(renderer.domElement);

  const aspect = window.innerWidth / window.innerHeight;
  const planetRadius = 1.0;
  const frustumHeight = planetRadius * 2.0 / 0.34;
  const camera = new THREE.OrthographicCamera(
    -frustumHeight * aspect / 2,
    frustumHeight * aspect / 2,
    frustumHeight / 2,
    -frustumHeight / 2,
    0.1,
    200
  );
  camera.position.set(0, 0, 10);
  camera.lookAt(0, 0, 0);

  const starGeo = new THREE.BufferGeometry();
  const starCount = 700;
  const pos = new Float32Array(starCount * 3);
  const sizes = new Float32Array(starCount);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random()*2 - 1);
    const rad = 25 + Math.random()*55;
    pos[i*3] = rad * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = rad * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = -10 - Math.random()*40;
    sizes[i] = 0.5 + Math.random()*1.2;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const starMat = new THREE.PointsMaterial({
    color: 0xaabbff,
    size: 0.07,
    transparent: true,
    opacity: 0.65,
    sizeAttenuation: false
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  const lightDir = new THREE.Vector3(-0.7, 0.6, 0.35).normalize();
  const tiltDeg = 22.0;
  const tiltRad = tiltDeg * Math.PI / 180.0;
  const ringNormal = new THREE.Vector3(0, Math.cos(tiltRad), Math.sin(tiltRad));

  const planetTexture = createPlanetTexture();

  const planetMaterial = new THREE.ShaderMaterial({
    uniforms: {
      uTexture: { value: planetTexture },
      uLightDir: { value: lightDir },
      uRingNormal: { value: ringNormal }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;
      void main() {
        vUv = uv;
        vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
        vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D uTexture;
      uniform vec3 uLightDir;
      uniform vec3 uRingNormal;
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;
      void main() {
        vec3 baseColor = texture2D(uTexture, vUv).rgb;
        float NdotL = dot(vWorldNormal, uLightDir);
        float lit = smoothstep(-0.08, 0.22, NdotL);
        vec3 color = baseColor * (0.10 + 0.90 * lit);

        float limb = max(dot(vWorldNormal, vec3(0.0, 0.0, 1.0)), 0.0);
        color *= (0.76 + 0.24 * limb);

        float onShadowSide = smoothstep(0.0, -0.18, NdotL);
        float ringPlaneDist = abs(dot(vWorldPosition, uRingNormal));
        float inRingPlane = smoothstep(0.16, 0.0, ringPlaneDist);
        float ringShadow = onShadowSide * inRingPlane * 0.58;
        color *= (1.0 - ringShadow);

        gl_FragColor = vec4(color, 1.0);
      }
    `
  });

  const planet = new THREE.Mesh(
    new THREE.SphereGeometry(planetRadius, 128, 64),
    planetMaterial
  );
  planet.rotation.x = tiltRad;
  scene.add(planet);

  const ringTexture = createRingTexture();

  const ringMaterial = new THREE.ShaderMaterial({
    uniforms: {
      uTexture: { value: ringTexture },
      uLightDir: { value: lightDir },
      uTime: { value: 0.0 }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;
      void main() {
        vUv = uv;
        vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
        vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D uTexture;
      uniform vec3 uLightDir;
      uniform float uTime;
      varying vec2 vUv;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;

      void main() {
        float radiusT = vUv.y;
        float angle = vUv.x * 6.28318530718;
        float innerSpeed = 0.42;
        float outerSpeed = 0.31;
        float speed = mix(innerSpeed, outerSpeed, radiusT);
        angle += uTime * speed;
        float newU = fract(angle / 6.28318530718);

        vec4 tex = texture2D(uTexture, vec2(newU, radiusT));
        vec3 color = tex.rgb;
        float alpha = tex.a;

        float edgeFade = smoothstep(0.0, 0.12, radiusT) * smoothstep(1.0, 0.88, radiusT);
        alpha *= edgeFade;

        float NdotL = dot(vWorldNormal, uLightDir);
        float lit = 0.32 + 0.68 * max(NdotL, 0.0);
        color *= lit;

        float sideLit = 0.88 + 0.12 * smoothstep(2.0, -2.0, vWorldPosition.x);
        color *= sideLit;

        float alongLight = dot(vWorldPosition, uLightDir);
        float distToShadowAxis = length(cross(vWorldPosition, uLightDir));
        float inPlanetShadow = smoothstep(1.15, 0.82, distToShadowAxis) * smoothstep(0.0, -0.25, alongLight);
        color *= (1.0 - 0.72 * inPlanetShadow);

        gl_FragColor = vec4(color, alpha);
      }
    `,
    transparent: true,
    alphaTest: 0.02,
    side: THREE.DoubleSide,
    depthWrite: false
  });

  const innerRadius = 1.22;
  const outerRadius = 2.20;
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(innerRadius, outerRadius, 256, 1),
    ringMaterial
  );
  ring.rotation.x = -Math.PI / 2.0 + tiltRad;
  scene.add(ring);

  window.addEventListener('resize', () => {
    const a = window.innerWidth / window.innerHeight;
    camera.left = -frustumHeight * a / 2;
    camera.right = frustumHeight * a / 2;
    camera.top = frustumHeight / 2;
    camera.bottom = -frustumHeight / 2;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate(time) {
    requestAnimationFrame(animate);
    const t = time * 0.001;

    planet.rotation.y = t * 0.44;
    ring.rotation.y = t * 0.35;
    ringMaterial.uniforms.uTime.value = t;

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);

} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
