<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gargantua Black Hole</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #020308;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x020308, 1);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020308);

  const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.05, 80);
  camera.position.set(0, 1.08, 9.0);
  camera.lookAt(0, 0, 0);

  const clock = new THREE.Clock();

  const diskUniforms = {
    time: { value: 0 },
    rotation: { value: 0 },
    inner: { value: 1.08 },
    outer: { value: 5.45 }
  };

  const diskVertex = `
    varying vec2 vUv;
    varying vec3 vPos;
    void main() {
      vUv = uv;
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;

  const diskFragment = `
    precision highp float;
    varying vec2 vUv;
    varying vec3 vPos;
    uniform float time;
    uniform float rotation;
    uniform float inner;
    uniform float outer;

    float hash(float n) {
      return fract(sin(n) * 43758.5453123);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i.x + i.y * 57.0);
      float b = hash(i.x + 1.0 + i.y * 57.0);
      float c = hash(i.x + (i.y + 1.0) * 57.0);
      float d = hash(i.x + 1.0 + (i.y + 1.0) * 57.0);
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    void main() {
      float r = mix(inner, outer, vUv.x);
      float a = vUv.y * 6.28318530718 + rotation;

      float radial = 1.0 - smoothstep(inner, outer, r);
      float innerGlow = exp(-pow((r - inner) * 2.25, 2.0));
      float outerFade = 1.0 - smoothstep(3.7, outer, r);

      float lanes = 0.55 + 0.45 * sin(a * 15.0 + r * 5.8 + time * 2.1);
      lanes *= 0.72 + 0.28 * sin(a * 31.0 - r * 8.0 + time * 4.0);

      float turbulent = noise(vec2(a * 2.4 + time * 0.35, r * 5.0));
      turbulent += 0.5 * noise(vec2(a * 7.0 - time * 0.65, r * 11.0));
      turbulent = clamp(turbulent / 1.5, 0.0, 1.0);

      float clumps = pow(max(0.0, sin(a * 5.0 + r * 3.3 - time * 1.7)), 10.0);
      clumps += 0.7 * pow(max(0.0, sin(a * 8.0 - r * 1.8 + time * 2.3)), 14.0);

      float beam = 0.72 + 0.58 * smoothstep(0.05, 1.0, cos(a - 0.35 * sin(time * 0.32)));
      float intensity = (0.33 + 1.55 * innerGlow + 0.5 * radial) * outerFade;
      intensity *= (0.58 + 0.42 * lanes + 0.55 * turbulent + 0.62 * clumps);
      intensity *= beam;
      intensity *= 0.96 + 0.04 * sin(time * 17.0 + a * 11.0);

      vec3 innerColor = vec3(1.0, 0.953, 0.816);
      vec3 midColor = vec3(1.0, 0.682, 0.231);
      vec3 outerColor = vec3(0.784, 0.333, 0.102);
      float t = smoothstep(inner, outer, r);
      vec3 color = mix(innerColor, midColor, smoothstep(0.04, 0.45, t));
      color = mix(color, outerColor, smoothstep(0.42, 1.0, t));

      float alpha = intensity * (0.76 + 0.24 * innerGlow);
      alpha *= smoothstep(inner, inner + 0.08, r) * (1.0 - smoothstep(outer - 0.2, outer, r));

      gl_FragColor = vec4(color * intensity * 1.35, clamp(alpha, 0.0, 0.96));
    }
  `;

  function makeDiskGeometry(inner, outer, segments, radialSteps) {
    const positions = [];
    const uvs = [];
    const indices = [];
    for (let r = 0; r <= radialSteps; r++) {
      const u = r / radialSteps;
      const radius = inner + (outer - inner) * u;
      for (let s = 0; s <= segments; s++) {
        const v = s / segments;
        const a = v * Math.PI * 2;
        positions.push(Math.cos(a) * radius, 0, Math.sin(a) * radius);
        uvs.push(u, v);
      }
    }
    const row = segments + 1;
    for (let r = 0; r < radialSteps; r++) {
      for (let s = 0; s < segments; s++) {
        const i = r * row + s;
        indices.push(i, i + row, i + 1);
        indices.push(i + 1, i + row, i + row + 1);
      }
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    g.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    g.setIndex(indices);
    g.computeVertexNormals();
    return g;
  }

  const diskMaterial = new THREE.ShaderMaterial({
    uniforms: diskUniforms,
    vertexShader: diskVertex,
    fragmentShader: diskFragment,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide
  });

  const disk = new THREE.Mesh(makeDiskGeometry(1.08, 5.45, 320, 18), diskMaterial);
  scene.add(disk);

  const lensUniforms = {
    time: { value: 0 },
    rotation: { value: 0 }
  };

  const lensVertex = `
    varying vec2 vUv;
    varying vec3 vPos;
    void main() {
      vUv = uv;
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;

  const lensFragment = `
    precision highp float;
    varying vec2 vUv;
    varying vec3 vPos;
    uniform float time;
    uniform float rotation;

    void main() {
      float a = vUv.y * 6.28318530718 + rotation;
      float edge = smoothstep(0.0, 0.18, vUv.x) * (1.0 - smoothstep(0.82, 1.0, vUv.x));
      float span = smoothstep(0.04, 0.18, abs(sin(vUv.y * 3.14159265)));
      float clump = 0.7 + 0.3 * sin(a * 13.0 + time * 3.0);
      clump += 0.25 * sin(a * 27.0 - time * 4.5);
      float beam = 0.76 + 0.48 * smoothstep(-0.1, 1.0, cos(a - 0.55 - 0.3 * sin(time * 0.35)));
      float hot = pow(1.0 - abs(vUv.x - 0.28) * 1.8, 2.0);
      float alpha = edge * span * beam * (0.42 + 0.42 * hot) * (0.86 + 0.14 * sin(time * 19.0 + a * 9.0));
      vec3 color = mix(vec3(1.0, 0.60, 0.18), vec3(1.0, 0.95, 0.74), clamp(hot, 0.0, 1.0));
      gl_FragColor = vec4(color * alpha * (1.7 + clump), clamp(alpha, 0.0, 0.82));
    }
  `;

  const lensMaterial = new THREE.ShaderMaterial({
    uniforms: lensUniforms,
    vertexShader: lensVertex,
    fragmentShader: lensFragment,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide
  });

  function makeLensArc(sign) {
    const positions = [];
    const uvs = [];
    const indices = [];
    const seg = 300;
    const bands = 7;
    for (let b = 0; b <= bands; b++) {
      const u = b / bands;
      const thick = (u - 0.5) * 0.19;
      for (let i = 0; i <= seg; i++) {
        const v = i / seg;
        const a = -Math.PI * 0.98 + v * Math.PI * 1.96;
        const x = Math.sin(a) * (1.16 + thick);
        const y = sign * (0.18 + Math.pow(Math.cos(a) * 0.5 + 0.5, 0.72) * 1.14 + thick * 0.45);
        const z = -0.18 + Math.cos(a) * 0.22;
        positions.push(x, y, z);
        uvs.push(u, v);
      }
    }
    const row = seg + 1;
    for (let b = 0; b < bands; b++) {
      for (let i = 0; i < seg; i++) {
        const p = b * row + i;
        indices.push(p, p + row, p + 1);
        indices.push(p + 1, p + row, p + row + 1);
      }
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    g.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    g.setIndex(indices);
    return g;
  }

  const topArc = new THREE.Mesh(makeLensArc(1), lensMaterial);
  const bottomArc = new THREE.Mesh(makeLensArc(-1), lensMaterial);
  scene.add(topArc, bottomArc);

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.95, 96, 64),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(sphere);

  const ringUniforms = {
    time: { value: 0 }
  };

  const ringMaterial = new THREE.ShaderMaterial({
    uniforms: ringUniforms,
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float time;
      void main() {
        float a = vUv.y * 6.28318530718;
        float band = 1.0 - smoothstep(0.22, 0.50, abs(vUv.x - 0.5));
        float shimmer = 0.86 + 0.14 * sin(a * 32.0 + time * 12.0);
        vec3 color = vec3(1.0, 0.86, 0.48);
        gl_FragColor = vec4(color * band * shimmer * 1.25, band * 0.72);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide
  });

  const photonRing = new THREE.Mesh(new THREE.TorusGeometry(0.972, 0.018, 8, 256), ringMaterial);
  photonRing.rotation.x = Math.PI / 2;
  scene.add(photonRing);

  const glowRing = new THREE.Mesh(
    new THREE.TorusGeometry(1.03, 0.035, 8, 256),
    new THREE.MeshBasicMaterial({
      color: 0xffb84a,
      transparent: true,
      opacity: 0.13,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  glowRing.rotation.x = Math.PI / 2;
  scene.add(glowRing);

  const stars = (() => {
    const count = 650;
    const positions = [];
    const colors = [];
    for (let i = 0; i < count; i++) {
      const r = 18 + Math.random() * 22;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 2 - 1);
      const x = Math.sin(phi) * Math.cos(theta) * r;
      const y = Math.cos(phi) * r;
      const z = Math.sin(phi) * Math.sin(theta) * r;
      if (Math.abs(y) < 1.3 && z > 0) continue;
      positions.push(x, y, z);
      const c = 0.28 + Math.random() * 0.55;
      colors.push(c * 0.82, c * 0.88, c);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    g.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    return new THREE.Points(
      g,
      new THREE.PointsMaterial({
        size: 0.025,
        vertexColors: true,
        transparent: true,
        opacity: 0.62,
        depthWrite: false
      })
    );
  })();
  scene.add(stars);

  const farGlow = new THREE.Mesh(
    new THREE.SphereGeometry(1.16, 64, 32),
    new THREE.MeshBasicMaterial({
      color: 0xff8a24,
      transparent: true,
      opacity: 0.055,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.BackSide
    })
  );
  scene.add(farGlow);

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  function animate(now) {
    requestAnimationFrame(animate);
    const t = now * 0.001;
    const rot = t * 0.58;

    diskUniforms.time.value = t;
    diskUniforms.rotation.value = rot;
    lensUniforms.time.value = t;
    lensUniforms.rotation.value = rot * 0.96;
    ringUniforms.time.value = t;

    disk.rotation.y = rot;
    topArc.rotation.y = rot * 0.18;
    bottomArc.rotation.y = rot * 0.18;
    glowRing.scale.setScalar(1.0 + 0.018 * Math.sin(t * 2.2));
    farGlow.scale.setScalar(1.0 + 0.025 * Math.sin(t * 1.7));

    renderer.render(scene, camera);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
} catch (e) {
  const fallback = document.createElement('div');
  fallback.style.cssText = 'position:fixed;inset:0;background:#020308;color:#ffcf82;font:12px monospace;padding:16px;';
  fallback.textContent = e && e.message ? e.message : String(e);
  document.body.appendChild(fallback);
}
</script>
</body>
</html>
