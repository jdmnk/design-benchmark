<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Black Hole</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050508;
        }
        canvas {
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body>
    <div id="loading">GENERATING BLACK HOLE...</div>
    
    <script type="module">
        import * as THREE from 'three';

        try {
            // ─── SCENE SETUP ─────────────────────────────────────────────
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);

            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Camera slightly above the horizontal disk plane (5–8°)
            camera.position.set(0, 1.8, 22);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            // ─── STARFIELD ─────────────────────────────────────────────────
            const starCount = 1200;
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);

            for (let i = 0; i < starCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 80 + Math.random() * 100;
                
                starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                starPos[i * 3 + 2] = r * Math.cos(phi);

                // Slight color variation: mostly white-blue, some warm
                const temp = Math.random();
                if (temp < 0.7) {
                    starColors[i * 3] = 0.7 + Math.random() * 0.3;
                    starColors[i * 3 + 1] = 0.75 + Math.random() * 0.25;
                    starColors[i * 3 + 2] = 1.0;
                } else if (temp < 0.9) {
                    starColors[i * 3] = 1.0;
                    starColors[i * 3 + 1] = 0.85 + Math.random() * 0.15;
                    starColors[i * 3 + 2] = 0.7 + Math.random() * 0.3;
                } else {
                    starColors[i * 3] = 1.0;
                    starColors[i * 3 + 1] = 0.6 + Math.random() * 0.2;
                    starColors[i * 3 + 2] = 0.4 + Math.random() * 0.2;
                }
                
                starSizes[i] = 0.5 + Math.random() * 1.5;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

            const starMat = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                sizeAttenuation: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // ─── BLACK HOLE PARAMETERS ───────────────────────────────────
            // Diameter = 28% of viewport height → radius = 14% of viewport height
            // At camera distance ~22, tan(fov/2) * dist gives viewport height in world units
            const vFOV = camera.fov * (Math.PI / 180);
            const viewportHeightWorld = 2 * Math.tan(vFOV / 2) * camera.position.z;
            const bhRadius = viewportHeightWorld * 0.14;

            // ─── EVENT HORIZON (perfectly black sphere) ────────────────────
            const bhGeo = new THREE.SphereGeometry(bhRadius, 64, 64);
            const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(bhGeo, bhMat);
            scene.add(blackHole);

            // ─── PHOTON RING (thin bright ring at ~1.05× horizon) ────────
            const photonR = bhRadius * 1.06;
            const photonGeo = new THREE.RingGeometry(photonR, photonR * 1.015, 128);
            const photonMat = new THREE.MeshBasicMaterial({
                color: 0xfff8e7,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const photonRing = new THREE.Mesh(photonGeo, photonMat);
            photonRing.rotation.x = -Math.PI / 2;
            scene.add(photonRing);

            // ─── ACCRETION DISK SHADER ───────────────────────────────────
            const diskVertexShader = `
                varying vec2 vUv;
                varying vec3 vWorldPos;
                void main() {
                    vUv = uv;
                    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const diskFragmentShader = `
                uniform float time;
                uniform float innerRadius;
                uniform float outerRadius;
                varying vec2 vUv;
                varying vec3 vWorldPos;

                // Color palette: white-yellow → amber → deep orange
                vec3 colInner = vec3(1.0, 0.953, 0.816);      // #fff3d0
                vec3 colMid   = vec3(1.0, 0.682, 0.231);      // #ffae3b
                vec3 colOuter = vec3(0.784, 0.333, 0.102);    // #c8551a

                void main() {
                    float r = length(vWorldPos.xz);
                    
                    // Radial falloff: 0 at inner edge, 1 at outer edge
                    float t = clamp((r - innerRadius) / (outerRadius - innerRadius), 0.0, 1.0);
                    
                    // Color gradient
                    vec3 color;
                    if (t < 0.5) {
                        color = mix(colInner, colMid, t * 2.0);
                    } else {
                        color = mix(colMid, colOuter, (t - 0.5) * 2.0);
                    }
                    
                    // Brightness falloff: hot inner edge, dim outer
                    float brightness = mix(2.5, 0.3, t);
                    
                    // Doppler beaming: one side brighter (assume rotating counter-clockwise,
                    // so left side approaching = brighter)
                    float angle = atan(vWorldPos.z, vWorldPos.x);
                    float beaming = 1.0 + 0.5 * cos(angle);
                    brightness *= beaming;
                    
                    // Subtle turbulence
                    float turb = sin(r * 30.0 - time * 2.0) * 0.05 + 
                                 sin(r * 80.0 + time * 3.0) * 0.03;
                    brightness += turb;
                    
                    // Edge softness
                    float edge = smoothstep(0.0, 0.05, t) * smoothstep(1.0, 0.95, t);
                    brightness *= edge;
                    
                    // Additive glow
                    gl_FragColor = vec4(color * brightness, brightness * 0.85);
                }
            `;

            // ─── MAIN ACCRETION DISK (horizontal ring) ────────────────────
            const diskInnerR = bhRadius * 1.35;
            const diskOuterR = bhRadius * 5.5;
            const diskSegments = 128;

            const diskGeo = new THREE.RingGeometry(diskInnerR, diskOuterR, diskSegments, 1);
            const diskUniforms = {
                time: { value: 0 },
                innerRadius: { value: diskInnerR },
                outerRadius: { value: diskOuterR }
            };
            const diskMat = new THREE.ShaderMaterial({
                vertexShader: diskVertexShader,
                fragmentShader: diskFragmentShader,
                uniforms: diskUniforms,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const disk = new THREE.Mesh(diskGeo, diskMat);
            disk.rotation.x = -Math.PI / 2;
            scene.add(disk);

            // ─── GRAVITATIONAL LENSING ARCS ────────────────────────────────
            // These simulate the far side of the disk bending over and under the black hole.
            // We create partial torus segments that wrap around the top and bottom.

            const arcVertexShader = `
                varying vec2 vUv;
                varying vec3 vWorldPos;
                void main() {
                    vUv = uv;
                    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const arcFragmentShader = `
                uniform float time;
                uniform vec3 colorInner;
                uniform vec3 colorMid;
                uniform vec3 colorOuter;
                uniform float beamingSign;
                varying vec2 vUv;
                varying vec3 vWorldPos;

                void main() {
                    // vUv.x goes around the arc (0→1), vUv.y goes across tube (0→1)
                    float t = vUv.y;
                    
                    // Radial-like color gradient
                    vec3 color;
                    if (t < 0.5) {
                        color = mix(colorInner, colorMid, t * 2.0);
                    } else {
                        color = mix(colorMid, colorOuter, (t - 0.5) * 2.0);
                    }
                    
                    // Brightness: hot inner, dim outer
                    float brightness = mix(3.0, 0.5, t);
                    
                    // Doppler beaming
                    float angle = atan(vWorldPos.z, vWorldPos.x);
                    float beaming = 1.0 + 0.4 * beamingSign * cos(angle);
                    brightness *= beaming;
                    
                    // Soft edges along the arc
                    float arcFade = smoothstep(0.0, 0.1, vUv.x) * smoothstep(1.0, 0.9, vUv.x);
                    
                    // Soft edges across tube
                    float tubeFade = smoothstep(0.0, 0.15, t) * smoothstep(1.0, 0.85, t);
                    
                    // Subtle animation
                    float turb = sin(vUv.x * 20.0 + time * 1.5) * 0.08;
                    brightness += turb;
                    
                    float alpha = brightness * arcFade * tubeFade * 0.9;
                    
                    gl_FragColor = vec4(color * brightness, alpha);
                }
            `;

            const arcColors = {
                inner: new THREE.Color(0xfff3d0),
                mid: new THREE.Color(0xffae3b),
                outer: new THREE.Color(0xc8551a)
            };

            // Upper arc - wraps over the top of the black hole
            const arcTopGeo = new THREE.TorusGeometry(
                bhRadius * 1.5,       // major radius
                bhRadius * 0.12,    // tube radius
                32,                   // radial segments
                128,                  // tubular segments
                Math.PI * 0.75      // arc length (covers most of the top)
            );
            const arcTopUniforms = {
                time: { value: 0 },
                colorInner: { value: arcColors.inner },
                colorMid: { value: arcColors.mid },
                colorOuter: { value: arcColors.outer },
                beamingSign: { value: 1.0 }
            };
            const arcTopMat = new THREE.ShaderMaterial({
                vertexShader: arcVertexShader,
                fragmentShader: arcFragmentShader,
                uniforms: arcTopUniforms,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const arcTop = new THREE.Mesh(arcTopGeo, arcTopMat);
            arcTop.rotation.x = -Math.PI / 2;
            arcTop.rotation.z = Math.PI;  // Arc over the top
            arcTop.position.y = bhRadius * 0.3;
            scene.add(arcTop);

            // Lower arc - wraps under the bottom
            const arcBotGeo = new THREE.TorusGeometry(
                bhRadius * 1.5,
                bhRadius * 0.12,
                32,
                128,
                Math.PI * 0.75
            );
            const arcBotUniforms = {
                time: { value: 0 },
                colorInner: { value: arcColors.inner },
                colorMid: { value: arcColors.mid },
                colorOuter: { value: arcColors.outer },
                beamingSign: { value: -1.0 }
            };
            const arcBotMat = new THREE.ShaderMaterial({
                vertexShader: arcVertexShader,
                fragmentShader: arcFragmentShader,
                uniforms: arcBotUniforms,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const arcBot = new THREE.Mesh(arcBotGeo, arcBotMat);
            arcBot.rotation.x = -Math.PI / 2;
            arcBot.rotation.z = 0;  // Arc under the bottom
            arcBot.position.y = -bhRadius * 0.3;
            scene.add(arcBot);

            // Secondary fainter arcs (closer to horizon, more lensed)
            const arcTop2Geo = new THREE.TorusGeometry(
                bhRadius * 1.15,
                bhRadius * 0.06,
                24,
                100,
                Math.PI * 0.5
            );
            const arcTop2Uniforms = {
                time: { value: 0 },
                colorInner: { value: new THREE.Color(0xfff8e0) },
                colorMid: { value: new THREE.Color(0xffc870) },
                colorOuter: { value: new THREE.Color(0xd06020) },
                beamingSign: { value: 1.0 }
            };
            const arcTop2Mat = new THREE.ShaderMaterial({
                vertexShader: arcVertexShader,
                fragmentShader: arcFragmentShader,
                uniforms: arcTop2Uniforms,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const arcTop2 = new THREE.Mesh(arcTop2Geo, arcTop2Mat);
            arcTop2.rotation.x = -Math.PI / 2;
            arcTop2.rotation.z = Math.PI;
            arcTop2.position.y = bhRadius * 0.5;
            scene.add(arcTop2);

            const arcBot2Geo = new THREE.TorusGeometry(
                bhRadius * 1.15,
                bhRadius * 0.06,
                24,
                100,
                Math.PI * 0.5
            );
            const arcBot2Uniforms = {
                time: { value: 0 },
                colorInner: { value: new THREE.Color(0xfff8e0) },
                colorMid: { value: new THREE.Color(0xffc870) },
                colorOuter: { value: new THREE.Color(0xd06020) },
                beamingSign: { value: -1.0 }
            };
            const arcBot2Mat = new THREE.ShaderMaterial({
                vertexShader: arcVertexShader,
                fragmentShader: arcFragmentShader,
                uniforms: arcBot2Uniforms,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const arcBot2 = new THREE.Mesh(arcBot2Geo, arcBot2Mat);
            arcBot2.rotation.x = -Math.PI / 2;
            arcBot2.rotation.z = 0;
            arcBot2.position.y = -bhRadius * 0.5;
            scene.add(arcBot2);

            // ─── INNER GLOW DISK (very close to horizon, hot) ────────────
            const innerGlowGeo = new THREE.RingGeometry(bhRadius * 1.02, bhRadius * 1.3, 128);
            const innerGlowMat = new THREE.MeshBasicMaterial({
                color: 0xfff8e0,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const innerGlow = new THREE.Mesh(innerGlowGeo, innerGlowMat);
            innerGlow.rotation.x = -Math.PI / 2;
            scene.add(innerGlow);

            // ─── ANIMATION ────────────────────────────────────────────────
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);

                const elapsed = clock.getElapsedTime();

                // Rotate the disk slowly
                disk.rotation.z = elapsed * 0.08;

                // Animate photon ring subtle shimmer
                photonRing.material.opacity = 0.7 + Math.sin(elapsed * 2.0) * 0.2;

                // Update shader uniforms
                diskUniforms.time.value = elapsed;
                arcTopUniforms.time.value = elapsed;
                arcBotUniforms.time.value = elapsed;
                arcTop2Uniforms.time.value = elapsed;
                arcBot2Uniforms.time.value = elapsed;

                // Subtle inner glow pulse
                innerGlow.material.opacity = 0.4 + Math.sin(elapsed * 1.5) * 0.15;

                // Very subtle star twinkle
                const positions = starGeo.attributes.position.array;
                for (let i = 0; i < starCount; i++) {
                    if (i % 50 === 0) {  // Only twinkle some stars
                        const idx = i * 3;
                        const twinkle = Math.sin(elapsed * 3.0 + i) * 0.01;
                        positions[idx + 1] += twinkle;
                    }
                }
                starGeo.attributes.position.needsUpdate = true;

                renderer.render(scene, camera);
            }

            animate();

            // ─── RESIZE HANDLER ───────────────────────────────────────────
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Hide loading text after a short delay
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 1000);
                }
            }, 500);

        } catch (err) {
            console.error('Black hole scene error:', err);
            document.body.innerHTML += `<div style="color:#c00;padding:20px;font-family:sans-serif;">
                Error loading scene: ${err.message}</div>`;
        }
    </script>
</body>
</html>
