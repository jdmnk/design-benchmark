<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua Black Hole</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';

        try {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 12);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Event Horizon (The Black Sphere)
            const horizonGeo = new THREE.SphereGeometry(1, 64, 64);
            const horizonMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const horizon = new THREE.Mesh(horizonGeo, horizonMat);
            scene.add(horizon);

            // 2. Accretion Disk (Flattened ring)
            // We use a custom shader-like material with additive blending
            function createDiskRing(innerRadius, outerRadius, opacity, color) {
                const geo = new THREE.RingGeometry(innerRadius, outerRadius, 128);
                const mat = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: opacity,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = Math.PI / 2;
                return mesh;
            }

            const diskContainer = new THREE.Group();
            // Main disk
            diskContainer.add(createDiskRing(1.1, 3.5, 0.8, 0xffae3b));
            // Inner hot rim
            diskContainer.add(createDiskRing(1.05, 1.3, 1.0, 0xfff3d0));
            scene.add(diskContainer);

            // 3. Gravitational Lensing Arcs (The "Halo" over/under the sphere)
            // These are meshes bent to simulate the light wrapping
            const arcGeo = new THREE.TorusGeometry(1.5, 0.2, 16, 100, Math.PI);
            const arcMat = new THREE.MeshBasicMaterial({ 
                color: 0xffae3b, 
                transparent: true, 
                opacity: 0.5,
                blending: THREE.AdditiveBlending 
            });
            
            const topArc = new THREE.Mesh(arcGeo, arcMat);
            topArc.rotation.z = Math.PI / 2;
            topArc.position.y = 0.5;
            scene.add(topArc);

            const bottomArc = new THREE.Mesh(arcGeo, arcMat);
            bottomArc.rotation.z = -Math.PI / 2;
            bottomArc.position.y = -0.5;
            scene.add(bottomArc);

            // 4. Photon Ring (Very thin bright edge)
            const photonRing = new THREE.Mesh(
                new THREE.TorusGeometry(1.02, 0.02, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0xffffff, blending: THREE.AdditiveBlending })
            );
            photonRing.rotation.x = Math.PI / 2;
            scene.add(photonRing);

            // 5. Starfield
            const starGeo = new THREE.BufferGeometry();
            const starCount = 1000;
            const starPos = new Float32Array(starCount * 3);
            for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random() - 0.5) * 100;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
            scene.add(new THREE.Points(starGeo, starMat));

            // Animation
            function animate() {
                requestAnimationFrame(animate);
                diskContainer.rotation.z += 0.005;
                topArc.rotation.z += 0.002;
                bottomArc.rotation.z -= 0.002;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (e) {
            console.error("Scene setup failed", e);
        }
    </script>
</body>
</html>
