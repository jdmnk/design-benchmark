<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Gargantua</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #030406; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, bh, diskGroup, arcsGroup, ringGlow, stars;
let t0 = performance.now();

try {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020305);
  scene.fog = new THREE.FogExp2(0x020305, 0.018);

  camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 1.15, 8.2);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x020305, 1);
  document.body.appendChild(renderer.domElement);

  // Lights
  scene.add(new THREE.AmbientLight(0x222222, 0.55));
  const key = new THREE.DirectionalLight(0xffe6b3, 1.5);
  key.position.set(3, 2, 5);
  scene.add(key);

  // Black hole sphere
  bh = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 48, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  bh.scale.setScalar(1.0);
  scene.add(bh);

  // Photon ring glow
  const ringGeom = new THREE.TorusGeometry(1.02, 0.035, 12, 120);
  ringGlow = new THREE.Mesh(
    ringGeom,
    new THREE.MeshBasicMaterial({
      color: 0xfff0c2,
      transparent: true,
      opacity: 0.85,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    })
  );
  ringGlow.rotation.x = Math.PI / 2;
  scene.add(ringGlow);

  // Main accretion disk with radial gradient texture
  const texCanvas = document.createElement('canvas');
  texCanvas.width = 512;
  texCanvas.height = 64;
  const ctx = texCanvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 512, 0);
  grad.addColorStop(0.00, '#fff3d0');
  grad.addColorStop(0.22, '#ffdd9a');
  grad.addColorStop(0.45, '#ffae3b');
  grad.addColorStop(0.72, '#d86a22');
  grad.addColorStop(1.00, '#8f2d12');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 64);
  // Bright core streak
  const g2 = ctx.createLinearGradient(0, 0, 512, 0);
  g2.addColorStop(0.0, 'rgba(255,255,255,0)');
  g2.addColorStop(0.45, 'rgba(255,255,255,0.15)');
  g2.addColorStop(0.5, 'rgba(255,255,255,0.65)');
  g2.addColorStop(0.55, 'rgba(255,255,255,0.15)');
  g2.addColorStop(1.0, 'rgba(255,255,255,0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, 512, 64);

  const diskTex = new THREE.CanvasTexture(texCanvas);
  diskTex.anisotropy = 8;

  diskGroup = new THREE.Group();
  const diskMat = new THREE.MeshBasicMaterial({
    map: diskTex,
    transparent: true,
    opacity: 0.95,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });

  // Flat, bright band around the hole
  const disk = new THREE.Mesh(new THREE.RingGeometry(1.25, 4.8, 128, 1), diskMat);
  disk.rotation.x = Math.PI / 2;
  disk.scale.set(1.9, 0.18, 1);
  diskGroup.add(disk);

  // A softer outer band for width
  const disk2 = new THREE.Mesh(new THREE.RingGeometry(1.45, 5.6, 128, 1), new THREE.MeshBasicMaterial({
    color: 0xff8d2f,
    transparent: true,
    opacity: 0.22,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  }));
  disk2.rotation.x = Math.PI / 2;
  disk2.scale.set(2.0, 0.20, 1);
  diskGroup.add(disk2);

  // Relativistic beaming: brighter on one side
  const sideGlow = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 1.1, 1, 1),
    new THREE.MeshBasicMaterial({
      color: 0xffefc8,
      transparent: true,
      opacity: 0.38,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  sideGlow.rotation.x = Math.PI / 2;
  sideGlow.position.y = 0.02;
  diskGroup.add(sideGlow);

  scene.add(diskGroup);

  // Wrapped lensing arcs above and below
  arcsGroup = new THREE.Group();
  const arcMat = new THREE.MeshBasicMaterial({
    color: 0xffd184,
    transparent: true,
    opacity: 0.55,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const topArc = new THREE.Mesh(new THREE.TorusGeometry(2.05, 0.08, 12, 120, Math.PI * 1.14), arcMat);
  topArc.rotation.x = Math.PI / 2;
  topArc.position.y = 0.95;
  topArc.scale.set(1.8, 0.85, 1);
  arcsGroup.add(topArc);

  const botArc = new THREE.Mesh(new THREE.TorusGeometry(2.05, 0.07, 12, 120, Math.PI * 1.08), arcMat.clone());
  botArc.rotation.x = Math.PI / 2;
  botArc.position.y = -0.98;
  botArc.scale.set(1.78, 0.82, 1);
  arcsGroup.add(botArc);

  const farWrap = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.05, 10, 140, Math.PI * 1.6), new THREE.MeshBasicMaterial({
    color: 0xffb24a,
    transparent: true,
    opacity: 0.22,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  }));
  farWrap.rotation.x = Math.PI / 2;
  farWrap.position.y = 0.18;
  farWrap.scale.set(1.6, 0.28, 1);
  arcsGroup.add(farWrap);

  scene.add(arcsGroup);

  // Stars
  const starCount = 900;
  const starGeo = new THREE.BufferGeometry();
  const pos = new Float32Array(starCount * 3);
  const col = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 35 + Math.random() * 35;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(THREE.MathUtils.randFloatSpread(2) * 0.55);
    pos[i*3+0] = Math.sin(ph) * Math.cos(th) * r;
    pos[i*3+1] = Math.cos(ph) * r * 0.75;
    pos[i*3+2] = Math.sin(ph) * Math.sin(th) * r - 20;
    const s = 0.55 + Math.random() * 0.45;
    col[i*3+0] = s;
    col[i*3+1] = s;
    col[i*3+2] = s + Math.random() * 0.08;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
    size: 0.03,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    depthWrite: false
  }));
  scene.add(stars);

} catch (e) {
  console.error(e);
}

function animate() {
  requestAnimationFrame(animate);
  const t = (performance.now() - t0) * 0.001;

  if (diskGroup) {
    diskGroup.rotation.z = t * 0.12;
    diskGroup.rotation.x = Math.PI / 2;
    diskGroup.rotation.y = 0;
  }
  if (arcsGroup) {
    arcsGroup.rotation.z = t * 0.08;
    arcsGroup.rotation.x = 0.01 * Math.sin(t * 0.4);
  }
  if (ringGlow) ringGlow.rotation.z = t * 0.14;

  // subtle camera breathing while keeping composition fixed
  if (camera) {
    camera.position.x = 0.03 * Math.sin(t * 0.25);
    camera.position.y = 1.15 + 0.01 * Math.sin(t * 0.3);
    camera.lookAt(0, 0, 0);
  }

  if (renderer && scene && camera) renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  try {
    if (!camera || !renderer) return;
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  } catch (e) { console.error(e); }
});
</script>
</body>
</html>
