<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gargantua</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, bhGroup, diskGroup, clock;
const params = {
  sphereRadius: 0.58,
  cameraZ: 4.8,
  cameraY: 0.47, // ~5.6 degrees above disk plane
};

function makeStarTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 128, 128);

  for (let i = 0; i < 80; i++) {
    const x = Math.random() * 128;
    const y = Math.random() * 128;
    const r = Math.random() * 1.8 + 0.2;
    const a = Math.random() * 0.9 + 0.1;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
    g.addColorStop(0, `rgba(255,255,255,${a})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020203);

  camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.01, 100);
  camera.position.set(params.cameraZ, params.cameraY, 0);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.setClearColor(0x020203, 1);
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starCount = 900;
  const pos = new Float32Array(starCount * 3);
  const col = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 22 + Math.random() * 28;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
    pos[i * 3 + 0] = Math.cos(theta) * Math.sin(phi) * r;
    pos[i * 3 + 1] = Math.sin(theta) * Math.sin(phi) * r;
    pos[i * 3 + 2] = Math.cos(phi) * r;
    const s = Math.random() * 0.7 + 0.3;
    col[i * 3 + 0] = s;
    col[i * 3 + 1] = s;
    col[i * 3 + 2] = s;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const stars = new THREE.Points(
    starGeo,
    new THREE.PointsMaterial({
      size: 0.03,
      map: makeStarTexture(),
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true,
      opacity: 0.9
    })
  );
  scene.add(stars);

  bhGroup = new THREE.Group();
  scene.add(bhGroup);

  // Black hole sphere
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(params.sphereRadius, 48, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  bhGroup.add(sphere);

  diskGroup = new THREE.Group();
  bhGroup.add(diskGroup);

  const torusMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });

  function makeRing(radius, tube, color, opacity, scaleY = 1, y = 0, z = 0) {
    const m = new THREE.Mesh(
      new THREE.TorusGeometry(radius, tube, 16, 220),
      new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide
      })
    );
    m.rotation.x = Math.PI / 2;
    m.scale.y = scaleY;
    m.position.set(0, y, z);
    return m;
  }

  // Broad disk band
  const disk = makeRing(1.85, 0.22, 0xffc56b, 0.42, 0.98);
  diskGroup.add(disk);

  const diskInner = makeRing(1.52, 0.12, 0xfff0c8, 0.58, 0.95);
  diskGroup.add(diskInner);

  // Bright rim / photon ring
  const photon = makeRing(params.sphereRadius * 1.055, 0.035, 0xffffff, 0.95, 1.0);
  diskGroup.add(photon);

  // Relativistic beaming side-brightening
  const beamed = new THREE.Mesh(
    new THREE.TorusGeometry(1.75, 0.16, 16, 180),
    new THREE.MeshBasicMaterial({
      color: 0xfff3d0,
      transparent: true,
      opacity: 0.7,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    })
  );
  beamed.rotation.x = Math.PI / 2;
  beamed.scale.y = 0.92;
  beamed.scale.x = 1.03;
  beamed.position.y = 0.03;
  diskGroup.add(beamed);

  // Far-side lensing arcs above and below
  const upperArc = new THREE.Mesh(
    new THREE.TorusGeometry(1.95, 0.09, 16, 180, Math.PI * 1.05),
    new THREE.MeshBasicMaterial({
      color: 0xffad42,
      transparent: true,
      opacity: 0.7,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    })
  );
  upperArc.rotation.x = Math.PI / 2;
  upperArc.position.y = 0.56;
  upperArc.scale.y = 0.72;
  diskGroup.add(upperArc);

  const lowerArc = new THREE.Mesh(
    new THREE.TorusGeometry(1.95, 0.09, 16, 180, Math.PI * 1.05),
    new THREE.MeshBasicMaterial({
      color: 0xff8d2b,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    })
  );
  lowerArc.rotation.x = Math.PI / 2;
  lowerArc.rotation.z = Math.PI;
  lowerArc.position.y = -0.56;
  lowerArc.scale.y = 0.72;
  diskGroup.add(lowerArc);

  // Outer hazy halo
  const halo = new THREE.Mesh(
    new THREE.TorusGeometry(2.05, 0.18, 16, 220),
    new THREE.MeshBasicMaterial({
      color: 0xc8551a,
      transparent: true,
      opacity: 0.18,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    })
  );
  halo.rotation.x = Math.PI / 2;
  halo.scale.y = 0.78;
  diskGroup.add(halo);

  // Slightly enlarge band on one side to mimic doppler boost
  const boosted = new THREE.Mesh(
    new THREE.TorusGeometry(1.78, 0.11, 16, 220),
    new THREE.MeshBasicMaterial({
      color: 0xfff3d0,
      transparent: true,
      opacity: 0.45,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    })
  );
  boosted.rotation.x = Math.PI / 2;
  boosted.position.y = 0.04;
  boosted.scale.x = 1.05;
  boosted.scale.y = 0.9;
  boosted.rotation.z = 0.17;
  diskGroup.add(boosted);

  // Add a subtle backdrop glow behind the ring
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(params.sphereRadius * 2.9, 32, 24),
    new THREE.MeshBasicMaterial({
      color: 0x2a1206,
      transparent: true,
      opacity: 0.12,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  bhGroup.add(glow);
}

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (diskGroup) {
    diskGroup.rotation.y = t * 0.12;
    // subtle precession/warp feel without changing composition
    diskGroup.rotation.z = Math.sin(t * 0.12) * 0.01;
  }

  try {
    renderer.render(scene, camera);
  } catch (e) {
    // keep page alive
  }
}

function init() {
  try {
    buildScene();
  } catch (e) {
    document.body.innerHTML = '<div style="color:white;font-family:sans-serif;padding:20px">Scene init error</div>';
    console.error(e);
  }
  animate();
}

addEventListener('resize', () => {
  if (!camera || !renderer) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

init();
</script>
</body>
</html>
