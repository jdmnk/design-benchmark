<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua Black Hole</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@r160/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@r160/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // Setup scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        // Camera positioned slightly above disk plane (~6 degrees)
        const cameraDistance = 3.5;
        camera.position.set(0, cameraDistance * Math.sin(Math.PI / 30), cameraDistance * Math.cos(Math.PI / 30));
        camera.lookAt(0, 0, 0);

        try {
            // Black hole sphere (event horizon) - 28% of viewport
            const horizonRadius = 0.28 * window.innerHeight / (2 * 75 * Math.PI / 180);
            const horizonGeometry = new THREE.SphereGeometry(horizonRadius * 0.5, 64, 64);
            const horizonMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(horizonGeometry, horizonMaterial);
            scene.add(blackHole);

            // Photon ring (thin bright ring at edge)
            const photonGeometry = new THREE.TorusGeometry(horizonRadius * 0.5 + 0.08, 0.04, 16, 100);
            const photonMaterial = new THREE.MeshBasicMaterial({
                color: 0xffff99,
                emissive: 0xffff99,
                transparent: true,
                opacity: 0.9
            });
            const photonRing = new THREE.Mesh(photonGeometry, photonMaterial);
            scene.add(photonRing);

            // Main accretion disk
            const diskInnerRadius = horizonRadius * 0.55;
            const diskOuterRadius = horizonRadius * 2.2;
            
            // Create disk with canvas texture for gradient coloring
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Draw radial gradient disk
            for (let x = 0; x < canvas.width; x++) {
                const ratio = x / canvas.width;
                let color;
                if (ratio < 0.4) {
                    // White-yellow inner
                    color = '#fff3d0';
                } else if (ratio < 0.7) {
                    // Transition to amber
                    const t = (ratio - 0.4) / 0.3;
                    const r = Math.round(255 * (1 - t * 0.2));
                    const g = Math.round(243 * (1 - t * 0.3));
                    const b = Math.round(208 * (1 - t * 0.7));
                    color = `rgb(${r}, ${g}, ${b})`;
                } else {
                    // Deep orange outer
                    color = '#c8551a';
                }
                ctx.fillStyle = color;
                ctx.fillRect(x, 0, 1, canvas.height);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearFilter;

            // Disk geometry using torus
            const diskGeometry = new THREE.TorusGeometry(
                (diskInnerRadius + diskOuterRadius) / 2,
                (diskOuterRadius - diskInnerRadius) / 2,
                2,
                128
            );
            
            const diskMaterial = new THREE.MeshBasicMaterial({
                map: texture,
                emissive: 0xffaa44,
                emissiveIntensity: 0.8,
                side: THREE.DoubleSide,
                toneMapped: false
            });
            
            const disk = new THREE.Mesh(diskGeometry, diskMaterial);
            disk.rotation.x = 0.001; // Nearly horizontal
            scene.add(disk);

            // Upper bent arc (lensed disk above)
            const arcUpperGeometry = new THREE.TorusGeometry(
                (diskInnerRadius + diskOuterRadius) / 2,
                (diskOuterRadius - diskInnerRadius) / 2.5,
                2,
                100
            );
            const arcMaterial = new THREE.MeshBasicMaterial({
                color: 0xffcc99,
                emissive: 0xffcc99,
                emissiveIntensity: 0.9,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.7,
                toneMapped: false
            });
            const arcUpper = new THREE.Mesh(arcUpperGeometry, arcMaterial);
            arcUpper.position.y = horizonRadius * 1.1;
            arcUpper.rotation.x = Math.PI * 0.4;
            scene.add(arcUpper);

            // Lower bent arc (lensed disk below)
            const arcLower = new THREE.Mesh(arcUpperGeometry, arcMaterial.clone());
            arcLower.position.y = -horizonRadius * 1.1;
            arcLower.rotation.x = -Math.PI * 0.4;
            scene.add(arcLower);

            // Starfield
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 500;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 100;
                positions[i + 1] = (Math.random() - 0.5) * 100;
                positions[i + 2] = (Math.random() - 0.5) * 100 - 5;
                
                const brightness = Math.random() * 0.5 + 0.3;
                colors[i] = brightness;
                colors[i + 1] = brightness;
                colors[i + 2] = brightness;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const starsMaterial = new THREE.PointsMaterial({
                size: 0.05,
                sizeAttenuation: true,
                vertexColors: true,
                transparent: true
            });
            
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                
                // Rotate disk slowly for accretion effect
                disk.rotation.z += 0.0002;
                arcUpper.rotation.z += 0.0002;
                arcLower.rotation.z += 0.0002;
                
                renderer.render(scene, camera);
            }
            
            animate();

            // Handle window resize
            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

        } catch (err) {
            console.error('Error in black hole rendering:', err);
            // Scene will still render with whatever was created before error
        }
    </script>
</body>
</html>
