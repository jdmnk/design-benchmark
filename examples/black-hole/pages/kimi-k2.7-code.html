<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supermassive Black Hole</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #020204;
    }
    canvas {
      display: block;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';

    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020204);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const R = 1.0;
      const fovY = THREE.MathUtils.degToRad(45);
      const desiredAngularRadius = 0.14 * fovY;
      const distance = R / Math.tan(desiredAngularRadius);
      const elevation = THREE.MathUtils.degToRad(5.0);

      camera.position.set(
        0,
        distance * Math.sin(elevation),
        distance * Math.cos(elevation)
      );
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x020204);
      document.body.appendChild(renderer.domElement);

      const blackHole = new THREE.Mesh(
        new THREE.SphereGeometry(R, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0x000000 })
      );
      scene.add(blackHole);

      const diskGroup = new THREE.Group();
      scene.add(diskGroup);

      const inner = 1.28;
      const outer = 4.0;

      const diskGeo = new THREE.RingGeometry(inner, outer, 240, 2);
      diskGeo.rotateX(-Math.PI / 2);

      const diskMat = new THREE.ShaderMaterial({
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
        uniforms: {
          inner: { value: inner },
          outer: { value: outer },
          c1: { value: new THREE.Color(0xfff3d0) },
          c2: { value: new THREE.Color(0xffae3b) },
          c3: { value: new THREE.Color(0xc8551a) },
          intensity: { value: 2.4 }
        },
        vertexShader: `
          varying vec3 vWorldPos;
          varying vec2 vUv;
          void main() {
            vec4 world = modelMatrix * vec4(position, 1.0);
            vWorldPos = world.xyz;
            vUv = uv;
            gl_Position = projectionMatrix * viewMatrix * world;
          }
        `,
        fragmentShader: `
          precision highp float;
          uniform float inner;
          uniform float outer;
          uniform vec3 c1;
          uniform vec3 c2;
          uniform vec3 c3;
          uniform float intensity;
          varying vec3 vWorldPos;

          void main() {
            float r = length(vWorldPos.xz);
            float t = clamp((r - inner) / (outer - inner), 0.0, 1.0);

            vec3 col;
            if (t < 0.5) {
              col = mix(c1, c2, t / 0.5);
            } else {
              col = mix(c2, c3, (t - 0.5) / 0.5);
            }

            float beam = 0.6 + 0.4 * smoothstep(-outer, outer, vWorldPos.x);
            col *= beam;

            float alpha = (1.0 - smoothstep(0.9, 1.0, t)) *
                          smoothstep(0.0, 0.04, t);

            gl_FragColor = vec4(col * intensity, alpha);
          }
        `
      });

      const disk = new THREE.Mesh(diskGeo, diskMat);
      diskGroup.add(disk);

      const photonRing = new THREE.Mesh(
        new THREE.TorusGeometry(1.08, 0.015, 8, 180),
        new THREE.MeshBasicMaterial({
          color: 0xfff3d0,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide
        })
      );
      diskGroup.add(photonRing);

      const arcMat = new THREE.MeshBasicMaterial({
        color: 0xffe8b0,
        transparent: true,
        opacity: 0.85,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide
      });

      const arcGeo = new THREE.TorusGeometry(1.26, 0.04, 10, 120, Math.PI);
      const topArc = new THREE.Mesh(arcGeo, arcMat);
      diskGroup.add(topArc);

      const bottomArc = new THREE.Mesh(arcGeo, arcMat.clone());
      bottomArc.rotation.z = Math.PI;
      diskGroup.add(bottomArc);

      const starGeo = new THREE.BufferGeometry();
      const starCount = 1200;
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const rad = 60 + Math.random() * 60;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2.0 * Math.random() - 1.0);
        starPos[i * 3] = rad * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = rad * Math.sin(phi) * Math.sin(theta);
        starPos[i * 3 + 2] = rad * Math.cos(phi);
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));

      const stars = new THREE.Points(
        starGeo,
        new THREE.PointsMaterial({
          color: 0xaabbcc,
          size: 0.12,
          transparent: true,
          opacity: 0.45,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          sizeAttenuation: true
        })
      );
      scene.add(stars);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        diskGroup.rotation.y += 0.04 * dt;
        renderer.render(scene, camera);
      }

      animate();
    } catch (err) {
      console.error('Scene setup failed:', err);
    }
  </script>
</body>
</html>
