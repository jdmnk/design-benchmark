<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;width:100%;height:100%;}
  canvas{display:block;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {
  // ---- Scene + camera (sphere diameter ≈ 28% of viewport height) ----
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x02020a);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 200);
  const fov = 50 * Math.PI / 180;
  const R = 1; // event horizon radius
  const d = R / (0.28 * Math.tan(fov / 2)); // distance so sphere spans 28% of viewport height
  const elev = 7 * Math.PI / 180;            // ~7° above disk plane (near edge-on)
  camera.position.set(0, d * Math.sin(elev), d * Math.cos(elev));
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x02020a, 1);
  document.body.appendChild(renderer.domElement);

  // ---- Soft round sprite texture (stars + halo) ----
  function radialTexture(stops) {
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const x = c.getContext('2d');
    const g = x.createRadialGradient(64, 64, 0, 64, 64, 64);
    stops.forEach(s => g.addColorStop(s[0], s[1]));
    x.fillStyle = g; x.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  }

  // ---- Starfield ----
  const starTex = radialTexture([
    [0.0, 'rgba(255,255,255,1)'],
    [0.25, 'rgba(255,255,255,0.5)'],
    [1.0, 'rgba(255,255,255,0)']
  ]);
  const starGeo = new THREE.BufferGeometry();
  const N = 1400;
  const sp = new Float32Array(N * 3);
  const sc = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 45 + Math.random() * 45;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    sp[i*3]   = r * Math.sin(ph) * Math.cos(th);
    sp[i*3+1] = r * Math.cos(ph);
    sp[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    const b = 0.25 + Math.random() * 0.75;
    sc[i*3] = b; sc[i*3+1] = b * 0.95; sc[i*3+2] = b * 0.9;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(sc, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    size: 0.7, sizeAttenuation: true, map: starTex, vertexColors: true,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.85
  })));

  // ---- Event horizon (perfectly black sphere) ----
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(R, 64, 48),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(sphere);

  // ---- Accretion disk (horizontal, custom shader) ----
  const diskVS = `
    varying float vR;
    varying float vLocalA;
    varying float vWorldA;
    void main(){
      vR = length(position.xy);
      vLocalA = atan(position.y, position.x);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldA = atan(wp.z, wp.x);
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `;
  const diskFS = `
    precision highp float;
    uniform float uTime;
    uniform float uInnerR;
    uniform float uOuterR;
    uniform vec3 uCInner;
    uniform vec3 uCMid;
    uniform vec3 uCOuter;
    varying float vR;
    varying float vLocalA;
    varying float vWorldA;
    void main(){
      float t = clamp((vR - uInnerR) / (uOuterR - uInnerR), 0.0, 1.0);
      vec3 col = t < 0.5
        ? mix(uCInner, uCMid, t * 2.0)
        : mix(uCMid, uCOuter, (t - 0.5) * 2.0);

      // Radial brightness: hot inner, fade outer
      float bright = pow(1.0 - t, 1.6);
      bright *= smoothstep(0.0, 0.06, t);          // soft inner edge
      bright *= 1.0 - smoothstep(0.82, 1.0, t);   // soft outer edge

      // Slowly rotating streaks give a visible spin cue
      float st = 0.5 + 0.5 * sin(vLocalA * 6.0 + uTime * 1.4);
      bright *= 0.80 + 0.20 * st;

      // Relativistic beaming — one side brighter, fixed in world space
      float beam = 0.5 + 0.5 * cos(vWorldA);
      beam = 0.40 + 0.60 * beam;
      bright *= beam;

      // Extra hot inner glow
      col += pow(1.0 - t, 6.0) * vec3(0.45, 0.32, 0.12);

      gl_FragColor = vec4(col * bright * 1.5, bright);
    }
  `;
  const diskMat = new THREE.ShaderMaterial({
    vertexShader: diskVS,
    fragmentShader: diskFS,
    uniforms: {
      uTime:    { value: 0 },
      uInnerR:  { value: R * 1.25 },
      uOuterR:  { value: R * 4.8 },
      uCInner:  { value: new THREE.Color(0xfff3d0) },
      uCMid:    { value: new THREE.Color(0xffae3b) },
      uCOuter:  { value: new THREE.Color(0xc8551a) }
    },
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const disk = new THREE.Mesh(new THREE.RingGeometry(R * 1.25, R * 4.8, 360, 6), diskMat);
  disk.rotation.x = -Math.PI / 2; // lay flat (horizontal)
  const diskGroup = new THREE.Group();
  diskGroup.add(disk);
  scene.add(diskGroup);

  // ---- Photon ring (thin bright circle hugging the horizon) ----
  const photonRing = new THREE.Mesh(
    new THREE.TorusGeometry(R * 1.035, R * 0.010, 24, 240),
    new THREE.MeshBasicMaterial({ color: 0xfff0c8, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false, opacity: 1.0 })
  );
  scene.add(photonRing);

  // ---- Gravitational lensing arcs (vertical plane facing camera) ----
  // These wrap over the top and under the bottom of the sphere — the
  // signature Gargantua halo. The left/right portions merge with the disk.
  function lensArc(radius, tube, color, opacity) {
    const m = new THREE.Mesh(
      new THREE.TorusGeometry(radius, tube, 20, 240),
      new THREE.MeshBasicMaterial({ color, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false, opacity })
    );
    scene.add(m);
    return m;
  }
  lensArc(R * 1.12, R * 0.020, 0xfff3d0, 0.85); // hot inner lensed rim
  lensArc(R * 1.30, R * 0.055, 0xffae3b, 0.95); // primary upper/lower arc
  lensArc(R * 1.55, R * 0.030, 0xc8551a, 0.55); // fainter outer arc

  // ---- Soft lensed halo glow (annular — keeps sphere black) ----
  const haloTex = radialTexture([
    [0.00, 'rgba(0,0,0,0)'],
    [0.28, 'rgba(0,0,0,0)'],
    [0.42, 'rgba(255,200,120,0.45)'],
    [0.70, 'rgba(200,110,40,0.15)'],
    [1.00, 'rgba(0,0,0,0)']
  ]);
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: haloTex, blending: THREE.AdditiveBlending, transparent: true,
    depthWrite: false, depthTest: false, opacity: 0.6
  }));
  halo.scale.set(R * 7.5, R * 7.5, 1);
  halo.renderOrder = -10;
  scene.add(halo);

  // ---- Render loop ----
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    diskMat.uniforms.uTime.value = t;
    diskGroup.rotation.y = t * 0.12; // slow disk rotation
    renderer.render(scene, camera);
  }
  animate();

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
