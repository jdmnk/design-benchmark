<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

let scene, camera, renderer;
let blackHole, photonRing, disk, upperArc, lowerArc;
let starField;
let startTime = Date.now();

function init() {
  try {
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const aspect = window.innerWidth / window.innerHeight;
    camera = new THREE.PerspectiveCamera(48, aspect, 0.1, 1000);

    // Camera positioned ~6 degrees above disk plane
    camera.position.set(0, 1.35, 14.5);
    camera.lookAt(0, 0, 0);

    window.addEventListener('resize', onResize);

    createScene();
    animate();

  } catch (e) {
    console.error(e);
    // Fallback: still show black background
    document.body.style.background = '#000';
  }
}

function createScene() {
  const BH_RADIUS = 2.5; // ~28% of viewport height

  // Black hole (event horizon)
  const bhGeo = new THREE.SphereGeometry(BH_RADIUS, 64, 64);
  const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  blackHole = new THREE.Mesh(bhGeo, bhMat);
  scene.add(blackHole);

  // Photon ring (thin bright ring at horizon edge)
  const prGeo = new THREE.TorusGeometry(BH_RADIUS * 1.08, 0.035, 16, 128);
  const prMat = new THREE.MeshBasicMaterial({ 
    color: 0xfff7e0, 
    transparent: true, 
    opacity: 0.95 
  });
  photonRing = new THREE.Mesh(prGeo, prMat);
  photonRing.rotation.x = Math.PI / 2;
  scene.add(photonRing);

  // Accretion disk - main disk (horizontal plane)
  const diskGeo = new THREE.TorusGeometry(5.8, 0.22, 8, 128, Math.PI * 2);
  const diskMat = new THREE.MeshBasicMaterial({ 
    color: 0xffae3b,
    transparent: true,
    opacity: 0.92,
    side: THREE.DoubleSide
  });
  disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.x = Math.PI / 2;
  scene.add(disk);

  // Inner brighter disk segment (white-yellow)
  const innerDiskGeo = new THREE.TorusGeometry(3.4, 0.18, 8, 128, Math.PI * 2);
  const innerDiskMat = new THREE.MeshBasicMaterial({ 
    color: 0xfff3d0,
    transparent: true,
    opacity: 0.95,
    side: THREE.DoubleSide
  });
  const innerDisk = new THREE.Mesh(innerDiskGeo, innerDiskMat);
  innerDisk.rotation.x = Math.PI / 2;
  scene.add(innerDisk);

  // Outer disk (deep orange)
  const outerDiskGeo = new THREE.TorusGeometry(7.6, 0.19, 8, 128, Math.PI * 2);
  const outerDiskMat = new THREE.MeshBasicMaterial({ 
    color: 0xc8551a,
    transparent: true,
    opacity: 0.85,
    side: THREE.DoubleSide
  });
  const outerDisk = new THREE.Mesh(outerDiskGeo, outerDiskMat);
  outerDisk.rotation.x = Math.PI / 2;
  scene.add(outerDisk);

  // Gravitational lensing arcs (upper)
  const upperGeo = new THREE.TorusGeometry(5.5, 0.17, 6, 96, Math.PI * 1.35);
  const upperMat = new THREE.MeshBasicMaterial({ 
    color: 0xfff3d0, 
    transparent: true, 
    opacity: 0.75,
    side: THREE.DoubleSide
  });
  upperArc = new THREE.Mesh(upperGeo, upperMat);
  upperArc.rotation.set(1.85, 0, 0);
  upperArc.position.y = 1.8;
  scene.add(upperArc);

  // Gravitational lensing arcs (lower)
  const lowerGeo = new THREE.TorusGeometry(5.5, 0.17, 6, 96, Math.PI * 1.35);
  const lowerMat = new THREE.MeshBasicMaterial({ 
    color: 0xfff3d0, 
    transparent: true, 
    opacity: 0.68,
    side: THREE.DoubleSide
  });
  lowerArc = new THREE.Mesh(lowerGeo, lowerMat);
  lowerArc.rotation.set(-1.85, 0, 0);
  lowerArc.position.y = -1.8;
  scene.add(lowerArc);

  // Sparse dim starfield
  const starCount = 1800;
  const starGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(starCount * 3);
  const colors = new Float32Array(starCount * 3);
  
  for (let i = 0; i < starCount; i++) {
    const i3 = i * 3;
    const radius = 80 + Math.random() * 120;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    
    positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i3 + 2] = radius * Math.cos(phi);
    
    const brightness = 0.25 + Math.random() * 0.45;
    colors[i3] = brightness;
    colors[i3 + 1] = brightness;
    colors[i3 + 2] = brightness * 0.95;
  }
  
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  
  const starMat = new THREE.PointsMaterial({
    size: 0.9,
    vertexColors: true,
    transparent: true,
    opacity: 0.75,
    depthWrite: false
  });
  
  starField = new THREE.Points(starGeo, starMat);
  scene.add(starField);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  const elapsed = (Date.now() - startTime) * 0.001;

  // Slow disk rotation (around vertical axis)
  const rotSpeed = 0.12;
  if (disk) disk.rotation.z = elapsed * rotSpeed;
  if (photonRing) photonRing.rotation.z = elapsed * rotSpeed * 0.95;

  // Gentle rotation on lensing arcs for subtle movement
  if (upperArc) upperArc.rotation.y = Math.sin(elapsed * 0.1) * 0.08;
  if (lowerArc) lowerArc.rotation.y = Math.sin(elapsed * 0.1) * 0.08;

  renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
