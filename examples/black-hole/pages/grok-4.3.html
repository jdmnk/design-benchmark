<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;
        let disk, photonRing;
        let starField;

        function init() {
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 1);
            document.body.appendChild(renderer.domElement);

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Camera - 6° above disk plane
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(55, aspect, 0.1, 1000);
            camera.position.set(0, 1.8, 38);
            camera.lookAt(0, 0, 0);

            // Event Horizon - perfectly black sphere (28% viewport height)
            const horizonRadius = 5.0;
            const horizonGeo = new THREE.SphereGeometry(horizonRadius, 64, 64);
            const horizonMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(horizonGeo, horizonMat);
            scene.add(blackHole);

            // Photon Ring - thin bright ring hugging the horizon
            const ringGeo = new THREE.TorusGeometry(horizonRadius * 1.08, 0.08, 16, 128);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0xfff8e0,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending
            });
            photonRing = new THREE.Mesh(ringGeo, ringMat);
            photonRing.rotation.x = Math.PI / 2;
            scene.add(photonRing);

            // Accretion Disk - horizontal plane (xz)
            disk = new THREE.Group();
            scene.add(disk);

            // Inner bright ring (white-yellow)
            const innerDisk = new THREE.TorusGeometry(horizonRadius * 1.45, 0.35, 8, 128);
            const innerMat = new THREE.MeshBasicMaterial({
                color: 0xfff3d0,
                transparent: true,
                opacity: 0.92,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const innerMesh = new THREE.Mesh(innerDisk, innerMat);
            innerMesh.rotation.x = Math.PI / 2;
            disk.add(innerMesh);

            // Mid disk (amber)
            const midDisk = new THREE.TorusGeometry(horizonRadius * 2.1, 0.55, 8, 128);
            const midMat = new THREE.MeshBasicMaterial({
                color: 0xffae3b,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const midMesh = new THREE.Mesh(midDisk, midMat);
            midMesh.rotation.x = Math.PI / 2;
            disk.add(midMesh);

            // Outer disk (deep orange)
            const outerDisk = new THREE.TorusGeometry(horizonRadius * 3.4, 0.9, 8, 128);
            const outerMat = new THREE.MeshBasicMaterial({
                color: 0xc8551a,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const outerMesh = new THREE.Mesh(outerDisk, outerMat);
            outerMesh.rotation.x = Math.PI / 2;
            disk.add(outerMesh);

            // Lensing arcs (far side bent over top and under bottom)
            // Upper arc
            const upperArc = new THREE.TorusGeometry(horizonRadius * 2.35, 0.22, 6, 64, Math.PI * 1.1);
            const upperMat = new THREE.MeshBasicMaterial({
                color: 0xfff3d0,
                transparent: true,
                opacity: 0.88,
                blending: THREE.AdditiveBlending
            });
            const upperMesh = new THREE.Mesh(upperArc, upperMat);
            upperMesh.rotation.set(0.9, 0, 0);
            upperMesh.position.y = 2.1;
            disk.add(upperMesh);

            // Lower arc
            const lowerArc = new THREE.TorusGeometry(horizonRadius * 2.35, 0.22, 6, 64, Math.PI * 1.1);
            const lowerMesh = new THREE.Mesh(lowerArc, upperMat);
            lowerMesh.rotation.set(-0.9, 0, 0);
            lowerMesh.position.y = -2.1;
            disk.add(lowerMesh);

            // Relativistic beaming - brighter on one side
            const brightSide = new THREE.TorusGeometry(horizonRadius * 2.5, 0.65, 8, 64, Math.PI);
            const brightMat = new THREE.MeshBasicMaterial({
                color: 0xfff8d0,
                transparent: true,
                opacity: 0.65,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const brightMesh = new THREE.Mesh(brightSide, brightMat);
            brightMesh.rotation.x = Math.PI / 2;
            brightMesh.rotation.z = -1.2;
            disk.add(brightMesh);

            // Sparse dim starfield
            const starCount = 1200;
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                // Random positions on a large sphere
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const radius = 120 + Math.random() * 60;
                
                starPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i3 + 2] = radius * Math.cos(phi);
                
                // Dim stars
                const brightness = 0.3 + Math.random() * 0.5;
                starColors[i3] = brightness;
                starColors[i3 + 1] = brightness;
                starColors[i3 + 2] = brightness;
            }
            
            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            
            const starMat = new THREE.PointsMaterial({
                size: 0.6,
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                depthWrite: false
            });
            
            starField = new THREE.Points(starGeo, starMat);
            scene.add(starField);

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Start render loop immediately
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Slow disk rotation
            if (disk) {
                disk.rotation.y += 0.0018;
            }
            
            // Very slow photon ring rotation
            if (photonRing) {
                photonRing.rotation.z += 0.0007;
            }

            renderer.render(scene, camera);
        }

        // Boot
        init();
    </script>
</body>
</html>
