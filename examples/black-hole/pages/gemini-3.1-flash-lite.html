<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua Black Hole</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

<script type="module">
    import * as THREE from 'three';

    try {
        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 12); // Slightly above disk plane
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 1. The Black Hole (Event Horizon)
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHole = new THREE.Mesh(geometry, material);
        scene.add(blackHole);

        // 2. Photon Ring
        const ringGeom = new THREE.RingGeometry(1.01, 1.05, 128);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
        const photonRing = new THREE.Mesh(ringGeom, ringMat);
        photonRing.rotation.x = Math.PI / 2;
        scene.add(photonRing);

        // 3. Accretion Disk (Flat)
        const diskGeom = new THREE.RingGeometry(1.1, 4, 128, 16);
        // Create custom gradient texture for disk
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 1;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 256, 0);
        grad.addColorStop(0, '#fff3d0');
        grad.addColorStop(0.2, '#ffae3b');
        grad.addColorStop(1, '#c8551a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 256, 1);
        const texture = new THREE.CanvasTexture(canvas);

        const diskMat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
        const accretionDisk = new THREE.Mesh(diskGeom, diskMat);
        accretionDisk.rotation.x = Math.PI / 2;
        scene.add(accretionDisk);

        // 4. Lensing Arcs (The "bent" light over and under the sphere)
        const arcGeom = new THREE.TorusGeometry(1.2, 0.4, 16, 100, Math.PI);
        const arcMat = new THREE.MeshBasicMaterial({ color: 0xffae3b, transparent: true, opacity: 0.4, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
        
        const topArc = new THREE.Mesh(arcGeom, arcMat);
        topArc.position.y = 0.1;
        scene.add(topArc);

        const bottomArc = new THREE.Mesh(arcGeom, arcMat);
        bottomArc.rotation.x = Math.PI;
        bottomArc.position.y = -0.1;
        scene.add(bottomArc);

        // 5. Starfield
        const starGeom = new THREE.BufferGeometry();
        const starCount = 1000;
        const pos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) pos[i] = (Math.random() - 0.5) * 100;
        starGeom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0x555566, size: 0.1 });
        scene.add(new THREE.Points(starGeom, starMat));

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate disk
            accretionDisk.rotation.z += 0.005;
            topArc.rotation.z += 0.005;
            bottomArc.rotation.z += 0.005;

            // Relativistic beaming effect (pulse brightness)
            const time = Date.now() * 0.001;
            accretionDisk.material.opacity = 0.7 + Math.sin(time) * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    } catch (e) {
        console.error("Render failed", e);
    }
</script>
</body>
</html>
