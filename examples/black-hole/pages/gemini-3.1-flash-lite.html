<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua Simulation</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<script type="module">
    import * as THREE from 'three';

    try {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Tilt camera slightly to view disk edge-on (approx 7 degrees)
        camera.position.set(0, 1.5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 1. Event Horizon (Black Sphere) ---
        const horizonGeo = new THREE.SphereGeometry(1, 64, 64);
        const horizonMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const horizon = new THREE.Mesh(horizonGeo, horizonMat);
        scene.add(horizon);

        // --- 2. Accretion Disk (Flat Ring) ---
        // Using a custom geometry to get the color gradient
        const diskGroup = new THREE.Group();
        const innerRadius = 1.1;
        const outerRadius = 4.5;
        
        // Function to create disk segment
        function createDiskPart(innerR, outerR, colorStart, colorEnd, opacity) {
            const geometry = new THREE.RingGeometry(innerR, outerR, 128, 1);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: opacity,
                depthWrite: false, // Prevents Z-fighting
                blending: THREE.AdditiveBlending
            });
            
            // Apply vertex colors for gradient
            const pos = geometry.attributes.position;
            const colors = [];
            const color1 = new THREE.Color(colorStart);
            const color2 = new THREE.Color(colorEnd);
            
            for (let i = 0; i < pos.count; i++) {
                const dist = Math.sqrt(pos.getX(i)**2 + pos.getY(i)**2);
                const t = (dist - innerR) / (outerR - innerR);
                const c = new THREE.Color().copy(color1).lerp(color2, t);
                colors.push(c.r, c.g, c.b);
            }
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            material.vertexColors = true;
            
            return new THREE.Mesh(geometry, material);
        }

        const disk = createDiskPart(innerRadius, outerRadius, '#fff3d0', '#c8551a', 0.8);
        disk.rotation.x = Math.PI / 2;
        diskGroup.add(disk);

        // --- 3. Lensing Arcs (Top and Bottom) ---
        // These simulate the light bending over and under the sphere
        const arcGeo = new THREE.TorusGeometry(1.6, 0.4, 16, 64, Math.PI);
        const arcMat = new THREE.MeshBasicMaterial({ 
            color: 0xffae3b, 
            transparent: true, 
            opacity: 0.5, 
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending 
        });
        
        const topArc = new THREE.Mesh(arcGeo, arcMat);
        topArc.position.y = 0.2;
        topArc.rotation.z = Math.PI / 2;
        diskGroup.add(topArc);

        const bottomArc = new THREE.Mesh(arcGeo, arcMat);
        bottomArc.position.y = -0.2;
        bottomArc.rotation.z = -Math.PI / 2;
        diskGroup.add(bottomArc);

        scene.add(diskGroup);

        // --- 4. Photon Ring (Bright inner halo) ---
        const photonRing = new THREE.Mesh(
            new THREE.RingGeometry(1.02, 1.1, 64),
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 })
        );
        photonRing.rotation.x = Math.PI / 2;
        scene.add(photonRing);

        // --- 5. Starfield ---
        const starGeo = new THREE.BufferGeometry();
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
        const starVertices = [];
        for(let i = 0; i < 1000; i++) {
            starVertices.push(
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100
            );
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            diskGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    } catch (e) {
        console.error("Scene init failed", e);
    }
</script>
</body>
</html>
