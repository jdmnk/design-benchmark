<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Saturn-like Ringed Gas Giant - Three.js</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      background-color: #03050a;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- INITIALIZATION ---
    try {
      // Scene setup with near-black space background
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x03050a);
      
      // Camera: fixed position, planet centered
      const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0.8, 5.2);
      camera.lookAt(0, 0, 0);
      
      // Renderer with software-friendly settings, no shadows
      const renderer = new THREE.WebGLRenderer({ 
        antialias: true, 
        powerPreference: 'high-performance',
        alpha: false
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Limit for performance
      renderer.shadowMap.enabled = false; // Explicitly disable shadow maps
      renderer.setClearColor(0x03050a, 1.0);
      document.body.appendChild(renderer.domElement);

      // Handle window resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }, false);

      // --- LIGHTING (upper-left) ---
      const ambientLight = new THREE.AmbientLight(0x404066);
      scene.add(ambientLight);
      
      const sunLight = new THREE.DirectionalLight(0xffeedd, 2.8);
      sunLight.position.set(-2.5, 1.8, 3.2);
      scene.add(sunLight);
      
      // Fill light from opposite side to prevent total blackness
      const fillLight = new THREE.DirectionalLight(0x445577, 0.9);
      fillLight.position.set(1.5, -0.8, -2.0);
      scene.add(fillLight);

      // --- PLANET GROUP (for rotation) ---
      const planetGroup = new THREE.Group();
      scene.add(planetGroup);
      
      // Planet radius: diameter ~34% of viewport height. At distance ~5.2, radius ~0.85
      const planetRadius = 0.88;
      
      // Create planet sphere with banded texture via canvas
      function createPlanetTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        // Base gradient: cream to pale gold to tan to amber
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#f3e6c4');
        gradient.addColorStop(0.15, '#eed9a8');
        gradient.addColorStop(0.3, '#e6c88f');
        gradient.addColorStop(0.5, '#d9b57c');
        gradient.addColorStop(0.7, '#c99a5b');
        gradient.addColorStop(0.85, '#b8864a');
        gradient.addColorStop(1, '#a0703a');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Add horizontal bands with subtle variations
        for (let i = 0; i < canvas.height; i++) {
          const y = i / canvas.height;
          // Darker belts
          if (Math.abs(y - 0.35) < 0.04 || Math.abs(y - 0.65) < 0.05) {
            ctx.fillStyle = 'rgba(80, 50, 30, 0.25)';
            ctx.fillRect(0, i - 2, canvas.width, 5);
          }
          // Lighter zones
          if (Math.abs(y - 0.25) < 0.03 || Math.abs(y - 0.75) < 0.04) {
            ctx.fillStyle = 'rgba(255, 240, 210, 0.2)';
            ctx.fillRect(0, i - 1, canvas.width, 4);
          }
          // Equatorial zone lighter
          if (Math.abs(y - 0.5) < 0.06) {
            ctx.fillStyle = 'rgba(255, 245, 220, 0.3)';
            ctx.fillRect(0, i - 2, canvas.width, 6);
          }
        }
        
        // Add swirls and spots for visible rotation structure
        for (let s = 0; s < 25; s++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height;
          const radius = 3 + Math.random() * 18;
          const alpha = 0.15 + Math.random() * 0.3;
          
          // Storm ovals / spots
          ctx.beginPath();
          ctx.ellipse(x, y, radius * 1.5, radius * 0.7, Math.random() * Math.PI, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 160, 100, ${alpha})`;
          ctx.fill();
          
          // Brighter swirls
          if (Math.random() > 0.6) {
            ctx.beginPath();
            ctx.ellipse(x + 2, y - 2, radius * 1.2, radius * 0.5, Math.random() * Math.PI, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(240, 220, 180, ${alpha * 0.8})`;
            ctx.fill();
          }
        }
        
        // Faint large storm oval (like Great Red Spot but pale)
        ctx.save();
        ctx.translate(canvas.width * 0.65, canvas.height * 0.45);
        ctx.scale(1.8, 0.9);
        ctx.beginPath();
        ctx.ellipse(0, 0, 28, 18, 0.1, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(210, 150, 100, 0.45)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(180, 120, 70, 0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
        
        return new THREE.CanvasTexture(canvas);
      }
      
      const planetTexture = createPlanetTexture();
      planetTexture.colorSpace = THREE.SRGBColorSpace;
      
      const planetGeometry = new THREE.SphereGeometry(planetRadius, 128, 64);
      const planetMaterial = new THREE.MeshStandardMaterial({
        map: planetTexture,
        roughness: 0.7,
        metalness: 0.1,
        emissive: new THREE.Color(0x0a0502),
        emissiveIntensity: 0.15
      });
      
      const planet = new THREE.Mesh(planetGeometry, planetMaterial);
      planetGroup.add(planet);
      
      // --- RING SYSTEM ---
      const ringGroup = new THREE.Group();
      planetGroup.add(ringGroup); // Attach to planet group so rings orbit with planet rotation? 
      // But rings should orbit in-plane independently. We'll attach to planetGroup but rotate ringGroup separately.
      // Actually, planet rotates on axis, rings orbit in same direction. We'll rotate ringGroup around Y in local space.
      
      // Create ring texture with gaps and semi-transparency
      function createRingTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        
        // Clear with transparent
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Ring base: pale icy tan, banded
        const ringGradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        ringGradient.addColorStop(0.0, 'rgba(220, 200, 160, 0.0)');
        ringGradient.addColorStop(0.08, 'rgba(210, 190, 150, 0.5)');
        ringGradient.addColorStop(0.2, 'rgba(200, 180, 140, 0.7)');
        ringGradient.addColorStop(0.4, 'rgba(190, 170, 130, 0.8)');
        ringGradient.addColorStop(0.55, 'rgba(180, 160, 120, 0.75)');
        ringGradient.addColorStop(0.65, 'rgba(160, 140, 100, 0.1)'); // Cassini division gap
        ringGradient.addColorStop(0.72, 'rgba(175, 155, 115, 0.65)');
        ringGradient.addColorStop(0.85, 'rgba(160, 140, 100, 0.5)');
        ringGradient.addColorStop(0.95, 'rgba(140, 120, 80, 0.2)');
        ringGradient.addColorStop(1.0, 'rgba(100, 80, 50, 0.0)');
        
        ctx.fillStyle = ringGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Add subtle radial structure / brightness clumps for visible revolution
        for (let i = 0; i < 80; i++) {
          const x = Math.random() * canvas.width;
          const width = 2 + Math.random() * 8;
          const alpha = 0.08 + Math.random() * 0.2;
          ctx.fillStyle = `rgba(240, 220, 180, ${alpha})`;
          ctx.fillRect(x, 2, width, canvas.height - 4);
        }
        
        // Dark gap (Cassini division) more defined
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(canvas.width * 0.63, 0, canvas.width * 0.04, canvas.height);
        
        // Semi-transparent inner edge
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, 0, canvas.width * 0.06, canvas.height);
        
        return new THREE.CanvasTexture(canvas);
      }
      
      const ringTexture = createRingTexture();
      ringTexture.colorSpace = THREE.SRGBColorSpace;
      
      // Inner radius ~0.95, outer ~2.2 * planetRadius = ~1.94
      const innerRadius = 0.98;
      const outerRadius = 1.96;
      
      const ringGeometry = new THREE.RingGeometry(innerRadius, outerRadius, 256, 1);
      
      // Modify UVs for proper texture mapping along radius
      const pos = ringGeometry.attributes.position;
      const uv = ringGeometry.attributes.uv;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const r = Math.sqrt(x * x + y * y);
        // Map radius to U coordinate (0 to 1)
        const u = (r - innerRadius) / (outerRadius - innerRadius);
        uv.setXY(i, u, 0.5);
      }
      
      const ringMaterial = new THREE.MeshStandardMaterial({
        map: ringTexture,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.85,
        roughness: 0.4,
        metalness: 0.2,
        emissive: new THREE.Color(0x332211),
        emissiveIntensity: 0.25,
        depthWrite: true
      });
      
      const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
      // Rotate so ring lies in XZ plane (equatorial) then tilt for view
      ringMesh.rotation.x = Math.PI / 2; // Flat in XZ
      ringGroup.add(ringMesh);
      
      // Add a second thin ring layer for more detail
      const ring2Geometry = new THREE.RingGeometry(innerRadius * 1.02, outerRadius * 0.98, 256, 1);
      const pos2 = ring2Geometry.attributes.position;
      const uv2 = ring2Geometry.attributes.uv;
      for (let i = 0; i < pos2.count; i++) {
        const x = pos2.getX(i);
        const y = pos2.getY(i);
        const r = Math.sqrt(x * x + y * y);
        const u = (r - innerRadius * 1.02) / (outerRadius * 0.98 - innerRadius * 1.02);
        uv2.setXY(i, u, 0.5);
      }
      
      const ring2Material = new THREE.MeshStandardMaterial({
        map: ringTexture,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.4,
        roughness: 0.5,
        metalness: 0.1,
        emissive: new THREE.Color(0x221100),
        emissiveIntensity: 0.15,
        depthWrite: true
      });
      
      const ring2Mesh = new THREE.Mesh(ring2Geometry, ring2Material);
      ring2Mesh.rotation.x = Math.PI / 2;
      ringGroup.add(ring2Mesh);
      
      // --- FAKE RING SHADOW ON PLANET (dark semi-transparent band) ---
      function createShadowBand() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw a dark horizontal band across the sphere texture space
        const bandY = canvas.height * 0.65; // Position on planet where shadow falls
        const bandHeight = 25;
        
        const gradient = ctx.createLinearGradient(0, bandY - bandHeight/2, 0, bandY + bandHeight/2);
        gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
        gradient.addColorStop(0.4, 'rgba(20, 10, 5, 0.35)');
        gradient.addColorStop(0.6, 'rgba(20, 10, 5, 0.4)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, bandY - bandHeight/2, canvas.width, bandHeight);
        
        return new THREE.CanvasTexture(canvas);
      }
      
      const shadowTexture = createShadowBand();
      shadowTexture.colorSpace = THREE.SRGBColorSpace;
      
      const shadowSphereGeometry = new THREE.SphereGeometry(planetRadius * 1.005, 64, 32);
      const shadowMaterial = new THREE.MeshBasicMaterial({
        map: shadowTexture,
        transparent: true,
        blending: THREE.MultiplyBlending,
        depthTest: true,
        depthWrite: false,
        side: THREE.FrontSide
      });
      
      const shadowSphere = new THREE.Mesh(shadowSphereGeometry, shadowMaterial);
      planetGroup.add(shadowSphere);
      
      // --- FAKE PLANET SHADOW ON RINGS (darken arc behind planet) ---
      // This is achieved by a dark transparent ring segment placed behind planet
      function createRingShadowTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Darken the region that would be behind the planet (center portion)
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
        gradient.addColorStop(0.4, 'rgba(0, 0, 0, 0.55)');
        gradient.addColorStop(0.6, 'rgba(0, 0, 0, 0.55)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        return new THREE.CanvasTexture(canvas);
      }
      
      const ringShadowTexture = createRingShadowTexture();
      
      const ringShadowGeometry = new THREE.RingGeometry(innerRadius, outerRadius, 256, 1);
      const posShadow = ringShadowGeometry.attributes.position;
      const uvShadow = ringShadowGeometry.attributes.uv;
      for (let i = 0; i < posShadow.count; i++) {
        const x = posShadow.getX(i);
        const y = posShadow.getY(i);
        const r = Math.sqrt(x * x + y * y);
        const u = (r - innerRadius) / (outerRadius - innerRadius);
        uvShadow.setXY(i, u, 0.5);
      }
      
      const ringShadowMaterial = new THREE.MeshBasicMaterial({
        map: ringShadowTexture,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.5,
        blending: THREE.MultiplyBlending,
        depthTest: true,
        depthWrite: false
      });
      
      const ringShadowMesh = new THREE.Mesh(ringShadowGeometry, ringShadowMaterial);
      ringShadowMesh.rotation.x = Math.PI / 2;
      ringGroup.add(ringShadowMesh);
      
      // --- STARFIELD BACKGROUND ---
      function createStarfield() {
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1200;
        const starsPositions = new Float32Array(starsCount * 3);
        const starsColors = new Float32Array(starsCount * 3);
        
        for (let i = 0; i < starsCount * 3; i += 3) {
          // Random sphere distribution with large radius
          const radius = 25 + Math.random() * 35;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          
          starsPositions[i] = Math.sin(phi) * Math.cos(theta) * radius;
          starsPositions[i+1] = Math.sin(phi) * Math.sin(theta) * radius * 0.6;
          starsPositions[i+2] = Math.cos(phi) * radius;
          
          // Dim white/blueish stars
          const brightness = 0.3 + Math.random() * 0.7;
          const tint = Math.random();
          if (tint < 0.1) {
            starsColors[i] = 0.7 * brightness;
            starsColors[i+1] = 0.8 * brightness;
            starsColors[i+2] = 1.0 * brightness;
          } else if (tint < 0.2) {
            starsColors[i] = 1.0 * brightness;
            starsColors[i+1] = 0.9 * brightness;
            starsColors[i+2] = 0.7 * brightness;
          } else {
            starsColors[i] = 0.9 * brightness;
            starsColors[i+1] = 0.9 * brightness;
            starsColors[i+2] = 0.95 * brightness;
          }
        }
        
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(starsColors, 3));
        
        const starsMaterial = new THREE.PointsMaterial({
          size: 0.12,
          vertexColors: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          transparent: true
        });
        
        return new THREE.Points(starsGeometry, starsMaterial);
      }
      
      const starfield = createStarfield();
      scene.add(starfield);
      
      // --- TILT THE ENTIRE PLANET SYSTEM ---
      // Tilt so rings viewed at 18-24 degrees above edge-on
      planetGroup.rotation.x = 0.35; // ~20 degrees
      planetGroup.rotation.z = 0.1; // slight additional tilt
      
      // --- ANIMATION LOOP ---
      let clock = new THREE.Clock();
      
      function animate() {
        requestAnimationFrame(animate);
        
        const delta = clock.getDelta();
        // Use elapsed time for framerate-independent motion
        const elapsedTime = performance.now() * 0.001; // seconds
        
        // Planet rotation: ~25 degrees per second
        const planetRotSpeed = 0.45; // radians per second approx 25 deg/s
        planet.rotation.y = elapsedTime * planetRotSpeed;
        
        // Shadow sphere rotates with planet
        shadowSphere.rotation.y = planet.rotation.y;
        
        // Rings orbit in same direction, slightly different speeds
        // Inner faster, outer slower simulated by rotating ring group
        const ringBaseSpeed = 0.38; // ~22 deg/s
        ringGroup.rotation.y = elapsedTime * ringBaseSpeed;
        
        // Subtle independent rotation for ring layers to simulate differential rotation
        ring2Mesh.rotation.z = elapsedTime * 0.1; // slight wobble? No, keep aligned.
        // Instead, use scale or offset? We'll keep simple.
        
        // Starfield slow rotation for ambiance
        starfield.rotation.y = elapsedTime * 0.02;
        starfield.rotation.x = elapsedTime * 0.01;
        
        // Render
        renderer.render(scene, camera);
      }
      
      // Start animation loop immediately
      animate();
      
      console.log('Saturn-like scene initialized successfully.');
      
    } catch (error) {
      console.error('Scene initialization failed:', error);
      // Fallback: render a blank dark scene with error indication
      document.body.innerHTML = '<div style="color:white; display:flex; align-items:center; justify-content:center; height:100vh; background:#03050a;">Scene could not be loaded.</div>';
    }
  </script>
</body>
</html>
