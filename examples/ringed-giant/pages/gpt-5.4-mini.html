<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Saturn-like Ringed Gas Giant</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #020305; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "three",
      "three/addons/": "three/addons/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

let renderer, scene, camera, clock;
let planet, planetOverlay, rings, ringFront, ringBack, starField, root;

try {
  const w = window.innerWidth, h = window.innerHeight;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(w, h);
  renderer.setClearColor(0x020305, 1);
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020305);

  camera = new THREE.PerspectiveCamera(35, w / h, 0.1, 100);
  camera.position.set(0, 0, 6.45);

  root = new THREE.Group();
  scene.add(root);

  // Lights: upper-left key, soft fill.
  const key = new THREE.DirectionalLight(0xfff1d6, 2.5);
  key.position.set(-2.5, 2.2, 3.2);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xa8b7d6, 0.45);
  fill.position.set(2.0, -1.0, 2.0);
  scene.add(fill);

  const amb = new THREE.AmbientLight(0x3a2f28, 0.55);
  scene.add(amb);

  // Starfield
  const starCount = 700;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 35 * Math.random() + 10;
    const a = Math.random() * Math.PI * 2;
    const z = (Math.random() * 2 - 1) * 18;
    starPos[i * 3 + 0] = Math.cos(a) * r + (Math.random() - 0.5) * 2.0;
    starPos[i * 3 + 1] = Math.sin(a) * r + (Math.random() - 0.5) * 2.0;
    starPos[i * 3 + 2] = z - 20;
  }
  const starsGeo = new THREE.BufferGeometry();
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starsMat = new THREE.PointsMaterial({
    color: 0xdfe7ff,
    size: 0.03,
    transparent: true,
    opacity: 0.75,
    sizeAttenuation: true,
    depthWrite: false
  });
  starField = new THREE.Points(starsGeo, starsMat);
  scene.add(starField);

  function makePlanetTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 1024;
    const ctx = c.getContext('2d');

    // Base warm palette with subtle vertical light gradient.
    const g = ctx.createLinearGradient(0, 0, 0, 1024);
    g.addColorStop(0.00, '#f4e6c7');
    g.addColorStop(0.25, '#ecd8a6');
    g.addColorStop(0.52, '#dcbf7d');
    g.addColorStop(0.76, '#c99a5b');
    g.addColorStop(1.00, '#e8d4ab');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 1024, 1024);

    // Horizontal banding, softly blended.
    const bands = [
      [0.00, 0.09, 'rgba(246,231,199,0.55)'],
      [0.09, 0.15, 'rgba(227,201,137,0.30)'],
      [0.15, 0.23, 'rgba(242,230,193,0.25)'],
      [0.23, 0.34, 'rgba(194,145,76,0.22)'],
      [0.34, 0.45, 'rgba(240,221,168,0.24)'],
      [0.45, 0.56, 'rgba(170,121,64,0.24)'],
      [0.56, 0.68, 'rgba(243,230,194,0.20)'],
      [0.68, 0.80, 'rgba(200,156,88,0.21)'],
      [0.80, 1.00, 'rgba(234,216,171,0.26)']
    ];
    bands.forEach(([a, b, col]) => {
      const y1 = a * 1024, y2 = b * 1024;
      const gg = ctx.createLinearGradient(0, y1, 0, y2);
      gg.addColorStop(0, col);
      gg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gg;
      ctx.fillRect(0, y1, 1024, y2 - y1);
    });

    // Soft darker belts and a lighter equatorial zone.
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#8e6839';
    for (const y of [150, 320, 620, 820]) {
      ctx.beginPath();
      ctx.ellipse(512, y, 520, 40, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 0.20;
    ctx.fillStyle = '#f9efcf';
    ctx.beginPath();
    ctx.ellipse(512, 515, 540, 70, 0, 0, Math.PI * 2);
    ctx.fill();

    // Swirls / spots / storm oval for rotation visibility.
    ctx.globalAlpha = 0.95;
    ctx.fillStyle = 'rgba(153,102,54,0.34)';
    ctx.beginPath();
    ctx.ellipse(690, 380, 68, 32, -0.18, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(110,74,40,0.25)';
    ctx.beginPath();
    ctx.ellipse(370, 650, 86, 40, 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(120,77,41,0.22)';
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(140, 265); ctx.bezierCurveTo(260, 235, 360, 260, 470, 245);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(590, 745); ctx.bezierCurveTo(690, 705, 790, 730, 900, 690);
    ctx.stroke();

    // Subtle grain.
    const img = ctx.getImageData(0, 0, 1024, 1024);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * 10;
      d[i] = Math.max(0, Math.min(255, d[i] + n));
      d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
      d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
    }
    ctx.putImageData(img, 0, 0);

    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  function makeShadowTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);

    // Soft ring shadow band, diagonally across the lit hemisphere.
    ctx.translate(512, 512);
    ctx.rotate(-0.18);
    const grad = ctx.createLinearGradient(-500, 0, 500, 0);
    grad.addColorStop(0.00, 'rgba(0,0,0,0)');
    grad.addColorStop(0.37, 'rgba(0,0,0,0)');
    grad.addColorStop(0.48, 'rgba(0,0,0,0.18)');
    grad.addColorStop(0.50, 'rgba(0,0,0,0.30)');
    grad.addColorStop(0.52, 'rgba(0,0,0,0.18)');
    grad.addColorStop(0.63, 'rgba(0,0,0,0)');
    grad.addColorStop(1.00, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 10, 560, 125, 0, 0, Math.PI * 2);
    ctx.fill();

    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }

  function makeRingTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);

    // Radial ring texture: pale icy tan with variation and Cassini division.
    const img = ctx.createImageData(1024, 1024);
    const d = img.data;
    for (let y = 0; y < 1024; y++) {
      for (let x = 0; x < 1024; x++) {
        const u = (x - 512) / 512;
        const v = (y - 512) / 512;
        const r = Math.sqrt(u*u + v*v); // 0..~1.4
        const a = Math.atan2(v, u);
        const ring = Math.abs(r - 0.52);
        const alphaEdge = THREE.MathUtils.smoothstep(0.74, 0.48, r) * THREE.MathUtils.smoothstep(0.18, 0.02, r);
        const alpha = Math.max(0, Math.min(1, alphaEdge * 1.15));
        if (alpha <= 0) continue;

        let base = 230;
        base += 10 * Math.sin(a * 24.0 + r * 18.0);
        base += 8 * Math.sin(a * 7.0 - r * 42.0);
        if (r > 0.44 && r < 0.56) base -= 18;
        if (r > 0.61 && r < 0.64) base -= 34; // Cassini division
        if (r < 0.30) base -= 16;
        if (r > 0.66) base -= 14;

        const t = Math.max(0, Math.min(255, base));
        const idx = (y * 1024 + x) * 4;
        d[idx] = t;
        d[idx+1] = Math.max(0, t - 12);
        d[idx+2] = Math.max(0, t - 34);
        d[idx+3] = Math.floor(255 * alpha);
      }
    }
    ctx.putImageData(img, 0, 0);

    // Faint clumps / spokes.
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < 18; i++) {
      ctx.save();
      ctx.translate(512, 512);
      ctx.rotate((i / 18) * Math.PI * 2);
      ctx.fillStyle = 'rgba(255,248,230,0.07)';
      ctx.fillRect(250, -18, 260, 36);
      ctx.restore();
    }

    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.anisotropy = 4;
    return tex;
  }

  const planetTex = makePlanetTexture();
  const shadowTex = makeShadowTexture();
  const ringTex = makeRingTexture();

  const planetGeo = new THREE.SphereGeometry(1.18, 64, 48);
  const planetMat = new THREE.MeshPhongMaterial({
    map: planetTex,
    color: 0xffffff,
    shininess: 8,
    specular: new THREE.Color(0x26170f),
    emissive: new THREE.Color(0x130c07),
    emissiveIntensity: 0.25
  });
  planet = new THREE.Mesh(planetGeo, planetMat);
  root.add(planet);

  const overlayMat = new THREE.MeshBasicMaterial({
    map: shadowTex,
    transparent: true,
    opacity: 0.95,
    depthWrite: false,
    depthTest: true
  });
  planetOverlay = new THREE.Mesh(new THREE.SphereGeometry(1.181, 64, 48), overlayMat);
  root.add(planetOverlay);

  // Rings: split into back and front passes for clean occlusion.
  const ringGeo = new THREE.RingGeometry(1.55, 2.62, 220, 1);
  const ringMatBack = new THREE.MeshPhongMaterial({
    map: ringTex,
    color: 0xffffff,
    transparent: true,
    opacity: 0.78,
    side: THREE.DoubleSide,
    depthWrite: false,
    shininess: 10,
    specular: new THREE.Color(0x2a2017)
  });
  const ringMatFront = ringMatBack.clone();

  ringBack = new THREE.Mesh(ringGeo, ringMatBack);
  ringFront = new THREE.Mesh(ringGeo, ringMatFront);

  // Tilt ring plane and place in equatorial plane.
  const ringTilt = 0.39; // ~22 degrees
  ringBack.rotation.x = ringTilt;
  ringFront.rotation.x = ringTilt;

  // Back half first, front half second; use depth and subtle polygon offset-ish spacing.
  ringBack.renderOrder = 0;
  planet.renderOrder = 1;
  planetOverlay.renderOrder = 2;
  ringFront.renderOrder = 3;

  root.add(ringBack);
  root.add(ringFront);

  // Clip ring into back/front semicircles using custom onBeforeCompile? Simpler: use two meshes with half-rings in geometry.
  // Build half-ring geometries by masking vertices based on angle in local space.
  function makeHalfRingGeometry(isFront) {
    const g = ringGeo.clone();
    const pos = g.attributes.position;
    const uv = g.attributes.uv;
    const indices = [];
    for (let i = 0; i < g.index.count; i += 3) {
      const a = g.index.getX(i), b = g.index.getX(i+1), c = g.index.getX(i+2);
      const z = (pos.getZ(a) + pos.getZ(b) + pos.getZ(c)) / 3;
      if (isFront ? z <= 0.001 : z >= -0.001) indices.push(a, b, c);
    }
    const hg = new THREE.BufferGeometry();
    hg.setIndex(indices);
    hg.setAttribute('position', pos.clone());
    hg.setAttribute('uv', uv.clone());
    hg.computeVertexNormals();
    return hg;
  }

  const backGeo = makeHalfRingGeometry(false);
  const frontGeo = makeHalfRingGeometry(true);
  ringBack.geometry.dispose();
  ringFront.geometry.dispose();
  ringBack.geometry = backGeo;
  ringFront.geometry = frontGeo;

  // Slightly different texture motion to hint inner/outer differential revolution.
  clock = new THREE.Clock();

  function animate(now) {
    const t = now * 0.001;

    // Planet rotation with visible band drift.
    planet.rotation.y = t * 0.42;
    planetOverlay.rotation.copy(planet.rotation);

    // Ring texture revolution / clumps.
    ringTex.rotation = t * 0.18;
    ringTex.center.set(0.5, 0.5);
    ringTex.needsUpdate = true;

    ringMatBack.map.rotation = t * 0.18;
    ringMatFront.map.rotation = t * 0.22;

    // Slight in-plane precession for life, but camera remains fixed.
    root.rotation.y = Math.sin(t * 0.12) * 0.015;

    // Slow star twinkle by tiny opacity modulation.
    starField.material.opacity = 0.68 + 0.08 * Math.sin(t * 1.4);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  window.addEventListener('resize', () => {
    try {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    } catch (e) {}
  });

} catch (err) {
  console.error(err);
  // Minimal fallback text on black background if scene setup fails.
  const p = document.createElement('div');
  p.style.cssText = 'position:fixed;inset:0;color:#fff;background:#020305;display:flex;align-items:center;justify-content:center;font:16px sans-serif;';
  p.textContent = 'Render failed';
  document.body.appendChild(p);
}
</script>
</body>
</html>
