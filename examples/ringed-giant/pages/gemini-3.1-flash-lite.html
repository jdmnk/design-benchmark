<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn-like Planet Scene</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';

        try {
            // --- Setup ---
            const width = window.innerWidth;
            const height = window.innerHeight;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = 20;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setClearColor(0x020205);
            document.body.appendChild(renderer.domElement);

            // --- Generate Textures ---
            // Planet Texture
            const planetCanvas = document.createElement('canvas');
            planetCanvas.width = 1024;
            planetCanvas.height = 512;
            const ctx = planetCanvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 0, 512);
            grad.addColorStop(0, '#f3e6c4');
            grad.addColorStop(0.3, '#e6c88f');
            grad.addColorStop(0.5, '#c99a5b');
            grad.addColorStop(0.7, '#e6c88f');
            grad.addColorStop(1, '#f3e6c4');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1024, 512);
            // Add bands and a storm
            ctx.fillStyle = 'rgba(100, 70, 40, 0.2)';
            for(let i=0; i<10; i++) ctx.fillRect(0, Math.random()*512, 1024, 10);
            ctx.fillStyle = 'rgba(200, 150, 100, 0.4)';
            ctx.beginPath(); ctx.ellipse(800, 256, 40, 20, 0, 0, Math.PI*2); ctx.fill();
            const planetTex = new THREE.CanvasTexture(planetCanvas);

            // Ring Texture
            const ringCanvas = document.createElement('canvas');
            ringCanvas.width = 512;
            ringCanvas.height = 512;
            const rCtx = ringCanvas.getContext('2d');
            const rGrad = rCtx.createRadialGradient(256, 256, 50, 256, 256, 256);
            rGrad.addColorStop(0, 'rgba(200, 180, 150, 0.8)');
            rGrad.addColorStop(0.6, 'rgba(180, 160, 130, 0.9)');
            rGrad.addColorStop(0.65, 'rgba(0, 0, 0, 1)'); // Cassini
            rGrad.addColorStop(0.7, 'rgba(180, 160, 130, 0.6)');
            rGrad.addColorStop(1, 'rgba(150, 130, 100, 0)');
            rCtx.fillStyle = rGrad;
            rCtx.fillRect(0, 0, 512, 512);
            const ringTex = new THREE.CanvasTexture(ringCanvas);

            // --- Meshes ---
            const planetGroup = new THREE.Group();
            scene.add(planetGroup);

            // Planet
            const planetGeo = new THREE.SphereGeometry(2, 64, 64);
            const planetMat = new THREE.MeshPhongMaterial({ map: planetTex, shininess: 5, emissive: 0x221100, emissiveIntensity: 0.1 });
            const planet = new THREE.Mesh(planetGeo, planetMat);
            planetGroup.add(planet);

            // Rings (Two parts for proper occlusion: Back and Front)
            const ringGeo = new THREE.RingGeometry(2.5, 5, 128);
            const ringMat = new THREE.MeshBasicMaterial({ map: ringTex, transparent: true, side: THREE.DoubleSide, depthWrite: false });
            
            const ringBack = new THREE.Mesh(ringGeo, ringMat);
            const ringFront = new THREE.Mesh(ringGeo, ringMat);
            
            // Tilt
            const tilt = THREE.MathUtils.degToRad(20);
            ringBack.rotation.x = Math.PI / 2 + tilt;
            ringFront.rotation.x = Math.PI / 2 + tilt;
            
            // To handle occlusion: 
            // 1. Back part is behind planet. 2. Front part is in front.
            // Simplified approach: Render ring in two halves or just rely on renderOrder.
            // Actually, we use renderOrder. Planet = 1, Rings = 0.
            ringBack.renderOrder = 0;
            planet.renderOrder = 1;
            ringFront.renderOrder = 2; // Renders after planet
            
            scene.add(ringBack);
            scene.add(ringFront);

            // --- Lighting ---
            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(5, 2, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x202030));

            // --- Stars ---
            const starGeo = new THREE.BufferGeometry();
            const starCount = 2000;
            const pos = new Float32Array(starCount * 3);
            for(let i=0; i<starCount*3; i++) pos[i] = (Math.random() - 0.5) * 100;
            starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            scene.add(new THREE.Points(starGeo, starMat));

            // --- Animation Loop ---
            function animate(time) {
                const t = time * 0.001;
                
                // Rotate planet
                planet.rotation.y = t * 0.1;
                
                // Rotate rings (clumpy texture movement)
                ringBack.rotation.z = t * 0.05;
                ringFront.rotation.z = t * 0.05;

                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate(0);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (e) {
            console.error(e);
        }
    </script>
</body>
</html>
