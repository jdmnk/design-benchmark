<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #03040a; }
  .scene {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: radial-gradient(120% 120% at 50% 50%, #0b0d16 0%, #03040a 62%);
  }
  /* Starfield — done; leave it as-is. */
  .stars { position: absolute; inset: 0; opacity: .85;
    background-image:
      radial-gradient(1px 1px at 15% 22%, #fff, transparent),
      radial-gradient(1px 1px at 68% 14%, #cbd5ff, transparent),
      radial-gradient(1px 1px at 82% 61%, #fff, transparent),
      radial-gradient(1px 1px at 34% 78%, #e6ecff, transparent),
      radial-gradient(1px 1px at 52% 41%, #fff, transparent),
      radial-gradient(1px 1px at 9% 66%, #cfd8ff, transparent),
      radial-gradient(1px 1px at 91% 33%, #fff, transparent),
      radial-gradient(1px 1px at 26% 9%, #fff, transparent),
      radial-gradient(1px 1px at 74% 88%, #dfe6ff, transparent);
  }
  /* The black hole is centered here; its size = the event-horizon diameter (~30% of viewport height). */
  .blackhole { position: relative; width: 30vh; height: 30vh; }

  /* ==================== YOUR CSS BELOW ==================== */
  /* Style the elements inside .blackhole and animate the disk's rotation —
     exactly ONE full turn over the 5s clip so it loops seamlessly. */

  .blackhole > * { position: absolute; }

  /* Event horizon: solid black sphere */
  .horizon {
    inset: 0;
    border-radius: 50%;
    background: #000;
    box-shadow: inset 0 0 4vh rgba(255, 235, 190, .08);
    z-index: 10;
  }

  /* Thin bright ring hugging the horizon */
  .photon-ring {
    inset: -1%;
    border-radius: 50%;
    box-shadow:
      0 0 0 .35vh rgba(255, 245, 215, .95),
      0 0 1vh .6vh rgba(255, 200, 100, .45),
      inset 0 0 .6vh rgba(255, 200, 100, .2);
    z-index: 11;
  }

  /* Bright edge-on accretion disk */
  .disk {
    left: 50%; top: 50%;
    width: 260%; height: 100%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    overflow: hidden;
    z-index: 12;
    background:
      /* relativistic beaming: left side brighter, right dimmer */
      linear-gradient(90deg,
        rgba(255, 255, 255, .32) 0%,
        rgba(255, 255, 255, 0) 55%,
        rgba(50, 15, 0, .38) 100%),
      /* hot inner band fading to deep orange */
      radial-gradient(ellipse 90% 24% at 50% 50%,
        #fffdf5 0%,
        #fff3d0 10%,
        #ffae3b 30%,
        #c8551a 60%,
        #6a2108 82%,
        transparent 100%);
  }

  /* Rotating azimuthal streaks on the disk */
  .disk::before {
    content: '';
    position: absolute;
    inset: -50%;
    background: conic-gradient(from 0deg,
      rgba(255, 255, 255, .20) 0deg 18deg,
      transparent 18deg 42deg,
      rgba(255, 200, 90, .22) 42deg 66deg,
      transparent 66deg 96deg,
      rgba(255, 245, 220, .18) 96deg 126deg,
      transparent 126deg 156deg,
      rgba(255, 180, 60, .20) 156deg 186deg,
      transparent 186deg 216deg,
      rgba(255, 255, 255, .15) 216deg 240deg,
      transparent 240deg 270deg,
      rgba(255, 220, 130, .18) 270deg 300deg,
      transparent 300deg 330deg,
      rgba(255, 255, 255, .20) 330deg 360deg
    );
    mix-blend-mode: screen;
    opacity: .75;
    animation:
      spin 5s linear infinite,
      pulse 1.25s ease-in-out infinite alternate;
  }

  /* Gravitational-lensing arcs over the top and bottom */
  .lensing {
    left: 50%; top: 50%;
    width: 110%; height: 120%;
    transform: translate(-50%, -50%);
    z-index: 13;
    pointer-events: none;
    background:
      radial-gradient(ellipse 78% 42% at 50% -12%,
        rgba(255, 250, 230, .95) 0%,
        rgba(255, 225, 150, .55) 22%,
        rgba(255, 174, 59, .28) 42%,
        transparent 72%),
      radial-gradient(ellipse 78% 42% at 50% 112%,
        rgba(255, 250, 230, .90) 0%,
        rgba(255, 225, 150, .50) 22%,
        rgba(255, 174, 59, .25) 42%,
        transparent 72%);
    filter: blur(.25vh) brightness(1.05);
    animation: shimmer 2.5s ease-in-out infinite alternate;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%   { opacity: .60; }
    100% { opacity: .92; }
  }

  @keyframes shimmer {
    0%   { opacity: .88; filter: blur(.22vh) brightness(1.02); }
    100% { opacity: 1;   filter: blur(.32vh) brightness(1.14); }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="stars"></div>
    <div class="blackhole">
      <div class="disk"></div>
      <div class="lensing"></div>
      <div class="horizon"></div>
      <div class="photon-ring"></div>
    </div>
  </div>
</body>
</html>
