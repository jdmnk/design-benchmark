<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #03040a; }
  .scene {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: radial-gradient(120% 120% at 50% 50%, #0b0d16 0%, #03040a 62%);
  }
  .stars { position: absolute; inset: 0; opacity: .85;
    background-image:
      radial-gradient(1px 1px at 15% 22%, #fff, transparent),
      radial-gradient(1px 1px at 68% 14%, #cbd5ff, transparent),
      radial-gradient(1px 1px at 82% 61%, #fff, transparent),
      radial-gradient(1px 1px at 34% 78%, #e6ecff, transparent),
      radial-gradient(1px 1px at 52% 41%, #fff, transparent),
      radial-gradient(1px 1px at 9% 66%, #cfd8ff, transparent),
      radial-gradient(1px 1px at 91% 33%, #fff, transparent),
      radial-gradient(1px 1px at 26% 9%, #fff, transparent),
      radial-gradient(1px 1px at 74% 88%, #dfe6ff, transparent);
  }
  .blackhole { position: relative; width: 30vh; height: 30vh; }

  /* ==================== BLACK HOLE CSS ==================== */

  @property --a {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  /* Accretion disk — wide, edge-on ellipse with warm color gradient */
  .disk {
    position: absolute;
    width: 250%; height: 20%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    overflow: hidden;
    background: radial-gradient(ellipse at center,
      #fffae6 0%, #ffd080 10%, #ffae3b 25%, #e07020 48%,
      #c8551a 65%, #6b2010 82%, transparent 100%);
    box-shadow:
      0 0 30px 8px rgba(255, 150, 50, 0.18),
      0 0 60px 18px rgba(200, 85, 26, 0.08);
    z-index: 5;
  }

  /* Rotating azimuthal structure (brightness clumps) via conic-gradient */
  .disk::before {
    content: '';
    position: absolute;
    width: 100%; aspect-ratio: 1;
    top: 50%; left: 0;
    margin-top: -50%;
    background: conic-gradient(from var(--a) at 50% 50%,
      rgba(255,255,240,.7) 0deg, rgba(255,170,60,.04) 14deg,
      transparent 24deg,
      rgba(255,255,220,.6) 38deg, rgba(255,180,60,.03) 52deg,
      transparent 62deg,
      rgba(255,255,240,.65) 76deg, transparent 92deg,
      rgba(255,200,100,.5) 108deg, transparent 122deg,
      rgba(255,255,220,.4) 138deg, transparent 152deg,
      rgba(255,180,60,.65) 168deg, transparent 182deg,
      rgba(255,255,240,.55) 198deg, transparent 212deg,
      rgba(255,200,100,.35) 228deg, transparent 242deg,
      rgba(255,255,220,.6) 258deg, transparent 272deg,
      rgba(255,180,60,.5) 288deg, transparent 302deg,
      rgba(255,255,240,.7) 318deg, rgba(255,200,100,.5) 342deg,
      rgba(255,255,240,.7) 360deg
    );
    mix-blend-mode: screen;
    animation: disk-spin 5s linear infinite;
  }

  /* Relativistic beaming — left side (approaching) brighter */
  .disk::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(to right,
      rgba(255,255,255,.32) 0%, rgba(255,240,200,.12) 32%,
      transparent 50%, rgba(0,0,0,.18) 68%, rgba(0,0,0,.35) 100%);
  }

  @keyframes disk-spin {
    to { --a: 360deg; }
  }

  /* Lensing halo — arcs over top and under bottom */
  .lensing {
    position: absolute;
    inset: 0;
    z-index: 11;
    pointer-events: none;
  }

  .lensing::before {
    /* Top arc */
    content: '';
    position: absolute;
    width: 116%; height: 116%;
    top: -8%; left: -8%;
    border-radius: 50%;
    border: 3px solid rgba(255, 225, 170, 0.88);
    border-bottom-color: transparent;
    filter: blur(1.2px);
    box-shadow:
      0 0 8px 2px rgba(255, 200, 120, 0.6),
      0 0 22px 6px rgba(255, 150, 50, 0.28);
    animation: shimmer 2.5s ease-in-out infinite alternate;
  }

  .lensing::after {
    /* Bottom arc (mirrored) */
    content: '';
    position: absolute;
    width: 116%; height: 116%;
    top: -8%; left: -8%;
    border-radius: 50%;
    border: 3px solid rgba(255, 225, 170, 0.88);
    border-top-color: transparent;
    filter: blur(1.2px);
    box-shadow:
      0 0 8px 2px rgba(255, 200, 120, 0.6),
      0 0 22px 6px rgba(255, 150, 50, 0.28);
    animation: shimmer 2.5s ease-in-out infinite alternate-reverse;
  }

  @keyframes shimmer {
    0% { opacity: 0.72; }
    100% { opacity: 1; }
  }

  /* Event horizon — solid black sphere */
  .horizon {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #000;
    z-index: 10;
  }

  /* Photon ring — thin bright ring at horizon edge */
  .photon-ring {
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 220, 160, 0.8);
    box-shadow:
      0 0 5px 1.5px rgba(255, 200, 120, 0.75),
      0 0 14px 4px rgba(255, 160, 60, 0.4),
      inset 0 0 5px 1.5px rgba(255, 200, 120, 0.55);
    z-index: 12;
    animation: ring-pulse 2.5s ease-in-out infinite alternate;
  }

  @keyframes ring-pulse {
    0% { opacity: 0.82; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="stars"></div>
    <div class="blackhole">
      <div class="disk"></div>
      <div class="lensing"></div>
      <div class="horizon"></div>
      <div class="photon-ring"></div>
    </div>
  </div>
</body>
</html>
