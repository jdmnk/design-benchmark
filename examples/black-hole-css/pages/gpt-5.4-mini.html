<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #03040a; }
  .scene {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: radial-gradient(120% 120% at 50% 50%, #0b0d16 0%, #03040a 62%);
  }
  /* Starfield — done; leave it as-is. */
  .stars { position: absolute; inset: 0; opacity: .85;
    background-image:
      radial-gradient(1px 1px at 15% 22%, #fff, transparent),
      radial-gradient(1px 1px at 68% 14%, #cbd5ff, transparent),
      radial-gradient(1px 1px at 82% 61%, #fff, transparent),
      radial-gradient(1px 1px at 34% 78%, #e6ecff, transparent),
      radial-gradient(1px 1px at 52% 41%, #fff, transparent),
      radial-gradient(1px 1px at 9% 66%, #cfd8ff, transparent),
      radial-gradient(1px 1px at 91% 33%, #fff, transparent),
      radial-gradient(1px 1px at 26% 9%, #fff, transparent),
      radial-gradient(1px 1px at 74% 88%, #dfe6ff, transparent);
  }
  /* The black hole is centered here; its size = the event-horizon diameter (~30% of viewport height). */
  .blackhole { position: relative; width: 30vh; height: 30vh; }

  /* ==================== YOUR CSS BELOW ==================== */
  .blackhole > div, .blackhole::before, .blackhole::after { position: absolute; inset: 0; }

  .disk{
    inset: 44% -35%;
    height: 12%;
    top: 44%;
    border-radius: 999px;
    background:
      radial-gradient(closest-side at 50% 50%, rgba(255,248,220,.95) 0 12%, rgba(255,227,170,.9) 18%, rgba(255,171,61,.95) 34%, rgba(200,85,26,.65) 58%, rgba(200,85,26,0) 78%),
      repeating-conic-gradient(from 0deg,
        rgba(255,243,208,.0) 0 8deg,
        rgba(255,243,208,.25) 8deg 11deg,
        rgba(255,174,59,.0) 11deg 19deg,
        rgba(255,174,59,.25) 19deg 22deg,
        rgba(200,85,26,.0) 22deg 30deg);
    filter: blur(.25vh) saturate(1.35) brightness(1.05);
    transform-origin: 50% 50%;
    animation: spin 5s linear infinite, shimmer 2.5s linear infinite;
    box-shadow:
      0 0 1.4vh rgba(255,220,150,.55),
      0 0 3vh rgba(255,147,45,.25);
    mix-blend-mode: screen;
  }
  .disk::before{
    content:"";
    position:absolute; inset:-180% -6%;
    border-radius: 50%;
    background:
      radial-gradient(closest-side at 50% 50%, rgba(255,243,208,.0) 48%, rgba(255,243,208,.9) 50%, rgba(255,174,59,.55) 58%, rgba(200,85,26,0) 72%),
      conic-gradient(from 0deg, rgba(255,255,255,0) 0 18deg, rgba(255,255,255,.9) 19deg 22deg, rgba(255,255,255,0) 23deg 48deg, rgba(255,174,59,.7) 49deg 54deg, rgba(255,255,255,0) 55deg 360deg);
    clip-path: inset(44% 0 44% 0 round 999px);
    opacity: .85;
    filter: blur(.35vh);
  }
  .disk::after{
    content:"";
    position:absolute; inset:-80% -20%;
    background: linear-gradient(90deg, transparent 0 14%, rgba(255,255,255,.75) 18%, rgba(255,214,140,.2) 24%, transparent 30% 70%, rgba(255,160,52,.28) 76%, transparent 82%);
    clip-path: inset(46% 0 46% 0 round 999px);
    mix-blend-mode: screen;
    opacity: .85;
  }

  .horizon{
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #020205 0 62%, #000 72%, #000 100%);
    box-shadow:
      inset 0 0 0 0.25vh rgba(255,255,255,.02),
      0 0 0.8vh rgba(0,0,0,.95);
    z-index: 3;
  }

  .photon-ring{
    inset: 1.3%;
    border-radius: 50%;
    background:
      radial-gradient(circle, transparent 61%, rgba(255,245,210,.98) 62.2%, rgba(255,197,83,.95) 64%, rgba(255,126,33,.0) 68%);
    filter: blur(.12vh) brightness(1.1);
    box-shadow: 0 0 1.4vh rgba(255,210,120,.35);
    z-index: 4;
    animation: pulse 2.5s linear infinite;
  }

  .lensing{
    inset: -8%;
    border-radius: 50%;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(closest-side at 50% 27%, transparent 55%, rgba(255,236,196,.0) 56%, rgba(255,236,196,.95) 58%, rgba(255,176,70,.55) 61%, rgba(255,176,70,0) 68%),
      radial-gradient(closest-side at 50% 73%, transparent 55%, rgba(255,236,196,.0) 56%, rgba(255,236,196,.92) 58%, rgba(255,176,70,.5) 61%, rgba(255,176,70,0) 68%);
    filter: blur(.22vh) saturate(1.2);
    opacity: .85;
    mix-blend-mode: screen;
  }
  .lensing::before, .lensing::after{
    content:"";
    position:absolute; left:50%; width: 130%; height: 46%;
    transform: translateX(-50%);
    border: .45vh solid rgba(255,238,200,.95);
    border-left-color: transparent;
    border-right-color: transparent;
    border-bottom-color: transparent;
    border-radius: 50%;
    filter: blur(.18vh);
    box-shadow: 0 0 1.2vh rgba(255,190,80,.28);
  }
  .lensing::before{
    top: 9%;
    transform: translateX(-50%) rotate(0deg) scaleX(1.02);
  }
  .lensing::after{
    bottom: 9%;
    transform: translateX(-50%) rotate(180deg) scaleX(1.02);
  }

  @keyframes spin { to { transform: rotate(1turn); } }
  @keyframes shimmer {
    0%,100% { opacity: .96; }
    50% { opacity: 1; }
  }
  @keyframes pulse {
    0%,100% { opacity: .78; }
    50% { opacity: .96; }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="stars"></div>
    <div class="blackhole">
      <!-- Style these (add or rename as you need): -->
      <div class="disk"></div>         <!-- bright accretion disk, viewed edge-on -->
      <div class="lensing"></div>      <!-- lensing halo: arcs over the top and mirrored under the bottom -->
      <div class="horizon"></div>      <!-- the solid-black event-horizon sphere -->
      <div class="photon-ring"></div>  <!-- thin bright ring hugging the horizon edge -->
    </div>
  </div>
</body>
</html>
