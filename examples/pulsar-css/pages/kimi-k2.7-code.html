/* Rotating beam/jet system */
.beams-wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  z-index: 1;
  animation: spin5 5s linear infinite;
}

.beam {
  position: absolute;
  left: 50%;
  width: 10vh;
  height: 120vh;
  mix-blend-mode: screen;
  filter: blur(4px);
  opacity: 0.75;
}

.beam-up {
  bottom: 0;
  transform: translateX(-50%);
  transform-origin: bottom center;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  background: linear-gradient(to top,
    rgba(230, 250, 255, 0.55) 0%,
    rgba(80, 220, 255, 0.28) 25%,
    rgba(0, 200, 255, 0.09) 60%,
    rgba(0, 200, 255, 0) 100%);
}

.beam-down {
  top: 0;
  transform: translateX(-50%);
  transform-origin: top center;
  clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
  background: linear-gradient(to bottom,
    rgba(230, 250, 255, 0.55) 0%,
    rgba(80, 220, 255, 0.28) 25%,
    rgba(0, 200, 255, 0.09) 60%,
    rgba(0, 200, 255, 0) 100%);
}

/* Equatorial disk */
.equator {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 52vh;
  height: 5.5vh;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 2px solid rgba(200, 245, 255, 0.85);
  box-shadow:
    0 0 16px rgba(120, 230, 255, 0.6),
    0 0 40px rgba(80, 180, 255, 0.25),
    inset 0 0 20px rgba(200, 245, 255, 0.2);
  filter: blur(1px);
  mix-blend-mode: screen;
  z-index: 2;
}

/* Shockwave rings */
.rings {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  z-index: 4;
}

.ring {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12vh;
  height: 12vh;
  margin-top: -6vh;
  margin-left: -6vh;
  border-radius: 50%;
  border: 2px solid rgba(160, 255, 255, 0.55);
  box-shadow:
    0 0 12px rgba(100, 255, 255, 0.45),
    inset 0 0 12px rgba(100, 255, 255, 0.15);
  opacity: 0;
  transform: scale(0);
  animation: expand 5s linear infinite;
}

.ring:nth-child(1) { animation-delay: 0s; }
.ring:nth-child(2) { animation-delay: -1s; }
.ring:nth-child(3) { animation-delay: -2s; }
.ring:nth-child(4) { animation-delay: -3s; }
.ring:nth-child(5) { animation-delay: -4s; }

/* Bright core */
.core {
  position: relative;
  width: 9vh;
  height: 9vh;
  border-radius: 50%;
  background: radial-gradient(circle at 33% 33%,
    #ffffff 0%,
    #f2f6ff 18%,
    #bcd2ff 45%,
    #5b7cff 100%);
  box-shadow:
    0 0 12px #ffffff,
    0 0 36px #bcd2ff,
    0 0 80px #5b7cff,
    inset 0 0 18px #ffffff;
  z-index: 10;
  animation: pulse 1s ease-in-out infinite;
}

@keyframes spin5 {
  from { transform: rotate(20deg); }
  to { transform: rotate(380deg); }
}

@keyframes expand {
  0% {
    transform: scale(0);
    opacity: 0;
  }
  2% {
    opacity: 0.9;
  }
  20% {
    opacity: 0.65;
  }
  100% {
    transform: scale(14);
    opacity: 0;
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    filter: brightness(1);
  }
  50% {
    transform: scale(1.28);
    filter: brightness(1.7);
  }
}

  <div class="rings">

    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>
  <div class="core"></div>
