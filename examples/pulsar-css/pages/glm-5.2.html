<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pulsar</title>
<style>
/* Dark space background — first rule, never blank */
body {
  margin: 0;
  background: #03040a;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

.scene {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background:
    radial-gradient(ellipse at 50% 50%, #0a1024 0%, #05060f 45%, #03040a 100%);
}

/* ---------- Beams (rotating lighthouse) ---------- */
.beams {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  animation: spin 5s linear infinite;
  mix-blend-mode: screen;
}
@keyframes spin {
  from { transform: rotate(20deg); }
  to   { transform: rotate(380deg); }
}

.beam {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 11vw;
  height: 115vh;
  margin-left: -5.5vw;
  margin-top: -115vh; /* bottom sits at center */
  transform-origin: 50% 100%;
  clip-path: polygon(50% 100%, 28% 0, 72% 0);
  background: linear-gradient(
    to top,
    rgba(235, 248, 255, 0.95) 0%,
    rgba(170, 220, 255, 0.55) 25%,
    rgba(120, 190, 255, 0.25) 55%,
    rgba(90, 160, 255, 0.08) 80%,
    transparent 100%
  );
  filter: blur(7px);
}
.beam.b {
  transform: rotate(180deg);
  filter: blur(7px) brightness(0.95);
}

/* inner brighter core of each beam */
.beam::after {
  content: "";
  position: absolute;
  inset: 0;
  clip-path: polygon(50% 100%, 42% 0, 58% 0);
  background: linear-gradient(
    to top,
    rgba(255, 255, 255, 0.9) 0%,
    rgba(200, 235, 255, 0.5) 30%,
    rgba(150, 210, 255, 0.15) 65%,
    transparent 100%
  );
  filter: blur(2px);
}

/* ---------- Equatorial ring (steady, tilted 20°) ---------- */
.ring {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 20vh;
  height: 4.2vh;
  transform: translate(-50%, -50%) rotate(20deg);
  border-radius: 50%;
  border: 1px solid rgba(190, 220, 255, 0.75);
  box-shadow:
    0 0 14px rgba(140, 200, 255, 0.55),
    inset 0 0 10px rgba(180, 220, 255, 0.5);
  background: radial-gradient(ellipse at center, rgba(150,200,255,0.08), transparent 70%);
}
.ring::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 50%;
  border: 0.5px solid rgba(220, 240, 255, 0.4);
  filter: blur(1px);
}

/* ---------- Shockwave rings ---------- */
.shocks {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
}
.shock {
  position: absolute;
  left: 0;
  top: 0;
  width: 9vh;
  height: 9vh;
  margin-left: -4.5vh;
  margin-top: -4.5vh;
  border-radius: 50%;
  border: 1.5px solid rgba(140, 220, 255, 0.7);
  box-shadow: 0 0 8px rgba(120, 200, 255, 0.4), inset 0 0 6px rgba(140, 220, 255, 0.3);
  transform: scale(1);
  opacity: 0;
  animation: shock 5s linear infinite;
}
.shock.s2 { animation-delay: 1s; }
.shock.s3 { animation-delay: 2s; }
.shock.s4 { animation-delay: 3s; }
.shock.s5 { animation-delay: 4s; }

@keyframes shock {
  0%   { transform: scale(1);    opacity: 0;    border-width: 2px; }
  4%   { opacity: 0.85; }
  60%  { opacity: 0.12; }
  70%  { transform: scale(7.5);  opacity: 0;    border-width: 0.4px; }
  100% { transform: scale(7.5);  opacity: 0;    border-width: 0.4px; }
}

/* ---------- Core (pulsing 1s) ---------- */
.core-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 9vh;
  height: 9vh;
  transform: translate(-50%, -50%);
}
.core {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%,
    #ffffff 0%,
    #f2f6ff 22%,
    #bcd2ff 52%,
    #5b7cff 82%,
    rgba(60, 100, 220, 0) 100%);
  animation: pulse 1s ease-in-out infinite;
  mix-blend-mode: screen;
}
@keyframes pulse {
  0%, 100% {
    transform: scale(0.82);
    filter: brightness(0.85);
    box-shadow:
      0 0 22px 5px rgba(170, 200, 255, 0.55),
      0 0 50px 16px rgba(110, 150, 255, 0.32),
      0 0 110px 40px rgba(70, 110, 230, 0.18);
  }
  50% {
    transform: scale(1.18);
    filter: brightness(1.35);
    box-shadow:
      0 0 40px 12px rgba(220, 235, 255, 0.95),
      0 0 90px 32px rgba(150, 190, 255, 0.6),
      0 0 180px 70px rgba(90, 140, 255, 0.32);
  }
}

/* tiny ultra-bright nucleus */
.nucleus {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 2.4vh;
  height: 2.4vh;
  margin-left: -1.2vh;
  margin-top: -1.2vh;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffff 0%, #ffffff 40%, rgba(220,235,255,0.6) 70%, transparent 100%);
  animation: pulse 1s ease-in-out infinite;
  mix-blend-mode: screen;
}
</style>

<body>
  <div class="scene">
    <div class="stars"></div>

    <div class="beams">
      <div class="beam a"></div>
      <div class="beam b"></div>
    </div>

    <div class="ring"></div>

    <div class="shocks">
      <div class="shock s1"></div>
      <div class="shock s2"></div>
      <div class="shock s3"></div>
      <div class="shock s4"></div>
      <div class="shock s5"></div>
    </div>

    <div class="core-wrap">
      <div class="core"></div>
    </div>
    <div class="nucleus"></div>
  </div>
</body>
