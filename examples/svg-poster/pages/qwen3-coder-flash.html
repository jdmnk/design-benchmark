<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Art Poster</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .anim {
            animation: drift 25s linear infinite;
        }
        @keyframes drift {
            0% { transform: translateX(0px); }
            100% { transform: translateX(-100px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .shimmer {
            animation: shimmer 3s ease-in-out infinite;
        }
        .pulse {
            animation: pulse 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="cover">
        <defs>
            <!-- Sky gradients -->
            <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ff9a3d"/>
                <stop offset="50%" stop-color="#ff6b35"/>
                <stop offset="100%" stop-color="#f7931e"/>
            </linearGradient>
            
            <!-- Mountain gradients -->
            <linearGradient id="mountain1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#4a5568"/>
                <stop offset="100%" stop-color="#2d3748"/>
            </linearGradient>
            
            <linearGradient id="mountain2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2d3748"/>
                <stop offset="100%" stop-color="#1a202c"/>
            </linearGradient>
            
            <linearGradient id="mountain3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1a202c"/>
                <stop offset="100%" stop-color="#121824"/>
            </linearGradient>
            
            <!-- Sun gradient -->
            <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffd700"/>
                <stop offset="100%" stop-color="#ff6347"/>
            </radialGradient>
            
            <!-- Cloud gradient -->
            <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#f0f0f0"/>
            </linearGradient>
        </defs>
        
        <!-- Sky background -->
        <rect width="100%" height="100%" fill="url(#skyGradient)" />
        
        <!-- Distant mountains -->
        <polygon points="0,600 200,400 400,450 600,400 800,430 1000,380 1000,600" fill="url(#mountain1Gradient)" />
        <polygon points="0,600 150,420 350,470 550,410 750,440 950,390 1000,600" fill="url(#mountain2Gradient)" />
        <polygon points="0,600 100,440 300,480 500,420 700,460 900,400 1000,600" fill="url(#mountain3Gradient)" />
        
        <!-- Foreground mountains -->
        <polygon points="0,600 250,400 500,450 750,400 1000,430 1000,600" fill="url(#mountain1Gradient)" />
        
        <!-- Sun -->
        <circle class="pulse" cx="850" cy="120" r="60" fill="url(#sunGradient)">
            <animate attributeName="r" values="60;65;60" dur="4s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Sun glow -->
        <circle class="shimmer" cx="850" cy="120" r="80" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.5">
            <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Clouds -->
        <g class="anim">
            <ellipse cx="200" cy="100" rx="60" ry="25" fill="url(#cloudGradient)" opacity="0.8"/>
            <ellipse cx="230" cy="90" rx="50" ry="20" fill="url(#cloudGradient)" opacity="0.8"/>
            <ellipse cx="170" cy="95" rx="45" ry="18" fill="url(#cloudGradient)" opacity="0.8"/>
        </g>
        
        <g class="anim" style="animation-delay: 3s;">
            <ellipse cx="600" cy="150" rx="70" ry="28" fill="url(#cloudGradient)" opacity="0.7"/>
            <ellipse cx="630" cy="140" rx="60" ry="24" fill="url(#cloudGradient)" opacity="0.7"/>
            <ellipse cx="570" cy="145" rx="55" ry="22" fill="url(#cloudGradient)" opacity="0.7"/>
        </g>
        
        <g class="anim" style="animation-delay: 6s;">
            <ellipse cx="400" cy="80" rx="50" ry="20" fill="url(#cloudGradient)" opacity="0.6"/>
            <ellipse cx="430" cy="70" rx="40" ry="16" fill="url(#cloudGradient)" opacity="0.6"/>
            <ellipse cx="370" cy="75" rx="35" ry="14" fill="url(#cloudGradient)" opacity="0.6"/>
        </g>
        
        <!-- Title text -->
        <text x="50%" y="80" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" 
              font-size="48" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">
            SAGA MOUNTAINS
        </text>
        
        <text x="50%" y="120" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" 
              font-size="20" font-weight="300" fill="rgba(255,255,255,0.8)" text-anchor="middle" opacity="0.8">
            Golden Hour Journey
        </text>
        
        <!-- Decorative elements -->
        <rect x="100" y="500" width="80" height="100" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1" rx="10"/>
        <rect x="820" y="480" width="60" height="120" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1" rx="8"/>
    </svg>
</body>
</html>
