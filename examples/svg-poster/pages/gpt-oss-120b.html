<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Mountain Poster</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#111;}
  svg{display:block;width:100vw;height:100vh;}
  text{font-family:"Georgia","Times New Roman",serif;font-weight:700;letter-spacing:0.04em;}
</style>
</head>
<body>
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Sky background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ffcc33"/>
    </linearGradient>

    <!-- Sun glow -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff4b5" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#ffdd55" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>

    <!-- Mountain gradient -->
    <linearGradient id="mountGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>

    <!-- Cloud shape -->
    <clipPath id="cloudClip">
      <ellipse cx="0" cy="0" rx="60" ry="35"/>
      <ellipse cx="45" cy="-10" rx="45" ry="30"/>
      <ellipse cx="-45" cy="-10" rx="45" ry="30"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1000" height="600" fill="url(#skyGrad)"/>

  <!-- Sun (glowing) -->
  <g transform="translate(800,150)">
    <circle r="80" fill="url(#sunGrad)">
      <animate attributeName="r" from="70" to="90" dur="6s" repeatCount="indefinite" 
               values="70;90;70" keyTimes="0;0.5;1" />
      <animate attributeName="opacity" values="1;0.8;1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Distant mountains -->
  <path d="M0,400 L200,250 L400,400 L600,260 L800,400 L1000,300 L1000,600 L0,600 Z"
        fill="url(#mountGrad)" opacity="0.6"/>

  <!-- Foreground mountains -->
  <path d="M0,500 L150,320 L300,500 L450,340 L600,500 L750,340 L900,500 L1000,380 L1000,600 L0,600 Z"
        fill="url(#mountGrad)" opacity="0.9"/>

  <!-- Drifting clouds -->
  <g fill="#ffffff" fill-opacity="0.7">
    <g clip-path="url(#cloudClip)" transform="translate(-200,80)">
      <rect x="-65" y="-35" width="130" height="70"/>
      <animateTransform attributeName="transform" type="translate"
                        from="-200 80" to="1200 80" dur="80s"
                        repeatCount="indefinite"/>
    </g>
    <g clip-path="url(#cloudClip)" transform="translate(-300,150)">
      <rect x="-65" y="-35" width="130" height="70"/>
      <animateTransform attributeName="transform" type="translate"
                        from="-300 150" to="1300 150" dur="100s"
                        repeatCount="indefinite"/>
    </g>
    <g clip-path="url(#cloudClip)" transform="translate(-150,230)">
      <rect x="-65" y="-35" width="130" height="70"/>
      <animateTransform attributeName="transform" type="translate"
                        from="-150 230" to="1150 230" dur="70s"
                        repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Place name -->
  <text x="50%" y="85%" text-anchor="middle" fill="#fff" font-size="72"
        filter="url(#textGlow)">
    Sierra del Sol
  </text>

  <!-- Text glow effect -->
  <defs>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

</svg>
</body>
</html>
