<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour Mountain - Travel Art Poster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0e27;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Sky Gradient -->
            <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
                <stop offset="30%" style="stop-color:#1e3a5f;stop-opacity:1" />
                <stop offset="60%" style="stop-color:#d97706;stop-opacity:1" />
                <stop offset="85%" style="stop-color:#f97316;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
            </linearGradient>

            <!-- Sun Radial Gradient -->
            <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#fef08a;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.8" />
            </radialGradient>

            <!-- Mountain Gradient -->
            <linearGradient id="mountainDark" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#c2410c;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#7c2d12;stop-opacity:1" />
            </linearGradient>

            <linearGradient id="mountainMid" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
                <stop offset="60%" style="stop-color:#ea580c;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
            </linearGradient>

            <linearGradient id="mountainLight" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
                <stop offset="40%" style="stop-color:#f97316;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
            </linearGradient>

            <!-- Cloud Gradient -->
            <radialGradient id="cloudGradient" cx="40%" cy="40%" r="60%">
                <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
                <stop offset="70%" style="stop-color:#fed7aa;stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.2" />
            </radialGradient>

            <!-- Glow Filter -->
            <filter id="glow">
                <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <!-- Shimmer Filter -->
            <filter id="shimmer">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feComponentTransfer in="blur" result="brightened">
                    <feFuncA type="linear" slope="0.8"/>
                </feComponentTransfer>
            </filter>
        </defs>

        <!-- Sky Background -->
        <rect width="1200" height="1600" fill="url(#skyGradient)"/>

        <!-- Animated Sun with glow -->
        <g id="sun-group">
            <circle cx="300" cy="250" r="180" fill="url(#sunGradient)" filter="url(#glow)">
                <animate attributeName="r" values="180;190;180" dur="6s" repeatCount="indefinite"/>
            </circle>
            <circle cx="300" cy="250" r="160" fill="url(#sunGradient)" opacity="0.3">
                <animate attributeName="r" values="160;175;160" dur="6s" repeatCount="indefinite"/>
            </circle>
        </g>

        <!-- Floating Cloud 1 -->
        <g id="cloud1" opacity="0.7">
            <ellipse cx="150" cy="200" rx="90" ry="50" fill="url(#cloudGradient)"/>
            <ellipse cx="100" cy="190" rx="70" ry="45" fill="url(#cloudGradient)"/>
            <ellipse cx="200" cy="195" rx="80" ry="48" fill="url(#cloudGradient)"/>
            <animate attributeName="opacity" values="0.6;0.8;0.6" dur="8s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="translate" values="0,0; 80,15; 0,0" dur="20s" repeatCount="indefinite"/>
        </g>

        <!-- Floating Cloud 2 -->
        <g id="cloud2" opacity="0.5">
            <ellipse cx="950" cy="300" rx="100" ry="55" fill="url(#cloudGradient)"/>
            <ellipse cx="890" cy="290" rx="75" ry="50" fill="url(#cloudGradient)"/>
            <ellipse cx="1020" cy="295" rx="85" ry="52" fill="url(#cloudGradient)"/>
            <animate attributeName="opacity" values="0.4;0.7;0.4" dur="12s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="translate" values="0,0; -100,-20; 0,0" dur="24s" repeatCount="indefinite"/>
        </g>

        <!-- Floating Cloud 3 -->
        <g id="cloud3" opacity="0.45">
            <ellipse cx="600" cy="150" rx="110" ry="50" fill="url(#cloudGradient)"/>
            <ellipse cx="540" cy="140" rx="80" ry="45" fill="url(#cloudGradient)"/>
            <ellipse cx="680" cy="145" rx="90" ry="48" fill="url(#cloudGradient)"/>
            <animate attributeName="opacity" values="0.35;0.6;0.35" dur="16s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="translate" values="0,0; 60,-30; 0,0" dur="28s" repeatCount="indefinite"/>
        </g>

        <!-- Far Mountains (Back layer) -->
        <polygon points="0,700 300,450 600,680 0,800" fill="#4c1d95" opacity="0.6"/>
        <polygon points="600,680 900,400 1200,720 1200,800 0,800" fill="#5b21b6" opacity="0.5"/>

        <!-- Mid-tone Mountains -->
        <polygon points="0,900 250,550 450,920 0,1000" fill="url(#mountainDark)"/>
        <polygon points="400,950 650,480 850,950 400,1000" fill="url(#mountainMid)"/>
        <polygon points="800,900 1050,450 1200,950 1200,1000 800,1000" fill="url(#mountainDark)"/>

        <!-- Front Mountains (Highlight layer) -->
        <polygon points="150,1100 350,620 550,1100 150,1100" fill="url(#mountainLight)"/>
        <polygon points="480,1150 750,580 950,1150 480,1150" fill="url(#mountainMid)"/>
        <polygon points="900,1100 1100,650 1200,1100 1200,1100 900,1100" fill="url(#mountainLight)"/>

        <!-- Snow peaks with shimmer -->
        <polygon points="350,620 380,680 320,680" fill="#ffffff" opacity="0.9" filter="url(#shimmer)">
            <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="750,580 790,650 710,650" fill="#ffffff" opacity="0.85" filter="url(#shimmer)">
            <animate attributeName="opacity" values="0.6;0.95;0.6" dur="5s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="1100,650 1140,720 1060,720" fill="#ffffff" opacity="0.8" filter="url(#shimmer)">
            <animate attributeName="opacity" values="0.65;0.9;0.65" dur="4.5s" repeatCount="indefinite"/>
        </polygon>

        <!-- Foreground base -->
        <rect y="1200" width="1200" height="400" fill="#2d1b4e" opacity="0.8"/>

        <!-- Text: Location Name -->
        <defs>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap');
                .title-text {
                    font-family: 'Playfair Display', serif;
                    font-size: 120px;
                    font-weight: 900;
                    letter-spacing: -2px;
                    fill: #fef08a;
                    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
                    text-anchor: middle;
                    filter: drop-shadow(0 4px 12px rgba(249, 115, 22, 0.4));
                }
                .subtitle-text {
                    font-family: 'Playfair Display', serif;
                    font-size: 48px;
                    font-weight: 700;
                    letter-spacing: 3px;
                    fill: #fed7aa;
                    text-anchor: middle;
                    opacity: 0.9;
                }
                .tagline-text {
                    font-family: 'Playfair Display', serif;
                    font-size: 32px;
                    font-weight: 700;
                    letter-spacing: 2px;
                    fill: #fbbf24;
                    text-anchor: middle;
                    opacity: 0.85;
                }
            </style>
        </defs>

        <!-- Animated text glow background -->
        <rect x="250" y="1320" width="700" height="180" fill="rgba(249, 115, 22, 0.1)" rx="20" opacity="0.6">
            <animate attributeName="opacity" values="0.3;0.6;0.3" dur="6s" repeatCount="indefinite"/>
        </rect>

        <!-- Main Title -->
        <text x="600" y="1420" class="title-text">GOLDEN PEAK</text>

        <!-- Subtitle -->
        <text x="600" y="1480" class="subtitle-text">ALPINE SANCTUARY</text>

        <!-- Decorative Elements -->
        <line x1="350" y1="1510" x2="450" y2="1510" stroke="#fbbf24" stroke-width="3" opacity="0.7"/>
        <circle cx="480" cy="1510" r="6" fill="#fbbf24" opacity="0.8"/>
        <line x1="510" y1="1510" x2="690" y2="1510" stroke="#fbbf24" stroke-width="3" opacity="0.7"/>
        <circle cx="720" cy="1510" r="6" fill="#fbbf24" opacity="0.8"/>
        <line x1="750" y1="1510" x2="850" y2="1510" stroke="#fbbf24" stroke-width="3" opacity="0.7"/>

        <!-- Tagline -->
        <text x="600" y="1555" class="tagline-text">WHERE EARTH MEETS SKY</text>

        <!-- Shimmer accent element -->
        <circle cx="600" cy="1300" r="3" fill="#fef08a" opacity="0.6">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="r" values="2;8;2" dur="3s" repeatCount="indefinite"/>
        </circle>
    </svg>
</body>
</html>
