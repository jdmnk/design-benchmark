<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLSTICE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #0a0e27; }
  svg { width: 100%; height: 100%; display: block; }
  
  @keyframes drift {
    from { transform: translateX(-20%); }
    to { transform: translateX(120%); }
  }
  @keyframes drift-reverse {
    from { transform: translateX(120%); }
    to { transform: translateX(-20%); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }
  
  .cloud-fast { animation: drift 45s linear infinite; }
  .cloud-slow { animation: drift-reverse 65s linear infinite; }
  .sun-glow { animation: float 6s ease-in-out infinite; }
  .shimmer-layer { animation: pulse 5s ease-in-out infinite; }
</style>
</head>
<body>
<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29" />

      <stop offset="70%" style="stop-color:#e07a5f" />

    <radialGradient id="sunCore" cx="50%" cy="50%">
