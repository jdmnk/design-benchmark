<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Poster - Canyons of Echo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1920 1080">
        <defs>
            <!-- Gradients -->
            <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
            </linearGradient>

            <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
            </linearGradient>

            <linearGradient id="mountainBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#4b6cb7;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#182848;stop-opacity:1" />
            </linearGradient>

            <linearGradient id="mountainFrontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#141E30;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
            </linearGradient>

            <!-- Filters for Glow -->
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                <feOffset dx="2" dy="2" result="offsetblur"/>
                <feComponentTransfer>
                    <feFuncA type="linear" slope="0.5"/>
                </feComponentTransfer>
                <feMerge>
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Sky Background -->
        <rect width="100%" height="100%" fill="url(#skyGradient)" />

        <!-- Sun -->
        <circle cx="960" cy="500" r="120" fill="url(#sunGradient)" filter="url(#glow)">
            <animate attributeName="r" values="120;125;120" dur="4s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite" />
        </circle>

        <!-- Mid-ground Layer (Slower Parallax) -->
        <path d="M0,1080 L300,500 L600,700 L900,400 L1200,600 L1500,350 L1920,550 L1920,1080 Z" 
              fill="url(#mountainBackGrad)" 
              opacity="0.8">
        </path>

        <!-- Clouds Group -->
        <g class="clouds" fill="#ffffff" opacity="0.1">
            <circle cx="200" cy="200" r="40" />
            <circle cx="260" cy="220" r="50" />
            <circle cx="600" cy="150" r="60" />
            <circle cx="680" cy="180" r="45" />
            <circle cx="1400" cy="250" r="55" />
        </g>

        <!-- Front Layer (Darker, Sharp) -->
        <path d="M0,1080 L0,800 L150,550 L350,750 L550,450 L750,650 L960,300 L1100,700 L1300,500 L1500,750 L1700,550 L1920,850 L1920,1080 Z" 
              fill="url(#mountainFrontGrad)" />

        <!-- Foreground Details (Geometric texture) -->
        <path d="M550,450 L750,650 L960,300" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.5" />
        <path d="M1300,500 L1500,750" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.5" />

        <!-- Typography -->
        <text x="50%" y="85%" 
              font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
              font-weight="800" 
              font-size="120" 
              fill="#ffffff" 
              text-anchor="middle" 
              letter-spacing="0.25em"
              style="text-transform: uppercase; filter: url(#textShadow);">
            SERRANÍA
        </text>
        <text x="50%" y="90%" 
              font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
              font-weight="400" 
              font-size="40" 
              fill="#ff8c00" 
              text-anchor="middle" 
              letter-spacing="0.5em"
              style="text-transform: uppercase; letter-spacing: 0.8em;">
            GOLDEN HOUR
        </text>

        <!-- CSS Animation for Drifting Clouds -->
        <style>
            .clouds circle {
                animation: float 20s ease-in-out infinite alternate;
            }
            .clouds circle:nth-child(1) { animation-delay: -5s; }
            .clouds circle:nth-child(2) { animation-delay: -10s; }
            .clouds circle:nth-child(3) { animation-delay: -15s; }
            
            @keyframes float {
                0% { transform: translateX(0); }
                100% { transform: translateX(30px); }
            }
        </style>
    </svg>

</body>
</html>
