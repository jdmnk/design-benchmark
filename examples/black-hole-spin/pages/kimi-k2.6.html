<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gargantua Black Hole</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <script type="module">
    try {
      import * as THREE from 'three';

      // Scene setup
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020205);

      // Camera
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      // Position camera so disk is nearly edge-on (only ~5-8 degrees above plane)
      camera.position.set(0, 0.15, 4.0);
      camera.lookAt(0, 0, 0);

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // Black hole event horizon - perfectly black sphere
      // Diameter ~28% of viewport height. At camera distance 4.0 and FOV 45,
      // viewport height in world units ≈ 2 * 4.0 * tan(22.5°) ≈ 3.31
      // 28% of 3.31 ≈ 0.93. Radius ≈ 0.465
      const bhRadius = 0.465;
      const bhGeometry = new THREE.SphereGeometry(bhRadius, 64, 64);
      const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
      const blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
      scene.add(blackHole);

      // Thin bright photon ring hugging the edge
      const photonRingGeometry = new THREE.TorusGeometry(bhRadius * 1.05, 0.008, 16, 128);
      const photonRingMaterial = new THREE.MeshBasicMaterial({
        color: 0xfff8e0,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
      });
      const photonRing = new THREE.Mesh(photonRingGeometry, photonRingMaterial);
      photonRing.rotation.x = Math.PI / 2;
      scene.add(photonRing);

      // Function to create accretion disk texture with visible azimuthal structure
      function createDiskTexture() {
        const size = 1024;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Create radial gradient base
        const cx = size / 2;
        const cy = size / 2;

        // Fill with transparent
        ctx.clearRect(0, 0, size, size);

        // Inner hot region
        const innerRadius = 0.15 * size;
        const outerRadius = 0.48 * size;

        // Build the disk with multiple layers for turbulent structure
        for (let i = 0; i < 120; i++) {
          const r = innerRadius + Math.random() * (outerRadius - innerRadius);
          const angle = Math.random() * Math.PI * 2;
          const bandWidth = 2 + Math.random() * 6;
          const brightness = 0.3 + Math.random() * 0.7;

          ctx.beginPath();
          ctx.arc(cx, cy, r, angle, angle + bandWidth / r);
          ctx.lineWidth = 1 + Math.random() * 3;

          // Color based on radius: white-yellow inner, amber mid, deep orange outer
          const t = (r - innerRadius) / (outerRadius - innerRadius);
          let rColor, gColor, bColor;

          if (t < 0.3) {
            // White-yellow: #fff3d0
            const localT = t / 0.3;
            rColor = Math.floor(255);
            gColor = Math.floor(243 - localT * 30);
            bColor = Math.floor(208 - localT * 60);
          } else if (t < 0.7) {
            // Amber: #ffae3b
            const localT = (t - 0.3) / 0.4;
            rColor = Math.floor(255 - localT * 80);
            gColor = Math.floor(213 - localT * 80);
            bColor = Math.floor(148 - localT * 80);
          } else {
            // Deep orange: #c8551a
            const localT = (t - 0.7) / 0.3;
            rColor = Math.floor(200 - localT * 50);
            gColor = Math.floor(85 - localT * 40);
            bColor = Math.floor(26 - localT * 10);
          }

          ctx.strokeStyle = `rgba(${rColor}, ${gColor}, ${bColor}, ${brightness * 0.6})`;
          ctx.stroke();
        }

        // Add brighter inner ring
        const gradient = ctx.createRadialGradient(cx, cy, innerRadius, cx, cy, outerRadius);
        gradient.addColorStop(0, 'rgba(255, 248, 220, 0.8)');
        gradient.addColorStop(0.2, 'rgba(255, 230, 150, 0.5)');
        gradient.addColorStop(0.5, 'rgba(255, 170, 60, 0.3)');
        gradient.addColorStop(0.8, 'rgba(200, 85, 26, 0.15)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        return texture;
      }

      const diskTexture = createDiskTexture();

      // Main accretion disk - horizontal plane
      const diskGeometry = new THREE.RingGeometry(bhRadius * 1.15, bhRadius * 3.5, 128, 1);
      const diskMaterial = new THREE.MeshBasicMaterial({
        map: diskTexture,
        transparent: true,
        opacity: 0.85,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const accretionDisk = new THREE.Mesh(diskGeometry, diskMaterial);
      accretionDisk.rotation.x = Math.PI / 2;
      scene.add(accretionDisk);

      // Gravitational lensing arcs - upper arc (back of disk bent over top)
      const upperArcGeometry = new THREE.TorusGeometry(bhRadius * 1.8, bhRadius * 0.35, 32, 128, Math.PI);
      const lensingMaterial = new THREE.MeshBasicMaterial({
        map: diskTexture,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const upperArc = new THREE.Mesh(upperArcGeometry, lensingMaterial.clone());
      upperArc.position.y = bhRadius * 0.3;
      upperArc.rotation.x = Math.PI / 2;
      upperArc.rotation.z = Math.PI; // Arc goes over the top
      scene.add(upperArc);

      // Lower arc (mirrored under bottom)
      const lowerArc = new THREE.Mesh(upperArcGeometry, lensingMaterial.clone());
      lowerArc.position.y = -bhRadius * 0.3;
      lowerArc.rotation.x = Math.PI / 2;
      scene.add(lowerArc);

      // Add a second, tighter lensing arc for more realism
      const tightArcGeometry = new THREE.TorusGeometry(bhRadius * 1.3, bhRadius * 0.15, 24, 128, Math.PI * 0.8);
      const tightArcMat = new THREE.MeshBasicMaterial({
        color: 0xffd080,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const upperTightArc = new THREE.Mesh(tightArcGeometry, tightArcMat.clone());
      upperTightArc.position.y = bhRadius * 0.5;
      upperTightArc.rotation.x = Math.PI / 2;
      upperTightArc.rotation.z = Math.PI;
      scene.add(upperTightArc);

      const lowerTightArc = new THREE.Mesh(tightArcGeometry, tightArcMat.clone());
      lowerTightArc.position.y = -bhRadius * 0.5;
      lowerTightArc.rotation.x = Math.PI / 2;
      scene.add(lowerTightArc);

      // Starfield background
      function createStars() {
        const starCount = 800;
        const positions = new Float32Array(starCount * 3);
        const colors = new Float32Array(starCount * 3);
        const sizes = new Float32Array(starCount);

        for (let i = 0; i < starCount; i++) {
          const r = 20 + Math.random() * 80;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);

          positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
          positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          positions[i * 3 + 2] = r * Math.cos(phi);

          const brightness = 0.3 + Math.random() * 0.7;
          const temp = 0.5 + Math.random() * 0.5; // color temperature

          colors[i * 3] = brightness * (0.8 + temp * 0.2);
          colors[i * 3 + 1] = brightness * (0.8 + temp * 0.1);
          colors[i * 3 + 2] = brightness * (0.9 + temp * 0.1);

          sizes[i] = 0.5 + Math.random() * 1.5;
        }

        const starGeometry = new THREE.BufferGeometry();
        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        starGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // Use points material with size attenuation
        const starMaterial = new THREE.PointsMaterial({
          size: 0.08,
          vertexColors: true,
          transparent: true,
          opacity: 0.8,
          blending: THREE.AdditiveBlending,
          sizeAttenuation: true
        });

        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        return stars;
      }

      const starField = createStars();

      // Animation setup
      const startTime = performance.now();

      function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const elapsed = (now - startTime) / 1000; // seconds

        // Disk rotation: 32 degrees per second
        const rotationSpeed = 32 * (Math.PI / 180);
        accretionDisk.rotation.z = elapsed * rotationSpeed;

        // Rotate lensing arcs as well to match
        upperArc.rotation.y = elapsed * rotationSpeed;
        lowerArc.rotation.y = elapsed * rotationSpeed;
        upperTightArc.rotation.y = elapsed * rotationSpeed;
        lowerTightArc.rotation.y = elapsed * rotationSpeed;

        // Update texture offset for shimmering effect
        diskTexture.offset.x = elapsed * 0.1;

        // Subtle flicker in disk opacity
        const flicker = 0.8 + Math.sin(elapsed * 8) * 0.05 + Math.sin(elapsed * 13.7) * 0.03;
        diskMaterial.opacity = flicker;

        // Lensing arcs shimmer
        const arcFlicker = 0.4 + Math.sin(elapsed * 6) * 0.08 + Math.cos(elapsed * 11.3) * 0.05;
        upperArc.material.opacity = arcFlicker;
        lowerArc.material.opacity = arcFlicker * 0.9;

        // Relativistic beaming: one side brighter
        // Simulate by adjusting texture repeat/offset to create asymmetric brightness
        const beamingPhase = elapsed * 0.5;
        diskTexture.repeat.set(1, 1);
        // Create a bright spot that slowly drifts
        const brightSpot = (Math.sin(beamingPhase) + 1) / 2; // 0 to 1

        // Subtle photon ring pulse
        photonRing.material.opacity = 0.85 + Math.sin(elapsed * 3) * 0.1;

        // Very subtle star twinkle
        starField.rotation.y = elapsed * 0.02;

        renderer.render(scene, camera);
      }

      // Handle resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Start immediately
      animate();

    } catch (e) {
      console.error('Scene initialization failed:', e);
      document.body.innerHTML = '<div style="color:white;padding:20px;">Error initializing scene: ' + e.message + '</div>';
    }
  </script>
</body>
</html>
