<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gargantua Render</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<script type="module">
    import * as THREE from 'three';

    try {
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 10); // Slight angle above disk
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Starfield
        const starGeom = new THREE.BufferGeometry();
        const starMat = new THREE.PointsMaterial({ color: 0x555555, size: 0.05, transparent: true, opacity: 0.8 });
        const starPositions = [];
        for(let i=0; i<1000; i++) {
            starPositions.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        }
        starGeom.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
        scene.add(new THREE.Points(starGeom, starMat));

        // Accretion Disk - using a custom shader approach for the "Gargantua" look
        // We need a main disk + lensing arcs (top/bottom)
        const diskGroup = new THREE.Group();
        
        // Custom Shader Material for the disk
        const diskVertexShader = `
            varying vec2 vUv;
            varying float vDist;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vDist = length(position);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const diskFragmentShader = `
            uniform float time;
            uniform float beaming; // Relativistic beaming factor
            varying vec2 vUv;
            varying float vDist;

            void main() {
                float radius = vDist;
                float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
                
                // Turbulence/Clumps
                float noise = sin(angle * 10.0 + time * 0.5) * 0.5 + 0.5;
                float flicker = sin(time * 5.0 + angle * 20.0) * 0.05 + 0.95;
                
                // Color gradient: inner (hot) to outer (cool)
                vec3 color = mix(vec3(1.0, 0.95, 0.8), vec3(0.78, 0.33, 0.1), (radius - 1.0) / 2.0);
                
                // Beaming
                float beam = 1.0 + sin(angle + time * 0.2) * 0.3 * beaming;
                
                float alpha = smoothstep(3.0, 1.0, radius) * smoothstep(0.8, 1.2, radius);
                gl_FragColor = vec4(color * beam * flicker, alpha * 0.8);
            }
        `;

        const createDiskPart = (inner, outer, rotationX) => {
            const geom = new THREE.RingGeometry(inner, outer, 128);
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    beaming: { value: 0.5 }
                },
                vertexShader: diskVertexShader,
                fragmentShader: diskFragmentShader,
                side: THREE.DoubleSide,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.rotation.x = rotationX;
            return mesh;
        };

        // Main disk + lensing arcs
        const disk = createDiskPart(1.2, 3.5, Math.PI / 2 + 0.1); 
        const topArc = createDiskPart(1.2, 2.8, 0.1); // Lensing arc top
        const botArc = createDiskPart(1.2, 2.8, -0.1); // Lensing arc bottom
        
        diskGroup.add(disk, topArc, botArc);
        scene.add(diskGroup);

        // The Black Hole Sphere
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        scene.add(sphere);

        // Photon Ring
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(1.02, 1.05, 128),
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
        );
        scene.add(ring);

        // Animation Loop
        function animate(t) {
            const time = t * 0.001;
            
            // Rotate disk
            diskGroup.rotation.z = time * 0.3; // ~17 deg/sec
            
            // Update shader uniforms
            disk.material.uniforms.time.value = time;
            topArc.material.uniforms.time.value = time;
            botArc.material.uniforms.time.value = time;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    } catch(e) {
        console.error(e);
        document.body.innerHTML = "Error initializing scene.";
    }
</script>
</body>
</html>
