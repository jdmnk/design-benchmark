<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<script type="module">
    import * as THREE from 'three';

    try {
        // --- Setup ---
        const width = window.innerWidth;
        const height = window.innerHeight;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        const camera = new THREE.PerspectiveCamera(30, width / height, 0.1, 1000);
        camera.position.set(0, 0.8, 10); // Slight angle above horizontal
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        document.body.appendChild(renderer.domElement);

        // --- Starfield ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1000;
        const positions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) positions[i] = (Math.random() - 0.5) * 200;
        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0x444444, size: 0.1 });
        scene.add(new THREE.Points(starGeometry, starMaterial));

        // --- Accretion Disk Texture ---
        // Create a canvas-based procedural texture for the disk
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(256, 256, 10, 256, 256, 250);
        gradient.addColorStop(0, '#fff3d0');
        gradient.addColorStop(0.2, '#ffae3b');
        gradient.addColorStop(0.5, '#c8551a');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 512, 512);
        
        // Add "clumps" for rotation visibility
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        for(let i=0; i<10; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = 150 + Math.random() * 80;
            ctx.beginPath();
            ctx.arc(256 + Math.cos(angle)*r, 256 + Math.sin(angle)*r, 20, 0, Math.PI*2);
            ctx.fill();
        }
        const texture = new THREE.CanvasTexture(canvas);

        // --- Geometry ---
        // Accretion Disk (Flat ring)
        const diskGeometry = new THREE.RingGeometry(1.2, 4, 64);
        const diskMaterial = new THREE.MeshBasicMaterial({ 
            map: texture, transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false 
        });
        const disk = new THREE.Mesh(diskGeometry, diskMaterial);
        disk.rotation.x = Math.PI / 2;
        scene.add(disk);

        // Event Horizon (Black sphere)
        const horizon = new THREE.Mesh(
            new THREE.SphereGeometry(1, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        scene.add(horizon);

        // Photon Ring (Bright edge)
        const photonRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.05, 0.02, 16, 100),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        scene.add(photonRing);

        // Lensing Arcs (Torus segments wrapping over/under)
        const createArc = (y) => {
            const arc = new THREE.Mesh(
                new THREE.TorusGeometry(1.5, 0.4, 16, 100, Math.PI),
                new THREE.MeshBasicMaterial({ map: texture, transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false })
            );
            arc.rotation.x = Math.PI / 2;
            arc.position.y = y;
            return arc;
        };
        const topArc = createArc(0.3);
        const botArc = createArc(-0.3);
        scene.add(topArc, botArc);

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            const t = time * 0.001; // Seconds

            // Rotate disk
            disk.rotation.z = t * 0.3; // ~17 deg/sec
            
            // Subtle flicker
            const flicker = 0.9 + Math.sin(t * 10) * 0.1;
            diskMaterial.opacity = flicker;
            
            // Relativistic Beaming simulation (vary brightness of a side)
            const brightness = 0.5 + Math.sin(t * 0.5) * 0.3;
            diskMaterial.color.setRGB(1, 0.9 + brightness * 0.1, 0.8);

            renderer.render(scene, camera);
        }

        animate(0);

    } catch (e) {
        console.error("Rendering failed", e);
    }
</script>
</body>
</html>
