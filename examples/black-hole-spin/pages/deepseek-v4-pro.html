<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gargantua - Interstellar Black Hole</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background-color: black;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'; // only for reference, not used
    
    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030311); // near-black space
    
    // Renderer with pixel ratio capped for performance
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      powerPreference: 'high-performance',
      alpha: false
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
    renderer.setClearColor(0x020210);
    document.body.appendChild(renderer.domElement);
    
    // Camera: fixed position, ~6 degrees above the disk plane
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 0.7, 8.5); // slightly above horizontal plane
    camera.lookAt(0, 0, 0);
    
    // --- LIGHTING & BACKGROUND STARS ---
    // No traditional lights; use emissive properties and additive blending for glow.
    
    // Create a sparse starfield background (static, dim)
    function createStarfield() {
      const starsGeo = new THREE.BufferGeometry();
      const starCount = 800;
      const positions = new Float32Array(starCount * 3);
      const colors = new Float32Array(starCount * 3);
      
      for (let i = 0; i < starCount * 3; i += 3) {
        // Random sphere distribution far away
        const radius = 30 + Math.random() * 30;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.asin((Math.random() * 2) - 1);
        
        positions[i] = Math.cos(theta) * Math.cos(phi) * radius;
        positions[i+1] = Math.sin(phi) * radius * 0.8; // slightly flattened
        positions[i+2] = Math.sin(theta) * Math.cos(phi) * radius;
        
        // Dim white/blueish stars
        const brightness = 0.3 + Math.random() * 0.7;
        colors[i] = 0.8 * brightness;
        colors[i+1] = 0.8 * brightness;
        colors[i+2] = 0.9 * brightness;
      }
      
      starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      starsGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      
      const starsMat = new THREE.PointsMaterial({
        size: 0.12,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: true,
        transparent: true,
        opacity: 0.9
      });
      
      const stars = new THREE.Points(starsGeo, starsMat);
      scene.add(stars);
    }
    createStarfield();
    
    // --- BLACK HOLE CORE (Event Horizon) ---
    const blackHoleRadius = 0.92; // diameter ~28% of viewport height at this distance
    const blackHoleGeo = new THREE.SphereGeometry(blackHoleRadius, 64, 64);
    const blackHoleMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const blackHole = new THREE.Mesh(blackHoleGeo, blackHoleMat);
    scene.add(blackHole);
    
    // --- PHOTON RING (thin bright ring hugging the event horizon) ---
    const photonRingGeo = new THREE.TorusGeometry(blackHoleRadius * 1.02, 0.025, 32, 128);
    const photonRingMat = new THREE.MeshBasicMaterial({
      color: 0xffdd99,
      emissive: new THREE.Color(0x553322),
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      depthTest: true,
      transparent: true,
      opacity: 0.9
    });
    const photonRing = new THREE.Mesh(photonRingGeo, photonRingMat);
    photonRing.rotation.x = Math.PI / 2;
    scene.add(photonRing);
    
    // --- ACCRETION DISK (horizontal, with structure) ---
    // We use a ring geometry with custom shader-like approach via canvas texture for azimuthal structure.
    // Disk extends from just outside photon ring to about 2.5x radius.
    const diskInnerRadius = blackHoleRadius * 1.15;
    const diskOuterRadius = blackHoleRadius * 2.6;
    
    // Create a canvas texture with streaks/clumps for azimuthal variation
    function createDiskTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 64; // radial resolution vs angular
      const ctx = canvas.getContext('2d');
      
      // Clear with transparent background
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw angular streaks and clumps
      const width = canvas.width;
      const height = canvas.height;
      
      // Base gradient: inner bright, outer dimmer, with color shift
      for (let x = 0; x < width; x++) {
        // x maps to angle 0 to 2PI
        const angle = (x / width) * Math.PI * 2;
        
        // Create radial gradient for each column to mimic inner hot, outer cool
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        // Inner edge: bright white-yellow
        gradient.addColorStop(0.0, '#fff8e7');
        gradient.addColorStop(0.2, '#ffd58c');
        gradient.addColorStop(0.5, '#ffaa33');
        gradient.addColorStop(0.8, '#d95f1a');
        gradient.addColorStop(1.0, '#8a2e0c');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(x, 0, 1, height);
      }
      
      // Add azimuthal structure: bright clumps and dark bands
      ctx.globalCompositeOperation = 'overlay';
      for (let i = 0; i < 35; i++) {
        const startX = Math.random() * width;
        const clumpWidth = 20 + Math.random() * 80;
        const alpha = 0.2 + Math.random() * 0.5;
        
        const gradientX = ctx.createLinearGradient(startX, 0, startX + clumpWidth, 0);
        gradientX.addColorStop(0, `rgba(255,255,255,${alpha})`);
        gradientX.addColorStop(0.5, `rgba(255,200,100,${alpha*0.8})`);
        gradientX.addColorStop(1, `rgba(255,255,255,0)`);
        
        ctx.fillStyle = gradientX;
        ctx.fillRect(startX, 0, clumpWidth, height);
        
        // Add some darker streaks
        if (Math.random() > 0.6) {
          const darkStart = Math.random() * width;
          const darkWidth = 15 + Math.random() * 50;
          ctx.fillStyle = `rgba(30,10,5,${0.3+Math.random()*0.4})`;
          ctx.fillRect(darkStart, 0, darkWidth, height);
        }
      }
      
      // Add turbulent thin lines
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(255,200,100,0.3)';
      ctx.lineWidth = 1.5;
      for (let j = 0; j < 60; j++) {
        const yPos = Math.random() * height;
        ctx.beginPath();
        ctx.moveTo(0, yPos);
        for (let x = 0; x < width; x += 40) {
          ctx.lineTo(x + Math.random()*30, yPos + (Math.random()-0.5)*8);
        }
        ctx.stroke();
      }
      
      return new THREE.CanvasTexture(canvas);
    }
    
    const diskTexture = createDiskTexture();
    diskTexture.wrapS = THREE.RepeatWrapping;
    diskTexture.wrapT = THREE.RepeatWrapping;
    diskTexture.colorSpace = THREE.SRGBColorSpace;
    
    // Main disk using RingGeometry
    const diskGeo = new THREE.RingGeometry(diskInnerRadius, diskOuterRadius, 200, 1);
    // Adjust UVs to map texture correctly
    const pos = diskGeo.attributes.position;
    const uv = diskGeo.attributes.uv;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const y = pos.getY(i);
      const radius = Math.sqrt(x*x + y*y);
      const angle = Math.atan2(y, x);
      
      // U: angle mapping (0 to 1)
      let u = (angle + Math.PI) / (Math.PI * 2);
      // V: radial mapping (0 inner, 1 outer)
      let v = (radius - diskInnerRadius) / (diskOuterRadius - diskInnerRadius);
      uv.setXY(i, u, v);
    }
    
    const diskMat = new THREE.MeshBasicMaterial({
      map: diskTexture,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      depthTest: true,
      transparent: true,
      opacity: 0.95,
      emissive: new THREE.Color(0x331100)
    });
    
    const accretionDisk = new THREE.Mesh(diskGeo, diskMat);
    accretionDisk.rotation.x = -Math.PI / 2; // horizontal plane
    scene.add(accretionDisk);
    
    // --- LENSING ARCS (bent light above and below) ---
    // These simulate the far side of the disk being warped by gravity.
    function createLensingArc(upper = true) {
      const arcRadius = blackHoleRadius * 1.8;
      const tubeRadius = 0.08;
      const arcAngle = Math.PI * 1.4; // slightly more than half circle to wrap around
      
      const curve = new THREE.EllipseCurve(
        0, 0,
        arcRadius, arcRadius,
        upper ? 0.2 : Math.PI - 0.2,
        upper ? Math.PI - 0.2 : 2*Math.PI - 0.2,
        false,
        0
      );
      
      const points = curve.getPoints(120);
      const path = new THREE.CatmullRomCurve3(
        points.map(p => new THREE.Vector3(p.x, upper ? 0.25 : -0.25, p.y)),
        false
      );
      
      const tubularSegments = 200;
      const tubeGeo = new THREE.TubeGeometry(path, tubularSegments, tubeRadius, 8, false);
      
      // Color gradient along the arc
      const colors = [];
      const posAttr = tubeGeo.attributes.position;
      for (let i = 0; i < posAttr.count; i++) {
        const x = posAttr.getX(i);
        const y = posAttr.getY(i);
        const z = posAttr.getZ(i);
        const angle = Math.atan2(z, x);
        // mix colors based on angle to simulate beaming and disk color
        const t = (angle + Math.PI) / (Math.PI * 2);
        const color = new THREE.Color();
        if (t < 0.3) color.setHSL(0.12, 1.0, 0.8);
        else if (t < 0.6) color.setHSL(0.1, 1.0, 0.6);
        else color.setHSL(0.08, 1.0, 0.5);
        colors.push(color.r, color.g, color.b);
      }
      tubeGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
      
      const tubeMat = new THREE.MeshBasicMaterial({
        vertexColors: true,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: true,
        transparent: true,
        opacity: 0.9,
        emissive: new THREE.Color(0x442200)
      });
      
      const arc = new THREE.Mesh(tubeGeo, tubeMat);
      return arc;
    }
    
    const upperArc = createLensingArc(true);
    const lowerArc = createLensingArc(false);
    scene.add(upperArc);
    scene.add(lowerArc);
    
    // Additional thin bright arcs closer to the photon ring for extra glow
    function createThinArc(upper = true) {
      const arcRadius = blackHoleRadius * 1.05;
      const tubeRadius = 0.03;
      const curve = new THREE.EllipseCurve(
        0, 0,
        arcRadius, arcRadius,
        upper ? 0.1 : Math.PI - 0.1,
        upper ? Math.PI - 0.1 : 2*Math.PI - 0.1,
        false,
        0
      );
      const points = curve.getPoints(80);
      const path = new THREE.CatmullRomCurve3(
        points.map(p => new THREE.Vector3(p.x, upper ? 0.15 : -0.15, p.y)),
        false
      );
      const geo = new THREE.TubeGeometry(path, 120, tubeRadius, 6, false);
      const mat = new THREE.MeshBasicMaterial({
        color: 0xffcc88,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: true,
        transparent: true,
        opacity: 0.9
      });
      return new THREE.Mesh(geo, mat);
    }
    
    const thinUpper = createThinArc(true);
    const thinLower = createThinArc(false);
    scene.add(thinUpper);
    scene.add(thinLower);
    
    // --- ADDITIONAL GLOW SPRITES AROUND DISK EDGES for shimmer ---
    function createGlowSprites() {
      const group = new THREE.Group();
      const spriteCount = 60;
      const spriteTexture = (() => {
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.beginPath();
        ctx.arc(16, 16, 14, 0, Math.PI*2);
        const gradient = ctx.createRadialGradient(16,16,0,16,16,14);
        gradient.addColorStop(0, 'rgba(255,200,100,1)');
        gradient.addColorStop(0.5, 'rgba(255,100,20,0.9)');
        gradient.addColorStop(1, 'rgba(255,50,0,0)');
        ctx.fillStyle = gradient;
        ctx.fill();
        return new THREE.CanvasTexture(canvas);
      })();
      
      for (let i = 0; i < spriteCount; i++) {
        const angle = (i / spriteCount) * Math.PI * 2;
        const radius = diskInnerRadius + Math.random() * (diskOuterRadius - diskInnerRadius);
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const spriteMat = new THREE.SpriteMaterial({
          map: spriteTexture,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          depthTest: true,
          opacity: 0.4 + Math.random() * 0.5,
          color: new THREE.Color().setHSL(0.08 + Math.random()*0.1, 1, 0.6)
        });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.position.set(x, 0, z);
        sprite.scale.set(0.25, 0.25, 1);
        group.add(sprite);
      }
      return group;
    }
    
    const glowSprites = createGlowSprites();
    scene.add(glowSprites);
    
    // --- ADDITIONAL FAINT OUTER DISK for depth ---
    const outerDiskGeo = new THREE.RingGeometry(diskOuterRadius, diskOuterRadius + 0.4, 150, 1);
    const outerDiskMat = new THREE.MeshBasicMaterial({
      color: 0x552211,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      depthTest: true,
      transparent: true,
      opacity: 0.3
    });
    const outerDisk = new THREE.Mesh(outerDiskGeo, outerDiskMat);
    outerDisk.rotation.x = -Math.PI / 2;
    scene.add(outerDisk);
    
    // --- ANIMATION LOOP ---
    let clock = new THREE.Clock();
    
    function animate() {
      const delta = clock.getDelta();
      // Use absolute time for consistent rotation speed
      const elapsedTime = performance.now() * 0.001; // seconds
      
      // Rotate accretion disk and related elements
      // Speed: ~30 degrees per second = 0.5236 rad/s
      const rotationSpeed = 0.55; // rad/s
      const diskRotation = elapsedTime * rotationSpeed;
      
      accretionDisk.rotation.z = diskRotation;
      outerDisk.rotation.z = diskRotation * 0.9;
      glowSprites.rotation.z = diskRotation;
      
      // Rotate lensing arcs? They should remain fixed relative to camera view,
      // but we can add subtle oscillation for shimmer.
      // Instead, we modulate their opacity or position slightly.
      const shimmer = Math.sin(elapsedTime * 15) * 0.03;
      upperArc.position.y = 0.25 + shimmer;
      lowerArc.position.y = -0.25 - shimmer;
      thinUpper.position.y = 0.15 + shimmer * 0.5;
      thinLower.position.y = -0.15 - shimmer * 0.5;
      
      // Beaming effect: vary brightness of one side of the disk by modifying material?
      // We can rotate a subtle overlay or adjust emissive. Since disk uses texture,
      // we can rotate the texture offset to shift clumps, but rotation already does that.
      // For beaming, we'll slightly adjust the color of photon ring based on angle.
      const beamIntensity = 0.7 + Math.sin(elapsedTime * 2.0) * 0.3;
      photonRing.material.color.setHSL(0.12, 1, 0.55 + beamIntensity * 0.2);
      
      // Rotate photon ring? It should stay fixed relative to camera, but we can rotate it too.
      photonRing.rotation.z = diskRotation * 0.2;
      
      // Starfield subtle rotation for background motion
      // (static stars, so no rotation)
      
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    // Start animation immediately
    animate();
    
    // Handle window resize
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    console.log('Gargantua black hole scene running.');
  </script>
</body>
</html>
