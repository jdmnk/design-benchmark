<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Gargantua</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #020204; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #err { position: fixed; inset: 0; color: #f88; background: #000; font: 12px/1.4 monospace; white-space: pre-wrap; padding: 12px; display: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "three"
    }
  }
  </script>
</head>
<body>
<div id="err"></div>
<script type="module">
try {
  import * as THREE from 'three';

  const errBox = document.getElementById('err');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020204);
  scene.fog = new THREE.Fog(0x020204, 18, 42);

  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setClearColor(0x020204, 1);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  renderer.setSize(innerWidth, innerHeight, false);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  const camera = new THREE.PerspectiveCamera(36, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0.0, 0.93, 8.6);
  camera.lookAt(0, 0, 0);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starCount = 260;
  const pos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 28 + Math.random() * 18;
    const t = Math.acos(THREE.MathUtils.randFloatSpread(2));
    const p = Math.random() * Math.PI * 2;
    pos[i * 3 + 0] = Math.cos(p) * Math.sin(t) * r;
    pos[i * 3 + 1] = Math.cos(t) * r;
    pos[i * 3 + 2] = Math.sin(p) * Math.sin(t) * r;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const stars = new THREE.Points(
    starGeo,
    new THREE.PointsMaterial({ color: 0xbfd0ff, size: 0.045, sizeAttenuation: true, transparent: true, opacity: 0.65 })
  );
  scene.add(stars);

  // Texture for disk
  function makeDiskTexture() {
    const c = document.createElement('canvas');
    c.width = 2048;
    c.height = 128;
    const g = c.getContext('2d');

    const grd = g.createLinearGradient(0, 0, 0, c.height);
    grd.addColorStop(0.00, '#2b1006');
    grd.addColorStop(0.18, '#c8551a');
    grd.addColorStop(0.50, '#ffae3b');
    grd.addColorStop(0.78, '#fff3d0');
    grd.addColorStop(1.00, '#2b1006');
    g.fillStyle = grd;
    g.fillRect(0, 0, c.width, c.height);

    // azimuthal clumps / turbulent streaks
    for (let i = 0; i < 5200; i++) {
      const x = Math.random() * c.width;
      const y = Math.random() * c.height;
      const a = Math.random() * 0.22;
      const w = 14 + Math.random() * 80;
      const h = 1 + Math.random() * 4;
      const bright = Math.random() < 0.58;
      g.fillStyle = bright ? `rgba(255,245,220,${a})` : `rgba(170,70,20,${a * 0.8})`;
      g.fillRect(x, y, w, h);
    }

    // a few brighter streaks
    for (let i = 0; i < 28; i++) {
      const x = Math.random() * c.width;
      const y = 14 + Math.random() * 82;
      const w = 140 + Math.random() * 260;
      const grad = g.createLinearGradient(x, 0, x + w, 0);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(0.3, 'rgba(255,248,224,0.55)');
      grad.addColorStop(0.7, 'rgba(255,175,59,0.35)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      g.fillStyle = grad;
      g.fillRect(x, y, w, 3 + Math.random() * 4);
    }

    // slight radial softness
    const radial = g.createRadialGradient(c.width * 0.5, c.height * 0.5, 6, c.width * 0.5, c.height * 0.5, c.height * 0.72);
    radial.addColorStop(0, 'rgba(255,255,255,0.05)');
    radial.addColorStop(1, 'rgba(0,0,0,0.35)');
    g.fillStyle = radial;
    g.fillRect(0, 0, c.width, c.height);

    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.repeat.set(1.0, 1.0);
    tex.needsUpdate = true;
    return tex;
  }
  const diskTex = makeDiskTexture();

  // Black hole sphere
  const bh = new THREE.Mesh(
    new THREE.SphereGeometry(0.82, 36, 26),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(bh);

  // Main accretion disk
  const disk = new THREE.Mesh(
    new THREE.TorusGeometry(2.95, 0.34, 18, 320),
    new THREE.MeshBasicMaterial({
      map: diskTex,
      color: 0xffffff,
      transparent: true,
      opacity: 0.96,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  disk.rotation.x = Math.PI / 2;
  scene.add(disk);

  // Brighter inner band
  const innerDisk = new THREE.Mesh(
    new THREE.TorusGeometry(2.05, 0.16, 14, 260),
    new THREE.MeshBasicMaterial({
      map: diskTex,
      color: 0xfff1c5,
      transparent: true,
      opacity: 0.85,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  innerDisk.rotation.x = Math.PI / 2;
  scene.add(innerDisk);

  // Lensing arcs, top and bottom
  const arcMat = new THREE.MeshBasicMaterial({
    color: 0xffdb95,
    transparent: true,
    opacity: 0.62,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const arcGeo = new THREE.TorusGeometry(1.26, 0.08, 12, 220, Math.PI * 1.35);
  const upperArc = new THREE.Mesh(arcGeo, arcMat);
  upperArc.rotation.x = Math.PI * 0.5;
  upperArc.position.y = 0.02;
  scene.add(upperArc);

  const lowerArc = new THREE.Mesh(arcGeo, arcMat.clone());
  lowerArc.rotation.x = Math.PI * 0.5;
  lowerArc.rotation.z = Math.PI;
  lowerArc.position.y = -0.02;
  scene.add(lowerArc);

  // Photon ring
  const photon = new THREE.Mesh(
    new THREE.TorusGeometry(0.94, 0.018, 10, 240),
    new THREE.MeshBasicMaterial({
      color: 0xfff4d0,
      transparent: true,
      opacity: 0.95,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  photon.rotation.x = Math.PI / 2;
  scene.add(photon);

  // Subtle glow shell behind ring
  const glow = new THREE.Mesh(
    new THREE.TorusGeometry(1.02, 0.07, 12, 240),
    new THREE.MeshBasicMaterial({
      color: 0xffa63d,
      transparent: true,
      opacity: 0.18,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  glow.rotation.x = Math.PI / 2;
  scene.add(glow);

  const clock = new THREE.Clock();

  function animate(now) {
    const t = now * 0.001;

    // Disk rotation: ~30 deg/sec
    const spin = t * THREE.MathUtils.degToRad(30);
    disk.rotation.z = spin;
    innerDisk.rotation.z = -spin * 1.05;
    photon.rotation.z = spin * 0.35;
    glow.rotation.z = -spin * 0.18;

    // Flicker / beaming drift
    diskTex.offset.x = (t * 0.022) % 1;
    diskTex.offset.y = 0.0;

    const flicker = 0.92 + 0.08 * Math.sin(t * 7.3) + 0.04 * Math.sin(t * 17.2);
    disk.material.opacity = 0.92 + 0.04 * Math.sin(t * 3.1);
    innerDisk.material.opacity = 0.72 + 0.08 * Math.sin(t * 5.4 + 1.3);

    // Slight asymmetry: one side brighter, slowly drifting
    const drift = 0.5 + 0.5 * Math.sin(t * 0.7);
    upperArc.material.opacity = 0.44 + 0.18 * drift * flicker;
    lowerArc.material.opacity = 0.40 + 0.16 * (1.0 - drift) * flicker;
    photon.material.opacity = 0.88 + 0.06 * Math.sin(t * 8.5);

    // Tiny shimmer in the arcs/disk
    upperArc.scale.setScalar(1.0 + 0.008 * Math.sin(t * 4.2));
    lowerArc.scale.setScalar(1.0 + 0.008 * Math.sin(t * 4.2 + 1.7));
    glow.scale.setScalar(1.0 + 0.01 * Math.sin(t * 6.0));

    stars.rotation.y = t * 0.004;
    stars.rotation.x = t * 0.0015;

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight, false);
  });

} catch (e) {
  const err = document.getElementById('err');
  err.style.display = 'block';
  err.textContent = (e && e.stack) ? e.stack : String(e);
}
</script>
</body>
</html>
