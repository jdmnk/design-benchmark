<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Gargantua</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020204;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

let scene, camera, renderer;
let bhGroup, diskGroup, clock;
let diskTexture;
let fallbackShown = false;

init();
animate(performance.now());

function init() {
  try {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020204);
    scene.fog = new THREE.FogExp2(0x020204, 0.02);

    camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.62, 6.2); // ~5.7° above disk plane
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setClearColor(0x020204, 1);
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    buildStars();
    buildBlackHole();
    buildDisk();
    buildLensingArcs();

    window.addEventListener('resize', onResize, { passive: true });
  } catch (e) {
    if (!fallbackShown) {
      fallbackShown = true;
      document.body.innerHTML = '<div style="color:#fff;padding:20px;font-family:system-ui">Scene initialization error.</div>';
      console.error(e);
    }
  }
}

function makeDiskTexture() {
  const c = document.createElement('canvas');
  c.width = 1024;
  c.height = 256;
  const ctx = c.getContext('2d');

  // Base radial band
  const g = ctx.createLinearGradient(0, 0, 0, c.height);
  g.addColorStop(0.00, 'rgba(255,243,208,0.00)');
  g.addColorStop(0.25, 'rgba(255,243,208,0.25)');
  g.addColorStop(0.48, 'rgba(255,243,208,0.95)');
  g.addColorStop(0.64, 'rgba(255,174,59,0.92)');
  g.addColorStop(0.82, 'rgba(200,85,26,0.82)');
  g.addColorStop(1.00, 'rgba(80,20,10,0.00)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, c.width, c.height);

  // Azimuthal turbulence / clumps
  for (let i = 0; i < 2400; i++) {
    const x = Math.random() * c.width;
    const y = (0.2 + Math.pow(Math.random(), 0.55) * 0.72) * c.height;
    const w = 4 + Math.random() * 22;
    const h = 1 + Math.random() * 5;
    const alpha = 0.03 + Math.random() * 0.16;
    const hue = Math.random() < 0.55 ? 38 : 24;
    ctx.fillStyle = `hsla(${hue},100%,${70 + Math.random()*18}%,${alpha})`;
    ctx.fillRect(x, y, w, h);
  }

  // Bright leading edge streaks
  for (let i = 0; i < 140; i++) {
    const x = Math.random() * c.width;
    const y = 0.36 * c.height + (Math.random() - 0.5) * 22;
    const w = 20 + Math.random() * 90;
    const h = 1 + Math.random() * 2.5;
    ctx.fillStyle = `rgba(255,248,220,${0.04 + Math.random()*0.08})`;
    ctx.fillRect(x, y, w, h);
  }

  // Soft blur with copy down/up
  ctx.globalAlpha = 0.55;
  ctx.drawImage(c, -3, 0);
  ctx.drawImage(c, 3, 0);
  ctx.globalAlpha = 1;

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.repeat.set(1, 1);
  tex.anisotropy = 4;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function buildStars() {
  const starGeo = new THREE.BufferGeometry();
  const count = 420;
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const r = 35 * Math.pow(Math.random(), 0.35);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(THREE.MathUtils.lerp(-0.9, 0.9, Math.random()));
    pos[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.cos(phi) * 0.55;
    pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta) - 6;
    const k = 0.35 + Math.random() * 0.65;
    col[i * 3 + 0] = k;
    col[i * 3 + 1] = k;
    col[i * 3 + 2] = k + Math.random() * 0.1;
  }

  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.03,
    vertexColors: true,
    transparent: true,
    opacity: 0.75,
    depthWrite: false
  });
  const stars = new THREE.Points(starGeo, mat);
  scene.add(stars);
}

function buildBlackHole() {
  bhGroup = new THREE.Group();
  scene.add(bhGroup);

  const radius = 0.78;
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 48, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  bhGroup.add(sphere);

  // Thin photon ring hugging the edge
  const photon = new THREE.Mesh(
    new THREE.TorusGeometry(radius * 1.02, 0.018, 10, 220),
    new THREE.MeshBasicMaterial({
      color: 0xffefc8,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  photon.rotation.x = Math.PI / 2;
  bhGroup.add(photon);

  // Slightly brighter inner halo
  const halo = new THREE.Mesh(
    new THREE.TorusGeometry(radius * 1.055, 0.03, 12, 220),
    new THREE.MeshBasicMaterial({
      color: 0xffb83c,
      transparent: true,
      opacity: 0.22,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  halo.rotation.x = Math.PI / 2;
  bhGroup.add(halo);
}

function buildDisk() {
  diskGroup = new THREE.Group();
  scene.add(diskGroup);

  diskTexture = makeDiskTexture();

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.03, 2.95, 320, 1),
    new THREE.MeshBasicMaterial({
      map: diskTexture,
      color: 0xffffff,
      transparent: true,
      opacity: 0.98,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.NormalBlending
    })
  );
  ring.rotation.x = Math.PI / 2;
  diskGroup.add(ring);

  // Inner hot rim
  const innerRim = new THREE.Mesh(
    new THREE.TorusGeometry(1.04, 0.075, 18, 260),
    new THREE.MeshBasicMaterial({
      color: 0xfff3d0,
      transparent: true,
      opacity: 0.62,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  innerRim.rotation.x = Math.PI / 2;
  diskGroup.add(innerRim);

  // Bright azimuthal clumps that visibly rotate
  const clumpGroup = new THREE.Group();
  diskGroup.add(clumpGroup);
  const clumpGeo = new THREE.SphereGeometry(0.045, 12, 10);
  for (let i = 0; i < 30; i++) {
    const a = (i / 30) * Math.PI * 2 + (Math.random() - 0.5) * 0.22;
    const rr = 1.15 + Math.random() * 1.45;
    const y = (Math.random() - 0.5) * 0.025;
    const s = new THREE.Mesh(
      clumpGeo,
      new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.11 + Math.random() * 0.08, 1, 0.72),
        transparent: true,
        opacity: 0.40 + Math.random() * 0.35,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    s.position.set(Math.cos(a) * rr, y, Math.sin(a) * rr);
    s.scale.setScalar(0.8 + Math.random() * 2.0);
    clumpGroup.add(s);
  }

  // Slight beaming asymmetry: brighter on viewer-left side
  const beamPlane = new THREE.Mesh(
    new THREE.RingGeometry(1.0, 3.0, 256, 1, Math.PI * 0.13, Math.PI * 0.78),
    new THREE.MeshBasicMaterial({
      color: 0xffd08a,
      transparent: true,
      opacity: 0.12,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  beamPlane.rotation.x = Math.PI / 2;
  beamPlane.position.y = 0.01;
  diskGroup.add(beamPlane);
}

function buildLensingArcs() {
  const arcMaterialTop = new THREE.MeshBasicMaterial({
    color: 0xffe7b0,
    transparent: true,
    opacity: 0.78,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const arcMaterialBottom = new THREE.MeshBasicMaterial({
    color: 0xffa73b,
    transparent: true,
    opacity: 0.52,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  // Upper bent arc
  const upper = new THREE.Mesh(
    new THREE.TorusGeometry(1.45, 0.045, 14, 220, Math.PI * 1.17),
    arcMaterialTop
  );
  upper.rotation.x = Math.PI / 2;
  upper.rotation.z = Math.PI * 0.98;
  upper.position.y = 0.42;
  upper.position.z = -0.02;
  scene.add(upper);

  // Lower mirrored arc
  const lower = new THREE.Mesh(
    new THREE.TorusGeometry(1.43, 0.038, 14, 220, Math.PI * 1.12),
    arcMaterialBottom
  );
  lower.rotation.x = Math.PI / 2;
  lower.rotation.z = -Math.PI * 0.02;
  lower.position.y = -0.42;
  lower.position.z = 0.02;
  scene.add(lower);

  // Faint wraparound glow
  const wrap = new THREE.Mesh(
    new THREE.TorusGeometry(1.82, 0.07, 10, 220),
    new THREE.MeshBasicMaterial({
      color: 0xff9a2f,
      transparent: true,
      opacity: 0.08,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  wrap.rotation.x = Math.PI / 2;
  scene.add(wrap);
}

function animate(now) {
  requestAnimationFrame(animate);

  const t = now * 0.001;

  try {
    const spin = THREE.MathUtils.degToRad(32); // ~32 deg/s
    if (diskGroup) diskGroup.rotation.y = t * spin;

    // shimmer/flicker
    const flicker = 0.92 + 0.08 * Math.sin(t * 11.0) + 0.04 * Math.sin(t * 17.7 + 1.2);
    const drift = 0.5 + 0.5 * Math.sin(t * 0.35);
    if (diskTexture) {
      diskTexture.offset.x = 0.08 * t * 0.12;
      diskTexture.offset.y = 0.0;
    }

    // Animate materials slightly via scene traversal
    scene.traverse((o) => {
      if (o.isMesh && o.material && o.material.transparent && o.material.blending === THREE.AdditiveBlending) {
        o.material.opacity = Math.max(0, o.material.opacity * 0.0 + o.userData.baseOpacity || o.material.opacity);
      }
    });

    // Manual tuning for visible motion
    if (diskGroup) {
      const ring = diskGroup.children[0];
      if (ring && ring.material) ring.material.opacity = 0.96 + 0.03 * Math.sin(t * 8.0);
      const inner = diskGroup.children[1];
      if (inner && inner.material) inner.material.opacity = 0.52 + 0.10 * Math.sin(t * 6.5 + 0.8);
      if (diskGroup.children[2]) {
        diskGroup.children[2].children.forEach((c, i) => {
          c.material.opacity = 0.22 + 0.18 * Math.sin(t * 7.0 + i * 0.9) + 0.08 * drift;
        });
      }
      if (diskGroup.children[3] && diskGroup.children[3].material) {
        diskGroup.children[3].material.opacity = 0.11 + 0.05 * Math.sin(t * 3.0 + 0.7);
      }
    }

    // Background star twinkle
    scene.traverse((o) => {
      if (o.isPoints && o.material) {
        o.material.size = 0.028 + 0.008 * Math.sin(t * 2.4);
        o.material.opacity = 0.68 + 0.08 * Math.sin(t * 1.7);
      }
    });

    // Subtle whole-scene pulse on arcs and photon ring through emissive-like opacity modulation
    if (bhGroup) {
      bhGroup.children.forEach((c, idx) => {
        if (c.material && c.material.opacity !== undefined && c.material.blending === THREE.AdditiveBlending) {
          const base = idx === 1 ? 0.9 : 0.22;
          c.material.opacity = base * flicker;
        }
      });
    }

    renderer.render(scene, camera);
  } catch (e) {
    console.error(e);
  }
}

function onResize() {
  if (!camera || !renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
