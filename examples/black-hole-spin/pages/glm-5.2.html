<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gargantua — Supermassive Black Hole</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;}
  #c{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

/* ---------- Renderer / scene (set up first so we never render blank) ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setClearColor(0x000004, 1);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000004);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
// Sphere radius 1, want diameter = 28% of viewport height.
// fraction = r / (d * tan(vfov/2))  -> d = r / (fraction * tan(vfov/2))
const camDist = 1.0 / (0.28 * Math.tan(THREE.MathUtils.degToRad(25)));
const elev = THREE.MathUtils.degToRad(7); // ~7° above disk plane
camera.position.set(0, camDist * Math.sin(elev), camDist * Math.cos(elev));
camera.lookAt(0, 0, 0);

/* ---------- Shared GLSL helpers ---------- */
const noiseGLSL = `
float hash11(float n){ return fract(sin(n)*43758.5453123); }
float noise2(vec2 p){
  vec2 i = floor(p), f = fract(p);
  float a = hash11(i.x + i.y*57.0);
  float b = hash11(i.x + 1.0 + i.y*57.0);
  float c = hash11(i.x + (i.y+1.0)*57.0);
  float d = hash11(i.x + 1.0 + (i.y+1.0)*57.0);
  vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
`;

const vertShader = `
varying vec3 vPos;
void main(){
  vPos = position;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;

/* ---------- Black event-horizon sphere ---------- */
const blackSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.0, 64, 48),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
scene.add(blackSphere);

/* ---------- Accretion disk (horizontal, xz-plane) ---------- */
const diskInner = 1.35, diskOuter = 5.6;
const diskGeo = new THREE.RingGeometry(diskInner, diskOuter, 320, 10);
diskGeo.rotateX(-Math.PI / 2); // lay flat in xz plane

const diskMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:  { value: 0 },
    uInner: { value: diskInner },
    uOuter: { value: diskOuter },
  },
  vertexShader: vertShader,
  fragmentShader: `
    uniform float uTime, uInner, uOuter;
    varying vec3 vPos;
    ${noiseGLSL}
    void main(){
      float r = length(vPos.xz);
      float phi = atan2(vPos.z, vPos.x);
      float t = (r - uInner) / (uOuter - uInner);
      if (t < 0.0 || t > 1.0) discard;

      // Radial profile: hot thin inner edge, broad body, soft outer fade.
      float core = exp(-pow((t - 0.08) * 5.0, 2.0));
      float body = smoothstep(0.0, 0.06, t) * (1.0 - smoothstep(0.55, 1.0, t));
      float radial = (core * 1.4 + 0.55) * body;

      // Rotating azimuthal structure (clumps + streaks + turbulence).
      float rot = uTime * 0.52; // ~30 deg/s
      float ang = phi + rot;
      float streaks = 0.5 + 0.5 * sin(ang * 7.0 + noise2(vec2(ang*0.7, r*0.5)) * 2.0);
      float clumps  = noise2(vec2(ang * 1.25, r * 0.6 - uTime * 0.18));
      float turb   = noise2(vec2(ang * 4.0 + uTime * 0.25, r * 2.2));
      float pattern = clamp(streaks * 0.35 + clumps * 0.45 + turb * 0.45, 0.0, 1.0);
      pattern = pow(pattern, 1.15);

      // Relativistic beaming: +x side brighter, with slow drift.
      float beam = 0.5 + 0.5 * cos(phi);
      float beaming = mix(0.45, 1.4, beam);
      beaming *= 0.88 + 0.12 * sin(uTime * 0.45);

      // Color ramp: #fff3d0 -> #ffae3b -> #c8551a
      vec3 cInner = vec3(1.0, 0.952, 0.815);
      vec3 cMid   = vec3(1.0, 0.682, 0.231);
      vec3 cOuter = vec3(0.784, 0.333, 0.102);
      vec3 col = (t < 0.5) ? mix(cInner, cMid, t * 2.0)
                          : mix(cMid, cOuter, (t - 0.5) * 2.0);
      col += vec3(0.35, 0.22, 0.10) * core; // hot inner boost

      // Shimmer / flicker.
      float flick = 0.82 + 0.18 * sin(uTime * 7.0 + phi * 4.0 + r * 5.0);

      float bright = radial * (0.32 + 0.68 * pattern) * beaming * flick;
      bright = clamp(bright, 0.0, 1.6);
      gl_FragColor = vec4(col * bright, 1.0);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const disk = new THREE.Mesh(diskGeo, diskMat);
scene.add(disk);

/* ---------- Lensing arcs (vertical ring facing camera, bright top & bottom) ---------- */
const lensInner = 1.03, lensOuter = 1.55;
const lensGeo = new THREE.RingGeometry(lensInner, lensOuter, 320, 6);
const lensMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uInner: { value: lensInner }, uOuter: { value: lensOuter } },
  vertexShader: vertShader,
  fragmentShader: `
    uniform float uTime, uInner, uOuter;
    varying vec3 vPos;
    ${noiseGLSL}
    void main(){
      float r = length(vPos.xy);
      float phi = atan2(vPos.y, vPos.x);
      float t = (r - uInner) / (uOuter - uInner);
      if (t < 0.0 || t > 1.0) discard;

      // Stronger at top & bottom (lensed far-side images), fainter at sides.
      float vert = abs(sin(phi));
      float sideFade = mix(0.35, 1.0, smoothstep(0.0, 0.55, vert));

      float radial = smoothstep(0.0, 0.18, t) * (1.0 - smoothstep(0.55, 1.0, t));

      // Synced rotation with the disk.
      float rot = uTime * 0.52;
      float ang = phi + rot;
      float streaks = 0.5 + 0.5 * sin(ang * 6.0);
      float clumps  = noise2(vec2(ang * 1.3, r * 0.8 - uTime * 0.18));
      float pattern = clamp(streaks * 0.4 + clumps * 0.6, 0.0, 1.0);

      // Lensed image is hot (inner disk lensed over the top).
      vec3 cInner = vec3(1.0, 0.95, 0.82);
      vec3 cMid   = vec3(1.0, 0.68, 0.23);
      vec3 col = mix(cInner, cMid, t);

      float flick = 0.8 + 0.2 * sin(uTime * 5.5 + phi * 6.0);
      float bright = radial * sideFade * (0.45 + 0.55 * pattern) * 1.5 * flick;
      bright = clamp(bright, 0.0, 1.8);
      gl_FragColor = vec4(col * bright, 1.0);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const lensing = new THREE.Mesh(lensGeo, lensMat);
scene.add(lensing);

/* ---------- Photon ring (thin bright ring hugging the horizon) ---------- */
const photonGeo = new THREE.RingGeometry(1.0, 1.045, 256, 2);
const photonMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: vertShader,
  fragmentShader: `
    uniform float uTime;
    varying vec3 vPos;
    void main(){
      float r = length(vPos.xy);
      float t = (r - 1.0) / 0.045;
      float radial = smoothstep(0.0, 0.25, t) * (1.0 - smoothstep(0.55, 1.0, t));
      float shimmer = 1.4 + 0.35 * sin(uTime * 4.0 + vPos.y * 8.0);
      vec3 col = vec3(1.0, 0.96, 0.85);
      float bright = radial * shimmer;
      gl_FragColor = vec4(col * bright, 1.0);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const photon = new THREE.Mesh(photonGeo, photonMat);
scene.add(photon);

/* ---------- Sparse dim starfield ---------- */
try {
  const N = 700;
  const positions = new Float32Array(N * 3);
  const sizes = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    // random direction on a sphere shell
    const u = Math.random() * 2 - 1;
    const th = Math.random() * Math.PI * 2;
    const rad = 40 + Math.random() * 50;
    const s = Math.sqrt(1 - u * u);
    positions[i*3]   = rad * s * Math.cos(th);
    positions[i*3+1] = rad * u;
    positions[i*3+2] = rad * s * Math.sin(th);
    sizes[i] = 0.6 + Math.random() * 1.6;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const starMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float size;
      varying float vSize;
      void main(){
        vSize = size;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (200.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying float vSize;
      void main(){
        vec2 d = gl_PointCoord - 0.5;
        float a = smoothstep(0.5, 0.0, length(d));
        vec3 c = vec3(0.7, 0.75, 0.9) * (0.35 + 0.65 * a);
        gl_FragColor = vec4(c * a * 0.6, a);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);
} catch (e) { /* starfield is non-critical */ }

/* ---------- Render loop, time-driven ---------- */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  diskMat.uniforms.uTime.value   = t;
  lensMat.uniforms.uTime.value   = t;
  photonMat.uniforms.uTime.value = t;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
