<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interstellar-style Black Hole</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';

    try {
      // ------------------------------------------------------------------
      // Scene setup
      // ------------------------------------------------------------------
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020205);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x020205);
      document.body.appendChild(renderer.domElement);

      // ------------------------------------------------------------------
      // Camera: black-hole shadow ~28% of viewport height, disk nearly edge-on
      // ------------------------------------------------------------------
      const R = 1.0;                          // event-horizon radius
      const fovDeg = 60.0;
      const fovRad = fovDeg * Math.PI / 180.0;
      const targetFraction = 0.28;
      const halfAngularRadius = targetFraction * fovRad * 0.5;
      const dist = R / Math.tan(halfAngularRadius);
      const elevation = 6.0 * Math.PI / 180.0;  // camera just above disk plane

      camera.position.set(0.0, dist * Math.sin(elevation), dist * Math.cos(elevation));
      camera.lookAt(0, 0, 0);

      // ------------------------------------------------------------------
      // Shared shader for disk and lensing arcs
      // ------------------------------------------------------------------
      const diskShader = {
        uniforms: {
          uTime: { value: 0 },
          uColorInner: { value: new THREE.Color(0xfff3d0) },
          uColorMid: { value: new THREE.Color(0xffae3b) },
          uColorOuter: { value: new THREE.Color(0xc8551a) },
          uRmin: { value: 4.2 },
          uRmax: { value: 4.8 },
          uBeamAngle: { value: Math.PI },
          uBeamWidth: { value: 0.65 },
          uBeamStrength: { value: 1.25 },
          uBaseAlpha: { value: 0.55 },
          uMode: { value: 0.0 }
        },
        vertexShader: `
          varying vec3 vWorldPos;
          void main() {
            vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vWorldPos;

          uniform float uTime;
          uniform vec3 uColorInner;
          uniform vec3 uColorMid;
          uniform vec3 uColorOuter;
          uniform float uRmin;
          uniform float uRmax;
          uniform float uBeamAngle;
          uniform float uBeamWidth;
          uniform float uBeamStrength;
          uniform float uBaseAlpha;
          uniform float uMode;

          const float PI = 3.14159265359;
          const float TWO_PI = 6.28318530718;

          float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
          }

          float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
          }

          void main() {
            float r, theta;
            vec3 p = vWorldPos;

            if (uMode < 0.5) {
              // Main accretion disk: horizontal plane, around Y axis
              r = length(p.xz);
              theta = atan(p.x, p.z);
            } else {
              // Lensing arcs: partial ring in X-Y plane, around Z axis
              r = length(p.xy);
              theta = atan(p.y, p.x);
            }

            float t = clamp((r - uRmin) / (uRmax - uRmin), 0.0, 1.0);

            vec3 col = mix(uColorInner, uColorMid, smoothstep(0.0, 0.45, t));
            col = mix(col, uColorOuter, smoothstep(0.55, 1.0, t));

            // Azimuthal rotation of turbulent clumps (~31.5 deg/sec)
            float spin = theta - uTime * 0.55;

            float clump = 0.0;
            clump += 0.5 + 0.5 * sin(spin * 6.0 + noise(vec2(spin * 2.0, uTime * 0.3)) * 3.0);
            clump += 0.3 + 0.2 * sin(spin * 14.0 + uTime * 0.7);
            clump *= smoothstep(uRmin, uRmin + 0.12, r) * smoothstep(uRmax, uRmax - 0.12, r);
            clump = clamp(clump, 0.0, 1.0);

            // Slow drift of relativistic beaming highlight
            float drift = 0.35 * sin(uTime * 0.22);
            float dtheta = mod(theta - (uBeamAngle + drift) + PI, TWO_PI) - PI;
            float beam = exp(-dtheta * dtheta / (2.0 * uBeamWidth * uBeamWidth));

            // Shimmer / flicker
            float flicker = 0.88 + 0.12 * noise(vec2(spin * 8.0, uTime * 4.0));

            float bright = 1.0 + clump * 1.35 + beam * uBeamStrength;
            col *= bright * flicker;

            // Soft radial edges
            float radialFade = smoothstep(uRmin, uRmin + 0.05, r) *
                               smoothstep(uRmax, uRmax - 0.05, r);

            // Fade arc endpoints so they taper into the disk band
            float endFade = 1.0;
            if (uMode > 0.5) {
              endFade = smoothstep(0.0, 0.18, abs(sin(theta)));
            }

            float alpha = uBaseAlpha * radialFade * endFade;

            gl_FragColor = vec4(col, alpha);
          }
        `
      };

      // ------------------------------------------------------------------
      // Black event horizon
      // ------------------------------------------------------------------
      const horizonGeo = new THREE.SphereGeometry(R, 64, 64);
      const horizonMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
      const horizon = new THREE.Mesh(horizonGeo, horizonMat);
      scene.add(horizon);

      // ------------------------------------------------------------------
      // Thin photon ring hugging the black sphere
      // ------------------------------------------------------------------
      const ringGeo = new THREE.TorusGeometry(1.08, 0.015, 12, 128);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0xfff3d0,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      const photonRing = new THREE.Mesh(ringGeo, ringMat);
      scene.add(photonRing);

      // ------------------------------------------------------------------
      // Main accretion disk: horizontal torus, viewed nearly edge-on
      // ------------------------------------------------------------------
      const diskGeo = new THREE.TorusGeometry(4.5, 0.3, 16, 180);
      diskGeo.rotateX(-Math.PI / 2); // lay flat in X-Z plane

      const diskMat = new THREE.ShaderMaterial({
        uniforms: THREE.UniformsUtils.clone(diskShader.uniforms),
        vertexShader: diskShader.vertexShader,
        fragmentShader: diskShader.fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      const disk = new THREE.Mesh(diskGeo, diskMat);
      scene.add(disk);

      // ------------------------------------------------------------------
      // Gravitational-lensing arcs above and below the horizon
      // ------------------------------------------------------------------
      const arcRadius = 1.55;
      const arcTube = 0.05;
      const arcGeo = new THREE.TorusGeometry(arcRadius, arcTube, 12, 100, Math.PI);

      const arcMat = new THREE.ShaderMaterial({
        uniforms: THREE.UniformsUtils.clone(diskShader.uniforms),
        vertexShader: diskShader.vertexShader,
        fragmentShader: diskShader.fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      arcMat.uniforms.uRmin.value = arcRadius - arcTube;
      arcMat.uniforms.uRmax.value = arcRadius + arcTube;
      arcMat.uniforms.uBaseAlpha.value = 0.75;
      arcMat.uniforms.uBeamStrength.value = 0.4;
      arcMat.uniforms.uMode.value = 1.0;

      const upperArc = new THREE.Mesh(arcGeo, arcMat);
      scene.add(upperArc);

      const lowerArc = new THREE.Mesh(arcGeo, arcMat.clone());
      lowerArc.rotation.z = Math.PI; // mirror to bottom
      lowerArc.material.uniforms = arcMat.uniforms; // share uniforms
      scene.add(lowerArc);

      // ------------------------------------------------------------------
      // Sparse dim starfield
      // ------------------------------------------------------------------
      const starCount = 1200;
      const starGeo = new THREE.BufferGeometry();
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);
        const rad = 250 + Math.random() * 150;
        const idx = i * 3;
        starPos[idx] = rad * Math.sin(phi) * Math.cos(theta);
        starPos[idx + 1] = rad * Math.sin(phi) * Math.sin(theta);
        starPos[idx + 2] = rad * Math.cos(phi);
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.1,
        transparent: true,
        opacity: 0.55,
        sizeAttenuation: false
      });
      const stars = new THREE.Points(starGeo, starMat);
      scene.add(stars);

      // ------------------------------------------------------------------
      // Render loop
      // ------------------------------------------------------------------
      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener('resize', onResize);

      function animate(time) {
