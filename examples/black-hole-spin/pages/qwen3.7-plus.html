<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#020204;width:100vw;height:100vh;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(1);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x020204, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020204);

// Camera ~7° above the disk plane, distance chosen so sphere = ~28% of viewport height
// fov=60 -> half-height 30°. 28% of height -> angular radius 8.4°. R=1, D=1/sin(8.4°)=~6.85
const R = 1.0;
const D = 6.85;
const camElev = 7.0 * Math.PI / 180;
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 200);
camera.position.set(0, D * Math.sin(camElev), D * Math.cos(camElev));
camera.lookAt(0, 0, 0);

// Event horizon — perfectly black sphere
const bhGeo = new THREE.SphereGeometry(R, 64, 64);
const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const blackHole = new THREE.Mesh(bhGeo, bhMat);
scene.add(blackHole);

// Starfield
const starCount = 1400;
const starPos = new Float32Array(starCount * 3);
const starCol = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  // uniform on sphere shell
  const u = Math.random();
  const v = Math.random();
  const theta = 2 * Math.PI * u;
  const phi = Math.acos(2 * v - 1);
  const rad = 80 + Math.random() * 20;
  starPos[i*3]   = rad * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = rad * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = rad * Math.cos(phi);
  const b = 0.3 + Math.random() * 0.7;
  const tint = Math.random();
  starCol[i*3]   = b * (0.8 + 0.2 * tint);
  starCol[i*3+1] = b * (0.85 + 0.15 * tint);
  starCol[i*3+2] = b;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
const starMat = new THREE.PointsMaterial({
  size: 0.6, sizeAttenuation: true, vertexColors: true,
  transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false
});
scene.add(new THREE.Points(starGeo, starMat));

// Accretion disk — flat ring in XZ plane with shader
const diskInner = 1.35 * R;
const diskOuter = 5.2 * R;
const diskGeo = new THREE.RingGeometry(diskInner, diskOuter, 256, 24);
// RingGeometry positions are in XY plane; rotate so it lies in XZ plane
diskGeo.rotateX(-Math.PI / 2);

const diskUniforms = {
  uTime: { value: 0 },
  uInner: { value: diskInner },
  uOuter: { value: diskOuter }
};

const diskVert = `
  varying vec3 vWorldPos;
  void main() {
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;

const diskFrag = `
  precision highp float;
  uniform float uTime;
  uniform float uInner;
  uniform float uOuter;
  varying vec3 vWorldPos;

  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float noise(vec2 p){
    vec2 i = floor(p); vec2 f = fract(p);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    vec2 u = f*f*(3.0 - 2.0*f);
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
  }
  float fbm(vec2 p){
    float s = 0.0; float a = 0.5;
    for(int i=0;i<4;i++){ s += a*noise(p); p *= 2.1; a *= 0.5; }
    return s;
  }

  void main() {
    float r = length(vWorldPos.xz);
    float ang = atan(vWorldPos.z, vWorldPos.x);

    // rotation ~30 deg/s = 0.524 rad/s
    float omega = 0.55;
    // differential rotation: inner parts faster
    float diffOmega = omega * pow(uInner / max(r, uInner), 0.6);
    float rotAng = ang - uTime * diffOmega;

    // radial color gradient
    float t = clamp((r - uInner) / (uOuter - uInner), 0.0, 1.0);
    vec3 cInner = vec3(1.0, 0.953, 0.816);   // #fff3d0
    vec3 cMid   = vec3(1.0, 0.678, 0.231);   // #ffae3b
    vec3 cOuter = vec3(0.784, 0.333, 0.102); // #c8551a
    vec3 col;
    if (t < 0.35) col = mix(cInner, cMid, t / 0.35);
    else col = mix(cMid, cOuter, (t - 0.35) / 0.65);

    // azimuthal structure — clumps and streaks
    float clump = fbm(vec2(rotAng * 2.5, r * 1.8));
    float streak = fbm(vec2(rotAng * 6.0 - uTime * 0.25, r * 4.0));
    float band = 0.55 + 0.55 * clump;
    band *= 0.75 + 0.55 * streak;

    // relativistic beaming — one side brighter, slow drift
    float beamPhase = ang + uTime * 0.08;
    float beam = 0.55 + 0.75 * pow(max(0.0, 0.5 + 0.5 * cos(beamPhase)), 1.5);

    // radial fade
    float innerFade = smoothstep(uInner * 0.98, uInner * 1.08, r);
    float outerFade = 1.0 - smoothstep(uOuter * 0.85, uOuter, r);

    // hot-spot near inner edge
    float innerGlow = exp(-pow((r - uInner * 1.05) / (0.25 * uInner), 2.0)) * 1.6;

    float alpha = innerFade * outerFade * band * beam;
    alpha += innerGlow * innerFade * outerFade * beam;

    // shimmer
    float shimmer = 0.88 + 0.18 * sin(uTime * 3.7 + rotAng * 4.0 + r * 1.8);
    shimmer *= 0.9 + 0.15 * sin(uTime * 7.1 + r * 3.0);
    alpha *= shimmer;

    col *= (0.9 + 0.6 * band);
    // boost inner
    col += vec3(0.35, 0.25, 0.15) * innerGlow * beam;

    gl_FragColor = vec4(col * alpha * 2.1, alpha);
  }
`;

const diskMat = new THREE.ShaderMaterial({
  uniforms: diskUniforms,
  vertexShader: diskVert,
  fragmentShader: diskFrag,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.DoubleSide
});
const disk = new THREE.Mesh(diskGeo, diskMat);
scene.add(disk);

// Photon ring — thin bright ring hugging the event horizon
const photonGeo = new THREE.TorusGeometry(R * 1.03, 0.012 * R, 12, 256);
const photonMat = new THREE.MeshBasicMaterial({
  color: 0xfff6d8,
  transparent: true,
  opacity: 0.95,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonRing = new THREE.Mesh(photonGeo, photonMat);
scene.add(photonRing);

// Secondary wider photon glow
const photonGlowGeo = new THREE.TorusGeometry(R * 1.06, 0.04 * R, 12, 256);
const photonGlowMat = new THREE.MeshBasicMaterial({
  color: 0xffcf88,
  transparent: true,
  opacity: 0.45,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
scene.add(new THREE.Mesh(photonGlowGeo, photonGlowMat));

// Gravitational lensing arcs — the far side of the disk bent up over and under the sphere.
// Approximate with thin torus bands above and below the horizon.
function makeLensArc(yOffset, radius, tube, color, opacity) {
  const geo = new THREE.TorusGeometry(radius, tube, 16, 256);
  const mat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: true
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.y = yOffset;
  return m;
}

// Upper lensed arc (far-side disk bent over the top)
const arcTop1 = makeLensArc( 0.38 * R, 1.15 * R, 0.055 * R, 0xffd8a0, 0.9);
const arcTop2 = makeLensArc( 0.55 * R, 1.35 * R, 0.045 * R, 0xffb870, 0.65);
const arcTop3 = makeLensArc( 0.72 * R, 1.60 * R, 0.035 * R, 0xff9955, 0.45);
scene.add(arcTop1, arcTop2, arcTop3);

// Lower lensed arc (mirrored under the bottom)
const arcBot1 = makeLensArc(-0.38 * R, 1.15 * R, 0.055 * R, 0xffd8a0, 0.9);
const arcBot2 = makeLensArc(-0.55 * R, 1.35 * R, 0.045 * R, 0xffb870, 0.65);
const arcBot3 = makeLensArc(-0.72 * R, 1.60 * R, 0.035 * R, 0xff9955, 0.45);
scene.add(arcBot1, arcBot2, arcBot3);

// Soft halo around the shadow — faint outer glow ring
const haloGeo = new THREE.TorusGeometry(R * 1.25, 0.18 * R, 12, 256);
const haloMat = new THREE.MeshBasicMaterial({
  color: 0xffb070,
  transparent: true,
  opacity: 0.18,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
scene.add(new THREE.Mesh(haloGeo, haloMat));

// Arc shimmer uniforms for time-based flicker
const arcMeshes = [arcTop1, arcTop2, arcTop3, arcBot1, arcBot2, arcBot3];

// Render loop driven by timestamp
const clock = { start: performance.now() };
function animate() {
  try {
    const t = (performance.now() - clock.start) / 1000;
    diskUniforms.uTime.value = t;

    // subtle flicker on lensing arcs
    for (let i = 0; i < arcMeshes.length; i++) {
      const m = arcMeshes[i];
      const base = m.material.userData.baseOpacity ?? m.material.opacity;
      if (m.material.userData.baseOpacity === undefined) m.material.userData.baseOpacity = m.material.opacity;
      const flick = 0.88 + 0.14 * Math.sin(t * 2.3 + i * 1.7) + 0.06 * Math.sin(t * 5.1 + i * 0.9);
      m.material.opacity = base * flick;
    }

    // slight photon ring pulse
    photonMat.opacity = 0.9 + 0.08 * Math.sin(t * 1.7);
    photonGlowMat.opacity = 0.42 + 0.08 * Math.sin(t * 2.1 + 1.0);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  } catch (e) {
    console.error(e);
    requestAnimationFrame(animate);
  }
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch (err) {
  console.error(err);
  document.body.innerHTML = '<div style="color:#aaa;font-family:sans-serif;padding:20px;">' + err.message + '</div>';
}
</script>
</body>
</html>
