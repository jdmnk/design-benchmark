<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gargantua - Interstellar Black Hole</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      background-color: black;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    
    // --- INITIALIZATION ---
    try {
      // Scene setup with near-black space background
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050510);
      
      // Renderer
      const renderer = new THREE.WebGLRenderer({ 
        antialias: true,
        powerPreference: "high-performance"
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0)); // limit for performance
      renderer.setClearColor(0x030310);
      document.body.appendChild(renderer.domElement);
      
      // Camera: fixed position, 7 degrees above the horizontal plane
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      const camDistance = 8.5;
      const elevationAngle = 7 * (Math.PI / 180); // 7 degrees
      camera.position.set(
        0, 
        Math.sin(elevationAngle) * camDistance, 
        Math.cos(elevationAngle) * camDistance
      );
      camera.lookAt(0, 0, 0);
      
      // --- LIGHTING (ambient only, objects use emissive) ---
      const ambientLight = new THREE.AmbientLight(0x111122);
      scene.add(ambientLight);
      
      // --- BLACK HOLE SPHERE (Event Horizon) ---
      const horizonGeometry = new THREE.SphereGeometry(1.0, 64, 64);
      const horizonMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
      const blackHole = new THREE.Mesh(horizonGeometry, horizonMaterial);
      scene.add(blackHole);
      
      // --- PHOTON RING (thin bright ring hugging the sphere) ---
      const photonRingGeometry = new THREE.TorusGeometry(1.02, 0.025, 32, 128);
      const photonRingMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xffeedd, 
        emissive: new THREE.Color(0xffd0a0),
        transparent: true,
        opacity: 0.9
      });
      const photonRing = new THREE.Mesh(photonRingGeometry, photonRingMaterial);
      photonRing.rotation.x = Math.PI / 2;
      scene.add(photonRing);
      
      // --- ACCRETION DISK STRUCTURE ---
      // We build a multi-layered disk with azimuthal clumps using vertex colors and custom rings.
      const diskGroup = new THREE.Group();
      scene.add(diskGroup);
      
      // Helper to create a textured ring segment with clumps
      function createClumpyRing(innerRadius, outerRadius, colorInner, colorOuter, segments = 128, clumps = 16, opacity = 0.9) {
        const geometry = new THREE.RingGeometry(innerRadius, outerRadius, segments, 1);
        // Modify geometry to have azimuthal brightness variation
        const positionAttribute = geometry.attributes.position;
        const colors = [];
        
        // Precompute colors based on angle for clumpy appearance
        for (let i = 0; i < positionAttribute.count; i++) {
          const x = positionAttribute.getX(i);
          const y = positionAttribute.getY(i);
          const angle = Math.atan2(y, x);
          const radius = Math.sqrt(x*x + y*y);
          
          // Normalized radius factor (0 at inner, 1 at outer)
          const t = (radius - innerRadius) / (outerRadius - innerRadius);
          
          // Base color interpolation
          const baseColor = new THREE.Color().copy(colorInner).lerp(colorOuter, t);
          
          // Clump factor: create bright spots based on angle
          let clumpFactor = 0.0;
          for (let c = 0; c < clumps; c++) {
            const clumpAngle = (c / clumps) * Math.PI * 2;
            // Vary clump angles slightly per ring to create streaks
            const angleDiff = Math.abs(angle - clumpAngle);
            const adjustedDiff = Math.min(angleDiff, Math.PI * 2 - angleDiff);
            // Gaussian-like influence
            const influence = Math.exp(-adjustedDiff * 3.5);
            clumpFactor += influence * (0.5 + 0.5 * Math.sin(c * 1.7));
          }
          clumpFactor = Math.min(1.0, clumpFactor * 0.9);
          
          // Brightness modulation: base brightness + clump boost
          const brightness = 0.6 + clumpFactor * 0.4;
          
          // Apply color
          const finalColor = baseColor.clone().multiplyScalar(brightness);
          colors.push(finalColor.r, finalColor.g, finalColor.b);
        }
        
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        
        const material = new THREE.MeshBasicMaterial({
          vertexColors: true,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: opacity,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        
        const ring = new THREE.Mesh(geometry, material);
        ring.rotation.x = -Math.PI / 2; // Lay flat in XZ plane
        return ring;
      }
      
      // Create multiple rings to simulate disk structure with beaming
      const diskLayers = [
        { inner: 1.05, outer: 1.6, colorInner: new THREE.Color('#fff3d0'), colorOuter: new THREE.Color('#ffae3b'), opacity: 0.95, clumps: 14 },
        { inner: 1.6, outer: 2.1, colorInner: new THREE.Color('#ffae3b'), colorOuter: new THREE.Color('#e8782a'), opacity: 0.9, clumps: 12 },
        { inner: 2.1, outer: 2.7, colorInner: new THREE.Color('#e8782a'), colorOuter: new THREE.Color('#c8551a'), opacity: 0.85, clumps: 10 },
        { inner: 2.7, outer: 3.2, colorInner: new THREE.Color('#c8551a'), colorOuter: new THREE.Color('#a03d1a'), opacity: 0.8, clumps: 8 }
      ];
      
      const diskMeshes = [];
      diskLayers.forEach(layer => {
        const ring = createClumpyRing(layer.inner, layer.outer, layer.colorInner, layer.colorOuter, 128, layer.clumps, layer.opacity);
        diskGroup.add(ring);
        diskMeshes.push(ring);
      });
      
      // Brighter side (relativistic beaming): create a slightly offset brighter copy for one side
      const beamingGroup = new THREE.Group();
      beamingGroup.rotation.y = Math.PI * 0.7; // rotate beaming highlight to one side
      diskGroup.add(beamingGroup);
      
      const beamRing = createClumpyRing(1.08, 1.7, new THREE.Color('#fff8e7'), new THREE.Color('#ffb55a'), 128, 10, 0.7);
      beamingGroup.add(beamRing);
      
      // --- GRAVITATIONAL LENSING ARCS (Far side of disk bent over/under) ---
      const arcsGroup = new THREE.Group();
      scene.add(arcsGroup);
      
      function createLensingArc(radius, verticalOffset, arcLength, color, thickness = 0.08, opacity = 0.85) {
        // Create a partial torus that wraps over/under the sphere
        const thetaStart = -arcLength / 2;
        const thetaEnd = arcLength / 2;
        const geometry = new THREE.TorusGeometry(radius, thickness, 16, 64, Math.PI * 2);
        
        // We'll use a custom approach: create a curved tube along an arc in the YZ plane (for top/bottom arcs)
        // Actually, simpler: use a torus but rotate and position it.
        // For top arc: torus in XZ plane? No, we need arcs above and below.
        // Better: create a custom curve for the arc.
        const points = [];
        const steps = 50;
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          const angle = thetaStart + t * (thetaEnd - thetaStart);
          // Position on a circle in the XZ plane? No, lensing arcs bend over the top, so they are in a plane perpendicular to disk?
          // In Interstellar, the far side of the disk appears bent over the top and mirrored below.
          // We can approximate with partial tori oriented horizontally but shifted vertically.
          // Actually, a torus geometry around Y axis? Let's use a torus with rotation.
          const x = Math.cos(angle) * radius;
          const z = Math.sin(angle) * radius;
          const y = verticalOffset;
          points.push(new THREE.Vector3(x, y, z));
        }
        const curve = new THREE.CatmullRomCurve3(points);
        const tubeGeometry = new THREE.TubeGeometry(curve, 64, thickness, 8, false);
        
        const material = new THREE.MeshBasicMaterial({
          color: color,
          emissive: new THREE.Color(color).multiplyScalar(0.5),
          transparent: true,
          opacity: opacity,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide
        });
        return new THREE.Mesh(tubeGeometry, material);
      }
      
      // Top arc: bends over the top of the sphere, radius slightly larger than sphere
      const topArcRadius = 1.15;
      const topArcVertical = 0.9;
      const topArcLength = Math.PI * 1.3; // wraps over
      const topArcColor = '#ffcc88';
      const topArc = createLensingArc(topArcRadius, topArcVertical, topArcLength, topArcColor, 0.07, 0.9);
      arcsGroup.add(topArc);
      
      // Bottom arc: mirrored under
      const bottomArc = createLensingArc(topArcRadius, -topArcVertical, topArcLength, '#ffbb77', 0.07, 0.9);
      arcsGroup.add(bottomArc);
      
      // Additional thinner arcs closer to photon ring
      const innerTopArc = createLensingArc(1.08, 0.75, Math.PI * 1.2, '#ffeebb', 0.04, 0.95);
      arcsGroup.add(innerTopArc);
      const innerBottomArc = createLensingArc(1.08, -0.75, Math.PI * 1.2, '#ffddaa', 0.04, 0.95);
      arcsGroup.add(innerBottomArc);
      
      // --- STARFIELD BACKGROUND ---
      const starsGeometry = new THREE.BufferGeometry();
      const starsCount = 800;
      const starsPositions = new Float32Array(starsCount * 3);
      const starsColors = new Float32Array(starsCount * 3);
      
      for (let i = 0; i < starsCount * 3; i += 3) {
        // Random sphere distribution with larger radius
        const radius = 20 + Math.random() * 30;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        
        starsPositions[i] = Math.cos(theta) * Math.sin(phi) * radius;
        starsPositions[i+1] = Math.sin(theta) * Math.sin(phi) * radius * 0.6; // flatten slightly
        starsPositions[i+2] = Math.cos(phi) * radius;
        
        // Dim stars with slight color variation
        const brightness = 0.3 + Math.random() * 0.7;
        const tint = Math.random();
        if (tint < 0.1) {
          starsColors[i] = 0.8 * brightness;
          starsColors[i+1] = 0.9 * brightness;
          starsColors[i+2] = 1.0 * brightness;
        } else if (tint < 0.2) {
          starsColors[i] = 1.0 * brightness;
          starsColors[i+1] = 0.8 * brightness;
          starsColors[i+2] = 0.7 * brightness;
        } else {
          starsColors[i] = 0.9 * brightness;
          starsColors[i+1] = 0.9 * brightness;
          starsColors[i+2] = 1.0 * brightness;
        }
      }
      
      starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
      starsGeometry.setAttribute('color', new THREE.BufferAttribute(starsColors, 3));
      
      const starsMaterial = new THREE.PointsMaterial({
        size: 0.12,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        opacity: 0.9
      });
      
      const stars = new THREE.Points(starsGeometry, starsMaterial);
      scene.add(stars);
      
      // --- ANIMATION LOOP ---
      let clock = new THREE.Clock();
      
      function animate() {
        const elapsedTime = performance.now() * 0.001; // seconds, frame-rate independent
        const delta = clock.getDelta();
        
        // Rotate accretion disk (25-40 degrees per second)
        const rotationSpeed = 32 * (Math.PI / 180); // 32 degrees per second in radians
        diskGroup.rotation.y += rotationSpeed * delta;
        
        // Rotate beaming group slower for drift effect
        beamingGroup.rotation.y += 0.2 * delta;
        
        // Subtle shimmer/flicker on arcs by adjusting opacity slightly
        const shimmer = 0.85 + Math.sin(elapsedTime * 15) * 0.05 + Math.sin(elapsedTime * 23) * 0.03;
        arcsGroup.children.forEach(arc => {
          if (arc.material) {
            arc.material.opacity = shimmer;
          }
        });
        
        // Photon ring subtle pulse
        photonRing.material.opacity = 0.8 + Math.sin(elapsedTime * 12) * 0.1;
        
        // Slight starfield rotation for depth
        stars.rotation.y += 0.02 * delta;
        stars.rotation.x += 0.005 * delta;
        
        // Render
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      
      // Start animation immediately
      animate();
      
      // Handle window resize
      window.addEventListener('resize', onWindowResize, false);
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      
      console.log('Gargantua scene initialized successfully.');
      
    } catch (error) {
      console.error('Scene initialization failed:', error);
      // Fallback: render a simple black background with error text
      document.body.innerHTML = '<div style="color:white; text-align:center; padding-top:50vh;">Scene error. Please check console.</div>';
    }
  </script>
</body>
</html>
