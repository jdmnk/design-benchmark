<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;height:100%;width:100%;}
  canvas{display:block;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {
  // ---- Scene / renderer ----
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000004);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 1000);
  // Sphere diameter ~28% of viewport height: R=1, d so asin(R/d)/tan(FOV/2) = 0.28
  const d = 7.68;
  const elev = THREE.MathUtils.degToRad(6); // 6° above disk plane -> near edge-on
  camera.position.set(0, d * Math.sin(elev), d * Math.cos(elev));
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  const R = 1.0; // event-horizon radius (world units)

  // ---- Black sphere (event horizon) ----
  const horizon = new THREE.Mesh(
    new THREE.SphereGeometry(R, 48, 48),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(horizon);

  // ---- Accretion disk (horizontal plane, near edge-on) ----
  const innerR = 1.25, outerR = 4.7;
  const diskGeom = new THREE.RingGeometry(innerR, outerR, 300, 8);
  const diskUniforms = {
    uTime:       { value: 0 },
    uInner:      { value: innerR },
    uOuter:      { value: outerR },
    uRotSpeed:   { value: 0.55 },          // ~31.5°/s
    uBeamingDir: { value: Math.PI * 0.9 }
  };
  const diskMat = new THREE.ShaderMaterial({
    uniforms: diskUniforms,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    vertexShader: `
      varying vec3 vPos;
      void main(){
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime, uInner, uOuter, uRotSpeed, uBeamingDir;
      varying vec3 vPos;
      void main(){
        // ring is built in local XY plane (z=0); mesh rotation puts it in the XZ world plane
        float r = length(vPos.xy);
        float a = atan(vPos.y, vPos.x);
        float rNorm = clamp((r - uInner) / (uOuter - uInner), 0.0, 1.0);

        // azimuthal structure rotating with the disk
        float aRot = a + uTime * uRotSpeed;
        float clump = 0.5 + 0.5 * sin(aRot * 3.0 + 1.0);
        clump *= 0.6 + 0.4 * (0.5 + 0.5 * sin(aRot * 7.0 - 2.0));
        clump *= 0.7 + 0.3 * (0.5 + 0.5 * sin(aRot * 13.0 + 0.5));
        float streak = 0.6 + 0.4 * sin(aRot * 9.0 + rNorm * 7.0 + uTime * 0.8);
        clump *= streak;

        // radial color: hot white-yellow -> amber -> deep orange
        vec3 cInner = vec3(1.000, 0.953, 0.816); // #fff3d0
        vec3 cMid   = vec3(1.000, 0.682, 0.231); // #ffae3b
        vec3 cOuter = vec3(0.784, 0.333, 0.102); // #c8551a
        vec3 col = mix(cInner, cMid, smoothstep(0.0, 0.5, rNorm));
        col = mix(col, cOuter, smoothstep(0.45, 1.0, rNorm));

        // bright inner edge
        float innerGlow = pow(1.0 - smoothstep(0.0, 0.3, rNorm), 1.5);

        // relativistic beaming (one side brighter), slowly drifting
        float beaming = 0.4 + 0.6 * (0.5 + 0.5 * cos(a - uBeamingDir));
        beaming = pow(beaming, 1.8);

        // shimmer / flicker
        float flick = 0.88 + 0.12 * sin(uTime * 7.0 + a * 4.0 + rNorm * 5.0);

        float bright = (0.4 + 1.6 * innerGlow) * (0.35 + 1.15 * clump) * beaming * flick;

        float alpha = smoothstep(0.0, 0.04, rNorm) * (1.0 - smoothstep(0.75, 1.0, rNorm));
        alpha *= (0.45 + 0.9 * clump);

        gl_FragColor = vec4(col * bright, clamp(alpha, 0.0, 1.0));
      }
    `
  });
  const disk = new THREE.Mesh(diskGeom, diskMat);
  disk.rotation.x = -Math.PI / 2; // lay flat -> horizontal disk
  scene.add(disk);

  // ---- Photon ring (thin, hugs horizon, camera-facing) ----
  const photonGeom = new THREE.RingGeometry(R * 1.005, R * 1.05, 300, 1);
  const photonUniforms = { uTime: { value: 0 } };
  const photonMat = new THREE.ShaderMaterial({
    uniforms: photonUniforms,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    vertexShader: `varying vec3 vPos; void main(){ vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `
      uniform float uTime;
      varying vec3 vPos;
      void main(){
        float r = length(vPos.xy);
        float rn = (r - 1.005) / (1.05 - 1.005);
        float core = 1.0 - abs(rn - 0.5) * 2.0;
        core = pow(max(core, 0.0), 2.0);
        float shim = 0.92 + 0.08 * sin(uTime * 6.0);
        vec3 col = vec3(1.0, 0.95, 0.82) * core * 2.4 * shim;
        gl_FragColor = vec4(col, core);
      }
    `
  });
  const photon = new THREE.Mesh(photonGeom, photonMat);
  scene.add(photon);

  // ---- Lensing arcs (camera-facing ring, bright over-top & under-bottom) ----
  const lensInner = R * 1.02, lensOuter = R * 1.8;
  const lensGeom = new THREE.RingGeometry(lensInner, lensOuter, 300, 4);
  const lensUniforms = {
    uTime: { value: 0 },
    uInner: { value: lensInner },
    uOuter: { value: lensOuter },
    uRotSpeed: { value: 0.55 }
  };
  const lensMat = new THREE.ShaderMaterial({
    uniforms: lensUniforms,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    vertexShader: `varying vec3 vPos; void main(){ vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `
      uniform float uTime, uInner, uOuter, uRotSpeed;
      varying vec3 vPos;
      void main(){
        float r = length(vPos.xy);
        float a = atan(vPos.y, vPos.x);
        float rNorm = clamp((r - uInner) / (uOuter - uInner), 0.0, 1.0);
        // bright at top (a=+pi/2) and bottom (a=-pi/2), dim at sides where the real disk takes over
        float arc = pow(abs(sin(a)), 2.2);
        arc *= (1.0 - smoothstep(0.0, 0.55, rNorm));
        arc *= smoothstep(0.0, 0.08, rNorm);
        // rotating shimmer tied to disk motion
        float aRot = a + uTime * uRotSpeed;
        float pat = 0.7 + 0.3 * sin(aRot * 5.0 + rNorm * 4.0);
        float shim = 0.85 + 0.15 * sin(uTime * 5.0 + a * 6.0);
        vec3 cInner = vec3(1.000, 0.953, 0.816);
        vec3 cMid   = vec3(1.000, 0.682, 0.231);
        vec3 col = mix(cInner, cMid, clamp(rNorm * 1.2, 0.0, 1.0));
        float bright = arc * 2.6 * pat * shim;
        gl_FragColor = vec4(col * bright, clamp(arc * 1.3, 0.0, 1.0));
      }
    `
  });
  const lens = new THREE.Mesh(lensGeom, lensMat);
  scene.add(lens);

  // ---- Sparse, dim starfield ----
  const starCount = 1400;
  const starPos = new Float32Array(starCount * 3);
  const starCol = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const rad = 60 + Math.random() * 40;
    starPos[i * 3]     = rad * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = rad * Math.cos(phi);
    starPos[i * 3 + 2] = rad * Math.sin(phi) * Math.sin(theta);
    const b = 0.25 + Math.random() * 0.6;
    starCol[i * 3]     = b;
    starCol[i * 3 + 1] = b * 0.96;
    starCol[i * 3 + 2] = b * 0.9;
  }
  const starGeom = new THREE.BufferGeometry();
  starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeom.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
  const starMat = new THREE.PointsMaterial({
    size: 0.18, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.85, depthWrite: false
  });
  scene.add(new THREE.Points(starGeom, starMat));

  // ---- Resize ----
  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ---- Animation loop (framerate-independent) ----
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    diskUniforms.uTime.value = t;
    photonUniforms.uTime.value = t;
    lensUniforms.uTime.value = t;
    // slow drift of the beaming highlight
    diskUniforms.uBeamingDir.value = Math.PI * 0.9 + 0.4 * Math.sin(t * 0.3);
    renderer.render(scene, camera);
  }
  animate();
} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
