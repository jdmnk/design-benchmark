<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

let renderer, scene, camera;
let blackHole, photonRing, disk, arcTop, arcBottom;
let diskTexture;
let startTime = performance.now();

function createStarfield() {
  const count = 800;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    const r = 80 + Math.random() * 40;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i] = r * Math.sin(phi) * Math.cos(theta);
    positions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i + 2] = r * Math.cos(phi);
    const c = 0.6 + Math.random() * 0.4;
    colors[i] = c; colors[i + 1] = c; colors[i + 2] = c * 0.95;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({ size: 0.6, vertexColors: true, transparent: true, opacity: 0.85 });
  return new THREE.Points(geo, mat);
}

function createDiskTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 64;
  const ctx = canvas.getContext('2d', { alpha: true });
  const grad = ctx.createLinearGradient(0, 0, 512, 0);
  grad.addColorStop(0.0, '#c8551a');
  grad.addColorStop(0.25, '#ffae3b');
  grad.addColorStop(0.55, '#fff3d0');
  grad.addColorStop(1.0, '#fff3d0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 64);

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 9; i++) {
    const x = (i * 57) % 480 + 16;
    const w = 18 + Math.random() * 22;
    ctx.fillRect(x, 8, w, 48);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

function init() {
  try {
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x020203, 1);
    document.body.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020203);

    const aspect = window.innerWidth / window.innerHeight;
    camera = new THREE.PerspectiveCamera(48, aspect, 0.1, 300);
    
    // Camera 6.5° above disk plane
    const dist = 6.8;
    const tilt = 6.5 * Math.PI / 180;
    camera.position.set(0, Math.sin(tilt) * dist, Math.cos(tilt) * dist);
    camera.lookAt(0, 0, 0);

    // Black hole
    const bhRadius = window.innerHeight * 0.14 / 100; // ~28% of viewport height
    const bhGeo = new THREE.SphereGeometry(bhRadius, 48, 48);
    const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    blackHole = new THREE.Mesh(bhGeo, bhMat);
    scene.add(blackHole);

    // Photon ring
    const ringGeo = new THREE.TorusGeometry(bhRadius * 1.08, bhRadius * 0.018, 24, 128);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xfff8e7, transparent: true, opacity: 0.95 });
    photonRing = new THREE.Mesh(ringGeo, ringMat);
    photonRing.rotation.x = Math.PI / 2;
    scene.add(photonRing);

    // Accretion disk
    diskTexture = createDiskTexture();
    const diskGeo = new THREE.RingGeometry(bhRadius * 1.25, bhRadius * 4.8, 128, 1);
    const diskMat = new THREE.MeshBasicMaterial({
      map: diskTexture,
      transparent: true,
      opacity: 0.98,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    });
    disk = new THREE.Mesh(diskGeo, diskMat);
    disk.rotation.x = Math.PI / 2;
    scene.add(disk);

    // Lensing arcs (top & bottom)
    const arcGeo = new THREE.TorusGeometry(bhRadius * 2.1, bhRadius * 0.035, 22, 90, Math.PI * 1.35);
    const arcMat = new THREE.MeshBasicMaterial({
      color: 0xffe8b0,
      transparent: true,
      opacity: 0.75,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide
    });
    
    arcTop = new THREE.Mesh(arcGeo, arcMat);
    arcTop.rotation.x = Math.PI / 2;
    arcTop.rotation.z = 0.6;
    scene.add(arcTop);

    arcBottom = new THREE.Mesh(arcGeo, arcMat);
    arcBottom.rotation.x = Math.PI / 2;
    arcBottom.rotation.z = -0.6;
    scene.add(arcBottom);

    scene.add(createStarfield());

    window.addEventListener('resize', onResize);
    animate();
  } catch (e) {
    console.error(e);
    document.body.innerHTML = '<div style="color:#fff;padding:20px">WebGL error</div>';
  }
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  const t = (performance.now() - startTime) / 1000;

  // Disk rotation: ~32°/s
  const rotSpeed = 32 * Math.PI / 180;
  disk.rotation.z = rotSpeed * t;

  // Subtle beaming drift & shimmer
  const beam = Math.sin(t * 0.9) * 0.08 + 0.92;
  disk.material.opacity = 0.92 + Math.sin(t * 3.1) * 0.06;
  arcTop.material.opacity = 0.68 + Math.sin(t * 2.7) * 0.12;
  arcBottom.material.opacity = 0.68 + Math.sin(t * 2.4 + 1.1) * 0.12;

  // Slow azimuthal drift of beaming highlight via texture offset
  diskTexture.offset.x = (t * 0.11) % 1;

  renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
