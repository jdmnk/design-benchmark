<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gargantua Black Hole</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #020204;
  }
  #canvas-container {
    width: 100vw;
    height: 100vh;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
(async () => {
  try {
    const THREE = await import('three');

    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020204);

    const fov = 45;
    const cameraZ = 50;
    const horizonFraction = 0.28;
    const horizonRadius = cameraZ * Math.tan(THREE.MathUtils.degToRad(fov) * 0.5) * (horizonFraction * 0.5);
    const camera = new THREE.PerspectiveCamera(fov, window.innerWidth / window.innerHeight, 0.1, 2000);
    const viewAngle = 6.5;
    camera.position.set(0, cameraZ * Math.tan(THREE.MathUtils.degToRad(viewAngle)), cameraZ);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x020204);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    function createDiskTexture() {
      const w = 1024, h = 128;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createLinearGradient(0, h, 0, 0);
      grad.addColorStop(0.0, '#fff3d0');
      grad.addColorStop(0.22, '#ffdf88');
      grad.addColorStop(0.42, '#ffae3b');
      grad.addColorStop(0.72, '#c8551a');
      grad.addColorStop(1.0, '#6e2306');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 20; i++) {
        const cx = Math.random() * w;
        const rw = (0.05 + Math.random() * 0.13) * w;
        const y0 = Math.random() * h * 0.25;
        const y1 = h * (0.55 + Math.random() * 0.45);
        const streak = ctx.createLinearGradient(cx - rw, 0, cx + rw, 0);
        streak.addColorStop(0, 'rgba(255, 255, 240, 0)');
        streak.addColorStop(0.5, 'rgba(255, 255, 240, 0.38)');
        streak.addColorStop(1, 'rgba(255, 255, 240, 0)');
        ctx.fillStyle = streak;
        ctx.fillRect(cx - rw, y0, rw * 2, y1 - y0);
      }

      const img = ctx.getImageData(0, 0, w, h);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const x = (i / 4) % w;
        const y = Math.floor((i / 4) / w);
        const u = x / w;
        const v = y / h;
        const t1 = Math.sin(u * Math.PI * 13 + v * Math.PI * 5);
        const t2 = Math.sin(u * Math.PI * 27 - v * Math.PI * 9);
        const boost = 1 + (t1 * 0.5 + t2 * 0.3) * 0.22;
        d[i] = Math.min(255, d[i] * boost);
        d[i + 1] = Math.min(255, d[i + 1] * boost);
        d[i + 2] = Math.min(255, d[i + 2] * boost);
      }
      ctx.putImageData(img, 0, 0);

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createGlowTexture() {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const g = ctx.createRadialGradient(size/2, size/2, size * 0.18, size/2, size/2, size * 0.55);
      g.addColorStop(0, 'rgba(255, 230, 170, 0.35)');
      g.addColorStop(0.45, 'rgba(255, 160, 60, 0.12)');
      g.addColorStop(1, 'rgba(255, 100, 30, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const horizon = new THREE.Mesh(
      new THREE.SphereGeometry(horizonRadius, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    scene.add(horizon);

    const photonRing = new THREE.Mesh(
      new THREE.TorusGeometry(horizonRadius * 1.035, horizonRadius * 0.038, 16, 128),
      new THREE.MeshBasicMaterial({
        color: 0xfff3d0,
        transparent: true,
        opacity: 0.82,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    photonRing.rotation.x = -Math.PI / 2;
    scene.add(photonRing);

    const diskInner = horizonRadius * 1.08;
    const diskOuter = horizonRadius * 4.6;
    const diskTexture = createDiskTexture();
    const disk = new THREE.Mesh(
      new THREE.RingGeometry(diskInner, diskOuter, 144, 8),
      new THREE.MeshBasicMaterial({
        map: diskTexture,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      })
    );
    disk.rotation.x = -Math.PI / 2;
    scene.add(disk);

    const beam = new THREE.Mesh(
      new THREE.RingGeometry(diskInner, diskOuter, 144, 1, -Math.PI / 4, Math.PI / 2),
      new THREE.MeshBasicMaterial({
        color: 0xfff3d0,
        transparent: true,
        opacity: 0.22,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      })
    );
    beam.rotation.x = -Math.PI / 2;
    scene.add(beam);

    const arcMajor = horizonRadius * 1.24;
    const arcTube = horizonRadius * 0.078;
    const arcMat = new THREE.MeshBasicMaterial({
      color: 0xffae3b,
      transparent: true,
      opacity: 0.62,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const upperArc = new THREE.Mesh(
      new THREE.TorusGeometry(arcMajor, arcTube, 16, 96, Math.PI),
      arcMat
    );
    scene.add(upperArc);

    const lowerArc = new THREE.Mesh(
      new THREE.TorusGeometry(arcMajor, arcTube, 16, 96, Math.PI),
      arcMat
    );
    lowerArc.rotation.z = Math.PI;
    scene.add(lowerArc);

    const glow = new THREE.Sprite(
      new THREE.SpriteMaterial({
        map: createGlowTexture(),
        transparent: true,
        opacity: 0.28,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    glow.scale.setScalar(horizonRadius * 5.5);
    scene.add(glow);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 700;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 250 + Math.random() * 350;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      starPos[i * 3 + 2] = r * Math.cos(phi);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({
        color: 0xaaccff,
        size: 0.45,
        transparent: true,
        opacity: 0.45,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      })
    );
    scene.add(stars);

    const diskSpeed = THREE.MathUtils.degToRad(35);
    const beamSpeed = THREE.MathUtils.degToRad(4);

    function animate(time) {
      requestAnimationFrame(animate);
      const t = time * 0.001;

      disk.rotation.y = diskSpeed * t;
      beam.rotation.y = beamSpeed * t + Math.sin(t * 0.25) * 0.4;

      disk.material.opacity = 0.88 + 0.07 * Math.sin(t * 4.1) + 0.04 * Math.sin(t * 13.7);
      photonRing.material.opacity = 0.8 + 0.09 * Math.sin(t * 5.3 + 1.0) + 0.05 * Math.sin(t * 17.0);
      arcMat.opacity = 0.6 + 0.07 * Math.sin(t * 3.2) + 0.04 * Math.sin(t * 9.5);

      const arcScale = 1 + 0.018 * Math.sin(t * 2.4);
      upperArc.scale.setScalar(arcScale);
      lowerArc.scale.setScalar(arcScale);

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    requestAnimationFrame(animate);
  } catch (err) {
    console.error('Scene setup failed:', err);
  }
})();
</script>
</body>
</html>
