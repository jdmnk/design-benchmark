<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystalline Orb</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import gsap from 'gsap';

        let camera, scene, renderer, composer;
        let orb, particles;

        init();
        animate();

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0009);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.5;
            document.body.appendChild(renderer.domElement);

            // Orb (Icosahedron)
            const orbGeometry = new THREE.IcosahedronGeometry(2.5, 1);
            const orbMaterial = new THREE.MeshStandardMaterial({
                color: 0x88ccff,
                emissive: 0x00bbff,
                emissiveIntensity: 1.5,
                roughness: 0,
                metalness: 0.8,
                transparent: true,
                opacity: 0.9,
                side: THREE.FrontSide
            });
            orb = new THREE.Mesh(orbGeometry, orbMaterial);
            scene.add(orb);

            // Colored Point Lights
            const light1 = new THREE.PointLight(0xff00ff, 15, 10);
            light1.position.set(-5, 5, 5);
            scene.add(light1);

            const light2 = new THREE.PointLight(0x00ffff, 15, 10);
            light2.position.set(5, -5, 5);
            scene.add(light2);

            const light3 = new THREE.PointLight(0xffff00, 15, 10);
            light3.position.set(0, 0, -5);
            scene.add(light3);

            // Ambient Light for subtle overall illumination
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(ambientLight);

            // Particle System
            const particleCount = 1000;
            const particleGeometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const color = new THREE.Color();

            for (let i = 0; i < particleCount; i++) {
                // Spherical distribution
                const r = 20; // radius of particle field
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                positions.push(x, y, z);

                // Assign random pastel-like colors
                color.setHSL(Math.random(), 0.7, 0.7 + Math.random() * 0.2);
                colors.push(color.r, color.g, color.b);
            }

            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });
            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);

            // Post-processing (Bloom)
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));

            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85); // strength, radius, threshold
            bloomPass.threshold = 0.1;
            bloomPass.strength = 0.5;
            bloomPass.radius = 0.8;
            composer.addPass(bloomPass);

            const outputPass = new OutputPass();
            composer.addPass(outputPass);

            // Handle window resizing
            window.addEventListener('resize', onWindowResize, false);

            // Initial animation with GSAP
            gsap.from(orb.scale, { duration: 2, x: 0.1, y: 0.1, z: 0.1, ease: "slow(0.7, 0.7, false)" });
            gsap.from(camera.position, { duration: 3, z: 20, ease: "power2.out" });
            gsap.to(camera.position, { duration: 10, y: 1, repeat: -1, yoyo: true, ease: "sine.inOut" });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const timer = performance.now() * 0.0001;

            // Orb rotation
            orb.rotation.x += 0.001;
            orb.rotation.y += 0.002;
            orb.rotation.z += 0.0005;

            // Particle movement
            particles.rotation.y += 0.0005; // Rotate the whole particle system
            particles.rotation.x += 0.0002;

            // Subtle camera movement
            camera.position.x = Math.sin(timer * 0.5) * 0.5;
            camera.position.z = 10 + Math.cos(timer * 0.3) * 0.5;


            composer.render();
        }
    </script>
</body>
</html>
