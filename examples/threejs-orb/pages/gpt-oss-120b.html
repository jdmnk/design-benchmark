<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glowing Crystalline Orb</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; }
  canvas { display:block; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { Color } from 'three';

// ---- Renderer & Scene -------------------------------------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.setClearColor(0x000010, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// ---- Camera ---------------------------------------------------------------
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  200
);
camera.position.set(0, 2, 8);

// ---- Lights ---------------------------------------------------------------
const ambient = new THREE.AmbientLight(0x222222);
scene.add(ambient);

const pointColors = [0xff0040, 0x00ff80, 0x0040ff];
pointColors.forEach((c, i) => {
  const light = new THREE.PointLight(c, 1.5, 30);
  const angle = (i / pointColors.length) * Math.PI * 2;
  light.position.set(Math.cos(angle) * 5, Math.sin(angle) * 5, 2);
  scene.add(light);
});

// ---- Crystalline Orb -------------------------------------------------------
const orbGeometry = new THREE.IcosahedronGeometry(2, 2);
const orbMaterial = new THREE.MeshStandardMaterial({
  color: new Color(0x3366ff),
  metalness: 0.85,
  roughness: 0.15,
  emissive: new Color(0x3366ff),
  emissiveIntensity: 2,
  clearcoat: 1,
  clearcoatRoughness: 0.1,
});
const orb = new THREE.Mesh(orbGeometry, orbMaterial);
scene.add(orb);

// ---- Star field ------------------------------------------------------------
const starCount = 2000;
const starGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const radius = 50;
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = 2 * Math.PI * Math.random();

  const r = radius * Math.cbrt(Math.random()); // spread more inside
  positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i * 3 + 2] = r * Math.cos(phi);
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const starMaterial = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.07,
  sizeAttenuation: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// ---- Post‑processing (bloom) -----------------------------------------------
const renderPass = new RenderPass(scene, camera);
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.2,   // strength
  0.4,   // radius
  0.6    // threshold
);
const composer = new EffectComposer(renderer);
composer.addPass(renderPass);
composer.addPass(bloomPass);

// ---- Animation -------------------------------------------------------------
function animate() {
  // Orb rotation
  orb.rotation.y += 0.001;
  orb.rotation.x += 0.0005;

  // Tiny drift for the stars (slow rotation)
  stars.rotation.y += 0.00007;

  composer.render();
  requestAnimationFrame(animate);
}
animate();

// ---- Resize handling -------------------------------------------------------
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  composer.setSize(w, h);
});
</script>
</body>
</html>
