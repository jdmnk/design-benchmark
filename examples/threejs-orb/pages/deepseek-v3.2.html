<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystalline Orb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(100, 150, 255, 0.7);
            font-size: 18px;
            letter-spacing: 2px;
            z-index: 100;
            opacity: 1;
            transition: opacity 1s ease;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="loading">INITIALIZING FIELD...</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000011, 10, 30);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);
        
        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        composer.addPass(bloomPass);
        
        // Main crystalline geometry
        const createCrystallineOrb = () => {
            // Icosahedron with subdivisions for more facets
            const geometry = new THREE.IcosahedronGeometry(2, 3);
            
            // Custom vertex shader for emissive glow effect
            const vertexShader = `
                varying vec3 vNormal;
                varying vec3 vPosition;
                
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;
            
            const fragmentShader = `
                uniform vec3 color1;
                uniform vec3 color2;
                uniform float time;
                varying vec3 vNormal;
                varying vec3 vPosition;
                
                void main() {
                    // Fresnel effect for edges
                    float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                    
                    // Pulsing internal glow
                    float pulse = sin(time * 0.5) * 0.3 + 0.7;
                    
                    // Mix colors based on position and time
                    vec3 mixedColor = mix(color1, color2, 
                        sin(vPosition.x * 2.0 + time) * 0.5 + 0.5);
                    
                    // Combine effects
                    vec3 finalColor = mixedColor * (0.7 + fresnel * 0.5) * pulse;
                    
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `;
            
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    color1: { value: new THREE.Color(0x2a6bff) },
                    color2: { value: new THREE.Color(0xaa33ff) },
                    time: { value: 0 }
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
                side: THREE.DoubleSide
            });
            
            const orb = new THREE.Mesh(geometry, material);
            orb.castShadow = true;
            orb.receiveShadow = false;
            
            // Add wireframe for crystalline structure
            const wireframe = new THREE.LineSegments(
                new THREE.WireframeGeometry(geometry),
                new THREE.LineBasicMaterial({ 
                    color: 0x88ccff, 
                    transparent: true, 
                    opacity: 0.2,
                    linewidth: 1
                })
            );
            orb.add(wireframe);
            
            return orb;
        };
        
        // Particle field (stars/dust)
        const createParticleField = (count = 2000) => {
            const particlesGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            const color1 = new THREE.Color(0x88aaff);
            const color2 = new THREE.Color(0xff88ee);
            
            for (let i = 0; i < count * 3; i += 3) {
                // Random position in a sphere
                const radius = 15 + Math.random() * 25;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);
                
                // Random color between blue and purple
                const mix = Math.random();
                const color = color1.clone().lerp(color2, mix);
                colors[i] = color.r;
                colors[i + 1] = color.g;
                colors[i + 2] = color.b;
                
                // Random size
                sizes[i / 3] = Math.random() * 0.15 + 0.05;
            }
            
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });
            
            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            return particles;
        };
        
        // Colored point lights
        const createLights = () => {
            const lights = new THREE.Group();
            
            // Main ambient light
            const ambient = new THREE.AmbientLight(0x222244, 0.3);
            lights.add(ambient);
            
            // Colored point lights in a tetrahedron arrangement
            const lightColors = [0x2a6bff, 0xff3366, 0x33ffaa, 0xffaa33];
            const positions = [
                [4, 3, 2],
                [-3, 4, -1],
                [2, -4, 3],
                [-2, -2, -4]
            ];
            
            positions.forEach((pos, i) => {
                const light = new THREE.PointLight(lightColors[i], 1.5, 20);
                light.position.set(pos[0], pos[1], pos[2]);
                
                // Add visible light spheres
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2, 8, 8),
                    new THREE.MeshBasicMaterial({ 
                        color: lightColors[i],
                        transparent: true,
                        opacity: 0.3
                    })
                );
                sphere.position.copy(light.position);
                lights.add(sphere);
                
                lights.add(light);
            });
            
            return lights;
        };
        
        // Create and add objects to scene
        const orb = createCrystallineOrb();
        scene.add(orb);
        
        const particles = createParticleField(2500);
        scene.add(particles);
        
        const lights = createLights();
        scene.add(lights);
        
        // Animation
        const clock = new THREE.Clock();
        
        const animate = () => {
            const time = clock.getElapsedTime();
            
            // Rotate orb with slight floating motion
            orb.rotation.x = time * 0.1;
            orb.rotation.y = time * 0.15;
            orb.position.y = Math.sin(time * 0.3) * 0.1;
            
            // Update shader time uniform
            if (orb.material.uniforms) {
                orb.material.uniforms.time.value = time;
            }
            
            // Rotate particles slowly
            particles.rotation.y = time * 0.02;
            particles.rotation.x = time * 0.01;
            
            // Animate lights
            lights.children.forEach((child, i) => {
                if (child instanceof THREE.PointLight || 
                    (child instanceof THREE.Mesh && child.material.transparent)) {
                    const basePos = [
                        [4, 3, 2],
                        [-3, 4, -1],
                        [2, -4, 3],
                        [-2, -2, -4]
                    ][i % 4];
                    
                    child.position.x = basePos[0] + Math.sin(time * 0.2 + i) * 1.5;
                    child.position.y = basePos[1] + Math.cos(time * 0.3 + i) * 1.5;
                    child.position.z = basePos[2] + Math.sin(time * 0.25 + i * 0.5) * 1.5;
                }
            });
            
            // Camera subtle movement
            camera.position.x = Math.sin(time * 0.05) * 0.5;
            camera.position.z = 8 + Math.cos(time * 0.03) * 0.2;
            camera.lookAt(0, 0, 0);
            
            // Render
            composer.render();
            
            requestAnimationFrame(animate);
        };
        
        // Handle window resize
        const handleResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        };
        
        window.addEventListener('resize', handleResize);
        
        // Start animation and hide loading
        setTimeout(() => {
            document.querySelector('.loading').classList.add('hidden');
            animate();
        }, 500);
        
        // Initial render
        composer.render();
    </script>
</body>
</html>
