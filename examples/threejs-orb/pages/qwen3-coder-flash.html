<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystalline Orb</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020410);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Create the crystalline orb
        const orbGeometry = new THREE.IcosahedronGeometry(1, 4);
        const orbMaterial = new THREE.MeshPhysicalMaterial({
            color: new THREE.Color(0x00aaff),
            metalness: 0.3,
            roughness: 0.1,
            clearcoat: 1.0,
            clearcoatRoughness: 0.05,
            transmission: 0.9,
            transparent: true,
            opacity: 0.8,
            emissive: new THREE.Color(0x0066ff),
            emissiveIntensity: 2.0,
            ior: 1.5,
            specularIntensity: 1.0,
            specularColor: new THREE.Color(0xffffff)
        });

        const orb = new THREE.Mesh(orbGeometry, orbMaterial);
        scene.add(orb);

        // Add point lights around the orb
        const light1 = new THREE.PointLight(0xff00ff, 1.5, 10);
        light1.position.set(2, 2, 2);
        scene.add(light1);

        const light2 = new THREE.PointLight(0x00ffff, 1.5, 10);
        light2.position.set(-2, -2, -2);
        scene.add(light2);

        const light3 = new THREE.PointLight(0xffff00, 1.5, 10);
        light3.position.set(0, 3, 0);
        scene.add(light3);

        // Create particle system
        const particleCount = 5000;
        const particles = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        const colorArray = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            // Position particles in a spherical shell
            const radius = 5 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
            posArray[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
            posArray[i + 2] = radius * Math.cos(phi);
            
            // Random colors
            colorArray[i] = Math.random() * 0.5 + 0.5;     // R
            colorArray[i + 1] = Math.random() * 0.5 + 0.5; // G
            colorArray[i + 2] = Math.random() * 0.5 + 0.5; // B
        }

        particles.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particles.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.02,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            sizeAttenuation: true
        });

        const particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);

        // Add bloom effect
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,
            0.4,
            0.85
        );
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.5;
        bloomPass.radius = 1.0;
        composer.addPass(bloomPass);

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate the orb
            orb.rotation.x += 0.002;
            orb.rotation.y += 0.004;
            
            // Rotate particles
            particleSystem.rotation.y += 0.0005;
            
            // Move lights in circular pattern
            const time = Date.now() * 0.0001;
            light1.position.x = 3 * Math.sin(time);
            light1.position.z = 3 * Math.cos(time);
            
            light2.position.x = 3 * Math.cos(time * 0.7);
            light2.position.z = 3 * Math.sin(time * 0.7);
            
            light3.position.y = 3 * Math.sin(time * 1.3);
            
            composer.render();
        }

        animate();
    </script>
</body>
</html>
