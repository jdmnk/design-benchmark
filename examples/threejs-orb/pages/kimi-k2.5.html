<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crystalline Orb</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a1a;
      overflow: hidden;
    }
    
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060610);
scene.fog = new THREE.FogExp2(0x060610, 0.035);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = false;
controls.minDistance = 4;
controls.maxDistance = 20;

// ========== Icosahedron Geometry with Custom Vertex Colors ==========
const geometry = new THREE.IcosahedronGeometry(1.6, 1);

// Create vertex colors with warm palette
const colors = [];
const palette = [
  new THREE.Color(0xffaa33), // warm gold
  new THREE.Color(0xff7744), // coral
  new THREE.Color(0xffcc66), // amber
  new THREE.Color(0xff5533), // deep orange
  new THREE.Color(0xffee99), // light yellow
];

const count = geometry.attributes.position.count;
for (let i = 0; i < count; i++) {
  const c = palette[Math.floor(Math.random() * palette.length)];
  colors.push(c.r, c.g, c.b);
}
geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

// Crystal material
const material = new THREE.MeshStandardMaterial({
  color: 0x331100,
  emissive: 0xff8822,
  emissiveIntensity: 2.5,
  roughness: 0.15,
  metalness: 0.95,
  vertexColors: true,
  transparent: true,
  opacity: 0.92,
  flatShading: true,
  side: THREE.DoubleSide,
});

const crystal = new THREE.Mesh(geometry, material);
scene.add(crystal);

// Wireframe overlay for crystalline look
const wireframeGeo = new THREE.IcosahedronGeometry(1.62, 1);
const wireframeMat = new THREE.MeshBasicMaterial({
  color: 0xffeeaa,
  wireframe: true,
  transparent: true,
  opacity: 0.12,
});
const wireframe = new THREE.Mesh(wireframeGeo, wireframeMat);
crystal.add(wireframe);

// Inner glow sphere
const innerGlowGeo = new THREE.IcosahedronGeometry(1.3, 2);
const innerGlowMat = new THREE.MeshBasicMaterial({
  color: 0xff6600,
  transparent: true,
  opacity: 0.08,
  wireframe: true,
});
const innerGlow = new THREE.Mesh(innerGlowGeo, innerGlowMat);
crystal.add(innerGlow);

// ========== Lights ==========
const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
scene.add(ambientLight);

// Orbiting colored point lights
const pointLights = [];
const lightColors = [0xff5500, 0x4488ff, 0xffcc00, 0xcc44ff, 0xff8888];
for (let i = 0; i < lightColors.length; i++) {
  const pl = new THREE.PointLight(lightColors[i], 3, 12, 2);
  scene.add(pl);
  pointLights.push(pl);
}

// ========== Outer Ring of Orbiting Lights ==========
const orbitRingGeo = new THREE.RingGeometry(2.8, 3.0, 64);
const orbitRingMat = new THREE.MeshBasicMaterial({
  color: 0xffaa44,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide,
});
const orbitRing = new THREE.Mesh(orbitRingGeo, orbitRingMat);
orbitRing.rotation.x = Math.PI / 2;
scene.add(orbitRing);

// Small orbiting lights around the ring
const orbiterCount = 12;
const orbiterGroup = new THREE.Group();
scene.add(orbiterGroup);

for (let i = 0; i < orbiterCount; i++) {
  const orbGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const orbMat = new THREE.MeshBasicMaterial({
    color: i % 2 === 0 ? 0xffcc66 : 0xff7744,
  });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  const angle = (i / orbiterCount) * Math.PI * 2;
  orb.position.set(Math.cos(angle) * 3, Math.sin(angle * 0.5) * 0.5, Math.sin(angle) * 3);
  orbiterGroup.add(orb);
}

// ========== Central Glowing Core ==========
const coreGeo = new THREE.SphereGeometry(0.3, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: 0xffeeaa });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// ========== Particle Systems ==========

// Main star field
const starCount = 600;
const starPositions = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
const starColors = new Float32Array(starCount * 3);

for (let i = 0; i < starCount; i++) {
  starPositions[i * 3] = (Math.random() - 0.5) * 35;
  starPositions[i * 3 + 1] = (Math.random() - 0.5) * 35;
  starPositions[i * 3 + 2] = (Math.random() - 0.5) * 35;
  starSizes[i] = Math.random() * 0.06 + 0.01;

  const tint = Math.random();
  if (tint > 0.7) {
    starColors[i * 3] = 1.0; starColors[i * 3 + 1] = 0.8; starColors[i * 3 + 2] = 0.5;
  } else if (tint > 0.4) {
    starColors[i * 3] = 0.5; starColors[i * 3 + 1] = 0.7; starColors[i * 3 + 2] = 1.0;
  } else {
    starColors[i * 3] = 1.0; starColors[i * 3 + 1] = 1.0; starColors[i * 3 + 2] = 1.0;
  }
}

const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
const starMat = new THREE.PointsMaterial({
  size: 0.05,
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  sizeAttenuation: true,
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Inner dust particles around the crystal
const dustCount = 300;
const dustPositions = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  const r = 1.8 + Math.random() * 4;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  dustPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  dustPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  dustPositions[i * 3 + 2] = r * Math.cos(phi);
}

const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0xffcc88,
  size: 0.03,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ========== Post-Processing ==========

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// Bloom
const bloomParams = {
  threshold: 0.15,
  strength: 1.8,
  radius: 0.6,
};
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  bloomParams.strength,
  bloomParams.radius,
  bloomParams.threshold
);
composer.addPass(bloomPass);

// Film grain / noise shader
const noiseShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0 },
    amount: { value: 0.04 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform float amount;
    varying vec2 vUv;
    
    float random(vec2 co) {
      return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
    }
    
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      float noise = random(vUv + time) * amount;
      color.rgb += noise - amount * 0.5;
      gl_FragColor = color;
    }
  `,
};
const noisePass = new ShaderPass(noiseShader);
composer.addPass(noisePass);

// Vignette shader
const vignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    strength: { value: 1.5 },
    radius: { value: 0.7 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float strength;
    uniform float radius;
    varying vec2 vUv;
    
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      vec2 uv = vUv * 2.0 - 1.0;
      float dist = length(uv);
      float vig = 1.0 - smoothstep(radius, 1.5, dist);
      color.rgb *= mix(1.0, vig, strength);
      gl_FragColor = color;
    }
  `,
};
const vignettePass = new ShaderPass(vignetteShader);
composer.addPass(vignettePass);

composer.addPass(new OutputPass());

// ========== Mouse Interaction ==========
const mouse = new THREE.Vector2();
const targetRotation = new THREE.Vector2();

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// ========== Resize ==========
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ========== Animation ==========
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Rotate crystal
  crystal.rotation.y = time * 0.25;
  crystal.rotation.x = Math.sin(time * 0.15) * 0.3;
  innerGlow.rotation.z = time * 0.2;
  innerGlow.rotation.x = time * 0.15;

  // Pulse emissive
  material.emissiveIntensity = 2.5 + Math.sin(time * 2.5) * 0.6;
  innerGlowMat.opacity = 0.06 + Math.sin(time * 3) * 0.03;

  // Rotate orbit ring
  orbitRing.rotation.z = time * 0.1;
  orbiterGroup.rotation.y = time * 0.4;

  // Animate orbiting lights
  const lightRadius = 4.5;
  pointLights.forEach((pl, i) => {
    const t = time * 0.4 + (i * Math.PI * 2) / pointLights.length;
    pl.position.x = Math.cos(t) * lightRadius;
    pl.position.z = Math.sin(t) * lightRadius;
    pl.position.y = Math.sin(t * 0.8 + i) * 2.0;
    pl.intensity = 2.5 + Math.sin(time * 3 + i) * 1.0;
  });

  // Rotate stars
  stars.rotation.y = time * 0.02;
  stars.rotation.x = Math.sin(time * 0.05) * 0.1;

  // Animate dust - gentle swirl
  const dustPos = dust.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    const ix = i * 3;
    const x = dustPos[ix];
    const z = dustPos[ix + 2];
    const speed = 0.0008;
    dustPos[ix] = x * Math.cos(speed) - z * Math.sin(speed);
    dustPos[ix + 2] = x * Math.sin(speed) + z * Math.cos(speed);
    dustPos[ix + 1] += Math.sin(time + i * 0.1) * 0.001;
  }
  dust.geometry.attributes.position.needsUpdate = true;
  dustMaterialFix();

  // Mouse influence on crystal
  targetRotation.x = mouse.y * 0.15;
  targetRotation.y = mouse.x * 0.15;
  crystal.rotation.x += (targetRotation.x - crystal.rotation.x) * 0.02;
  crystal.rotation.y += (targetRotation.y - crystal.rotation.y) * 0.02;

  // Core pulsing
  const s = 1.0 + Math.sin(time * 4) * 0.15;
  core.scale.set(s, s, s);

  // Update shaders
  noisePass.uniforms.time.value = time;

  controls.update();
  composer.render();
}

function dustMaterialFix() {
  // (Empty - dust material doesn't change, just positions)
}

animate();
</script>

</body>
</html>
