<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystalline Orb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@r160/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@r160/examples/jsm/",
            "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import gsap from 'gsap';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000a1a);
        scene.fog = new THREE.Fog(0x000a1a, 100, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.body.appendChild(renderer.domElement);

        // Post-processing for bloom
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,
            0.4,
            0.85
        );
        composer.addPass(bloomPass);

        // Create crystalline icosahedron
        const geometry = new THREE.IcosahedronGeometry(15, 5);
        
        // Create emissive material
        const material = new THREE.MeshPhongMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.6,
            shininess: 100,
            wireframe: false,
            flatShading: false
        });

        const orb = new THREE.Mesh(geometry, material);
        orb.castShadow = true;
        orb.receiveShadow = true;
        scene.add(orb);

        // Add wireframe overlay for crystalline effect
        const wireframeGeometry = new THREE.IcosahedronGeometry(15, 5);
        const wireframeMaterial = new THREE.LineBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.3,
            linewidth: 2
        });
        const wireframe = new THREE.LineSegments(wireframeGeometry, wireframeMaterial);
        wireframe.position.copy(orb.position);
        scene.add(wireframe);

        // Create dynamic point lights
        const lights = [
            { color: 0xff00ff, position: [30, 20, 30] },
            { color: 0x00ff00, position: [-30, -20, 30] },
            { color: 0xffff00, position: [20, -30, 25] },
            { color: 0x00ffff, position: [-25, 25, 30] }
        ];

        lights.forEach((lightConfig, index) => {
            const light = new THREE.PointLight(lightConfig.color, 1.5, 100);
            light.position.set(...lightConfig.position);
            light.castShadow = true;
            scene.add(light);

            // Animate light position
            gsap.to(light.position, {
                x: lightConfig.position[0] * 1.3,
                y: lightConfig.position[1] * 1.3,
                duration: 5 + index,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
        });

        // Add ambient light for general illumination
        const ambientLight = new THREE.AmbientLight(0x0033ff, 0.4);
        scene.add(ambientLight);

        // Create particle field
        const particleCount = 200;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 150;
            positions[i + 1] = (Math.random() - 0.5) * 150;
            positions[i + 2] = (Math.random() - 0.5) * 150;

            velocities[i] = (Math.random() - 0.5) * 0.05;
            velocities[i + 1] = (Math.random() - 0.5) * 0.05;
            velocities[i + 2] = (Math.random() - 0.5) * 0.05;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));

        const particleMaterial = new THREE.PointsMaterial({
            color: 0x00ffff,
            size: 0.5,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.6,
            emissive: 0x00ffff,
            emissiveIntensity: 0.5
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.001;

            // Rotate orb
            orb.rotation.x += 0.0005;
            orb.rotation.y += 0.0008;
            orb.rotation.z += 0.0003;

            // Rotate wireframe
            wireframe.rotation.copy(orb.rotation);

            // Pulse emissive intensity
            const pulse = Math.sin(time * 2) * 0.2 + 0.6;
            material.emissiveIntensity = pulse;
            particleMaterial.opacity = pulse * 0.6;

            // Update particles
            const positionAttribute = particleGeometry.getAttribute('position');
            const velocityAttribute = particleGeometry.getAttribute('velocity');
            const positions = positionAttribute.array;
            const velocities = velocityAttribute.array;

            for (let i = 0; i < positions.length; i += 3) {
                positions[i] += velocities[i];
                positions[i + 1] += velocities[i + 1];
                positions[i + 2] += velocities[i + 2];

                // Wrap around
                if (Math.abs(positions[i]) > 75) {
                    positions[i] = -Math.sign(positions[i]) * 75;
                }
                if (Math.abs(positions[i + 1]) > 75) {
                    positions[i + 1] = -Math.sign(positions[i + 1]) * 75;
                }
                if (Math.abs(positions[i + 2]) > 75) {
                    positions[i + 2] = -Math.sign(positions[i + 2]) * 75;
                }
            }
            positionAttribute.needsUpdate = true;

            // Subtle camera movement
            camera.position.x = Math.sin(time * 0.3) * 5;
            camera.position.y = Math.cos(time * 0.2) * 3;
            camera.lookAt(0, 0, 0);

            composer.render();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
            composer.setSize(width, height);
        });

        animate();
    </script>
</body>
</html>
