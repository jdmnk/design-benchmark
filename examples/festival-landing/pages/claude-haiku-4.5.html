<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBERWAVE — Electronic Music Festival 2027</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 25%, #2d0a3a 50%, #1a0a2e 75%, #0a0a1a 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse 800px 800px at 50% -200px, rgba(255, 100, 50, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 600px 300px at 80% 100%, rgba(255, 50, 150, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== HEADER AREA ===== */
        header {
            position: relative;
            padding-top: 40px;
            padding-bottom: 20px;
            text-align: center;
        }

        /* EMBERWAVE Title */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3.5rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: 0.15em;
            margin: 20px 0 0 0;
            position: relative;
            line-height: 1;
            
            background: linear-gradient(90deg, 
                #ff6b35 0%, 
                #ff3a7f 35%, 
                #00d4ff 65%, 
                #ffaa00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            
            text-shadow: 
                0 0 60px rgba(255, 107, 53, 0.5),
                0 0 40px rgba(255, 58, 127, 0.3),
                0 0 30px rgba(0, 212, 255, 0.2);
            
            animation: glow-pulse 4s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { 
                text-shadow: 
                    0 0 60px rgba(255, 107, 53, 0.5),
                    0 0 40px rgba(255, 58, 127, 0.3),
                    0 0 30px rgba(0, 212, 255, 0.2);
            }
            50% { 
                text-shadow: 
                    0 0 80px rgba(255, 107, 53, 0.8),
                    0 0 50px rgba(255, 58, 127, 0.5),
                    0 0 40px rgba(0, 212, 255, 0.4);
            }
        }

        /* Decorative line */
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff3a7f, #00d4ff, transparent);
            margin: 16px auto;
            box-shadow: 0 0 20px rgba(255, 58, 127, 0.6);
        }

        /* Date and Location */
        .meta {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #00d4ff;
            margin: 20px 0 10px 0;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .meta strong {
            color: #ffaa00;
        }

        /* ===== VISUAL HERO ELEMENT ===== */
        .hero-visual {
            position: relative;
            height: 180px;
            margin: 30px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .canyon {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.4));
        }

        /* Glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .orb-1 {
            width: 120px;
            height: 120px;
            left: 10%;
            top: 20px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.4) 0%, transparent 70%);
            box-shadow: 0 0 60px rgba(255, 107, 53, 0.6);
            animation-delay: 0s;
        }

        .orb-2 {
            width: 90px;
            height: 90px;
            right: 15%;
            top: 40px;
            background: radial-gradient(circle, rgba(255, 58, 127, 0.3) 0%, transparent 70%);
            box-shadow: 0 0 50px rgba(255, 58, 127, 0.5);
            animation-delay: 1s;
        }

        .orb-3 {
            width: 80px;
            height: 80px;
            left: 50%;
            transform: translateX(-50%);
            top: 60px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.3) 0%, transparent 70%);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        /* ===== CTA BUTTON ===== */
        .cta-section {
            text-align: center;
            margin: 30px 0 40px 0;
        }

        .btn-tickets {
            display: inline-block;
            padding: 16px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #ff3a7f, #ff6b35);
            color: #fff;
            border: 2px solid #ff3a7f;
            border-radius: 2px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 58, 127, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-tickets::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .btn-tickets:hover {
            box-shadow: 0 0 50px rgba(255, 58, 127, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* ===== LINEUP SECTION ===== */
        .lineup-container {
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 4px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
        }

        .lineup-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #00d4ff;
            margin-bottom: 24px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .lineup {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .artist {
            text-align: center;
            padding: 16px 12px;
            border-radius: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .artist::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(255, 58, 127, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .artist:hover::before {
            opacity: 1;
        }

        .artist-name {
            position: relative;
            z-index: 1;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Headliner styling */
        .artist.headliner .artist-name {
            font-size: 1.3rem;
            background: linear-gradient(90deg, #ffaa00, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 170, 0, 0.5);
        }

        /* Secondary artists */
        .artist:not(.headliner) .artist-name {
            font-size: 0.95rem;
            color: #00d4ff;
        }

        .artist:not(.headliner):hover .artist-name {
            color: #ff3a7f;
            text-shadow: 0 0 20px rgba(255, 58, 127, 0.6);
        }

        /* ===== PHASE 2 BADGE ===== */
        .phase-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 58, 127, 0.2));
            border: 1px solid #00d4ff;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #00d4ff;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.1);
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { 
                box-shadow: 0 0 15px rgba(0, 212, 255, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.1);
            }
            50% { 
                box-shadow: 0 0 25px rgba(0, 212, 255, 0.6), inset 0 0 15px rgba(0, 212, 255, 0.2);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: clamp(2.5rem, 10vw, 4rem);
            }

            .lineup {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .lineup-container {
                padding: 30px 20px;
            }

            header {
                padding-top: 30px;
                padding-bottom: 15px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2rem;
            }

            .meta {
                font-size: 0.8rem;
            }

            .lineup {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .btn-tickets {
                padding: 14px 35px;
                font-size: 0.95rem;
            }

            .hero-visual {
                height: 120px;
                margin: 20px 0;
            }

            .lineup-container {
                padding: 25px 16px;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>EMBERWAVE</h1>
            <div class="divider"></div>
            <div class="meta">JUNE 18–20, 2027 · <strong>ASH CANYON, NEVADA</strong></div>
        </header>

        <div class="hero-visual">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
            <div class="canyon">
                <svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
                    <!-- Desert canyon silhouette -->
                    <defs>
                        <linearGradient id="canyonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff3a7f;stop-opacity:0.1" />
                            <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:0.15" />
                            <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:0.3" />
                        </linearGradient>
                    </defs>
                    <polygon points="0,200 60,80 120,120 200,50 280,100 340,70 400,150 400,200" fill="url(#canyonGradient)" stroke="none"/>
                    <polygon points="0,200 40,100 70,140 140,80 200,110 270,90 320,130 365,100 400,200" fill="rgba(255,107,53,0.08)" stroke="rgba(255,107,53,0.25)" stroke-width="1.5"/>
                </svg>
            </div>
        </div>

        <div class="cta-section">
            <button class="btn-tickets">Get Tickets</button>
        </div>

        <div class="lineup-container">
            <div class="lineup-title">Lineup</div>
            <div class="lineup">
                <div class="artist headliner">
                    <div class="artist-name">NOVA CULT</div>
                </div>
                <div class="artist headliner">
                    <div class="artist-name">Velvet Static</div>
                </div>
                <div class="artist headliner">
                    <div class="artist-name">MOONBURN</div>
                </div>
                <div class="artist">
                    <div class="artist-name">Dax Riviera</div>
                </div>
                <div class="artist">
                    <div class="artist-name">Cinder & Ash</div>
                </div>
                <div class="artist">
                    <div class="artist-name">The Glass Dunes</div>
                </div>
            </div>
            <div style="text-align: center;">
                <span class="phase-badge">Phase 2 Lineup — March 2027</span>
            </div>
        </div>
    </div>
</body>
</html>
