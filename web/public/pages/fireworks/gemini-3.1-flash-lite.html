<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/**
 * FIREWORKS FINALE
 * Framerate-independent animation using requestAnimationFrame timestamps.
 * Self-contained, canvas 2D, no external assets.
 */
try {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let width, height;

    // Configuration
    const PARTICLE_LIMIT = 2000;
    const GRAVITY = 0.05;
    const FRICTION = 0.98;
    
    // State
    const fireworks = [];
    const particles = [];
    const stars = [];
    let buildings = [];

    // Resize handler
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        // Regenerate skyline
        buildings = [];
        let x = 0;
        while (x < width) {
            const w = 40 + Math.random() * 80;
            const h = 50 + Math.random() * (height * 0.15);
            buildings.push({ x, w, h });
            x += w + 2;
        }
        
        // Regenerate stars
        stars.length = 0;
        for(let i=0; i<100; i++) {
            stars.push({ x: Math.random() * width, y: Math.random() * height * 0.7, r: Math.random() * 1.5 });
        }
    }
    window.addEventListener('resize', resize);
    resize();

    class Firework {
        constructor(time, spawnY = height + 10) {
            this.start = time;
            this.x = Math.random() * width * 0.8 + 0.1 * width;
            this.y = spawnY;
            this.targetY = Math.random() * (height * 0.4) + height * 0.05;
            this.speed = -8 - Math.random() * 4;
            this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            this.exploded = false;
        }
        update(t) {
            this.y += this.speed;
            if (this.y <= this.targetY) {
                this.exploded = true;
                explode(this.x, this.y, this.color);
            }
        }
        draw() {
            ctx.beginPath();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x, this.y + 10);
            ctx.stroke();
        }
    }

    function explode(x, y, color) {
        const count = 60 + Math.random() * 40;
        const type = Math.random();
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 1;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                color,
                life: 1.0,
                decay: 0.01 + Math.random() * 0.02
            });
        }
    }

    // Seed initial fireworks so show is in progress
    for (let i = 0; i < 5; i++) {
        fireworks.push(new Firework(performance.now(), Math.random() * height * 0.5 + height * 0.4));
    }

    function animate(now) {
        // Fade trails
        ctx.fillStyle = 'rgba(0, 5, 15, 0.2)';
        ctx.fillRect(0, 0, width, height);

        // Draw sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, '#02050A');
        grad.addColorStop(1, '#0A1A2A');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        // Draw stars
        ctx.fillStyle = '#fff';
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });

        // Skyline
        ctx.fillStyle = '#08080C';
        buildings.forEach(b => {
            ctx.fillRect(b.x, height - b.h, b.w, b.h);
            // Tiny windows
            if (Math.random() > 0.98) {
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(b.x + 5, height - b.h + 10, 5, 5);
                ctx.fillStyle = '#08080C';
            }
        });

        // Spawn logic
        if (Math.random() < 0.03) {
            fireworks.push(new Firework(now));
        }

        // Update / Draw Fireworks
        for (let i = fireworks.length - 1; i >= 0; i--) {
            const f = fireworks[i];
            f.update(now);
            f.draw();
            if (f.exploded) fireworks.splice(i, 1);
        }

        // Update / Draw Particles
        ctx.globalCompositeOperation = 'lighter';
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.vx *= FRICTION;
            p.vy *= FRICTION;
            p.vy += GRAVITY;
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.decay;

            if (p.life <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';

        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

} catch(e) {
    console.error(e);
}
</script>
</body>
</html>
