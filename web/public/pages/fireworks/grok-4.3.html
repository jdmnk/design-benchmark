<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fireworks Finale</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#000; }
canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: true });

let W = 0, H = 0;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

const SKYLINE_HEIGHT = 0.18;
const skyGradient = ctx.createLinearGradient(0, 0, 0, H * 0.82);
skyGradient.addColorStop(0, '#0a0c1f');
skyGradient.addColorStop(0.4, '#0f1329');
skyGradient.addColorStop(1, '#05070f');

let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.78,
      size: Math.random() * 1.6 + 0.6
    });
  }
}
initStars();

let buildings = [];
function initBuildings() {
  buildings = [];
  const count = Math.floor(W / 18) + 3;
  let x = 0;
  for (let i = 0; i < count; i++) {
    const w = 22 + Math.random() * 38;
    const h = 0.06 + Math.random() * 0.12;
    buildings.push({ x, w, h, windows: Math.floor(w / 5) });
    x += w + (Math.random() * 6 - 1);
  }
}
initBuildings();

let particles = [];
let bursts = [];

function createRocket(x, y, targetY, color, type) {
  return {
    type: 'rocket',
    x, y,
    vx: (Math.random() - 0.5) * 0.6,
    vy: -3.2 - Math.random() * 1.4,
    targetY,
    color,
    trail: [],
    exploded: false,
    burstType: type || (Math.random() * 3 | 0)
  };
}

function explode(rocket) {
  const count = rocket.burstType === 0 ? 68 : rocket.burstType === 1 ? 52 : 76;
  const speedBase = rocket.burstType === 2 ? 3.8 : 5.2;
  const newSparks = [];
  
  for (let i = 0; i < count; i++) {
    let angle = (i / count) * Math.PI * 2;
    let speed = speedBase * (0.6 + Math.random() * 0.75);
    
    if (rocket.burstType === 1) { // ring
      angle = (i / count) * Math.PI * 2;
      speed = speedBase * (0.95 + Math.random() * 0.15);
    } else if (rocket.burstType === 2) { // willow
      speed = speedBase * (0.45 + Math.random() * 0.6);
    }
    
    newSparks.push({
      type: 'spark',
      x: rocket.x,
      y: rocket.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed * 0.75,
      color: rocket.color,
      life: rocket.burstType === 2 ? 92 : 58,
      maxLife: rocket.burstType === 2 ? 92 : 58,
      size: rocket.burstType === 2 ? 1.9 : 2.1,
      trail: [],
      gravity: rocket.burstType === 2 ? 0.028 : 0.018,
      isWillow: rocket.burstType === 2
    });
  }
  
  particles.push(...newSparks);
  
  bursts.push({
    x: rocket.x,
    y: rocket.y,
    time: 0,
    maxTime: 14,
    color: rocket.color,
    size: rocket.burstType === 2 ? 18 : 32
  });
}

function seedInitialBursts(t) {
  const num = 5;
  for (let i = 0; i < num; i++) {
    const x = 80 + Math.random() * (W - 160);
    const progress = (i % 3) / 3;
    const startY = H * 0.35 + progress * (H * 0.4);
    const rocket = createRocket(
      x,
      startY,
      H * 0.18 + Math.random() * (H * 0.25),
      ['#ffcc33', '#ff3366', '#33ccff', '#cc66ff', '#66ff99'][i % 5],
      i % 3
    );
    rocket.vy = -2.1 - Math.random();
    rocket.trail = Array.from({ length: 5 }, () => ({ x: rocket.x, y: rocket.y }));
    particles.push(rocket);
  }
}

let lastSpawn = 0;
function spawnRocket(t) {
  if (t - lastSpawn < 280) return;
  lastSpawn = t;
  
  const x = 60 + Math.random() * (W - 120);
  const color = ['#ffcc33', '#ff3366', '#33ccff', '#cc66ff', '#66ff99'][Math.random() * 5 | 0];
  const type = Math.random() * 3 | 0;
  const rocket = createRocket(x, H * 0.78, H * 0.18 + Math.random() * H * 0.3, color, type);
  particles.push(rocket);
}

function updateAndDraw(timestamp) {
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0, 0, W, H);
  
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 0.75;
  for (const s of stars) {
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
  
  ctx.fillStyle = 'rgba(5,7,15,0.38)';
  ctx.fillRect(0, 0, W, H);
  
  const skylineY = H * (1 - SKYLINE_HEIGHT);
  
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    
    if (p.type === 'rocket') {
      p.x += p.vx;
      p.y += p.vy;
      p.vy *= 0.995;
      
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 7) p.trail.shift();
      
      if (p.y <= p.targetY || p.vy > -0.4) {
        explode(p);
        particles.splice(i, 1);
        continue;
      }
      
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let j = 1; j < p.trail.length; j++) {
        ctx.lineTo(p.trail[j].x, p.trail[j].y);
      }
      ctx.stroke();
      
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(p.x - 1.3, p.y - 1.3, 2.6, 2.6);
    } else {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.995;
      
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 5) p.trail.shift();
      
      p.life--;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      
      const alpha = p.life / p.maxLife;
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = alpha * 0.9;
      ctx.lineWidth = p.size * 0.9;
      if (p.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let j = 1; j < p.trail.length; j++) ctx.lineTo(p.trail[j].x, p.trail[j].y);
        ctx.stroke();
      }
      
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }
  
  ctx.globalCompositeOperation = 'lighter';
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i];
    b.time++;
    const prog = b.time / b.maxTime;
    const alpha = 1 - prog;
    
    ctx.fillStyle = b.color;
    ctx.globalAlpha = alpha * 0.65;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size * (1 + prog * 0.6), 0, Math.PI * 2);
    ctx.fill();
    
    if (b.time > b.maxTime) bursts.splice(i, 1);
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  
  ctx.fillStyle = '#02040a';
  ctx.fillRect(0, skylineY, W, H);
  
  ctx.fillStyle = '#05070f';
  for (let i = 0; i < buildings.length; i++) {
    const b = buildings[i];
    const bh = b.h * H;
    ctx.fillRect(b.x, skylineY - bh, b.w, bh);
    
    ctx.fillStyle = '#112233';
    const winH = 2.5;
    for (let w = 2; w < b.w - 3; w += 5) {
      if (Math.random() < 0.65) {
        ctx.fillRect(b.x + w, skylineY - bh * (0.3 + Math.random() * 0.55), 2.4, winH);
      }
    }
    ctx.fillStyle = '#05070f';
  }
  
  ctx.fillStyle = 'rgba(255,240,200,0.06)';
  for (const b of bursts) {
    if (b.time < 6) {
      ctx.fillRect(0, skylineY - 6, W, 12);
    }
  }
  
  if (particles.length < 2100) {
    spawnRocket(timestamp);
  }
  
  const active = particles.filter(p => p.type === 'rocket' || p.life > 25).length;
  if (active < 3) {
    const x = W * 0.2 + Math.random() * W * 0.6;
    particles.push(createRocket(x, H * 0.72, H * 0.22, '#ffcc33', Math.random() * 3 | 0));
  }
}

let started = false;
function loop(t) {
  if (!started) {
    seedInitialBursts(t);
    started = true;
    lastSpawn = t;
  }
  updateAndDraw(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
