<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let startTime = performance.now();

// Particle pool
const particles = [];
const rockets = [];

const colors = [
  '#FFD700', '#FFA500', '#FF4500', // golds, oranges, reds
  '#FF1744', '#E81E63', '#9C27B0',  // reds, pinks, purples
  '#7C4DFF', '#2196F3', '#00BCD4',  // blues, cyans
  '#00FF41', '#76FF03', '#FFEA00'   // greens, yellows
];

const skyH = canvas.height * 0.82;  // Sky height (top 82%)
const horizonY = canvas.height * 0.82;  // Horizon where skyline starts

// Manage total particle count
const MAX_PARTICLES = 2500;

function clamp(x, min, max) {
  return Math.min(Math.max(x, min), max);
}

function createStar() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * skyH * 0.7,
    radius: Math.random() * 0.8,
    alpha: Math.random() * 0.5 + 0.3,
    twinklePhase: Math.random() * Math.PI * 2
  };
}

const stars = Array.from({ length: 40 }, createStar);

function drawSkyline() {
  ctx.save();
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);
  
  // Draw procedural buildings
  let x = 0;
  const baselineY = horizonY;
  while (x < canvas.width) {
    const buildingHeight = Math.random() * (skyH * 0.4) + (skyH * 0.15);
    const buildingWidth = Math.random() * 60 + 40;
    const buildingColor = `hsl(0, 0%, ${Math.random() * 10 + 5}%)`;
    
    ctx.fillStyle = buildingColor;
    ctx.fillRect(x, baselineY - buildingHeight, buildingWidth, buildingHeight);
    
    // Tiny lit windows
    if (Math.random() > 0.3) {
      const windowRows = Math.floor((buildingHeight - 10) / 15);
      const windowCols = Math.floor((buildingWidth - 8) / 12);
      for (let i = 0; i < windowRows; i++) {
        for (let j = 0; j < windowCols; j++) {
          if (Math.random() > 0.4) {
            const wx = x + j * 12 + 4;
            const wy = baselineY - buildingHeight + 10 + i * 15;
            ctx.fillStyle = Math.random() > 0.5 ? '#FFE680' : '#1a1a2e';
            ctx.fillRect(wx, wy, 6, 6);
          }
        }
      }
    }
    
    x += buildingWidth;
  }
  
  ctx.restore();
}

function drawStars(time) {
  ctx.save();
  stars.forEach(star => {
    const twinkle = Math.sin(time * 0.0005 + star.twinklePhase) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha * twinkle * 0.6})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

function drawSky() {
  // Background gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, horizonY);
  gradient.addColorStop(0, '#0a0a2e');
  gradient.addColorStop(1, '#16213e');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, horizonY);
}

class Particle {
  constructor(x, y, vx, vy, color, type = 'spark') {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.type = type;
    this.lifetime = 2000 + Math.random() * 1000; // ms
    this.maxLifetime = this.lifetime;
    this.size = Math.random() * 3 + 1;
    this.gravity = 0.15;
    this.trailX = [x];
    this.trailY = [y];
  }

  update(dt) {
    this.lifetime -= dt;
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    
    if (this.trailX.length > 8) {
      this.trailX.shift();
      this.trailY.shift();
    }
    this.trailX.push(this.x);
    this.trailY.push(this.y);
  }

  draw(ctx) {
    const alpha = Math.max(0, this.lifetime / this.maxLifetime);
    
    // Draw trail
    if (this.trailX.length > 1) {
      ctx.strokeStyle = `rgba(${this.hexToRgb(this.color)}, ${alpha * 0.4})`;
      ctx.lineWidth = this.size * 0.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(this.trailX[0], this.trailY[0]);
      for (let i = 1; i < this.trailX.length; i++) {
        ctx.lineTo(this.trailX[i], this.trailY[i]);
      }
      ctx.stroke();
    }
    
    // Draw particle with glow
    const glowSize = this.size * 2.5;
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
    gradient.addColorStop(0, `rgba(${this.hexToRgb(this.color)}, ${alpha * 0.8})`);
    gradient.addColorStop(1, `rgba(${this.hexToRgb(this.color)}, 0)`);
    
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    
    ctx.fillStyle = `rgba(${this.hexToRgb(this.color)}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }

  hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    if (!result) return '255, 200, 0';
    return [
      parseInt(result[1], 16),
      parseInt(result[2], 16),
      parseInt(result[3], 16)
    ].join(', ');
  }

  isAlive() {
    return this.lifetime > 0 && this.y < canvas.height;
  }
}

class Rocket {
  constructor(x, y, targetY, color) {
    this.x = x;
    this.y = y;
    this.targetY = targetY;
    this.color = color;
    this.speed = 8;
    this.exploded = false;
    this.trailX = [x];
    this.trailY = [y];
  }

  update(dt) {
    if (!this.exploded) {
      const dist = this.targetY - this.y;
      if (Math.abs(dist) > this.speed) {
        this.y -= this.speed;
        this.trailX.push(this.x);
        this.trailY.push(this.y);
        if (this.trailX.length > 30) {
          this.trailX.shift();
          this.trailY.shift();
        }
      } else {
        this.explode();
      }
    }
  }

  explode() {
    if (!this.exploded) {
      this.exploded = true;
      const burstType = Math.random();
      const particleCount = Math.random() * 40 + 80;
      
      if (burstType < 0.33) {
        // Peony (spherical burst)
        for (let i = 0; i < particleCount; i++) {
          const angle = (i / particleCount) * Math.PI * 2;
          const speed = Math.random() * 6 + 2;
          const vx = Math.cos(angle) * speed;
          const vy = Math.sin(angle) * speed;
          const particle = new Particle(this.x, this.y, vx, vy, this.color, 'peony');
          if (particles.length < MAX_PARTICLES) particles.push(particle);
        }
      } else if (burstType < 0.66) {
        // Ring (fast expanding circle)
        for (let i = 0; i < particleCount * 0.7; i++) {
          const angle = (i / (particleCount * 0.7)) * Math.PI * 2;
          const speed = Math.random() * 8 + 4;
          const vx = Math.cos(angle) * speed;
          const vy = Math.sin(angle) * speed - 1;
          const particle = new Particle(this.x, this.y, vx, vy, this.color, 'ring');
          if (particles.length < MAX_PARTICLES) particles.push(particle);
        }
      } else {
        // Willow (drooping, slower)
        for (let i = 0; i < particleCount; i++) {
          const angle = (i / particleCount) * Math.PI * 2;
          const speed = Math.random() * 4 + 1;
          const vx = Math.cos(angle) * speed;
          const vy = Math.sin(angle) * speed + 1;
          const particle = new Particle(this.x, this.y, vx, vy, this.color, 'willow');
          if (particles.length < MAX_PARTICLES) particles.push(particle);
        }
      }
    }
  }

  draw(ctx) {
    if (!this.exploded) {
      // Draw rocket trail
      ctx.strokeStyle = `rgba(255, 200, 100, 0.6)`;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(this.trailX[0], this.trailY[0]);
      for (let i = 1; i < this.trailX.length; i++) {
        ctx.lineTo(this.trailX[i], this.trailY[i]);
      }
      ctx.stroke();
      
      // Draw rocket
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  isAlive() {
    return !this.exploded || true; // Rockets stay alive for drawing, but are removed after explosion
  }
}

function spawnRocket() {
  const x = Math.random() * canvas.width * 0.6 + canvas.width * 0.2;
  const targetY = Math.random() * (skyH * 0.4) + (skyH * 0.15);
  const color = colors[Math.floor(Math.random() * colors.length)];
  const rocket = new Rocket(x, canvas.height, targetY, color);
  rockets.push(rocket);
}

function update(dt) {
  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt);
    if (!particles[i].isAlive()) {
      particles.splice(i, 1);
    }
  }
  
  // Update rockets
  for (let i = rockets.length - 1; i >= 0; i--) {
    rockets[i].update(dt);
    if (rockets[i].exploded && rockets[i].y < 0) {
      rockets.splice(i, 1);
    }
  }
}

function draw(time) {
  // Draw sky and stars first (never blank)
  drawSky();
  drawStars(time);
  
  // Fade trails with translucent rect
  ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
  ctx.fillRect(0, 0, canvas.width, horizonY);
  
  // Draw particles and rockets
  particles.forEach(p => p.draw(ctx));
  rockets.forEach(r => r.draw(ctx));
  
  // Draw skyline on top
  drawSkyline();
}

let lastSpawnTime = 0;
const SPAWN_INTERVAL = 350; // ms between new rockets

function animate(time) {
  const elapsed = time - startTime;
  const dt = 16; // ~60fps frame time
  
  update(dt);
  
  // Spawn new rockets on schedule
  if (elapsed - lastSpawnTime > SPAWN_INTERVAL) {
    spawnRocket();
    lastSpawnTime = elapsed;
  }
  
  draw(time);
  
  requestAnimationFrame(animate);
}

// Seed initial bursts so show is in progress at t=0
try {
  for (let i = 0; i < 4; i++) {
    spawnRocket();
    lastSpawnTime = -SPAWN_INTERVAL * (5 - i);
  }
  // Advance them
  for (let step = 0; step < 80; step++) {
    rockets.forEach(r => r.update(16));
    rockets.forEach(r => {
      if (r.exploded) r.explode();
    });
    particles.forEach(p => p.update(16));
  }
} catch (e) {
  console.error('Setup error:', e);
}

// Handle window resize
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

requestAnimationFrame(animate);
</script>
</body>
</html>
