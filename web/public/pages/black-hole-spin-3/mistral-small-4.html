<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gargantua</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module">
    try {
      const bhRadius = 2.15;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setClearColor(0x05050a);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      camera.position.set(0, bhRadius * 0.57, 10);
      camera.lookAt(0, 0, 0);

      // Starfield
      const starsGeometry = new THREE.BufferGeometry();
      const starCount = 2000;
      const positions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const i3 = i * 3;
        positions[i3] = (Math.random() - 0.5) * 100;
        positions[i3 + 1] = (Math.random() - 0.5) * 100;
        positions[i3 + 2] = (Math.random() - 0.5) * 100;
      }
      starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const stars = new THREE.Points(starsGeometry, new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.8,
        transparent: true,
        opacity: 0.3
      }));
      scene.add(stars);

      // Black hole
      const blackHoleGeometry = new THREE.SphereGeometry(bhRadius, 64, 64);
      const blackHoleMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
      const blackHole = new THREE.Mesh(blackHoleGeometry, blackHoleMaterial);
      scene.add(blackHole);

      // Photon ring
      const photonRingGeometry = new THREE.TorusGeometry(bhRadius * 1.1, bhRadius * 0.05, 32, 128);
      const photonRingMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffdd,
        emissive: 0xffffdd,
        emissiveIntensity: 1.8,
        blending: THREE.AdditiveBlending,
        transparent: true
      });
      const photonRing = new THREE.Mesh(photonRingGeometry, photonRingMaterial);
      scene.add(photonRing);

      // Disk shader material
      const diskVertexShader = `
        varying vec3 vWorldPosition;
        void main() {
          vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

      const diskFragmentShader = `
        uniform float time;
        varying vec3 vWorldPosition;

        void main() {
          float r = length(vWorldPosition.xy);
          float angle = atan(vWorldPosition.y, vWorldPosition.x);

          vec3 innerColor = vec3(1.0, 0.95, 0.81);   // #fff3d0
          vec3 midColor = vec3(1.0, 0.68, 0.23);     // #ffae3b
          vec3 outerColor = vec3(0.78, 0.33, 0.10);   // #c8551a

          vec3 color;
          if (r < bhRadius * 1.2) {
            color = innerColor;
          } else if (r < bhRadius * 1.5) {
            color = mix(innerColor, midColor, (r - bhRadius * 1.2) / (bhRadius * 0.3));
          } else {
            color = mix(midColor, outerColor, (r - bhRadius * 1.5) / (bhRadius * 3.0));
          }

          float pattern = 1.0 + 0.25 * (
            sin(5.0 * angle + time * 4.0) * 0.6 +
            sin(12.0 * angle + time * 2.0) * 0.4
          );

          float beaming = 1.0 + 0.35 * cos(angle - time * 0.5);
          float shimmer = 1.0 + 0.1 * sin(time * 2.5) * sin(time * 1.3);

          float intensity = pattern * beaming * shimmer;
          gl_FragColor = vec4(color * intensity, intensity * 0.25);
        }
      `;

      const diskMaterial = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 } },
        vertexShader: diskVertexShader,
        fragmentShader: diskFragmentShader,
        blending: THREE.AdditiveBlending,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false
      });

      // Main accretion disk
      const diskGeometry = new THREE.TorusGeometry(bhRadius * 3.0, bhRadius * 0.5, 64, 512);
      const accretionDisk = new THREE.Mesh(diskGeometry, diskMaterial);
      scene.add(accretionDisk);

      // Top lensing arc
      const topArcGeometry = new THREE.TorusGeometry(bhRadius * 3.5, bhRadius * 0.25, 16, 256, Math.PI);
      const topArcMaterial = diskMaterial.clone();
      topArcMaterial.uniforms = THREE.UniformsUtils.clone(diskMaterial.uniforms);
      const topArc = new THREE.Mesh(topArcGeometry, topArcMaterial);
      topArc.rotation.x = -Math.PI / 2;
      topArc.position.z = bhRadius * 1.2;
      scene.add(topArc);

      // Bottom lensing arc
      const bottomArcGeometry = new THREE.TorusGeometry(bhRadius * 3.5, bhRadius * 0.25, 16, 256, Math.PI);
      const bottomArcMaterial = diskMaterial.clone();
      bottomArcMaterial.uniforms = THREE.UniformsUtils.clone(diskMaterial.uniforms);
      const bottomArc = new THREE.Mesh(bottomArcGeometry, bottomArcMaterial);
      bottomArc.rotation.x = Math.PI / 2;
      bottomArc.position.z = -bhRadius * 1.2;
      scene.add(bottomArc);

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        const time = performance.now() * 0.001;
        const diskRotationSpeed = 0.52; // ~30 degrees/second

        accretionDisk.rotation.y = time * diskRotationSpeed;
        diskMaterial.uniforms.time.value = time;
        topArcMaterial.uniforms.time.value = time;
        bottomArcMaterial.uniforms.time.value = time;

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

    } catch (e) {
      console.error(e);
      const err = document.createElement('div');
      err.style.position = 'absolute';
      err.style.top = '0';
      err.style.left = '0';
      err.style.width = '100%';
      err.style.padding = '1rem';
      err.style.backgroundColor = 'rgba(0,0,0,0.8)';
      err.style.color = 'white';
      err.style.fontFamily = 'sans-serif';
      err.style.textAlign = 'center';
      err.style.zIndex = '1000';
      err.textContent = 'Error: ' + (e.message || e.toString());
      document.body.appendChild(err);
    }
  </script>
</body>
</html>
