<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;
        let blackHole, photonRing, disk, upperArc, lowerArc;
        let diskTexture;
        let startTime = performance.now();

        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 1200;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                // Sparse stars in a large sphere
                const radius = 40 + Math.random() * 60;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);
                
                const brightness = 0.3 + Math.random() * 0.5;
                colors[i] = brightness;
                colors[i + 1] = brightness;
                colors[i + 2] = brightness;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const starsMaterial = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                depthWrite: false
            });
            
            return new THREE.Points(starsGeometry, starsMaterial);
        }

        function createAccretionDisk() {
            // Create canvas texture with azimuthal structure and color gradient
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 64;
            const ctx = canvas.getContext('2d', { alpha: true });
            
            const grad = ctx.createLinearGradient(0, 0, 0, 64);
            grad.addColorStop(0, '#c8551a');
            grad.addColorStop(0.3, '#ffae3b');
            grad.addColorStop(0.6, '#fff3d0');
            grad.addColorStop(1, '#c8551a');
            
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1024, 64);
            
            // Add azimuthal clumps and streaks
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            for (let i = 0; i < 18; i++) {
                const x = Math.random() * 1024;
                const w = 20 + Math.random() * 60;
                ctx.fillRect(x, 8 + Math.random() * 48, w, 4 + Math.random() * 8);
            }
            
            // Brighter side for relativistic beaming (left side of texture)
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            ctx.fillRect(0, 0, 280, 64);
            
            diskTexture = new THREE.CanvasTexture(canvas);
            diskTexture.wrapS = THREE.RepeatWrapping;
            diskTexture.wrapT = THREE.ClampToEdgeWrapping;
            
            const geometry = new THREE.TorusGeometry(2.8, 0.22, 2, 128);
            const material = new THREE.MeshBasicMaterial({
                map: diskTexture,
                transparent: true,
                opacity: 0.95,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            
            const torus = new THREE.Mesh(geometry, material);
            torus.rotation.x = Math.PI / 2; // Make it horizontal (XZ plane)
            return torus;
        }

        function createLensingArcs() {
            // Upper arc (bent over top)
            const upperGeo = new THREE.TorusGeometry(2.75, 0.13, 2, 96, Math.PI * 0.9);
            const upperMat = new THREE.MeshBasicMaterial({
                color: 0xfff3d0,
                transparent: true,
                opacity: 0.85,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const upper = new THREE.Mesh(upperGeo, upperMat);
            upper.rotation.x = Math.PI / 2;
            upper.rotation.z = 0.6;
            
            // Lower arc (mirrored under)
            const lowerGeo = new THREE.TorusGeometry(2.75, 0.13, 2, 96, Math.PI * 0.9);
            const lowerMat = new THREE.MeshBasicMaterial({
                color: 0xfff3d0,
                transparent: true,
                opacity: 0.85,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const lower = new THREE.Mesh(lowerGeo, lowerMat);
            lower.rotation.x = Math.PI / 2;
            lower.rotation.z = -0.6;
            
            return { upper, lower };
        }

        function init() {
            try {
                scene = new THREE.Scene();
                
                camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 200);
                // Position slightly above the disk plane for near edge-on view
                camera.position.set(0, 0.85, 7.8);
                camera.lookAt(0, 0, 0);
                
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: false,
                    powerPreference: "high-performance"
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setClearColor(0x000000, 1);
                document.body.appendChild(renderer.domElement);
                
                // Black hole (event horizon)
                const bhGeometry = new THREE.SphereGeometry(1.0, 48, 48);
                const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
                blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
                scene.add(blackHole);
                
                // Photon ring
                const ringGeometry = new THREE.TorusGeometry(1.08, 0.025, 3, 128);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0xfff8e7,
                    transparent: true,
                    opacity: 0.95,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                photonRing = new THREE.Mesh(ringGeometry, ringMaterial);
                photonRing.rotation.x = Math.PI / 2;
                scene.add(photonRing);
                
                // Accretion disk
                disk = createAccretionDisk();
                scene.add(disk);
                
                // Lensing arcs
                const arcs = createLensingArcs();
                upperArc = arcs.upper;
                lowerArc = arcs.lower;
                scene.add(upperArc);
                scene.add(lowerArc);
                
                // Starfield
                const stars = createStarfield();
                scene.add(stars);
                
                // Start render loop immediately
                animate();
                
                // Handle resize
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
                
            } catch (e) {
                console.error(e);
                // Fallback: show black background
                document.body.style.background = '#000';
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = (performance.now() - startTime) / 1000;
            
            // Disk rotation: ~32 deg/sec
            const rotationSpeed = 0.56; // rad/sec
            if (disk) {
                disk.rotation.z = time * rotationSpeed;
            }
            
            // Subtle flickering in disk and arcs
            const flicker = 0.88 + Math.sin(time * 7.5) * 0.06 + Math.sin(time * 13.2) * 0.04;
            if (disk && disk.material) {
                disk.material.opacity = 0.92 * flicker;
            }
            
            const arcFlicker = 0.78 + Math.sin(time * 9.3) * 0.09;
            if (upperArc && upperArc.material) {
                upperArc.material.opacity = 0.82 * arcFlicker;
            }
            if (lowerArc && lowerArc.material) {
                lowerArc.material.opacity = 0.82 * arcFlicker;
            }
            
            // Slow drift in beaming highlight (rotate texture offset)
            if (disk && disk.material.map) {
                disk.material.map.offset.x = (time * 0.03) % 1;
            }
            
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
