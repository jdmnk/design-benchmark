<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gargantua Black Hole</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.FogExp2(0x000000, 0.03);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(0, 0.63, 6.0); // ~6 degrees above the disk plane
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  renderer.setClearColor(0x000000, 1);
  document.body.appendChild(renderer.domElement);

  // Lighting-free emissive scene for reliability in software WebGL.
  const root = new THREE.Group();
  scene.add(root);

  // Black hole event horizon
  const horizonRadius = 0.75;
  const horizon = new THREE.Mesh(
    new THREE.SphereGeometry(horizonRadius, 48, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  root.add(horizon);

  // Photon ring hugging the edge
  const photonRing = new THREE.Mesh(
    new THREE.TorusGeometry(horizonRadius * 1.02, 0.03, 10, 160),
    new THREE.MeshBasicMaterial({
      color: 0xfff0c8,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  photonRing.rotation.x = Math.PI / 2;
  root.add(photonRing);

  // Procedural disk texture
  function makeDiskTexture() {
    const c = document.createElement('canvas');
    c.width = 2048;
    c.height = 256;
    const ctx = c.getContext('2d');
    const img = ctx.createImageData(c.width, c.height);

    for (let y = 0; y < c.height; y++) {
      const v = y / (c.height - 1); // 0..1 across thickness
      const edgeGlow = Math.pow(1.0 - Math.abs(v - 0.5) * 2.0, 2.2);
      for (let x = 0; x < c.width; x++) {
        const u = x / c.width;

        const beam = 0.72 + 0.28 * Math.sin((u * Math.PI * 2.0) + 0.8);
        const clump =
          0.5
          + 0.18 * Math.sin(u * Math.PI * 18.0 + v * Math.PI * 5.0)
          + 0.10 * Math.sin(u * Math.PI * 41.0 + 1.7)
          + 0.08 * Math.sin(u * Math.PI * 83.0 + 4.1);

        const inner = Math.max(0, 1.0 - Math.abs(v - 0.5) * 2.35);
        const hot = Math.pow(inner, 2.8);

        let r = (255 * (0.25 + 0.85 * hot)) * clump;
        let g = (243 * (0.18 + 0.78 * hot)) * clump;
        let b = (208 * (0.11 + 0.42 * hot)) * clump;

        // White-yellow inner edge, amber mid, orange outer
        const warmMix = hot;
        r = r * (0.75 + 0.35 * warmMix) + 255 * 0.25 * edgeGlow;
        g = g * (0.78 + 0.18 * warmMix) + 240 * 0.18 * edgeGlow;
        b = b * (0.88 - 0.35 * warmMix) + 180 * 0.06 * edgeGlow;

        // Fade outwards
        const fade = 0.08 + 0.92 * Math.pow(1.0 - Math.abs(v - 0.5) * 1.9, 1.55);
        r *= fade * beam;
        g *= fade * beam;
        b *= fade * beam;

        const idx = (y * c.width + x) * 4;
        img.data[idx + 0] = Math.min(255, r);
        img.data[idx + 1] = Math.min(255, g);
        img.data[idx + 2] = Math.min(255, b);
        img.data[idx + 3] = Math.min(255, 255 * (0.85 * fade));
      }
    }

    ctx.putImageData(img, 0, 0);

    // Add brighter streaks and turbulence
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < 24; i++) {
      const y = 40 + Math.random() * 170;
      const h = 3 + Math.random() * 18;
      const x = Math.random() * c.width;
      const w = 60 + Math.random() * 220;
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, 'rgba(255,243,208,0)');
      grad.addColorStop(0.5, 'rgba(255,243,208,0.65)');
      grad.addColorStop(1, 'rgba(255,174,59,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x - w * 0.5, y, w, h);
    }

    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.repeat.set(1.0, 1.0);
    tex.needsUpdate = true;
    return tex;
  }

  const diskTex = makeDiskTexture();

  // Main accretion disk band
  const disk = new THREE.Mesh(
    new THREE.TorusGeometry(1.95, 0.20, 22, 420),
    new THREE.MeshBasicMaterial({
      map: diskTex,
      color: 0xffffff,
      transparent: true,
      opacity: 0.95,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.NormalBlending
    })
  );
  disk.rotation.x = Math.PI / 2;
  root.add(disk);

  // Additional thin bright band to sharpen the apparent disk plane
  const thinBand = new THREE.Mesh(
    new THREE.TorusGeometry(1.92, 0.09, 18, 420),
    new THREE.MeshBasicMaterial({
      color: 0xffd9a0,
      transparent: true,
      opacity: 0.38,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  thinBand.rotation.x = Math.PI / 2;
  root.add(thinBand);

  // Lensing arcs: bright curved far-side light above and below the horizon
  function makeArc(points, color, opacity, scaleY) {
    const curve = new THREE.CatmullRomCurve3(points);
    const geo = new THREE.TubeGeometry(curve, 120, 0.065, 10, false);
    const mat = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.scale.y = scaleY;
    return mesh;
  }

  const topArc = makeArc(
    [
      new THREE.Vector3(-2.45, 0.02, 0),
      new THREE.Vector3(-1.55, 0.56, 0),
      new THREE.Vector3(-0.6, 0.92, 0),
      new THREE.Vector3(0.6, 0.92, 0),
      new THREE.Vector3(1.55, 0.56, 0),
      new THREE.Vector3(2.45, 0.02, 0)
    ],
    0xfff2ce,
    0.85,
    1.0
  );
  root.add(topArc);

  const bottomArc = makeArc(
    [
      new THREE.Vector3(-2.45, -0.02, 0),
      new THREE.Vector3(-1.55, -0.56, 0),
      new THREE.Vector3(-0.6, -0.92, 0),
      new THREE.Vector3(0.6, -0.92, 0),
      new THREE.Vector3(1.55, -0.56, 0),
      new THREE.Vector3(2.45, -0.02, 0)
    ],
    0xffa945,
    0.68,
    1.0
  );
  root.add(bottomArc);

  // Subtle far-side halo ring pieces to strengthen the Interstellar-like wrap
  const haloUpper = new THREE.Mesh(
    new THREE.TorusGeometry(2.05, 0.045, 8, 220, Math.PI * 0.95),
    new THREE.MeshBasicMaterial({
      color: 0xfff0c8,
      transparent: true,
      opacity: 0.22,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  haloUpper.rotation.x = Math.PI / 2;
  haloUpper.position.y = 0.62;
  root.add(haloUpper);

  const haloLower = new THREE.Mesh(
    new THREE.TorusGeometry(2.05, 0.045, 8, 220, Math.PI * 0.95),
    new THREE.MeshBasicMaterial({
      color: 0xffa53b,
      transparent: true,
      opacity: 0.18,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  haloLower.rotation.x = Math.PI / 2;
  haloLower.position.y = -0.62;
  root.add(haloLower);

  // Sparse starfield
  const starCount = 1400;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 30 + Math.random() * 60;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    starPos[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = r * Math.cos(phi) * 0.55;
    starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({
    color: 0xbfd6ff,
    size: 0.04,
    transparent: true,
    opacity: 0.55,
    depthWrite: false
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  const clockStart = performance.now();

  function animate(now) {
    const t = (now - clockStart) * 0.001;

    // Disk rotation: ~30 degrees/sec
    const rot = t * THREE.MathUtils.degToRad(30);
    disk.rotation.y = rot;
    thinBand.rotation.y = -rot * 0.96;
    photonRing.rotation.z = t * 0.22;
    topArc.rotation.y = rot * 0.24;
    bottomArc.rotation.y = -rot * 0.19;
    haloUpper.rotation.z = t * 0.08;
    haloLower.rotation.z = -t * 0.06;

    // Animated clumps / shimmer
    diskTex.offset.x = (t * 0.028) % 1;
    diskTex.needsUpdate = true;

    disk.material.opacity = 0.90 + 0.05 * Math.sin(t * 4.2);
    thinBand.material.opacity = 0.33 + 0.05 * Math.sin(t * 5.1 + 0.7);
    topArc.material.opacity = 0.80 + 0.07 * Math.sin(t * 3.2);
    bottomArc.material.opacity = 0.62 + 0.06 * Math.sin(t * 3.7 + 1.4);
    haloUpper.material.opacity = 0.18 + 0.05 * Math.sin(t * 2.8);
    haloLower.material.opacity = 0.14 + 0.04 * Math.sin(t * 3.0 + 2.0);
    photonRing.material.opacity = 0.88 + 0.05 * Math.sin(t * 6.0);

    // Beaming highlight drift
    const drift = 0.5 + 0.5 * Math.sin(t * 0.5);
    disk.material.color.setRGB(1.0, 0.97 - 0.05 * drift, 0.9 - 0.08 * drift);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  });

} catch (err) {
  document.body.innerHTML = '<pre style="color:#fff;padding:12px;white-space:pre-wrap">Error: ' + (err && err.message ? err.message : err) + '</pre>';
  console.error(err);
}
</script>
</body>
</html>
