<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jupiter</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #030407;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x030407, 1);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x030407);

  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 20);
  camera.position.set(0, 0, 5);

  function fitCamera() {
    const aspect = window.innerWidth / Math.max(1, window.innerHeight);
    const viewHeight = 2.56;
    camera.top = viewHeight / 2;
    camera.bottom = -viewHeight / 2;
    camera.left = -viewHeight * aspect / 2;
    camera.right = viewHeight * aspect / 2;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  fitCamera();

  const starCount = 520;
  const starPositions = new Float32Array(starCount * 3);
  const starColors = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 7 + Math.random() * 6;
    const a = Math.random() * Math.PI * 2;
    const y = (Math.random() - 0.5) * 7;
    starPositions[i * 3 + 0] = Math.cos(a) * r;
    starPositions[i * 3 + 1] = y;
    starPositions[i * 3 + 2] = -5 - Math.random() * 4;
    const b = 0.25 + Math.random() * 0.55;
    starColors[i * 3 + 0] = b * 0.9;
    starColors[i * 3 + 1] = b * 0.95;
    starColors[i * 3 + 2] = b;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
    size: 0.012,
    vertexColors: true,
    transparent: true,
    opacity: 0.65,
    depthWrite: false
  }));
  scene.add(stars);

  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(0.035, 20, 12),
    new THREE.MeshBasicMaterial({ color: 0xc7b89d })
  );
  moon.position.set(1.55, 0.64, -0.35);
  scene.add(moon);

  const glowMaterial = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uColor: { value: new THREE.Color(0xcaa878) }
    },
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec3 p = position * 1.035;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      uniform vec3 uColor;
      void main() {
        float rim = 1.0 - max(vNormal.z, 0.0);
        float a = smoothstep(0.38, 1.0, rim) * 0.15;
        gl_FragColor = vec4(uColor, a);
      }
    `
  });

  const planetMaterial = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uLight: { value: new THREE.Vector3(-0.58, 0.68, 0.46).normalize() }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vWorldNormal;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vWorldNormal = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vWorldNormal;
      uniform float uTime;
      uniform vec3 uLight;

      float hash(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
          mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x),
          u.y
        );
      }

      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        mat2 m = mat2(1.62, 1.18, -1.18, 1.62);
        for (int i = 0; i < 5; i++) {
          v += a * noise(p);
          p = m * p + 17.0;
          a *= 0.52;
        }
        return v;
      }

      vec3 zoneColor(float x) {
        vec3 ivory = vec3(0.86, 0.78, 0.61);
        vec3 cream = vec3(0.96, 0.88, 0.69);
        vec3 pale = vec3(0.78, 0.66, 0.47);
        return mix(mix(ivory, cream, smoothstep(0.1, 0.9, x)), pale, 0.18 * x);
      }

      vec3 beltColor(float x) {
        vec3 tan = vec3(0.61, 0.42, 0.24);
        vec3 ochre = vec3(0.74, 0.49, 0.24);
        vec3 rust = vec3(0.45, 0.20, 0.13);
        return mix(mix(tan, ochre, smoothstep(0.0, 0.7, x)), rust, smoothstep(0.45, 1.0, x));
      }

      float oval(vec2 p, vec2 c, vec2 r) {
        vec2 q = (p - c) / r;
        return length(q);
      }

      void main() {
        vec2 uv = vUv;
        float lat = uv.y;
        float lon = uv.x;
        float centeredLat = lat - 0.5;

        float bandSeed = floor(lat * 13.0);
        float bandDir = mod(bandSeed, 2.0) * 2.0 - 1.0;
        float bandSpeed = bandDir * (0.035 + 0.018 * sin(bandSeed * 1.73));
        float shear = sin(lat * 42.0 + uTime * 0.55) * 0.008;
        float x = lon + uTime * bandSpeed + shear;

        float warpA = fbm(vec2(x * 3.2 + uTime * 0.025, lat * 18.0));
        float warpB = fbm(vec2(x * 11.0 - uTime * 0.09, lat * 45.0 + warpA * 2.0));
        float raggedLat = lat + (warpA - 0.5) * 0.035 + (warpB - 0.5) * 0.018;

        float bands =
          sin(raggedLat * 62.0 + 0.8 * sin(raggedLat * 17.0)) +
          0.55 * sin(raggedLat * 31.0 - 0.7) +
          0.25 * sin(raggedLat * 103.0 + warpA * 2.4);
        float belt = smoothstep(-0.15, 0.55, bands);

        float fine = fbm(vec2(x * 42.0 + bandDir * uTime * 0.8, lat * 95.0));
        float wisps = fbm(vec2(x * 75.0 - bandDir * uTime * 1.1, lat * 34.0 + fine * 3.0));
        float boundary = 1.0 - smoothstep(0.12, 0.55, abs(fract(raggedLat * 12.5 + warpA * 0.25) - 0.5));
        belt = clamp(belt + (fine - 0.5) * 0.22 + boundary * (wisps - 0.5) * 0.35, 0.0, 1.0);

        vec3 zone = zoneColor(fine);
        vec3 beltCol = beltColor(wisps);
        vec3 color = mix(zone, beltCol, belt);

        float streaks = smoothstep(0.46, 0.96, fbm(vec2(x * 120.0, lat * 20.0 + uTime * bandDir * 0.22)));
        color += vec3(0.10, 0.075, 0.045) * streaks * (1.0 - belt * 0.35);
        color -= vec3(0.11, 0.055, 0.025) * belt * smoothstep(0.62, 0.98, fine);

        vec2 grsCenter = vec2(0.39 + uTime * 0.012, 0.365);
        grsCenter.x = fract(grsCenter.x);
        vec2 d = vec2(abs(fract(uv.x - grsCenter.x + 0.5) - 0.5), uv.y - grsCenter.y);
        float e = length(vec2(d.x / 0.112, d.y / 0.064));
        float angle = atan(d.y / 0.064, d.x / 0.112) + uTime * 0.72;
        float spiral = sin(angle * 2.8 - e * 8.0 + uTime * 1.15);
        float eyeWall = smoothstep(1.10, 0.88, e) * smoothstep(0.58, 0.92, e);
        float core = smoothstep(0.98, 0.18, e);
        vec3 grsOuter = vec3(0.94, 0.70, 0.47);
        vec3 grsInner = mix(vec3(0.72, 0.24, 0.12), vec3(0.96, 0.43, 0.18), 0.5 + 0.5 * spiral);
        float grsMask = smoothstep(1.08, 0.92, e);
        color = mix(color, grsOuter, eyeWall * 0.86);
        color = mix(color, grsInner, core * 0.9);
        color += vec3(0.18, 0.09, 0.035) * core * smoothstep(0.2, 1.0, spiral);
        color -= vec3(0.08, 0.035, 0.02) * grsMask * smoothstep(0.1, 0.9, -spiral);

        float nDotL = dot(normalize(vWorldNormal), normalize(uLight));
        float light = smoothstep(-0.22, 0.92, nDotL) * 0.82 + 0.18;
        float terminatorWarmth = smoothstep(0.12, -0.35, nDotL);
        color *= light;
        color = mix(color, color * vec3(0.64, 0.50, 0.42), terminatorWarmth * 0.42);

        float limb = clamp(vNormal.z, 0.0, 1.0);
        color *= mix(0.34, 1.08, pow(limb, 0.42));
        color += vec3(0.055, 0.038, 0.022) * pow(1.0 - limb, 3.0);

        gl_FragColor = vec4(color, 1.0);
      }
    `
  });

  const planet = new THREE.Mesh(
    new THREE.SphereGeometry(1, 160, 96),
    planetMaterial
  );
  planet.rotation.z = -0.03;
  scene.add(planet);

  const glow = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 64), glowMaterial);
  glow.rotation.copy(planet.rotation);
  scene.add(glow);

  window.addEventListener('resize', fitCamera);

  function animate(timestamp) {
    const t = timestamp * 0.001;
    planetMaterial.uniforms.uTime.value = t;
    planet.rotation.y = 0.035 * Math.sin(t * 0.18);
    glow.rotation.copy(planet.rotation);
    stars.rotation.z = t * 0.003;
    moon.position.x = 1.55 - t * 0.012;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
} catch (e) {
  const fallback = document.createElement('div');
  fallback.style.cssText = 'position:fixed;inset:0;background:#030407;';
  document.body.appendChild(fallback);
}
</script>
</body>
</html>
