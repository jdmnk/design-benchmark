<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jupiter</title>
<style>
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
  function createNoiseTexture() {
    const W = 1024, H = 512, GS = 128;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const img = ctx.createImageData(W, H);
    const data = img.data;

    const grid = new Float32Array((GS + 1) * (GS + 1));
    for (let i = 0; i < grid.length; i++) grid[i] = Math.random();

    function sample(x, y) {
      x = x % GS; if (x < 0) x += GS;
      y = y % GS; if (y < 0) y += GS;
      const X = Math.floor(x);
      const Y = Math.floor(y);
      const xf = x - X;
      const yf = y - Y;
      const u = xf * xf * (3.0 - 2.0 * xf);
      const v = yf * yf * (3.0 - 2.0 * yf);
      const idx = Y * (GS + 1) + X;
      const a = grid[idx];
      const b = grid[idx + 1];
      const c = grid[idx + GS + 1];
      const d = grid[idx + GS + 2];
      return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
    }

    for (let y = 0; y < H; y++) {
      const ny = y / H;
      for (let x = 0; x < W; x++) {
        const nx = x / W;
        let val = 0, amp = 1, freq = 1, max = 0;
        for (let o = 0; o < 5; o++) {
          val += sample(nx * GS * freq, ny * GS * freq) * amp;
          max += amp;
          amp *= 0.5;
          freq *= 2;
        }
        val = (val / max - 0.5) * 1.3 + 0.5;
        val = Math.max(0, Math.min(1, val));
        const c = Math.floor(val * 255);
        const i = (y * W + x) * 4;
        data[i] = c; data[i + 1] = c; data[i + 2] = c; data[i + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.colorSpace = THREE.NoColorSpace;
    return tex;
  }

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020205);

  const camera = new THREE.PerspectiveCamera(42.0, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(1);
  document.body.appendChild(renderer.domElement);

  const noiseTex = createNoiseTexture();

  const jupiterMat = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
      noiseTex: { value: noiseTex },
      lightDir: { value: new THREE.Vector3(-0.55, 0.55, 0.65).normalize() }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float time;
      uniform sampler2D noiseTex;
      uniform vec3 lightDir;

      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vPosition;

      const float bandCount = 10.0;
      const float PI = 3.14159265359;

      float zonalSpeed(float t) {
        float env = 1.0 + 0.5 * cos((t - 0.5) * 2.0 * PI);
        return 0.08 * sin((t - 0.05) * PI * bandCount) * env;
      }

      void main() {
        float t = vUv.y;

        float warp = (texture2D(noiseTex, vUv * vec2(4.0, 8.0) + vec2(time * 0.02, 0.0)).r - 0.5) * 0.04;
        float tb = t + warp;
        float bandArg = (tb - 0.05) * PI * bandCount;

        float profile = sin(bandArg);
        profile += 0.5 * sin(bandArg * 2.1 + 1.3);
        profile += 0.25 * sin(bandArg * 3.7 + 2.0);
        profile += (texture2D(noiseTex, vUv * vec2(6.0, 12.0)).r - 0.5) * 0.4;
        profile *= 0.55;

        float isZone = smoothstep(-0.12, 0.12, profile);

        vec3 zoneCol = vec3(0.95, 0.90, 0.74);
        vec3 beltDark = vec3(0.58, 0.36, 0.16);
        vec3 beltOchre = vec3(0.74, 0.45, 0.18);
        vec3 beltCol = mix(beltDark, beltOchre, smoothstep(-0.5, -0.15, profile));
        vec3 baseColor = mix(beltCol, zoneCol, isZone);

        float speed = zonalSpeed(tb);
        float localU = vUv.x + time * speed;
        vec2 flowUv = vec2(fract(localU), vUv.y);

        float turb = texture2D(noiseTex, flowUv * vec2(3.0, 1.5)).r;
        float fine = texture2D(noiseTex, flowUv * vec2(14.0, 7.0) + vec2(time * 0.03, 0.0)).r;
        baseColor *= (0.82 + 0.36 * turb);

        vec3 wispCol = mix(zoneCol, vec3(1.0, 0.96, 0.82), 0.35);
        baseColor = mix(baseColor, wispCol, smoothstep(0.62, 0.92, fine) * 0.28);

        float boundary = 1.0 - smoothstep(0.0, 0.1, abs(sin(bandArg)));
        float shimmer = (texture2D(noiseTex, flowUv * vec2(10.0, 20.0) + vec2(time * 0.4, time * 0.06)).r - 0.5) * boundary * 0.12;
        baseColor += shimmer;

        float stormV = 0.38;
        float stormU0 = 0.35;
        float stormU = fract(stormU0 + time * zonalSpeed(stormV));
        float du = fract(vUv.x - stormU + 0.5) - 0.5;
        float dv = vUv.y - stormV;
        float a = 0.11;
        float b = 0.09;
        float dEll = length(vec2(du / a, dv / b));
        float inStorm = 1.0 - smoothstep(0.0, 1.0, dEll);

        float angle = atan(dv, du);
        float r = clamp(dEll, 0.0, 1.0);
        float swirl = angle - time * 0.9 - r * 10.0;
        float swirlPattern = sin(swirl * 4.0 + time * 1.5) * 0.5 + 0.5;
        float eyewall = exp(-pow((r - 0.78) / 0.11, 2.0));

        vec3 core = vec3(0.72, 0.20, 0.05);
        vec3 mid = vec3(0.86, 0.34, 0.10);
        vec3 spotCol = mix(core, mid, swirlPattern);
        spotCol = mix(spotCol, vec3(0.94, 0.70, 0.42), eyewall * 0.75);

        baseColor = mix(baseColor, spotCol, inStorm * 0.94);

        vec3 n = normalize(vNormal);
        vec3 viewDir = normalize(-vPosition);
        float diff = smoothstep(-0.18, 0.42, dot(n, normalize(lightDir)));
        vec3 lit = baseColor * (0.11 + 0.89 * diff);

        float fresnel = 1.0 - max(dot(n, viewDir), 0.0);
        lit *= (1.0 - 0.5 * fresnel * fresnel);

        gl_FragColor = vec4(lit, 1.0);
      }
    `
  });

  const jupiter = new THREE.Mesh(new THREE.SphereGeometry(1.5, 96, 48), jupiterMat);
  scene.add(jupiter);

  const starGeo = new THREE.BufferGeometry();
  const starCount = 400;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const rad = 30 + Math.random() * 40;
    starPos[i * 3] = rad * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = rad * Math.sin(phi) * Math.sin(theta);
    starPos[i * 3 + 2] = rad * Math.cos(phi);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0.6, sizeAttenuation: false });
  scene.add(new THREE.Points(starGeo, starMat));

  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(0.032, 16, 8),
    new THREE.MeshBasicMaterial({ color: 0xcccccc })
  );
  scene.add(moon);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;
    jupiterMat.uniforms.time.value = time;

    const mt = time * 0.06;
    moon.position.set(Math.cos(mt) * 2.6, -0.4 + Math.sin(mt) * 0.25, -1.2);

    renderer.render(scene, camera);
  }
  animate();
} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
