<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;
        let diskGroup, photonRing;
        let time = 0;

        function init() {
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Scene - near black space first
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Camera - 6 degrees above disk plane
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            const camDistance = 12;
            const angle = THREE.MathUtils.degToRad(6);
            camera.position.set(0, Math.sin(angle) * camDistance, Math.cos(angle) * camDistance);
            camera.lookAt(0, 0, 0);

            // Black hole event horizon (perfectly black)
            const bhRadius = 1.4; // ~28% of viewport height at this camera setup
            const blackHole = new THREE.Mesh(
                new THREE.SphereGeometry(bhRadius, 64, 64),
                new THREE.MeshBasicMaterial({ color: 0x000000 })
            );
            scene.add(blackHole);

            // Photon ring - thin bright ring hugging horizon
            photonRing = new THREE.Mesh(
                new THREE.TorusGeometry(bhRadius * 1.05, 0.025, 16, 128),
                new THREE.MeshBasicMaterial({ 
                    color: 0xffffff, 
                    transparent: true, 
                    opacity: 0.95 
                })
            );
            photonRing.rotation.x = Math.PI / 2;
            scene.add(photonRing);

            // Accretion disk group
            diskGroup = new THREE.Group();
            scene.add(diskGroup);

            // Create disk rings with color gradient + beaming
            const innerR = bhRadius * 1.6;
            const outerR = bhRadius * 4.5;
            const colors = [0xfff3d0, 0xffd38a, 0xffae3b, 0xe67e22, 0xc8551a];
            
            for (let i = 0; i < 5; i++) {
                const r1 = innerR + (outerR - innerR) * (i / 5);
                const r2 = innerR + (outerR - innerR) * ((i + 1) / 5);
                const width = r2 - r1;
                
                const ring = new THREE.Mesh(
                    new THREE.RingGeometry(r1, r2, 128, 1, 0, Math.PI * 2),
                    new THREE.MeshBasicMaterial({
                        color: colors[i],
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: i === 0 ? 0.95 : 0.75,
                        blending: THREE.AdditiveBlending
                    })
                );
                ring.rotation.x = Math.PI / 2;
                diskGroup.add(ring);

                // Relativistic beaming: brighter half on one side
                const brightHalf = new THREE.Mesh(
                    new THREE.RingGeometry(r1, r2, 64, 1, Math.PI * 1.2, Math.PI * 0.8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffffff,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.35,
                        blending: THREE.AdditiveBlending
                    })
                );
                brightHalf.rotation.x = Math.PI / 2;
                diskGroup.add(brightHalf);
            }

            // Gravitational lensing arcs (upper halo)
            const upperArc = new THREE.Mesh(
                new THREE.TorusGeometry(bhRadius * 2.8, 0.12, 8, 64, Math.PI * 0.65),
                new THREE.MeshBasicMaterial({
                    color: 0xffe8a0,
                    transparent: true,
                    opacity: 0.7,
                    blending: THREE.AdditiveBlending
                })
            );
            upperArc.rotation.set(1.35, 0, 0);
            upperArc.position.y = 0.6;
            diskGroup.add(upperArc);

            // Gravitational lensing arcs (lower halo)
            const lowerArc = upperArc.clone();
            lowerArc.rotation.set(-1.35, 0, 0);
            lowerArc.position.y = -0.6;
            diskGroup.add(lowerArc);

            // Dim starfield
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 800;
            const positions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i += 3) {
                const radius = 80 + Math.random() * 120;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const stars = new THREE.Points(
                starsGeometry,
                new THREE.PointsMaterial({
                    color: 0x888899,
                    size: 0.6,
                    transparent: true,
                    opacity: 0.6
                })
            );
            scene.add(stars);

            // Start render immediately
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.004;

            // Slow disk rotation
            diskGroup.rotation.y = time * 0.25;
            photonRing.rotation.z = time * 0.15;

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', onResize);

        // Boot
        try {
            init();
        } catch (e) {
            console.error(e);
            document.body.innerHTML = '<div style="color:white;padding:20px">Render error</div>';
        }
    </script>
</body>
</html>
