<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020204);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
  // Camera ~5° above the disk plane
  const camDist = 9.0;
  const camElev = Math.tan(5.0 * Math.PI / 180.0) * camDist;
  camera.position.set(0, camElev, camDist);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setClearColor(0x020204, 1);
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Sphere radius chosen so diameter ~= 28% of viewport height.
  // With FOV=50, distance=9, vertical extent at center ~= 2*9*tan(25°)=8.39.
  // Sphere diameter 2R should be 0.28 * 8.39 = 2.35, so R ~ 1.17.
  const R_BH = 1.17;

  // ----- Event Horizon (perfect black) -----
  const bh = new THREE.Mesh(
    new THREE.SphereGeometry(R_BH, 96, 96),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(bh);

  // ----- Disk shader -----
  const diskVert = /* glsl */`
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `;

  const diskFrag = /* glsl */`
    precision highp float;
    uniform float uTime;
    uniform float uIsArc;     // 0 = main disk, 1 = lensed arc
    uniform float uBrightness;
    varying vec2 vUv;
    varying vec3 vWorldPos;

    void main() {
      float r = vUv.x; // 0 inner -> 1 outer

      // Color gradient: hot white-yellow -> amber -> deep orange
      vec3 cInner = vec3(1.000, 0.953, 0.816); // #fff3d0
      vec3 cMid   = vec3(1.000, 0.678, 0.231); // #ffae3b
      vec3 cOuter = vec3(0.784, 0.333, 0.102); // #c8551a

      vec3 color = mix(cInner, cMid, smoothstep(0.00, 0.35, r));
      color = mix(color, cOuter, smoothstep(0.30, 1.00, r));

      // Hot inner-edge bloom
      float innerGlow = smoothstep(0.18, 0.0, r);
      color += innerGlow * vec3(1.2, 1.0, 0.75) * 1.4;

      // Relativistic beaming (one side brighter).
      // For the disk: angle in disk plane (XZ).
      // For the lensed arcs: use arc-length parameter (atan in their plane).
      float ang;
      if (uIsArc < 0.5) {
        ang = atan(vWorldPos.z, vWorldPos.x) - uTime * 0.08;
      } else {
        // Arcs lie roughly in XY plane; use atan(y, x) along arc
        ang = atan(vWorldPos.y + 0.001, vWorldPos.x) - uTime * 0.08;
      }
      // Approaching side (cos > 0) boosted, receding dimmed
      float beam = 0.55 + 0.55 * (0.5 + 0.5 * cos(ang));
      color *= beam;

      // Subtle turbulent flicker
      float flick = 0.92 + 0.08 * sin(ang * 8.0 + uTime * 1.3);
      color *= flick;

      // Alpha: fade at outer edge, strong at inner
      float alpha = smoothstep(1.0, 0.55, r) * smoothstep(0.0, 0.04, r);
      alpha *= uBrightness;

      gl_FragColor = vec4(color, alpha);
    }
  `;

  function makeDiskMaterial(isArc, brightness) {
    return new THREE.ShaderMaterial({
      vertexShader: diskVert,
      fragmentShader: diskFrag,
      uniforms: {
        uTime: { value: 0 },
        uIsArc: { value: isArc ? 1.0 : 0.0 },
        uBrightness: { value: brightness }
      },
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false,
      depthTest: true,
      blending: THREE.AdditiveBlending
    });
  }

  // ----- Main accretion disk (XZ plane) -----
  const diskInner = R_BH * 1.15;
  const diskOuter = R_BH * 4.2;
  const diskGeom = new THREE.RingGeometry(diskInner, diskOuter, 200, 12);
  diskGeom.rotateX(-Math.PI / 2); // lay flat in XZ plane
  const diskMat = makeDiskMaterial(false, 1.0);
  const disk = new THREE.Mesh(diskGeom, diskMat);
  scene.add(disk);

  // Faint extended halo disk
  const haloGeom = new THREE.RingGeometry(diskOuter * 0.9, diskOuter * 1.6, 160, 4);
  haloGeom.rotateX(-Math.PI / 2);
  const haloMat = makeDiskMaterial(false, 0.18);
  const halo = new THREE.Mesh(haloGeom, haloMat);
  scene.add(halo);

  // ----- Lensed arcs (top & bottom) -----
  // The far side of the disk, bent over/under the sphere, forms thin bright arcs
  // hugging the shadow edge. They span horizontally across the sphere in the XY plane.
  const arcInner = R_BH * 1.01;
  const arcOuter = R_BH * 1.55;

  // Top arc: upper half of a ring in XY plane (from +X through +Y to -X)
  const topArcGeom = new THREE.RingGeometry(arcInner, arcOuter, 200, 4, 0, Math.PI);
  const topArcMat = makeDiskMaterial(true, 1.15);
  const topArc = new THREE.Mesh(topArcGeom, topArcMat);
  scene.add(topArc);

  // Bottom arc: lower half (mirror of top)
  const botArcGeom = new THREE.RingGeometry(arcInner, arcOuter, 200, 4, Math.PI, Math.PI);
  const botArcMat = makeDiskMaterial(true, 0.95);
  const botArc = new THREE.Mesh(botArcGeom, botArcMat);
  scene.add(botArc);

  // Secondary softer arcs (slightly larger, fainter) to thicken the halo
  const topArc2Geom = new THREE.RingGeometry(arcOuter * 0.95, arcOuter * 1.25, 200, 3, 0, Math.PI);
  const topArc2Mat = makeDiskMaterial(true, 0.35);
  const topArc2 = new THREE.Mesh(topArc2Geom, topArc2Mat);
  scene.add(topArc2);
  const botArc2Geom = new THREE.RingGeometry(arcOuter * 0.95, arcOuter * 1.25, 200, 3, Math.PI, Math.PI);
  const botArc2Mat = makeDiskMaterial(true, 0.30);
  const botArc2 = new THREE.Mesh(botArc2Geom, botArc2Mat);
  scene.add(botArc2);

  // ----- Photon ring (thin bright ring hugging the shadow edge) -----
  const photonGeom = new THREE.TorusGeometry(R_BH * 1.02, 0.018, 8, 256);
  const photonMat = new THREE.MeshBasicMaterial({
    color: 0xfff2c8,
    transparent: true,
    opacity: 0.95,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const photon = new THREE.Mesh(photonGeom, photonMat);
  // Torus lies in XY plane by default, which is the sky plane for our camera — perfect.
  scene.add(photon);

  // Softer outer photon glow
  const photonGlowGeom = new THREE.TorusGeometry(R_BH * 1.04, 0.06, 8, 256);
  const photonGlowMat = new THREE.MeshBasicMaterial({
    color: 0xffcc66,
    transparent: true,
    opacity: 0.35,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const photonGlow = new THREE.Mesh(photonGlowGeom, photonGlowMat);
  scene.add(photonGlow);

  // ----- Starfield -----
  const STAR_COUNT = 1200;
  const starPositions = new Float32Array(STAR_COUNT * 3);
  const starColors = new Float32Array(STAR_COUNT * 3);
  for (let i = 0; i < STAR_COUNT; i++) {
    const r = 200 + Math.random() * 800;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i * 3 + 2] = r * Math.cos(phi);
    // Slight color variation
    const tint = 0.6 + Math.random() * 0.4;
    starColors[i * 3 + 0] = tint;
    starColors[i * 3 + 1] = tint * (0.85 + Math.random() * 0.15);
    starColors[i * 3 + 2] = tint * (0.8 + Math.random() * 0.2);
  }
  const starGeom = new THREE.BufferGeometry();
  starGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  starGeom.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
  const starMat = new THREE.PointsMaterial({
    size: 1.2,
    sizeAttenuation: true,
    vertexColors: true,
    transparent: true,
    opacity: 0.75,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const stars = new THREE.Points(starGeom, starMat);
  scene.add(stars);

  // ----- Subtle ambient glow behind the black hole (fake lensing glow) -----
  const glowSpriteMat = new THREE.SpriteMaterial({
    color: 0xffaa55,
    transparent: true,
    opacity: 0.18,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: false
  });
  const glowSprite = new THREE.Sprite(glowSpriteMat);
  glowSprite.scale.set(R_BH * 6, R_BH * 6, 1);
  glowSprite.position.set(0, 0, -0.1);
  glowSprite.renderOrder = -1;
  scene.add(glowSprite);

  // ----- Render loop -----
  const clock = new THREE.Clock();
  const allDiskMats = [diskMat, haloMat, topArcMat, botArcMat, topArc2Mat, botArc2Mat];

  function animate() {
    const t = clock.getElapsedTime();
    for (const m of allDiskMats) {
      m.uniforms.uTime.value = t;
    }
    // Slow rotation of the whole disk system around Y
    const rot = t * 0.03;
    disk.rotation.y = rot;
    halo.rotation.y = rot;
    // Arcs stay fixed (they are lensed images); their pattern rotates via uTime.
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
} catch (err) {
  console.error(err);
  document.body.innerHTML = '<pre style="color:#fff;padding:1em">' + err.stack + '</pre>';
}
</script>
</body>
</html>
