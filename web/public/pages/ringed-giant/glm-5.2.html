<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturn-like Ringed Gas Giant</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #05060a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {
  // ---------- Renderer / scene / camera ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05060a);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 5);

  // ---------- Constants ----------
  // Visible world-height at z=0 with cam at z=5, fov=45 -> 2*5*tan(22.5) ~= 4.14
  // Planet diameter = 34% of viewport height -> radius ~0.70
  const PLANET_R    = 0.70;
  const RING_INNER  = 1.02;
  const RING_OUTER  = 1.54;   // ~2.2x planet radius
  const TILT        = 20 * Math.PI / 180;

  const lightDirWorld = new THREE.Vector3(-0.7, 0.7, 0.5).normalize(); // upper-left
  const invTilt = new THREE.Matrix4().makeRotationX(-TILT);
  const localLightDir = lightDirWorld.clone().applyMatrix4(invTilt).normalize();

  // ---------- Tilted group (planet + rings share equatorial plane) ----------
  const group = new THREE.Group();
  group.rotation.x = TILT; // +20deg: near edge drops in front of bottom, far edge rises behind top
  scene.add(group);

  // ---------- Helpers ----------
  function smoothstep(a, b, x) {
    const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
    return t * t * (3 - 2 * t);
  }

  // ---------- Procedural planet band texture ----------
  function makeBandTexture() {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 512;
    const ctx = c.getContext('2d');

    // Latitude gradient: warm cream / pale gold / tan / soft amber
    const g = ctx.createLinearGradient(0, 0, 0, 512);
    g.addColorStop(0.00, '#a87440');
    g.addColorStop(0.12, '#c99a5b');
    g.addColorStop(0.25, '#e6c88f');
    g.addColorStop(0.38, '#f3e6c4');
    g.addColorStop(0.50, '#f8f0d4'); // lighter equatorial zone
    g.addColorStop(0.62, '#f3e6c4');
    g.addColorStop(0.75, '#e6c88f');
    g.addColorStop(0.88, '#c99a5b');
    g.addColorStop(1.00, '#9c6c3a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 1024, 512);

    // Faint darker belts & lighter zones
    for (let i = 0; i < 90; i++) {
      const y = Math.random() * 512;
      const h = 3 + Math.random() * 18;
      const dark = Math.random() < 0.5;
      ctx.fillStyle = dark
        ? `rgba(120,80,40,${0.04 + Math.random() * 0.10})`
        : `rgba(255,240,200,${0.04 + Math.random() * 0.10})`;
      ctx.fillRect(0, y, 1024, h);
    }

    // Wavy swirl lines so rotation reads
    for (let i = 0; i < 45; i++) {
      const y = Math.random() * 512;
      const r = 140 + (Math.random() * 70 | 0);
      const gg = 100 + (Math.random() * 50 | 0);
      const b = 55 + (Math.random() * 35 | 0);
      ctx.strokeStyle = `rgba(${r},${gg},${b},${0.10 + Math.random() * 0.16})`;
      ctx.lineWidth = 1 + Math.random() * 2.5;
      ctx.beginPath();
      for (let x = 0; x <= 1024; x += 6) {
        const yy = y + Math.sin(x * 0.018 + i * 1.3) * 11 + Math.sin(x * 0.05 + i * 2.1) * 5;
        if (x === 0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }

    // Storm ovals (drift with rotation)
    function drawStorm(cx, cy, rx, ry, r0, g0, b0, a0) {
      const sg = ctx.createRadialGradient(cx, cy, 1, cx, cy, rx);
      sg.addColorStop(0,   `rgba(${r0},${g0},${b0},${a0})`);
      sg.addColorStop(0.65,`rgba(${r0},${g0},${b0},${a0 * 0.32})`);
      sg.addColorStop(1,   `rgba(${r0},${g0},${b0},0)`);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(1, ry / rx);
      ctx.beginPath();
      ctx.arc(0, 0, rx, 0, Math.PI * 2);
      ctx.fillStyle = sg;
      ctx.fill();
      ctx.restore();
    }
    drawStorm(280, 210, 58, 33, 205, 125, 65, 0.78);  // main storm
    drawStorm(640, 305, 32, 19, 240, 200, 150, 0.50);
    drawStorm(810, 175, 24, 14, 175, 105, 55, 0.55);
    drawStorm(130, 360, 20, 12, 250, 220, 170, 0.45);
    drawStorm(470, 260, 16, 10, 220, 170, 120, 0.40);

    // Fine grain noise
    const img = ctx.getImageData(0, 0, 1024, 512);
    for (let i = 0; i < img.data.length; i += 4) {
      const n = (Math.random() - 0.5) * 14;
      img.data[i]   = Math.max(0, Math.min(255, img.data[i]   + n));
      img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1] + n));
      img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2] + n));
    }
    ctx.putImageData(img, 0, 0);

    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }

  // ---------- Procedural ring (radial) texture ----------
  function makeRingTexture() {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 8;
    const ctx = c.getContext('2d');
    const img = ctx.createImageData(1024, 8);
    for (let x = 0; x < 1024; x++) {
      const t = x / 1024;
      // subtle radial banding
      let band = 0.5
        + 0.22 * Math.sin(t * 60 + 0.3)
        + 0.16 * Math.sin(t * 25 + 1.7)
        + 0.08 * Math.sin(t * 140 + 0.6);
      band = Math.max(0, Math.min(1, band));
      const r = 205 + band * 35;
      const g = 188 + band * 32;
      const b = 152 + band * 28;
      // Cassini-division-style gap ~2/3 out
      const gap  = 1 - Math.exp(-Math.pow((t - 0.66) / 0.012, 2));
      // secondary thin gap
      const gap2 = 1 - 0.65 * Math.exp(-Math.pow((t - 0.40) / 0.007, 2));
      let a = 0.92 * gap * gap2;
      a *= smoothstep(0.0, 0.05, t);
      a *= 1 - smoothstep(0.95, 1.0, t);
      a *= 0.55 + 0.45 * smoothstep(0.0, 0.18, t); // inner edge fainter
      a = Math.max(0, Math.min(1, a));
      for (let y = 0; y < 8; y++) {
        const idx = (y * 1024 + x) * 4;
        img.data[idx]     = r;
        img.data[idx + 1] = g;
        img.data[idx + 2] = b;
        img.data[idx + 3] = a * 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.ClampToEdgeWrapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }

  const bandTex = makeBandTexture();
  const ringTex = makeRingTexture();

  // ---------- Planet ----------
  const planetGeo = new THREE.SphereGeometry(PLANET_R, 96, 64);
  const planetMat = new THREE.ShaderMaterial({
    uniforms: {
      bandTex:        { value: bandTex },
      lightDir:       { value: lightDirWorld },
