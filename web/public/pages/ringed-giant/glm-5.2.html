<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saturn-like Ringed Gas Giant</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05060a;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
  // ---- Renderer & scene (set up early so a partial failure still shows space) ----
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x05060a, 1);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05060a);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
  // Planet radius = 1; place camera so diameter ≈ 34% of viewport height.
  camera.position.set(0, 0, 7.1);
  camera.lookAt(0, 0, 0);

  // ---- Starfield ----
  const starCount = 1400;
  const sp = new Float32Array(starCount * 3);
  const sc = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 60, th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    sp[i*3]   = r * Math.sin(ph) * Math.cos(th);
    sp[i*3+1] = r * Math.cos(ph);
    sp[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    const b = 0.4 + Math.random() * 0.6;
    sc[i*3] = b; sc[i*3+1] = b * (0.85 + Math.random()*0.15); sc[i*3+2] = b * (0.9 + Math.random()*0.1);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(sc, 3));
  const starMat = new THREE.PointsMaterial({
    size: 0.12, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.9, depthWrite: false
  });
  scene.add(new THREE.Points(starGeo, starMat));

  // ---- Lighting direction (upper-left, slightly toward camera) ----
  const lightDir = new THREE.Vector3(-0.62, 0.48, 0.62).normalize();

  // ---- Tilt group (planet + rings share equatorial plane) ----
  const tilt = 21 * Math.PI / 180; // view ~21° above edge-on
  const group = new THREE.Group();
  group.rotation.x = tilt;
  scene.add(group);

  // Light direction in the planet/ring local frame (un-tilt the world light)
  const invTilt = new THREE.Matrix4().makeRotationX(-tilt);
  const lightDirLocal = lightDir.clone().applyMatrix4(invTilt).normalize();

  const R = 1.0;            // planet radius
  const innerR = 1.28;      // ring inner radius
  const outerR = 2.2;       // ring outer radius

  // ---- Planet ----
  const planetGeo = new THREE.SphereGeometry(R, 128, 96);
  const planetMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:        { value: 0 },
      uLightDir:    { value: lightDir.clone() },
      uLightDirLocal:{ value: lightDirLocal.clone() },
      uInnerR:      { value: innerR },
      uOuterR:      { value: outerR },
      uPlanetR:     { value: R }
    },
    vertexShader: `
      varying vec3 vLocalPos;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPos;
      void main(){
        vLocalPos = position;
        vWorldNormal = normalize(mat3(modelMatrix) * normal);
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec3 vLocalPos;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPos;
      uniform float uTime;
      uniform vec3 uLightDir;
      uniform vec3 uLightDirLocal;
      uniform float uInnerR, uOuterR, uPlanetR;

      // Warm cream -> pale gold -> soft amber palette
      vec3 palette(float t){
        vec3 c1 = vec3(0.953, 0.902, 0.769); // #f3e6c4
        vec3 c2 = vec3(0.902, 0.784, 0.561); // #e6c88f
        vec3 c3 = vec3(0.788, 0.604, 0.357); // #c99a5b
        vec3 col = mix(c1, c2, smoothstep(0.0, 0.55, t));
        col = mix(col, c3, smoothstep(0.5, 1.0, t));
        return col;
      }

      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float noise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i + vec2(1.0, 0.0)),
              c = hash(i + vec2(0.0, 1.0)), d = hash(i + vec2(1.0, 1.0));
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }
      float fbm(vec2 p){
        float v = 0.0, a = 0.5;
        for (int i = 0; i < 4; i++){ v += a * noise(p); p *= 2.0; a *= 0.5; }
        return v;
      }

      void main(){
        float lat = vLocalPos.y;                       // -1 .. 1
        float lon = atan(vLocalPos.z, vLocalPos.x);
        float rotLon = lon + uTime * 0.42;             // ~24°/s prograde

        // Wavy band structure (bands drift + swirl with rotation)
        float wave = sin(rotLon * 2.3 + lat * 7.0) * 0.05
                   + sin(rotLon * 1.31 - lat * 4.5) * 0.035
                   + sin(rotLon * 4.7 + lat * 2.0) * 0.02;
        float bandT = clamp(lat * 0.5 + 0.5 + wave, 0.0, 1.0);

        vec3 base = palette(bandT);

        // Belts (darker) and zones (lighter)
        float belt = sin(bandT * 3.14159 * 7.0) * 0.5 + 0.5;
        base *= mix(1.0, 0.80, belt * 0.55);
        // Lighter equatorial zone
        float eq = smoothstep(0.14, 0.0, abs(lat));
        base = mix(base, vec3(0.99, 0.93, 0.78), eq * 0.55);

        // Turbulence / swirls (rotates with planet)
        float n1 = fbm(vec2(rotLon * 3.2, lat * 9.0));
        float n2 = fbm(vec2(rotLon * 6.5 + 4.0, lat * 18.0));
        base *= 0.88 + n1 * 0.16;
        base = mix(base, base * vec3(0.92, 0.80, 0.62), smoothstep(0.55, 0.85, n2) * 0.4);

        // Storm oval (Great-Spot-like) that rotates with the bands
        float stormLat = 0.22;
        float dlon = sin((rotLon - 1.1) * 0.5);
        float dlat = (lat - stormLat);
        float storm = exp(-(dlat * dlat * 9.0 + dlon * dlon * 3.2));
        base = mix(base, vec3(0.80, 0.50, 0.30), storm * 0.7);
        // storm rim highlight
        base += vec3(0.10, 0.06, 0.03) * smoothstep(0.6, 0.9, storm) * (1.0 - storm);

        // ---- Lighting (upper-left) ----
        vec3 N = normalize(vWorldNormal);
        vec3 L = normalize(uLightDir);
        float ndl = dot(N, L);
        float diff = max(0.0, ndl);
        float ambient = 0.05;
        float light = ambient + diff * 1.15;
        light += pow(max(0.0, ndl), 3.0) * 0.25; // gentle brightening on lit crescent
        // soft terminator
        float term = smoothstep(-0.25, 0.35, ndl);
        light *= mix(0.35, 1.0, term);

        vec3 color = base * light;

        // ---- Ring shadow cast onto the planet ----
        // Ring lies in local y=0 plane, innerR..outerR. Trace from surface point
        // toward the light; if that ray crosses y=0 inside the ring, it's shadowed.
        vec3 Ll = normalize(uLightDirLocal);
        float Py = vLocalPos.y;
        float Ly = Ll.y;
        float t = -Py / Ly;
        vec3 crossPos = vLocalPos + t * Ll;
        float cr = length(crossPos.xz);
        float inRing = smoothstep(uInnerR, uInnerR + 0.04, cr)
                     * smoothstep(uOuterR, uOuterR - 0.04, cr);
        float ringShadow = (t > 0.0 ? inRing : 0.0);
        // Soften and only where it would be lit (so the band reads on the lit side)
        ringShadow *= smoothstep(-0.1, 0.45, ndl);
        color *= mix(1.0, 0.32, ringShadow);

        // ---- Limb darkening ----
        vec3 V = normalize(cameraPosition - vWorldPos);
        float limb = pow(max(0.0, dot(V, N)), 0.55);
        color *= 0.72 + 0.28 * limb;

        gl_FragColor = vec4(color, 1.0);
      }
    `
  });
  const planet = new THREE.Mesh(planetGeo, planetMat);
  group.add(planet);

  // ---- Atmospheric rim glow (fake bloom, additive) ----
  const atmoMat = new THREE.ShaderMaterial({
    uniforms: { uLightDir: { value: lightDir.clone() } },
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    depthWrite: false,
    vertexShader: `
      varying vec3 vN; varying vec3 vW;
      void main(){
        vN = normalize(mat3(modelMatrix) * normal);
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vW = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      varying vec3 vN; varying vec3 vW; uniform vec3 uLightDir;
      void main(){
        vec3 V = normalize(cameraPosition - vW);
        float fres = pow(1.0 - max(0.0, dot(V, vN)), 2.5);
        float lit = max(0.0, dot(vN, normalize(uLightDir)));
        vec3 c = mix(vec3(0.45, 0.32, 0.18), vec3(0.98, 0.86, 0.62), pow(lit, 0.7));
        gl_FragColor = vec4(c * fres * 0.9, fres * 0.55);
      }
    `
  });
  const atmo = new THREE.Mesh(new THREE.SphereGeometry(R * 1.06, 80, 56), atmoMat);
  group.add(atmo);

  // ---- Rings (custom radial-UV ring geometry) ----
  const segs = 320, radSegs = 12;
  const ringPos = [], ringIdx = [], ringUv = [];
  for (let j = 0; j <= segs; j++) {
    const a = (j / segs) * Math.PI * 2;
    for (let i = 0; i <= radSegs; i++) {
      const r = innerR + (outerR - innerR) * (i / radSegs);
      ringPos.push(Math.cos(a) * r, 0, Math.sin(a) * r);
      ringUv.push(i / radSegs, j / segs);
    }
  }
  for (let j = 0; j < segs; j++) {
    for (let i = 0; i < radSegs; i++) {
      const a = j * (radSegs + 1) + i;
      const b = a + (radSegs + 1);
      ringIdx.push(a, b, a + 1,  a + 1, b, b + 1);
    }
  }
  const ringGeo = new THREE.BufferGeometry();
  ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringPos, 3));
  ringGeo.setAttribute('uv', new THREE.Float32BufferAttribute(ringUv, 2));
  ringGeo.setIndex(ringIdx);
  ringGeo.computeVertexNormals();

  const ringMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:     { value: 0 },
      uLightDir: { value: lightDir.clone() },
      uInnerR:   { value: innerR },
      uOuterR:   { value: outerR },
      uPlanetR:  { value: R }
    },
    transparent: true,
    side: THREE.FrontSide,
    depthWrite: false,
    vertexShader: `
      varying vec3 vLocalPos;
      varying vec3 vWorldPos;
      varying vec2 vUv;
      void main(){
        vLocalPos = position;
        vUv = uv;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec3 vLocalPos;
      varying vec3 vWorldPos;
      varying vec2 vUv;
      uniform float uTime;
      uniform vec3 uLightDir;
      uniform float uInnerR, uOuterR, uPlanetR;

      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float noise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i + vec2(1.0, 0.0)),
              c = hash(i + vec2(0.0, 1.0)), d = hash(i + vec2(1.0, 1.0));
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }

      void main(){
        float u = vUv.x;                          // 0 inner .. 1 outer
        float r = mix(uInnerR, uOuterR, u);
        float ang = atan(vLocalPos.z, vLocalPos.x);

        // In-plane revolution: inner faster than outer (Keplerian-ish)
        float speed = 0.55 / r;
        float rotAng = ang + uTime * speed;

        // Radial banding (icy tan, subtly banded)
        float bands = noise(vec2(u * 80.0, 0.0)) * 0.5
                    + noise(vec2(u * 160.0, 7.0)) * 0.3
                    + 0.45;
        bands *= 0.8 + 0.2 * sin(u * 260.0);
        // Fine striae
        bands += 0.06 * sin(u * 900.0 + noise(vec2(u*40.0, 1.0)) * 6.0);

        // Orbiting brightness clumps (radial structure revolving)
        float clump = 0.65 + 0.35 * sin(rotAng * 6.0 + u * 14.0);
        clump *= 0.75 + 0.25 * noise(vec2(rotAng * 3.5, u * 10.0));
        clump *= 0.85 + 0.15 * sin(rotAng * 13.0 - u * 5.0);

        vec3 icyLight = vec3(0.90, 0.84, 0.73);
        vec3 icyDark  = vec3(0.52, 0.45, 0.35);
        vec3 col = mix(icyDark, icyLight, clamp(bands * clump, 0.0, 1.0));

        float alpha = 0.92;
        // Soft inner & outer edges (semi-transparent)
        alpha *= smoothstep(0.0, 0.05, u) * smoothstep(1.0, 0.93, u);
        // Cassini-division style gap ~2/3 out
        float gap = smoothstep(0.006, 0.0, abs(u - 0.665));
        alpha *= (1.0 - gap);
        // A couple of fainter gaps
        alpha *= 1.0 - smoothstep(0.004, 0.0, abs(u - 0.40)) * 0.55;
        alpha *= 1.0 - smoothstep(0.004, 0.0, abs(u - 0.86)) * 0.4;

        // Brightness: near/left side (toward light) brighter
        vec3 L = normalize(uLightDir);
        float sideLight = dot(normalize(vec3(vWorldPos.x, 0.0, vWorldPos.z)), L);
        float bright = 0.45 + 0.65 * (sideLight * 0.5 + 0.5);
        col *= bright;

        // Darken the arc of ring that passes through the planet's shadow
        // (planet blocks the light): points behind the planet from the light,
        // within the planet's projected radius.
        float along = dot(vWorldPos, L);
        float perp = length(vWorldPos - along * L);
        float inShadow = smoothstep(uPlanetR, uPlanetR * 0.82, perp)
                       * smoothstep(0.05, -0.15, along);
        col *= mix(1.0, 0.12, inShadow);
        alpha *= mix(1.0, 0.55, inShadow);

        gl_FragColor = vec4(col, alpha);
      }
    `
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  group.add(ring);

  // Render order: opaque planet first, then transparent ring (depth-tested).
  planet.renderOrder = 1;
  atmo.renderOrder = 0;
  ring.renderOrder = 2;

  // ---- Resize ----
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---- Animation loop (framerate-independent, driven by elapsed time) ----
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    planetMat.uniforms.uTime.value = t;
    ringMat.uniforms.uTime.value = t;
    renderer.render(scene, camera);
  }
  animate();
} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
