<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saturn-like Ringed Gas Giant</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x02020a, 1);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x02020a);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 6);
  camera.lookAt(0, 0, 0);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- Starfield ----------
  const starCount = 900;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 30 + Math.random() * 40;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i * 3 + 2] = r * Math.cos(phi);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xaabbdd, size: 0.05, sizeAttenuation: true, transparent: true, opacity: 0.6 });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // ---------- Planet radius sized to 34% of viewport height ----------
  const fovRad = THREE.MathUtils.degToRad(camera.fov);
  const dist = camera.position.z;
  const visibleHeight = 2 * dist * Math.tan(fovRad / 2);
  const planetRadius = 0.17 * visibleHeight;

  // ---------- Planet band texture ----------
  function lerpColor(c1, c2, t) {
    return [
      c1[0] + (c2[0] - c1[0]) * t,
      c1[1] + (c2[1] - c1[1]) * t,
      c1[2] + (c2[2] - c1[2]) * t
    ];
  }
  function hexToRgb(hex) {
    return [(hex >> 16 & 255), (hex >> 8 & 255), (hex & 255)];
  }
  const cream = hexToRgb(0xf3e6c4);
  const gold = hexToRgb(0xe6c88f);
  const amber = hexToRgb(0xc99a5b);

  const pw = 1024, ph = 512;
  const pCanvas = document.createElement('canvas');
  pCanvas.width = pw; pCanvas.height = ph;
  const pCtx = pCanvas.getContext('2d');
  const pImg = pCtx.createImageData(pw, ph);
  for (let y = 0; y < ph; y++) {
    const v = y / ph;
    const lat = (v - 0.5) * 2; // -1 .. 1
    const absLat = Math.abs(lat);
    let base;
    if (absLat < 0.12) {
      base = lerpColor(cream, gold, absLat / 0.12);
    } else if (absLat < 0.55) {
      base = lerpColor(gold, amber, (absLat - 0.12) / 0.43);
    } else {
      base = lerpColor(amber, [0.75 * amber[0], 0.75 * amber[1], 0.75 * amber[2]], (absLat - 0.55) / 0.45);
    }
    // darker belt lines
    const belt1 = Math.exp(-Math.pow((lat - 0.28) / 0.03, 2)) * 0.35;
    const belt2 = Math.exp(-Math.pow((lat + 0.20) / 0.025, 2)) * 0.3;
    const belt3 = Math.exp(-Math.pow((lat - 0.62) / 0.02, 2)) * 0.25;
    const beltDark = belt1 + belt2 + belt3;

    // ring shadow band near equator (subtle, uniform in longitude)
    const ringShadow = Math.exp(-Math.pow((lat - 0.02) / 0.05, 2)) * 0.18;

    for (let x = 0; x < pw; x++) {
      const u = x / pw;
      // turbulence noise via layered sines
      const n = Math.sin(u * Math.PI * 14 + lat * 8) * 0.02
              + Math.sin(u * Math.PI * 37 - lat * 3) * 0.015
              + Math.sin(u * Math.PI * 6 + lat * 20) * 0.03;

      // storm oval
      const stormDx = (u - 0.28) * pw;
      const stormDy = (v - 0.62) * ph;
      const stormDist = Math.sqrt((stormDx / 55) ** 2 + (stormDy / 22) ** 2);
      const storm = Math.max(0, 1 - stormDist) * 0.5;

      let r = base[0] + n * 255;
      let g = base[1] + n * 255;
      let b = base[2] + n * 255;

      const darkFactor = 1 - beltDark - ringShadow;
      r *= darkFactor; g *= darkFactor; b *= darkFactor;

      r = r * (1 - storm) + 214 * storm;
      g = g * (1 - storm) + 150 * storm;
      b = b * (1 - storm) + 90 * storm;

      const idx = (y * pw + x) * 4;
      pImg.data[idx] = Math.max(0, Math.min(255, r));
      pImg.data[idx + 1] = Math.max(0, Math.min(255, g));
      pImg.data[idx + 2] = Math.max(0, Math.min(255, b));
      pImg.data[idx + 3] = 255;
    }
  }
  pCtx.putImageData(pImg, 0, 0);
  const planetTexture = new THREE.CanvasTexture(pCanvas);
  planetTexture.wrapS = THREE.RepeatWrapping;

  // ---------- Ring texture (radial profile + angular clumps) ----------
  const rw = 512, rh = 256;
  const rCanvas = document.createElement('canvas');
  rCanvas.width = rw; rCanvas.height = rh;
  const rCtx = rCanvas.getContext('2d');
  const rImg = rCtx.createImageData(rw, rh);
  for (let y = 0; y < rh; y++) {
    const t = y / rh; // 0 = inner, 1 = outer (flipY will be disabled)
    // edge fade
    let alpha = 1.0;
    if (t < 0.06) alpha = t / 0.06;
    if (t > 0.94) alpha = (1 - t) / 0.06;
    // Cassini-division gap
    const gap = Math.exp(-Math.pow((t - 0.67) / 0.018, 2));
    alpha *= (1 - gap * 0.92);
    // subtle banding
    const band = 0.85 + 0.15 * Math.sin(t * 55.0);

    let baseR = 224, baseG = 205, baseB = 168;
    baseR *= band; baseG *= band; baseB *= band;

    for (let x = 0; x < rw; x++) {
      const ang = (x / rw) * Math.PI * 2;
      const clump = 0.8 + 0.2 * Math.sin(ang * 9 + t * 5) + 0.1 * Math.sin(ang * 23 - t * 11);
      const idx = (y * rw + x) * 4;
      rImg.data[idx] = Math.max(0, Math.min(255, baseR * clump));
      rImg.data[idx + 1] = Math.max(0, Math.min(255, baseG * clump));
      rImg.data[idx + 2] = Math.max(0, Math.min(255, baseB * clump));
      rImg.data[idx + 3] = Math.max(0, Math.min(255, alpha * 255));
    }
  }
  rCtx.putImageData(rImg, 0, 0);
  const ringTexture = new THREE.CanvasTexture(rCanvas);
  ringTexture.flipY = false;

  // ---------- Ring lighting overlay (static, non-rotating): left brighter, shadow patch lower-right near planet ----------
  const ow = 512, oh = 256;
  const oCanvas = document.createElement('canvas');
  oCanvas.width = ow; oCanvas.height = oh;
  const oCtx = oCanvas.getContext('2d');
  const oImg = oCtx.createImageData(ow, oh);
  for (let y = 0; y < oh; y++) {
    const t = y / oh;
    let edgeAlpha = 1.0;
    if (t < 0.06) edgeAlpha = t / 0.06;
    if (t > 0.94) edgeAlpha = (1 - t) / 0.06;
    for (let x = 0; x < ow; x++) {
      const ang = (x / ow) * Math.PI * 2;
      // brighter on -X side (left), angle = PI
      const lightTerm = 0.5 + 0.5 * Math.cos(ang - Math.PI);
      let brightness = lightTerm; // 0..1

      // planet shadow patch on ring, near inner edge, lower-right (angle ~ -PI/4)
      let angDiff = ang - (-Math.PI / 4);
      angDiff = Math.atan2(Math.sin(angDiff), Math.cos(angDiff));
      const shadowPatch = Math.exp(-Math.pow(angDiff / 0.5, 2)) * Math.exp(-Math.pow((t - 0.12) / 0.10, 2));

      brightness -= shadowPatch * 0.6;
      brightness = Math.max(0, Math.min(1, brightness));

      const idx = (y * ow + x) * 4;
      // warm tint overlay; use additive-ish (dark areas contribute little, bright areas add warm light)
      oImg.data[idx] = 255;
      oImg.data[idx + 1] = 235;
      oImg.data[idx + 2] = 200;
      oImg.data[idx + 3] = Math.max(0, Math.min(255, brightness * 120 * edgeAlpha));
    }
  }
  oCtx.putImageData(oImg, 0, 0);
  const overlayTexture = new THREE.CanvasTexture(oCanvas);
  overlayTexture.flipY = false;

  // ---------- Group holding planet + rings, tilted so rings read ~20 deg above edge-on ----------
  const system = new THREE.Group();
  system.rotation.x = THREE.MathUtils.degToRad(-21);
  scene.add(system);

  // Planet
  const planetGeo = new THREE.SphereGeometry(planetRadius, 64, 64);
  const planetMat = new THREE.MeshPhongMaterial({ map: planetTexture, shininess: 4, specular: 0x111111 });
  const planetMesh = new THREE.Mesh(planetGeo, planetMat);
  system.add(planetMesh);

  // Soft atmosphere glow (fake, additive, no postprocessing)
  const glowGeo = new THREE.SphereGeometry(planetRadius * 1.05, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xf0d9a8, transparent: true, opacity: 0.12,
    side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  system.add(glowMesh);

  // Rings (main, rotating for orbit motion)
  const innerR = planetRadius * 1.2;
  const outerR = planetRadius * 2.2;
  const ringGeo = new THREE.RingGeometry(innerR, outerR, 128, 1);
  // remap UVs radially (RingGeometry default UVs are already radius/angle based in three r160)
  const ringMat = new THREE.MeshBasicMaterial({
    map: ringTexture, transparent: true, side: THREE.DoubleSide,
    depthWrite: false
  });
  const ringMesh = new THREE.Mesh(ringGeo, ringMat);
  system.add(ringMesh);

  // Static lighting/shadow overlay on rings (does not rotate)
  const overlayGeo = new THREE.RingGeometry(innerR, outerR, 128, 1);
  const overlayMat = new THREE.MeshBasicMaterial({
    map: overlayTexture, transparent: true, side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const overlayMesh = new THREE.Mesh(overlayGeo, overlayMat);
  overlayMesh.position.z = 0.0005;
  system.add(overlayMesh);

  // ---------- Lights ----------
  const ambient = new THREE.AmbientLight(0x404050, 0.7);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xfff4e0, 1.3);
  dirLight.position.set(-4, 3, 4);
  scene.add(dirLight);

  // ---------- Animation ----------
  const start = performance.now();
  function animate(now) {
    requestAnimationFrame(animate);
    const t = (now - start) / 1000;

    planetMesh.rotation.y = THREE.MathUtils.degToRad(25) * t;
    ringMesh.rotation.z = THREE.MathUtils.degToRad(20) * t;

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);
} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
