<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — The data layer for real-time products</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: #F4F4F1;
    color: #111111;
    font-family: Helvetica, Arial, "Inter", "Helvetica Neue", sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; text-decoration: none; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

  .label, .eyebrow, .meta {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .num { color: #E2231A; font-weight: 600; }

  /* ───────── NAV ───────── */
  .topbar { border-bottom: 1px solid #111; }
  .nav {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    column-gap: 20px;
    align-items: center;
    padding: 20px 0;
  }
  .wordmark {
    grid-column: span 3;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .nav-links {
    grid-column: span 5;
    display: flex;
    gap: 32px;
    font-size: 13px;
  }
  .nav-links a:hover { color: #E2231A; }
  .nav-cta {
    grid-column: span 4;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 24px;
  }
  .btn-red {
    background: #E2231A;
    color: #F4F4F1;
    padding: 10px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .btn-red:hover { background: #111; }

  /* ───────── HERO ───────── */
  .hero { border-bottom: 1px solid #111; padding: 34px 0 30px; }
  .hero-eyebrow { margin-bottom: 26px; }
  .hero h1 {
    font-size: 84px;
    line-height: 0.94;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin-bottom: 26px;
  }
  .hero-sub {
    font-size: 18px;
    line-height: 1.4;
    max-width: 640px;
    margin-bottom: 30px;
  }
  .hero-ctas { display: flex; gap: 12px; align-items: center; }
  .btn-primary {
    background: #E2231A;
    color: #F4F4F1;
    padding: 14px 22px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .btn-primary:hover { background: #111; }
  .btn-secondary {
    background: transparent;
    color: #111;
    padding: 13px 22px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid #111;
  }
  .btn-secondary:hover { background: #111; color: #F4F4F1; }

  /* ───────── FEATURES ───────── */
  .features { border-bottom: 1px solid #111; padding: 26px 0 30px; }
  .features-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    column-gap: 20px;
  }
  .feature { grid-column: span 3; padding-left: 20px; border-left: 1px solid #111; }
  .feature:first-child { padding-left: 0; border-left: none; }
  .feature-num {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #E2231A;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .feature-title {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .feature-desc {
    font-size: 13px;
    line-height: 1.45;
  }

  /* ───────── TRUSTED ───────── */
  .trusted {
    display: grid;
    grid-template-columns: 150px 1fr;
    align-items: stretch;
  }
  .trusted-label {
    border-right: 1px solid #111;
    padding: 24px 24px 24px 0;
    align-self: center;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .trusted-list {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
  }
