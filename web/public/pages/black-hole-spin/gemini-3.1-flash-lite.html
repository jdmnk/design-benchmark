<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua Simulation</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <!-- Importmap for three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<script type="module">
    import * as THREE from 'three';

    try {
        // Setup Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 12); // Slightly above the plane
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Starfield ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1000;
        const posArray = new Float32Array(starCount * 3);
        for(let i = 0; i < starCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMaterial = new THREE.PointsMaterial({ size: 0.05, color: 0x555555 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- Accretion Disk Material ---
        // Using a custom geometry approach to simulate lensing arcs
        // We need a disk + top arc + bottom arc
        const createDiskGeometry = (inner, outer, segments) => {
            const geom = new THREE.RingGeometry(inner, outer, segments, 1);
            return geom;
        };

        const diskMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending
        });

        // Add azimuthal structure via a custom texture generator
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(256, 256, 128, 256, 256, 256);
        grad.addColorStop(0, '#fff3d0');
        grad.addColorStop(0.3, '#ffae3b');
        grad.addColorStop(1, '#c8551a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 512);
        
        // Add "clumps" for rotation
        for(let i=0; i<10; i++) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
            ctx.beginPath();
            ctx.arc(256 + Math.cos(i)*150, 256 + Math.sin(i)*150, 20 + Math.random()*30, 0, Math.PI*2);
            ctx.fill();
        }
        const diskTexture = new THREE.CanvasTexture(canvas);
        diskMat.map = diskTexture;

        // Main Disk
        const disk = new THREE.Mesh(createDiskGeometry(1.6, 5, 128), diskMat);
        disk.rotation.x = Math.PI / 2;
        scene.add(disk);

        // Lensing Arcs (Top and Bottom)
        const arcGeom = new THREE.RingGeometry(1.6, 3.5, 64, 1, 0, Math.PI);
        const topArc = new THREE.Mesh(arcGeom, diskMat);
        topArc.position.y = 0.5; // Offset to create lensing effect
        topArc.rotation.x = Math.PI / 2;
        scene.add(topArc);

        const bottomArc = new THREE.Mesh(arcGeom, diskMat);
        bottomArc.position.y = -0.5;
        bottomArc.rotation.x = Math.PI / 2;
        bottomArc.rotation.z = Math.PI; // Flip for bottom
        scene.add(bottomArc);

        // Event Horizon
        const blackHole = new THREE.Mesh(
            new THREE.SphereGeometry(1.5, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        scene.add(blackHole);

        // Photon Ring
        const photonRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.55, 0.02, 16, 100),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        photonRing.rotation.x = Math.PI / 2;
        scene.add(photonRing);

        // Animation Loop
        function animate(time) {
            requestAnimationFrame(animate);
            
            const t = time * 0.001;
            
            // Rotate disk
            disk.rotation.z = t * 0.5;
            topArc.rotation.z = t * 0.5;
            bottomArc.rotation.z = t * 0.5;
            
            // Subtle flicker
            const flicker = 0.8 + Math.sin(t * 10) * 0.1;
            diskMat.opacity = flicker;
            
            // Relativistic beaming simulation: adjust brightness based on rotation
            const beaming = 1.0 + Math.sin(t * 0.5) * 0.2;
            diskMat.color.setHSL(0.08, 1, 0.5 * beaming);

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);

    } catch (e) {
        console.error("Rendering failed:", e);
    }
</script>
</body>
</html>
