<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gargantua Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<script type="module">
    import * as THREE from 'three';

    try {
        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 12); // Slightly above disk plane
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Starfield ---
        const starGeom = new THREE.BufferGeometry();
        const starCount = 1000;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random() - 0.5) * 100;
        starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0x444444, size: 0.1 });
        scene.add(new THREE.Points(starGeom, starMat));

        // --- Accretion Disk & Lensing Geometry ---
        // We use a custom shader material for the disk to handle the radial gradient and "turbulence"
        const diskRadius = 4.5;
        const diskGeometry = new THREE.RingGeometry(1.2, diskRadius, 128, 32);
        
        // Custom Shader for the Disk (handles color, rotation, and fake lensing arcs)
        const diskMaterial = new THREE.ShaderMaterial({
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            uniforms: {
                time: { value: 0 },
                innerColor: { value: new THREE.Color(0xfff3d0) },
                midColor: { value: new THREE.Color(0xffae3b) },
                outerColor: { value: new THREE.Color(0xc8551a) }
            },
            vertexShader: `
                varying vec2 vUv;
                varying float vRadius;
                uniform float time;
                void main() {
                    vUv = uv;
                    // Rotate the UV to make the "clumps" move
                    float angle = atan(position.y, position.x) + time * 0.2;
                    float dist = length(position);
                    vRadius = dist;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                varying float vRadius;
                uniform float time;
                uniform vec3 innerColor;
                uniform vec3 midColor;
                uniform vec3 outerColor;

                void main() {
                    float dist = (vRadius - 1.2) / (4.5 - 1.2);
                    vec3 color = mix(innerColor, mix(midColor, outerColor, dist), dist);
                    
                    // Additive "clumps" for motion
                    float angle = atan(vUv.y - 0.5, vUv.x - 0.5) * 5.0;
                    float noise = sin(angle + time * 2.0) * 0.5 + 0.5;
                    float alpha = (1.0 - dist) * 0.8 * (0.7 + 0.3 * noise);
                    
                    // Relativistic beaming: one side brighter
                    float beaming = 1.0 + (vUv.x - 0.5) * 0.5;
                    
                    gl_FragColor = vec4(color * beaming, alpha);
                }
            `
        });

        // Main Disk
        const disk = new THREE.Mesh(diskGeometry, diskMaterial);
        disk.rotation.x = Math.PI / 2 + 0.1; // Edge on
        scene.add(disk);

        // Lensing Arcs (The "Ghost" rings above and below)
        const arcGeom = new THREE.TorusGeometry(2.8, 0.5, 16, 100, Math.PI);
        const arcMat = new THREE.MeshBasicMaterial({ 
            color: 0xffae3b, 
            transparent: true, 
            opacity: 0.3,
            side: THREE.DoubleSide
        });
        
        const arcTop = new THREE.Mesh(arcGeom, arcMat);
        arcTop.position.y = 0.8;
        arcTop.rotation.x = 0.2;
        scene.add(arcTop);

        const arcBot = new THREE.Mesh(arcGeom, arcMat);
        arcBot.position.y = -0.8;
        arcBot.rotation.x = -0.2;
        arcBot.rotation.z = Math.PI;
        scene.add(arcBot);

        // Event Horizon (The Black Sphere)
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(1.1, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        scene.add(sphere);

        // Photon Ring (Bright edge)
        const photonRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.15, 0.03, 16, 100),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        scene.add(photonRing);

        // --- Animation ---
        function animate(t) {
            requestAnimationFrame(animate);
            const time = t * 0.001;

            diskMaterial.uniforms.time.value = time;
            
            // Subtle shimmer
            disk.scale.setScalar(1 + Math.sin(time * 5) * 0.005);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);

    } catch (e) {
        console.error("Scene setup failed", e);
    }
</script>
</body>
</html>
