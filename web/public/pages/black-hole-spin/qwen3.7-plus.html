<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

try {

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// Camera: very low above disk plane (~6 degrees)
const fov = 50;
const camera = new THREE.PerspectiveCamera(fov, window.innerWidth/window.innerHeight, 0.01, 1000);
// Sphere diameter ~28% of viewport height. At distance D, sphere radius r subtends
// 2*atan(r/D)*180/pi degrees. We want that to be ~28% of fov -> ~14 deg.
// So r/D = tan(7 deg) ~ 0.1228. With r=1, D ~ 8.14.
const camDist = 8.2;
const camElev = Math.sin(6 * Math.PI/180) * camDist; // ~6 deg above disk plane
const camHoriz = Math.cos(6 * Math.PI/180) * camDist;
camera.position.set(0, camElev, camHoriz);
camera.lookAt(0, 0, 0);

// ============ STARS ============
const starCount = 1200;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount*3);
const starCol = new Float32Array(starCount*3);
for (let i=0;i<starCount;i++){
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  const r = 80 + Math.random()*40;
  starPos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
  starPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
  starPos[i*3+2] = r*Math.cos(phi);
  const b = 0.3 + Math.random()*0.7;
  const tint = 0.85 + Math.random()*0.15;
  starCol[i*3]   = b*tint;
  starCol[i*3+1] = b*tint*0.95;
  starCol[i*3+2] = b;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol,3));
const starMat = new THREE.PointsMaterial({ size: 0.25, vertexColors: true, sizeAttenuation: true, transparent: true, opacity: 0.9 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ============ BLACK HOLE SPHERE ============
const bhGeo = new THREE.SphereGeometry(1, 64, 64);
const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const bh = new THREE.Mesh(bhGeo, bhMat);
scene.add(bh);

// ============ PHOTON RING (hugging sphere edge) ============
// Thin bright torus in XZ plane at sphere equator
const photonRingGeo = new THREE.TorusGeometry(1.015, 0.012, 16, 256);
const photonRingMat = new THREE.MeshBasicMaterial({
  color: 0xfff0c8,
  transparent: true,
  opacity: 1.0,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonRing = new THREE.Mesh(photonRingGeo, photonRingMat);
photonRing.rotation.x = Math.PI/2;
scene.add(photonRing);

// Secondary softer photon glow
const photonGlowGeo = new THREE.TorusGeometry(1.03, 0.035, 16, 256);
const photonGlowMat = new THREE.MeshBasicMaterial({
  color: 0xffc070,
  transparent: true,
  opacity: 0.55,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonGlow = new THREE.Mesh(photonGlowGeo, photonGlowMat);
photonGlow.rotation.x = Math.PI/2;
scene.add(photonGlow);

// ============ ACCRETION DISK (flat annulus in XZ plane) ============
const diskInner = 1.25;
const diskOuter = 4.2;
const diskGeo = new THREE.RingGeometry(diskInner, diskOuter, 256, 24);

const diskVert = `
  varying vec2 vUv;
  varying vec3 vPos;
  void main() {
    vUv = uv;
    vPos = position;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
  }
`;
const diskFrag = `
  precision highp float;
  uniform float uTime;
  uniform float uInner;
  uniform float uOuter;
  varying vec2 vUv;
  varying vec3 vPos;

  // hash/noise
  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){
    vec2 i = floor(p); vec2 f = fract(p);
    float a = hash(i);
    float b = hash(i+vec2(1,0));
    float c = hash(i+vec2(0,1));
    float d = hash(i+vec2(1,1));
    vec2 u = f*f*(3.0-2.0*f);
    return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
  }
  float fbm(vec2 p){
    float v = 0.0; float a = 0.5;
    for(int i=0;i<5;i++){ v += a*noise(p); p*=2.07; a*=0.5; }
    return v;
  }

  void main() {
    float r = length(vPos.xz);
    float t = (r - uInner) / (uOuter - uInner); // 0..1 outward
    float theta = atan(vPos.z, vPos.x);

    // Rotating azimuthal structure
    float rotSpeed = 0.7; // rad/s -> ~40 deg/s
    float spin = theta + uTime * rotSpeed;
    // Differential rotation: inner spins faster
    float diff = 1.0 + (1.0 - t)*1.5;
    float a = spin * diff;

    // Clumpy streaks
    float streaks = 0.0;
    streaks += 0.5*fbm(vec2(a*2.0, t*8.0 + uTime*0.15));
    streaks += 0.35*fbm(vec2(a*5.0 + 3.1, t*16.0 - uTime*0.25));
    streaks += 0.25*fbm(vec2(a*9.0, t*28.0 + uTime*0.4));

    // Bright azimuthal clumps (big features)
    float clump = 0.5 + 0.5*sin(a*3.0 + t*4.0);
    clump *= 0.5 + 0.5*sin(a*1.3 - t*2.0 + uTime*0.2);

    float brightness = 0.55 + 0.45*streaks + 0.3*clump;

    // Shimmer
    float shimmer = 0.9 + 0.1*sin(uTime*3.0 + a*4.0);
    brightness *= shimmer;

    // Color gradient: inner white-yellow -> amber -> deep orange
    vec3 cInner = vec3(1.0, 0.95, 0.82);   // #fff3d0
    vec3 cMid   = vec3(1.0, 0.68, 0.23);   // #ffae3b
    vec3 cOuter = vec3(0.78, 0.33, 0.10);  // #c8551a
    vec3 col;
    if (t < 0.5) col = mix(cInner, cMid, t*2.0);
    else col = mix(cMid, cOuter, (t-0.5)*2.0);

    // Relativistic beaming: one side brighter (approaching side)
    // Approaching side is where velocity is toward camera (+Z)
    // Disk rotates CCW when viewed from +Y. Approaching side: +X side (theta=0)
    float beam = 0.55 + 0.55 * (0.5 + 0.5*cos(theta + uTime*0.08));
    brightness *= beam;

    // Radial falloff: bright inner, fade outer
    float radial = pow(1.0 - t, 1.3);
    // Inner edge sharp cutoff
    float innerEdge = smoothstep(0.0, 0.08, t);
    // Outer soft fade
    float outerEdge = 1.0 - smoothstep(0.75, 1.0, t);

    float alpha = brightness * radial * innerEdge * outerEdge;
    alpha = clamp(alpha, 0.0, 1.0);

    // Boost inner brightness
    col *= 1.2 + 0.8*(1.0 - t);

    gl_FragColor = vec4(col * brightness * 1.4, alpha);
  }
`;

const diskMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uInner: { value: diskInner },
    uOuter: { value: diskOuter }
  },
  vertexShader: diskVert,
  fragmentShader: diskFrag,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.DoubleSide
});
const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = -Math.PI/2; // lay flat in XZ
scene.add(disk);

// ============ LENSING ARCS (halo over/under sphere) ============
// The far side of the disk gets lensed up over and under the sphere.
// Approximate with two vertical (XY-plane) arcs: a thin torus band
// representing the bent disk image, colored like the disk.
// Use a torus in XY plane (vertical ring). Major radius ~ sphere radius,
// minor radius = thickness of the halo band.

function makeLensingArc(tilt, yOff, scale, intensity){
  const geo = new THREE.TorusGeometry(1.08*scale, 0.055*scale, 24, 256);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uIntensity: { value: intensity }
    },
    vertexShader: `
      varying vec3 vPos;
      varying vec2 vUv;
      void main(){
        vPos = position;
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform float uTime;
      uniform float uIntensity;
      varying vec3 vPos;
      varying vec2 vUv;

      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p){
        vec2 i = floor(p); vec2 f = fract(p);
        float a = hash(i); float b = hash(i+vec2(1,0));
        float c = hash(i+vec2(0,1)); float d = hash(i+vec2(1,1));
        vec2 u = f*f*(3.0-2.0*f);
        return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
      }

      void main(){
        // vUv.x goes around the torus (major), vUv.y around the tube (minor)
        float a = vUv.x * 6.2831853;
        float tube = abs(vUv.y - 0.5) * 2.0; // 0 at center, 1 at edge

        // Brightest at the "equator" of the halo (where it aligns with disk plane)
        // and fades toward the top/bottom of the halo arc
        // The halo is a vertical ring; "equator" of it is at +/- X (where the disk is)
        float equator = pow(abs(cos(a)), 0.6);

        // Moving clumps along the arc (rotating with disk)
        float rotSpeed = 0.7;
        float spin = a + uTime * rotSpeed;
        float clumps = 0.6 + 0.4*sin(spin*4.0);
        clumps *= 0.7 + 0.3*sin(spin*1.7 + uTime*0.3);

        float shimmer = 0.9 + 0.1*sin(uTime*4.0 + a*3.0);

        // Color: inner-ish disk colors (hot white-yellow)
        vec3 cHot = vec3(1.0, 0.93, 0.78);
        vec3 cWarm = vec3(1.0, 0.72, 0.3);
        vec3 col = mix(cHot, cWarm, 0.4 + 0.3*sin(a*2.0));

        // Radial falloff across tube
        float tubeFade = 1.0 - smoothstep(0.0, 1.0, tube);
        tubeFade = pow(tubeFade, 1.5);

        float alpha = equator * clumps * shimmer * tubeFade * uIntensity;
        alpha = clamp(alpha, 0.0, 1.0);

        gl_FragColor = vec4(col * (1.0 + 0.5*equator) * 1.3, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  // Torus default in XY plane. We want vertical ring. Already is.
  mesh.rotation.x = tilt;
  mesh.position.y = yOff;
  return mesh;
}

// Top arc (lensed far-side disk bent over the top)
const arcTop = makeLensingArc(0, 0.0, 1.0, 0.85);
scene.add(arcTop);
// Bottom arc (mirror under)
const arcBot = makeLensingArc(0, 0.0, 1.0, 0.75);
scene.add(arcBot);

// Additional outer faint halo (Einstein ring feel)
const outerHaloGeo = new THREE.TorusGeometry(1.18, 0.025, 16, 256);
const outerHaloMat = new THREE.MeshBasicMaterial({
  color: 0xffb060,
  transparent: true,
  opacity: 0.28,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const outerHalo = new THREE.Mesh(outerHaloGeo, outerHaloMat);
scene.add(outerHalo);

// Glow sphere around black hole (subtle)
const glowGeo = new THREE.SphereGeometry(1.12, 48, 48);
const glowMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec3 vNorm;
    varying vec3 vView;
    void main(){
      vNorm = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position,1.0);
      vView = normalize(-mv.xyz);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vNorm;
    varying vec3 vView;
    void main(){
      float rim = 1.0 - max(dot(vNorm, vView), 0.0);
      rim = pow(rim, 3.0);
      vec3 col = vec3(1.0, 0.7, 0.35);
      gl_FragColor = vec4(col * rim * 0.8, rim * 0.6);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.BackSide
});
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

// ============ ANIMATION ============
const clock = new THREE.Clock();
let startTime = performance.now() / 1000;

function animate(){
  try {
    const t = performance.now() / 1000 - startTime;
    diskMat.uniforms.uTime.value = t;
    arcTop.material.uniforms.uTime.value = t;
    arcBot.material.uniforms.uTime.value = t;
    glowMat.uniforms.uTime.value = t;

    // Subtle photon ring shimmer
    photonRingMat.opacity = 0.9 + 0.1*Math.sin(t*5.0);
    photonGlowMat.opacity = 0.45 + 0.1*Math.sin(t*3.0 + 1.0);

    // Slow drift of outer halo
    outerHalo.rotation.y = t * 0.05;
    outerHaloMat.opacity = 0.22 + 0.08*Math.sin(t*2.0);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  } catch(e) {
    console.error(e);
    requestAnimationFrame(animate);
  }
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch(err) {
  console.error('Init error:', err);
  document.body.innerHTML = '<div style="color:#fff;font-family:monospace;padding:20px">'+err.message+'</div>';
}
</script>
</body>
</html>
