<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;background:#000;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x020204, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020204);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
const camDist = 7.5;
const camAngle = 6 * Math.PI / 180;
camera.position.set(0, Math.sin(camAngle) * camDist, Math.cos(camAngle) * camDist);
camera.lookAt(0, 0, 0);

// --- Event horizon (black sphere) ---
const sphereGeo = new THREE.SphereGeometry(1.0, 96, 96);
const sphereMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(sphere);

// --- Photon ring (thin bright ring hugging sphere) ---
const photonRingGeo = new THREE.TorusGeometry(1.02, 0.018, 12, 256);
const photonRingMat = new THREE.MeshBasicMaterial({
  color: 0xfff1c8,
  transparent: true,
  opacity: 1.0,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonRing = new THREE.Mesh(photonRingGeo, photonRingMat);
photonRing.rotation.x = Math.PI / 2;
scene.add(photonRing);

// Soft outer halo ring
const haloRingGeo = new THREE.TorusGeometry(1.04, 0.06, 12, 256);
const haloRingMat = new THREE.MeshBasicMaterial({
  color: 0xffc888,
  transparent: true,
  opacity: 0.35,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const haloRing = new THREE.Mesh(haloRingGeo, haloRingMat);
haloRing.rotation.x = Math.PI / 2;
scene.add(haloRing);

// --- Accretion disk shader ---
const diskVert = `
  varying vec3 vLocal;
  void main() {
    vLocal = position;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const diskFrag = `
  precision highp float;
  varying vec3 vLocal;
  uniform float uTime;

  // simple pseudo-noise
  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float noise(vec2 p){
    vec2 i = floor(p); vec2 f = fract(p);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
  }
  float fbm(vec2 p){
    float v = 0.0; float a = 0.5;
    for(int i=0;i<4;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }
    return v;
  }

  void main() {
    // Disk plane = local XY (ring geometry built in XY, then rotated)
    float r = length(vLocal.xy);
    float theta = atan(vLocal.y, vLocal.x);

    float rInner = 1.30;
    float rOuter = 4.20;
    float t = clamp((r - rInner) / (rOuter - rInner), 0.0, 1.0);

    // Color gradient: white-yellow inner -> amber -> deep orange outer
    vec3 cInner = vec3(1.000, 0.953, 0.816); // #fff3d0
    vec3 cMid   = vec3(1.000, 0.682, 0.231); // #ffae3b
    vec3 cOuter = vec3(0.784, 0.333, 0.102); // #c8551a
    vec3 col = mix(cInner, cMid, smoothstep(0.0, 0.45, t));
    col = mix(col, cOuter, smoothstep(0.35, 1.0, t));

    // Rotating clumps / turbulent bands (differential rotation: inner faster)
    float rotSpeed = 0.65; // rad/s (~37 deg/s)
    float omega = rotSpeed * (1.0 + 1.5 / (r + 0.3)); // differential
    float phase = theta - uTime * omega;

    float clump = 0.0;
    clump += fbm(vec2(phase*2.0, r*1.8)) * 0.9;
    clump += fbm(vec2(phase*5.0 - uTime*0.4, r*3.5)) * 0.4;
    clump += (sin(phase*3.0 + r*2.5) * 0.5 + 0.5) * 0.35;

    // Relativistic beaming: one side brighter, drift slowly
    float beamAngle = theta - uTime * 0.08;
    float beam = 0.55 + 0.55 * (sin(beamAngle) * 0.5 + 0.5);
    beam = pow(beam, 1.3);

    // Radial edge fades
    float innerFade = smoothstep(rInner, rInner + 0.18, r);
    float outerFade = 1.0 - smoothstep(rOuter - 0.6, rOuter, r);

    // Shimmer / flicker
    float shimmer = 0.92 + 0.08 * sin(uTime * 6.0 + theta * 11.0 + r * 4.0);

    float alpha = innerFade * outerFade * (0.55 + 0.55 * clump) * beam * shimmer;
    // Boost brightness near inner edge
    float innerBoost = 1.0 + 1.2 * (1.0 - smoothstep(rInner, rInner + 0.6, r));

    col *= innerBoost * (0.8 + 0.6 * clump);

    gl_FragColor = vec4(col, alpha);
  }
`;

const diskGeo = new THREE.RingGeometry(1.30, 4.20, 256, 24);
const diskMat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.DoubleSide,
  uniforms: { uTime: { value: 0 } },
  vertexShader: diskVert,
  fragmentShader: diskFrag
});
const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = -Math.PI / 2; // lay flat in XZ plane
scene.add(disk);

// Second (fainter, wider) disk layer for glow
const diskGlowGeo = new THREE.RingGeometry(1.15, 5.5, 192, 12);
const diskGlowFrag = `
  precision highp float;
  varying vec3 vLocal;
  uniform float uTime;
  void main() {
    float r = length(vLocal.xy);
    float theta = atan(vLocal.y, vLocal.x);
    float t = clamp((r - 1.15) / (5.5 - 1.15), 0.0, 1.0);
    vec3 col = mix(vec3(1.0, 0.85, 0.6), vec3(0.6, 0.25, 0.1), t);
    float innerFade = smoothstep(1.15, 1.5, r);
    float outerFade = 1.0 - smoothstep(4.0, 5.5, r);
    float beam = 0.5 + 0.5 * (sin(theta - uTime*0.08)*0.5 + 0.5);
    float alpha = innerFade * outerFade * 0.18 * beam;
    alpha *= 0.9 + 0.1*sin(uTime*3.0 + theta*6.0);
    gl_FragColor = vec4(col, alpha);
  }
`;
const diskGlowMat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.DoubleSide,
  uniforms: { uTime: { value: 0 } },
  vertexShader: diskVert,
  fragmentShader: diskGlowFrag
});
const diskGlow = new THREE.Mesh(diskGlowGeo, diskGlowMat);
diskGlow.rotation.x = -Math.PI / 2;
scene.add(diskGlow);

// --- Gravitational lensing arcs (top and bottom) ---
// Upper arc: partial torus wrapping over the top of the sphere
const arcFrag = `
  precision highp float;
  varying vec3 vPos;
  uniform float uTime;
  void main() {
    vec3 p = vPos;
    // Use angle around Y to modulate brightness (matches disk clumps)
    float theta = atan(p.z, p.x);
    float beam = 0.55 + 0.55 * (sin(theta - uTime*0.08)*0.5 + 0.5);
    vec3 col = mix(vec3(1.0, 0.95, 0.82), vec3(1.0, 0.68, 0.23), 0.4);
    float shimmer = 0.9 + 0.1 * sin(uTime*4.0 + theta*8.0);
    float alpha = 0.85 * beam * shimmer;
    gl_FragColor = vec4(col * 1.3, alpha);
  }
`;
const arcVert = `
  varying vec3 vPos;
  void main() {
    vPos = (modelMatrix * vec4(position, 1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

function makeLensArc(yOffset, startAngle) {
  // Partial torus in XZ plane (hole along Y), hugging sphere edge
  const geo = new THREE.TorusGeometry(1.05, 0.035, 10, 220, Math.PI * 1.35);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    uniforms: { uTime: { value: 0 } },
    vertexShader: arcVert,
    fragmentShader: arcFrag
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI / 2; // orient in XZ plane
  mesh.rotation.z = startAngle;  // center the arc on +Z (toward camera)
  mesh.position.y = yOffset;
  return mesh;
}

const upperArc = makeLensArc(1.02, -Math.PI * 0.675);
const lowerArc = makeLensArc(-1.02, -Math.PI * 0.675);
scene.add(upperArc);
scene.add(lowerArc);

// Softer wider arcs (halo around lensed image)
function makeLensHalo(yOffset, startAngle) {
  const geo = new THREE.TorusGeometry(1.08, 0.12, 10, 200, Math.PI * 1.35);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    uniforms: { uTime: { value: 0 } },
    vertexShader: arcVert,
    fragmentShader: `
      precision highp float;
      varying vec3 vPos;
      uniform float uTime;
      void main() {
        float theta = atan(vPos.z, vPos.x);
        float beam = 0.55 + 0.55 * (sin(theta - uTime*0.08)*0.5 + 0.5);
        vec3 col = vec3(1.0, 0.75, 0.45);
        float shimmer = 0.85 + 0.15 * sin(uTime*3.0 + theta*6.0);
        float alpha = 0.22 * beam * shimmer;
        gl_FragColor = vec4(col, alpha);
      }
    `
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI / 2;
  mesh.rotation.z = startAngle;
  mesh.position.y = yOffset;
  return mesh;
}

const upperHalo = makeLensHalo(1.02, -Math.PI * 0.675);
const lowerHalo = makeLensHalo(-1.02, -Math.PI * 0.675);
scene.add(upperHalo);
scene.add(lowerHalo);

// --- Starfield ---
const starCount = 600;
const starPos = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const R = 60 + Math.random() * 20;
  starPos[i * 3]     = R * Math.sin(phi) * Math.cos(theta);
  starPos[i * 3 + 1] = R * Math.sin(phi) * Math.sin(theta);
  starPos[i * 3 + 2] = R * Math.cos(phi);
  starSizes[i] = 0.15 + Math.random() * 0.6;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
const starMat = new THREE.PointsMaterial({
  color: 0xdde4ff,
  size: 0.35,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.55,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation loop (timestamp-driven, framerate independent) ---
const clockStart = performance.now();
function animate() {
  const tNow = performance.now();
  const t = (tNow - clockStart) / 1000;

  diskMat.uniforms.uTime.value = t;
  diskGlowMat.uniforms.uTime.value = t;
  upperArc.material.uniforms.uTime.value = t;
  lowerArc.material.uniforms.uTime.value = t;
  upperHalo.material.uniforms.uTime.value = t;
  lowerHalo.material.uniforms.uTime.value = t;

  // Subtle photon ring shimmer
  photonRingMat.opacity = 0.85 + 0.15 * Math.sin(t * 2.3);
  haloRingMat.opacity = 0.3 + 0.08 * Math.sin(t * 1.7 + 1.0);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

} catch (err) {
  console.error(err);
  document.body.style.color = '#fff';
  document.body.style.fontFamily = 'monospace';
  document.body.style.padding = '20px';
  document.body.textContent = 'Error: ' + err.message;
}
</script>
</body>
</html>
