<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Gargantua</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020204;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, bh, diskGroup, arcGroup, photonRing, stars;
const clock = new THREE.Clock();
const tmpV = new THREE.Vector3();

try {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020204);
  scene.fog = new THREE.FogExp2(0x020204, 0.055);

  camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.05, 100);
  camera.position.set(0.0, 0.36, 6.8);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
  renderer.setClearColor(0x020204, 1);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Starfield
  {
    const starCount = 700;
    const positions = new Float32Array(starCount * 3);
    const colors = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 30 + Math.random() * 40;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(THREE.MathUtils.lerp(-0.9, 0.9, Math.random()));
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.cos(phi);
      const z = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 0] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;
      const b = 0.45 + Math.random() * 0.55;
      colors[i * 3 + 0] = b * 0.8;
      colors[i * 3 + 1] = b * 0.85;
      colors[i * 3 + 2] = b;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    g.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const m = new THREE.PointsMaterial({
      size: 0.035,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.85,
      depthWrite: false
    });
    stars = new THREE.Points(g, m);
    scene.add(stars);
  }

  // Black hole sphere
  const bhGeom = new THREE.SphereGeometry(1.0, 48, 32);
  const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  bh = new THREE.Mesh(bhGeom, bhMat);
  scene.add(bh);

  // Photon ring
  const photonTex = makeRingTexture(512, 64, 'photon');
  const photonMat = new THREE.MeshBasicMaterial({
    map: photonTex,
    transparent: true,
    alphaMap: photonTex,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    opacity: 0.9,
    color: 0xfff3d0
  });
  const photonGeo = new THREE.CylinderGeometry(1.085, 1.085, 0.085, 96, 1, true);
  photonRing = new THREE.Mesh(photonGeo, photonMat);
  photonRing.rotation.z = Math.PI / 2;
  scene.add(photonRing);

  // Main accretion disk
  const diskTex = makeDiskTexture(1024, 128);
  const diskMat = new THREE.MeshBasicMaterial({
    map: diskTex,
    transparent: true,
    alphaMap: diskTex,
    blending: THREE.NormalBlending,
    depthWrite: false,
    opacity: 0.98,
    color: 0xffffff,
    side: THREE.DoubleSide
  });
  const diskGeo = new THREE.CylinderGeometry(3.9, 3.9, 0.18, 160, 1, true);
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.z = Math.PI / 2; // make the cylinder axis along x, then disk plane horizontal in x-z
  disk.rotation.x = Math.PI / 2;
  diskGroup = new THREE.Group();
  diskGroup.add(disk);
  scene.add(diskGroup);

  // Lensing arcs above and below
  arcGroup = new THREE.Group();
  const arcUpper = makeLensingArc(1);
  const arcLower = makeLensingArc(-1);
  arcGroup.add(arcUpper, arcLower);
  scene.add(arcGroup);

  // subtle inner glow behind the horizon
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x2b1b12,
    transparent: true,
    opacity: 0.12,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const glow = new THREE.Mesh(new THREE.SphereGeometry(1.12, 32, 24), glowMat);
  scene.add(glow);

  window.addEventListener('resize', onResize, false);
  onResize();

} catch (err) {
  console.error(err);
}

function makeRingTexture(w, h, mode = 'disk') {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  const img = ctx.createImageData(w, h);
  const d = img.data;

  for (let y = 0; y < h; y++) {
    const v = y / (h - 1);
    // alpha profile: bright center with soft falloff
    let band = Math.exp(-Math.pow((v - 0.5) / 0.24, 2.0));
    if (mode === 'photon') band = Math.exp(-Math.pow((v - 0.5) / 0.18, 2.5));

    for (let x = 0; x < w; x++) {
      const u = x / w;
      const ang = u * Math.PI * 2;

      // azimuthal structure and drift-friendly asymmetry
      let clump =
        0.48
        + 0.22 * Math.sin(ang * 3.0 + 0.8)
        + 0.16 * Math.sin(ang * 7.0 - 1.1)
        + 0.10 * Math.sin(ang * 13.0 + 2.2)
        + 0.06 * Math.sin(ang * 29.0 + 0.4);

      // brighter beamed side
      const beaming = 0.78 + 0.42 * (0.5 + 0.5 * Math.cos(ang - 0.35));
      const radial = mode === 'photon' ? 1.15 : (0.62 + 0.38 * (1.0 - Math.abs(v - 0.5) / 0.5));

      let intensity = band * radial * clump * beaming;
      intensity = Math.max(0, Math.min(1, intensity));

      const edgeGlow = mode === 'photon'
        ? Math.pow(1.0 - Math.abs(v - 0.5) / 0.5, 0.35)
        : Math.pow(1.0 - Math.abs(v - 0.5) / 0.5, 0.85);

      const base = mode === 'photon'
        ? [255, 245, 210]
        : (v < 0.35
            ? [255, 243, 208]
            : (v < 0.68 ? [255, 174, 59] : [200, 85, 26]));

      let r = base[0] * intensity;
      let g = base[1] * intensity;
      let b = base[2] * intensity;

      if (mode !== 'photon') {
        // subtle hot streaks / turbulence
        const streak = 0.18 * Math.max(0, Math.sin(ang * 8.0 + v * 10.0));
        r *= 1.0 + streak;
        g *= 1.0 + streak * 0.8;
        b *= 1.0 + streak * 0.25;
      } else {
        r *= 1.0 + 0.35 * edgeGlow;
        g *= 1.0 + 0.25 * edgeGlow;
        b *= 1.0 + 0.10 * edgeGlow;
      }

      const a = Math.min(255, 255 * intensity * (mode === 'photon' ? 1.0 : 0.92));
      const i = (y * w + x) * 4;
      d[i + 0] = r;
      d[i + 1] = g;
      d[i + 2] = b;
      d[i + 3] = a;
    }
  }

  ctx.putImageData(img, 0, 0);

  // soften with a few translucent strokes
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.35, 'rgba(255,245,225,0.08)');
  grad.addColorStop(0.5, 'rgba(255,183,75,0.11)');
  grad.addColorStop(0.7, 'rgba(200,85,26,0.08)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.repeat.set(1, 1);
  tex.needsUpdate = true;
  return tex;
}

function makeLensingArc(sign = 1) {
  const pts = [];
  const r = 4.05;
  const h = 1.52 * sign;
  const z = 0.04;
  pts.push(new THREE.Vector3(-r, 0.03 * sign, z));
  pts.push(new THREE.Vector3(-2.3, 0.55 * h, z));
  pts.push(new THREE.Vector3(-0.9, 1.05 * h, z));
  pts.push(new THREE.Vector3(0.0, 1.18 * h, z));
  pts.push(new THREE.Vector3(0.9, 1.05 * h, z));
  pts.push(new THREE.Vector3(2.3, 0.55 * h, z));
  pts.push(new THREE.Vector3(r, 0.03 * sign, z));

  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
  const geo = new THREE.TubeGeometry(curve, 120, 0.055, 10, false);
  const tex = makeRingTexture(512, 64, 'photon');
  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    alphaMap: tex,
    transparent: true,
    opacity: 0.68,
    color: 0xffefc8,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = 0;
  mesh.rotation.y = 0.0;
  return mesh;
}

function onResize() {
  if (!camera || !renderer) return;
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function animate(now) {
  requestAnimationFrame(animate);
  const t = (now || performance.now()) * 0.001;

  try {
    // disk rotation: 25–40 deg/s
    const spin = t * THREE.MathUtils.degToRad(32.0);
    if (diskGroup) diskGroup.rotation.y = spin;

    // slight drift / shimmer
    if (photonRing) {
      photonRing.rotation.y = -spin * 0.32 + 0.14 * Math.sin(t * 0.4);
      photonRing.material.opacity = 0.78 + 0.12 * Math.sin(t * 3.8) + 0.06 * Math.sin(t * 11.1);
    }
    if (arcGroup) {
      arcGroup.rotation.y = spin * 0.22;
      arcGroup.rotation.z = 0.01 * Math.sin(t * 0.6);
      arcGroup.children.forEach((m, idx) => {
        m.material.opacity = 0.56 + 0.10 * Math.sin(t * 4.0 + idx * 1.7);
      });
    }
    if (stars) {
      stars.material.opacity = 0.72 + 0.06 * Math.sin(t * 0.5);
      stars.rotation.y = 0.01 * Math.sin(t * 0.12);
    }
    if (bh) {
      bh.scale.setScalar(1.0);
    }

    // tiny camera breathing in position, imperceptibly subtle
    camera.position.y = 0.36 + 0.008 * Math.sin(t * 0.45);
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  } catch (err) {
    console.error(err);
  }
}
requestAnimationFrame(animate);

</script>
</body>
</html>
