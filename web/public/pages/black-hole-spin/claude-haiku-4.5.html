<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole - Gargantua</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@r160/build/three.module.js"
    }
}
</script>
<script type="module">
import * as THREE from 'three';

try {
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    
    const vH = window.innerHeight;
    const vW = window.innerWidth;
    
    // Camera positioned ~6 degrees above the disk plane
    const camera = new THREE.PerspectiveCamera(60, vW / vH, 0.1, 10000);
    const camDist = 350;
    const camHeight = camDist * Math.tan(6 * Math.PI / 180);
    camera.position.set(0, camHeight, 0);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, precision: 'mediump' });
    renderer.setSize(vW, vH);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);
    
    // Starfield background
    const starGeo = new THREE.BufferGeometry();
    const starCount = 600;
    const positions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 1500;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 1500;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 1500;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const starMat = new THREE.PointsMaterial({ 
        color: 0xffffff, 
        size: 1.5, 
        sizeAttenuation: true,
        opacity: 0.6,
        transparent: true
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);
    
    // Black hole event horizon (28% of viewport height in diameter)
    const bhRadius = (vH * 0.28) / 2 * 0.5; // scaled to scene units
    const blackHole = new THREE.Mesh(
        new THREE.SphereGeometry(bhRadius, 96, 96),
        new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    scene.add(blackHole);
    
    // Create accretion disk texture
    const texCanvas = document.createElement('canvas');
    texCanvas.width = 1024;
    texCanvas.height = 512;
    const ctx = texCanvas.getContext('2d', { willReadFrequently: true });
    
    function paintDiskTexture(rot) {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, texCanvas.width, texCanvas.height);
        
        const cx = texCanvas.width / 2;
        const cy = texCanvas.height / 2;
        
        // Paint disk with turbulent structure
        for (let a = 0; a < Math.PI * 2; a += 0.02) {
            for (let r = 0; r < 480; r += 3) {
                const actualAngle = a + rot * 0.5;
                const x = cx + Math.cos(actualAngle) * r;
                const y = cy + Math.sin(actualAngle) * r * 0.35;
                
                const rFrac = r / 480;
                
                // Turbulence
                const turb = Math.sin(a * 15 + rot * 2) * 0.2 + Math.sin(a * 7) * 0.15;
                const clump = Math.abs(Math.sin(a * 4.7 + rot)) * 0.3;
                let bright = (1 - rFrac * 0.7 + turb + clump * (1 - rFrac)) * 0.9;
                
                // Beaming (one side brighter)
                const beaming = Math.max(0.6, Math.cos(actualAngle - rot * 0.3) * 0.4 + 0.8);
                bright *= beaming;
                
                // Color based on radius
                let r255, g255, b255;
                if (rFrac < 0.15) {
                    // Inner hot white-yellow
                    r255 = 255; g255 = 243; b255 = 208;
                } else if (rFrac < 0.5) {
                    // Mid amber-orange transition
                    const t = (rFrac - 0.15) / 0.35;
                    r255 = Math.lerp(255, 255, t);
                    g255 = Math.lerp(243, 174, t);
                    b255 = Math.lerp(208, 59, t);
                } else {
                    // Outer deep orange
                    r255 = 200; g255 = 85; b255 = 26;
                }
                
                const rr = Math.floor(r255 * bright);
                const gg = Math.floor(g255 * bright);
                const bb = Math.floor(b255 * bright);
                
                ctx.fillStyle = `rgb(${rr},${gg},${bb})`;
                ctx.fillRect(Math.floor(x) - 1, Math.floor(y) - 1, 2, 2);
            }
        }
    }
    
    Math.lerp = (a, b, t) => a + (b - a) * t;
    
    paintDiskTexture(0);
    const diskTex = new THREE.CanvasTexture(texCanvas);
    diskTex.magFilter = THREE.LinearFilter;
    diskTex.minFilter = THREE.LinearFilter;
    
    // Accretion disk
    const diskGeo = new THREE.TorusGeometry(bhRadius * 3, bhRadius * 1.2, 48, 300);
    const diskMat = new THREE.MeshBasicMaterial({
        map: diskTex,
        transparent: true,
        side: THREE.DoubleSide,
        opacity: 0.95
    });
    const disk = new THREE.Mesh(diskGeo, diskMat);
    disk.rotation.x = 0.1047; // ~6 degrees
    scene.add(disk);
    
    // Upper lensed arc
    const arcGeo1 = new THREE.TorusGeometry(bhRadius * 2.0, bhRadius * 0.4, 32, 128);
    const arcMat1 = new THREE.MeshBasicMaterial({
        color: 0xffae3b,
        transparent: true,
        opacity: 0.65,
        emissive: 0xffa500,
        emissiveIntensity: 0.3,
        side: THREE.DoubleSide
    });
    const arcUpper = new THREE.Mesh(arcGeo1, arcMat1);
    arcUpper.rotation.x = -0.2618; // ~-15 degrees
    scene.add(arcUpper);
    
    // Lower lensed arc
    const arcMat2 = new THREE.MeshBasicMaterial({
        color: 0xff8c42,
        transparent: true,
        opacity: 0.5,
        emissive: 0xff6347,
        emissiveIntensity: 0.2,
        side: THREE.DoubleSide
    });
    const arcLower = new THREE.Mesh(arcGeo1, arcMat2);
    arcLower.rotation.x = 0.2618; // ~+15 degrees
    scene.add(arcLower);
    
    // Photon ring
    const photonGeo = new THREE.TorusGeometry(bhRadius * 1.92, bhRadius * 0.15, 32, 200);
    const photonMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 0.5,
        side: THREE.DoubleSide
    });
    const photonRing = new THREE.Mesh(photonGeo, photonMat);
    photonRing.rotation.x = 0.1047;
    scene.add(photonRing);
    
    // State for animation
    let lastRot = 0;
    
    function animate(now) {
        const t = (now || performance.now()) / 1000;
        
        // Disk rotation: 35 degrees per second
        const rot = (t * 35 * Math.PI / 180) % (Math.PI * 2);
        
        // Update disk only if rotation changed significantly
        if (Math.abs(rot - lastRot) > 0.05 || lastRot === 0) {
            paintDiskTexture(rot);
            diskTex.needsUpdate = true;
            lastRot = rot;
        }
        disk.rotation.z = rot;
        
        // Shimmer effect in arcs
        const shimmer = Math.sin(t * 2.2) * 0.15 + 0.85;
        arcMat1.opacity = shimmer * 0.65;
        arcMat2.opacity = shimmer * 0.5;
        
        // Photon ring flicker
        const flicker = Math.sin(t * 3.1) * 0.25 + 0.75;
        photonMat.emissiveIntensity = flicker * 0.5;
        
        // Disk opacity flicker (subtle)
        diskMat.opacity = 0.93 + Math.sin(t * 1.8) * 0.07;
        
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
    
    // Handle resize
    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    
} catch (error) {
    console.error('Scene initialization error:', error);
    // Fallback: show error message
    document.body.innerHTML = '<div style="color: #f00; padding: 20px;">Error loading scene: ' + error.message + '</div>';
}
</script>
</body>
</html>
