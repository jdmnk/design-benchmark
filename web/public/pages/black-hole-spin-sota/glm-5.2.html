<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
  #scene { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<script type="module">
import * as THREE from 'three';

try {
  // ---- Renderer / scene / camera (set background first so partial failure still shows) ----
  const canvas = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  renderer.setClearColor(0x000000, 1);
  renderer.autoClear = true;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const FOV = 35;
  const camera = new THREE.PerspectiveCamera(FOV, window.innerWidth / window.innerHeight, 0.1, 1000);
  // Disk in XZ plane (horizontal). Camera ~6.5 degrees above disk plane.
  const D = 11.7;
  const elev = 6.5 * Math.PI / 180;
  camera.position.set(0, Math.sin(elev) * D, Math.cos(elev) * D);
  camera.lookAt(0, 0, 0);

  // ---- Colors ----
  const colInner = new THREE.Color(0xfff3d0);
  const colMid   = new THREE.Color(0xffae3b);
  const colOuter = new THREE.Color(0xc8551a);

  // ---- Azimuthal structure texture (clumps / streaks around the ring) ----
  function makeAzimuthTexture() {
    const w = 1024, h = 8;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    const data = new Float32Array(w);
    for (let i = 0; i < w; i++) {
      const t = (i / w) * Math.PI * 2;
      let v = 0;
      v += Math.sin(t * 3.1 + 1.3) * 0.45;
      v += Math.sin(t * 6.7 + 0.7) * 0.30;
      v += Math.sin(t * 12.3 + 2.1) * 0.20;
      v += Math.sin(t * 22.9 + 4.0) * 0.12;
      v += Math.sin(t * 41.0 + 1.9) * 0.07;
      v += (Math.random() - 0.5) * 0.22;
      data[i] = Math.max(0, Math.min(1, 0.55 + v));
    }
    // light smoothing (wrap-aware)
    const sm = new Float32Array(w);
    for (let i = 0; i < w; i++) {
      let s = 0;
      for (let k = -2; k <= 2; k++) s += data[(i + k + w) % w];
      sm[i] = s / 5;
    }
    const img = ctx.createImageData(w, h);
    for (let i = 0; i < w; i++) {
      for (let j = 0; j < h; j++) {
        const idx = (j * w + i) * 4;
        const val = Math.round(sm[i] * 255);
        img.data[idx] = val; img.data[idx + 1] = val; img.data[idx + 2] = val; img.data[idx + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.needsUpdate = true;
    return tex;
  }
  const azTex = makeAzimuthTexture();

  // ---- Black sphere (event horizon) ----
  const sphereR = 1.0;
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(sphereR, 64, 48),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(sphere);

  // ---- Accretion disk (flat, horizontal) with custom shader ----
  const diskInner = 1.08;
  const diskOuter = 4.2;
  const diskGeo = new THREE.RingGeometry(diskInner, diskOuter, 360, 1);
  // lay flat (XZ plane)
  const diskUniforms = {
    uTime:        { value: 0 },
    uTex:         { value: azTex },
    uRotation:    { value: 0 },
    uInner:       { value: diskInner },
    uOuter:       { value: diskOuter },
    uColorInner:  { value: colInner },
    uColorMid:    { value: colMid },
    uColorOuter:  { value: colOuter },
    uBeamingAngle:{ value: 0.0 },
  };
  const diskMat = new THREE.ShaderMaterial({
    uniforms: diskUniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    vertexShader: `
      varying float vAngle;
      varying float vRadius;
      void main() {
        vAngle = atan(position.y, position.x);
        vRadius = length(position.xy);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying float vAngle;
      varying float vRadius;
      uniform float uTime;
      uniform sampler2D uTex;
      uniform float uRotation;
      uniform float uInner;
      uniform float uOuter;
      uniform vec3 uColorInner;
      uniform vec3 uColorMid;
      uniform vec3 uColorOuter;
      uniform float uBeamingAngle;

      void main() {
        float span = max(uOuter - uInner, 1e-4);
        float r = clamp((vRadius - uInner) / span, 0.0, 1.0);

        // rotating azimuthal lookup
        float ang = vAngle + uRotation;
        float u = ang / 6.2831853;
        u = u - floor(u);
        float clump = texture2D(uTex, vec2(u, 0.5)).r;
        clump = 0.45 + 0.95 * clump;

        // radial color gradient
        vec3 col = mix(uColorInner, uColorMid, smoothstep(0.0, 0.42, r));
        col = mix(col, uColorOuter, smoothstep(0.40, 1.0, r));

        // brightness: hot inner edge, fade outward
        float bright = pow(smoothstep(1.0, 0.0, r), 1.4);
        bright += 0.9 * smoothstep(0.10, 0.0, r);   // sharp inner rim
        bright *= clump;

        // relativistic beaming (fixed side brighter)
        float beam = 0.5 + 0.5 * cos(vAngle - uBeamingAngle);
        beam = mix(0.40, 1.55, pow(beam, 2.0));
        bright *= beam;

        // shimmer / flicker
        bright *= 1.0 + 0.13 * sin(uTime * 3.1 + ang * 7.0);
        bright *= 1.0 + 0.08 * sin(uTime * 5.3 - ang * 13.0 + 1.7);

        // soft edges
        float edge = smoothstep(0.0, 0.06, r) * smoothstep(1.0, 0.82, r);
        bright *= edge;

        gl_FragColor = vec4(col * bright, bright);
      }
    `
  });
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.x = -Math.PI / 2; // flat on XZ plane
  scene.add(disk);

  // ---- Photon ring (thin bright circle hugging the silhouette, facing camera) ----
  function makePhotonRing(R, tube, color, intensity) {
    const geo = new THREE.TorusGeometry(R, tube, 10, 200);
    const uni = {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(color) },
      uIntensity: { value: intensity }
    };
    const mat = new THREE.ShaderMaterial({
      uniforms: uni,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide,
      vertexShader: `
        varying float vT;
        void main(){
          vT = atan(position.y, position.x);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        varying float vT;
        uniform float uTime;
        uniform vec3 uColor;
        uniform float uIntensity;
        void main(){
          float sh = 1.0 + 0.06 * sin(uTime * 4.0 + vT * 11.0);
          gl_FragColor = vec4(uColor * uIntensity * sh, 1.0);
        }
      `
    });
    const m = new THREE.Mesh(geo, mat);
    m.userData.uni = uni;
    return m;
  }
  const photonRing = makePhotonRing(1.018, 0.006, 0xfff6cf, 2.2);
  scene.add(photonRing);

  // ---- Lensing arcs (bent disk light wrapping over top & under bottom) ----
  function makeLensingArc(R, tube, color, intensity, topBoost) {
    const geo = new THREE.TorusGeometry(R, tube, 12, 220);
    const uni = {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(color) },
      uIntensity: { value: intensity },
      uTopBoost: { value: topBoost }
    };
    const mat = new THREE.ShaderMaterial({
      uniforms: uni,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide,
      vertexShader: `
        varying float vT;
        void main(){
          vT = atan(position.y, position.x);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        varying float vT;
        uniform float uTime;
        uniform vec3 uColor;
        uniform float uIntensity;
        uniform float uTopBoost;
        void main(){
          // bright at top (vT~pi/2) and bottom (vT~-pi/2), fade toward sides
          float vert = abs(sin(vT));
          float b = smoothstep(0.02, 0.55, vert);
          b = pow(b, 1.25);
          // top arc a bit brighter than bottom
          b *= 1.0 + uTopBoost * smoothstep(0.0, 0.6, sin(vT));
          // shimmer
          b *= 1.0 + 0.16 * sin(uTime * 3.7 + vT * 9.0);
          b *= 1.0 + 0.10 * sin(uTime * 6.1 - vT * 15.0 + 0.8);
          gl_FragColor = vec4(uColor * b * uIntensity, b);
        }
      `
    });
    const m = new THREE.Mesh(geo, mat);
    m.userData.uni = uni;
    return m;
  }
  const lens1 = makeLensingArc(1.10, 0.020, 0xffe9b0, 1.6, 0.35);
  const lens2 = makeLensingArc(1.28, 0.045, 0xffb35a, 0.7, 0.30);
  const lens3 = makeLensingArc(1.55, 0.090, 0xc8551a, 0.28, 0.25);
  scene.add(lens1, lens2, lens3);

  // ---- Starfield (sparse, dim) ----
  function makeStars() {
    const N = 900;
    const pos = new Float32Array(N * 3);
    const col = new Float32Array(N * 3);
    const sz  = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      // random on sphere shell
      const u = Math.random() * 2 - 1;
      const phi = Math.random() * Math.PI * 2;
      const s = Math.sqrt(1 - u * u);
      const r = 80 + Math.random() * 40;
      pos[3*i]   = r * s * Math.cos(phi);
      pos[3*i+1] = r * u;
      pos[3*i+2] = r * s * Math.sin(phi);
      const b = 0.25 + Math.pow(Math.random(), 4) * 0.75;
      // slight color variation
      const tint = Math.random();
      col[3*i]   = b * (0.85 + 0.15 * tint);
      col[3*i+1] = b * 0.95;
      col[3*i+2] = b * (0.9 + 0.10 * (1 - tint));
      sz[i] = 0.6 + Math.pow(Math.random(), 3) * 2.2;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    g.setAttribute('aSize',    new THREE.BufferAttribute(sz, 1));
    const m = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        attribute float aSize;
        varying vec3 vCol;
        uniform float uTime;
        void main(){
          vCol = color;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          float tw = 0.7 + 0.3 * sin(uTime * 2.0 + position.x * 0.7 + position.z * 0.3);
          gl_PointSize = aSize * tw * (300.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        varying vec3 vCol;
        void main(){
          vec2 d = gl_PointCoord - 0.5;
          float a = smoothstep(0.5, 0.0, length(d));
          gl_FragColor = vec4(vCol * a, a);
        }
      `,
      vertexColors: true
    });
    return new THREE.Points(g, m);
  }
  const stars = makeStars();
  scene.add(stars);

  // ---- Resize ----
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  // ---- Render loop (framerate-independent) ----
  const clock = new THREE.Clock();
  // beaming highlight slow drift
  let beamAngle = 0.0;
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    const dt = Math.min(clock.getDelta(), 0.05);

    // disk rotation: ~32 deg/sec
    diskUniforms.uRotation.value += dt * (32 * Math.PI / 180);
    diskUniforms.uTime.value = t;

    // slow drift of beaming highlight
    beamAngle += dt * 0.18;
    diskUniforms.uBeamingAngle.value = Math.sin(beamAngle) * 0.35;

    photonRing.userData.uni.uTime.value = t;
    lens1.userData.uni.uTime.value = t;
    lens2.userData.uni.uTime.value = t;
    lens3.userData.uni.uTime.value = t;
    stars.material.uniforms.uTime.value = t;

    renderer.render(scene, camera);
  }
  animate();
} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
