<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;}
  #c{display:block;width:100vw;height:100vh;background:#000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';

try {
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000005, 1);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000005);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
  // ~6 degrees above the disk plane, distance tuned so the black sphere
  // (radius 1) spans ~28% of viewport height.
  const CAM_DIST = 8.55, CAM_ELEV = 6 * Math.PI / 180;
  camera.position.set(0, CAM_DIST * Math.sin(CAM_ELEV), CAM_DIST * Math.cos(CAM_ELEV));
  camera.lookAt(0, 0, 0);

  // ---------- Starfield ----------
  const starCount = 900;
  const starPos = new Float32Array(starCount * 3);
  const starCol = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    // random point on a large shell
    const u = Math.acos(2 * ((i * 0.6180339887) % 1) - 1);
    const th = 6.283185 * ((i * 0.7548776662) % 1);
    const r = 60 + ((i * 13.37) % 30);
    starPos[i*3]   = r * Math.sin(u) * Math.cos(th);
    starPos[i*3+1] = r * Math.cos(u);
    starPos[i*3+2] = r * Math.sin(u) * Math.sin(th);
    const b = 0.25 + 0.5 * ((i * 0.393) % 1);
    starCol[i*3] = b; starCol[i*3+1] = b; starCol[i*3+2] = b * (0.9 + 0.2*((i*0.17)%1));
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
    size: 0.35, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.8, depthWrite: false
  }));
  scene.add(stars);

  // ---------- Black hole (event horizon) ----------
  const horizon = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 64, 64),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  horizon.renderOrder = 0;
  scene.add(horizon);

  // ---------- Accretion disk (horizontal, edge-on) ----------
  const diskVert = `
    varying float vR;
    varying float vA;
    varying vec3 vWorld;
    void main(){
      vR = length(position.xy);
      vA = atan(position.y, position.x);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `;
  const diskFrag = `
    precision highp float;
    uniform float uTime;
    uniform vec3 uInner;
    uniform vec3 uMid;
    uniform vec3 uOuter;
    varying float vR;
    varying float vA;
    varying vec3 vWorld;
    void main(){
      float rin = 1.3;
      float rout = 4.0;
      float t = clamp((vR - rin) / (rout - rin), 0.0, 1.0);
      vec3 col = t < 0.5 ? mix(uInner, uMid, t*2.0) : mix(uMid, uOuter, (t-0.5)*2.0);
      float bright = mix(1.75, 0.18, t);
      // azimuthal clumps / turbulent bands (baked in local angle -> rotate with disk)
      float s1 = sin(vA*6.0 + vR*1.5);
      float s2 = sin(vA*13.0 - vR*2.0);
      float clump = 0.6 + 0.4*(0.5+0.5*s1) + 0.25*(0.5+0.5*s2);
      bright *= clump;
      // shimmer / flicker
      bright *= 0.9 + 0.1*sin(uTime*6.0 + vA*18.0 + vR*4.0);
      // relativistic beaming: brighter on the approaching (screen -x) side, slow drift
      float beamDir = -vWorld.x + 0.55*sin(uTime*0.22);
      float beam = 0.5 + 1.15*smoothstep(-2.6, 2.6, beamDir);
      bright *= beam;
      // soft inner/outer edge fade
      float a = smoothstep(rin, rin+0.18, vR);
      float b = 1.0 - smoothstep(rout-0.9, rout, vR);
      gl_FragColor = vec4(col * bright, a * b);
    }
  `;
  const diskMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uInner: { value: new THREE.Color(0xfff3d0) },
      uMid:   { value: new THREE.Color(0xffae3b) },
      uOuter: { value: new THREE.Color(0xc8551a) }
    },
    vertexShader: diskVert,
    fragmentShader: diskFrag,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: true,
    side: THREE.DoubleSide
  });
  const diskMesh = new THREE.Mesh(new THREE.RingGeometry(1.3, 4.0, 220, 12), diskMat);
  diskMesh.renderOrder = 1;
  const diskGroup = new THREE.Group();
  diskGroup.rotation.x = -Math.PI / 2; // tilt ring into the horizontal plane
  diskGroup.add(diskMesh);
  scene.add(diskGroup);

  // ---------- Lensing halo (far side bent up & mirrored under) ----------
  const haloVert = `
    varying float vHR;
    varying float vHA;
    void main(){
      vHR = length(position.xy);
      vHA = atan(position.y, position.x);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;
  const haloFrag = `
    precision highp float;
    uniform float uTime;
    uniform vec3 uCol;
    varying float vHR;
    varying float vHA;
    void main(){
      float rin = 1.02, rout = 1.85;
      float t = clamp((vHR - rin) / (rout - rin), 0.0, 1.0);
      float bright = mix(1.9, 0.0, t);
      // strongest over the top & under the bottom of the horizon
      float tb = abs(sin(vHA));
      bright *= 0.2 + 1.5 * pow(tb, 1.4);
      bright *= 0.88 + 0.12 * sin(uTime*4.0 + vHA*8.0);
      gl_FragColor = vec4(uCol * bright, 1.0);
    }
  `;
  const haloMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uCol: { value: new THREE.Color(0xffcf8a) }
    },
    vertexShader: haloVert,
    fragmentShader: haloFrag,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: false,
    side: THREE.DoubleSide
  });
  const halo = new THREE.Mesh(new THREE.RingGeometry(1.02, 1.85, 200, 1), haloMat);
  halo.renderOrder = 2;
  scene.add(halo);

  // ---------- Photon ring (thin bright edge hugging the horizon) ----------
  const photonFrag = `
    precision highp float;
    uniform float uTime;
    varying float vHR;
    varying float vHA;
    void main(){
      float mid = 1.045;
      float d = abs(vHR - mid);
      float bright = smoothstep(0.05, 0.0, d);
      bright *= 0.85 + 0.15 * sin(uTime*5.0 + vHA*14.0);
      // slightly hotter at top/bottom
      bright *= 0.75 + 0.5 * abs(sin(vHA));
      vec3 c = vec3(1.0, 0.95, 0.82);
      gl_FragColor = vec4(c * bright * 2.2, 1.0);
    }
  `;
  const photonMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: haloVert,
    fragmentShader: photonFrag,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: false,
    side: THREE.DoubleSide
  });
  const photonRing = new THREE.Mesh(new THREE.RingGeometry(0.99, 1.12, 200, 1), photonMat);
  photonRing.renderOrder = 3;
  scene.add(photonRing);

  // ---------- Resize ----------
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- Render loop (framerate-independent) ----------
  const SPIN = 32 * Math.PI / 180; // ~32 deg/sec
  function animate(now) {
    const t = now * 0.001;
    diskMesh.rotation.z = t * SPIN;
    diskMat.uniforms.uTime.value = t;
    haloMat.uniforms.uTime.value = t;
    photonMat.uniforms.uTime.value = t;
    stars.rotation.y = t * 0.005;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

} catch (e) {
  console.error(e);
}
</script>
</body>
</html>
