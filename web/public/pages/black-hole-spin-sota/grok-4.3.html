<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gargantua</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
<script type="module">
import * as THREE from 'three';

try {
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    const camDist = 9.5;
    const camAngle = THREE.MathUtils.degToRad(6.5);
    camera.position.set(0, Math.sin(camAngle) * camDist, Math.cos(camAngle) * camDist);
    camera.lookAt(0, 0, 0);

    // Black hole (event horizon)
    const bhRadius = 1.0;
    const bhGeo = new THREE.SphereGeometry(bhRadius, 64, 64);
    const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const blackHole = new THREE.Mesh(bhGeo, bhMat);
    scene.add(blackHole);

    // Photon ring
    const photonGeo = new THREE.TorusGeometry(bhRadius * 1.55, 0.018, 24, 128);
    const photonMat = new THREE.MeshBasicMaterial({
        color: 0xfff8e0,
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending
    });
    const photonRing = new THREE.Mesh(photonGeo, photonMat);
    photonRing.rotation.x = Math.PI / 2;
    scene.add(photonRing);

    // Canvas texture for accretion disk with structure and color gradient
    const texSize = 512;
    const canvas = document.createElement('canvas');
    canvas.width = texSize;
    canvas.height = texSize;
    const ctx = canvas.getContext('2d', { alpha: true });
    const imgData = ctx.createImageData(texSize, texSize);
    const data = imgData.data;

    for (let y = 0; y < texSize; y++) {
        for (let x = 0; x < texSize; x++) {
            const dx = (x / texSize) * 2 - 1;
            const dy = (y / texSize) * 2 - 1;
            const r = Math.sqrt(dx * dx + dy * dy);
            const theta = Math.atan2(dy, dx);

            if (r > 0.12 && r < 0.98) {
                const ringR = (r - 0.12) / 0.86;
                let intensity = Math.pow(1.0 - ringR, 1.6) * 1.1;
                intensity *= (0.65 + 0.35 * Math.sin(theta * 3.7 + ringR * 4.5) * (1 - ringR * 0.6));
                if (theta > 0 && theta < Math.PI) intensity *= 1.35; // relativistic beaming

                const inner = Math.max(0, 1.0 - ringR * 1.4);
                let col = [255, 243, 208];
                if (ringR > 0.25) {
                    col = [255, 174, 59];
                }
                if (ringR > 0.55) {
                    col = [200, 85, 26];
                }
                const i = (y * texSize + x) * 4;
                data[i] = col[0] * intensity;
                data[i + 1] = col[1] * intensity;
                data[i + 2] = col[2] * intensity;
                data[i + 3] = Math.min(255, intensity * 255 * 0.9);
            }
        }
    }
    ctx.putImageData(imgData, 0, 0);
    const diskTexture = new THREE.CanvasTexture(canvas);
    diskTexture.wrapS = diskTexture.wrapT = THREE.RepeatWrapping;
    diskTexture.repeat.set(1, 1);

    // Main accretion disk (slightly thick)
    const diskGeo = new THREE.RingGeometry(bhRadius * 1.65, bhRadius * 4.8, 128, 1);
    const diskMat = new THREE.MeshBasicMaterial({
        map: diskTexture,
        transparent: true,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
    });
    const disk = new THREE.Mesh(diskGeo, diskMat);
    disk.rotation.x = Math.PI / 2;
    scene.add(disk);

    // Lensing arcs (upper and lower)
    const arcGeo = new THREE.TorusGeometry(bhRadius * 2.85, 0.11, 16, 96, Math.PI * 1.15);
    const arcMat = new THREE.MeshBasicMaterial({
        color: 0xffd580,
        transparent: true,
        opacity: 0.85,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
    });

    const upperArc = new THREE.Mesh(arcGeo, arcMat);
    upperArc.rotation.set(-1.05, 0, 0);
    upperArc.position.y = 0.35;
    scene.add(upperArc);

    const lowerArc = new THREE.Mesh(arcGeo, arcMat);
    lowerArc.rotation.set(1.05, 0, Math.PI);
    lowerArc.position.y = -0.35;
    scene.add(lowerArc);

    // Dim starfield
    const starCount = 1800;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i += 3) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const rad = 45 + Math.random() * 55;
        starPos[i] = rad * Math.sin(phi) * Math.cos(theta);
        starPos[i + 1] = rad * Math.sin(phi) * Math.sin(theta);
        starPos[i + 2] = rad * Math.cos(phi);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({
        color: 0xaaaaaa,
        size: 0.09,
        transparent: true,
        opacity: 0.65,
        depthWrite: false
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // Animation
    const startTime = performance.now();
    let lastTime = startTime;

    function animate(now) {
        const t = (now - startTime) / 1000;
        const delta = (now - lastTime) / 1000;
        lastTime = now;

        // Disk rotation ~32 deg/s
        const rotSpeed = THREE.MathUtils.degToRad(32);
        const rot = rotSpeed * t;
        disk.rotation.z = rot;
        photonRing.rotation.z = rot * 0.92;

        // Subtle lensing arc shimmer
        const shimmer = 0.82 + Math.sin(t * 3.8) * 0.12;
        upperArc.material.opacity = 0.78 + Math.sin(t * 2.9) * 0.11;
        lowerArc.material.opacity = 0.78 + Math.cos(t * 3.1) * 0.11;

        // Slow beaming highlight drift
        const beamPhase = t * 0.6;
        diskMat.map.offset.set(beamPhase * 0.02, 0);

        // Gentle photon ring flicker
        photonMat.opacity = 0.92 + Math.sin(t * 5.2) * 0.07;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    // Handle resize
    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    // Start immediately
    requestAnimationFrame(animate);
} catch (e) {
    console.error(e);
}
</script>
</body>
</html>
