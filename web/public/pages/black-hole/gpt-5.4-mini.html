<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gargantua Black Hole</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020203);
scene.fog = new THREE.FogExp2(0x020203, 0.03);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.0, 9.0);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const group = new THREE.Group();
scene.add(group);

const holeRadius = 1.0;
const bhGeom = new THREE.SphereGeometry(holeRadius, 96, 96);
const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const blackHole = new THREE.Mesh(bhGeom, bhMat);
group.add(blackHole);

// Bright photon ring
const ringGeom = new THREE.TorusGeometry(holeRadius * 1.02, 0.06, 24, 256);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0xfff2cf,
  transparent: true,
  opacity: 0.95
});
const photonRing = new THREE.Mesh(ringGeom, ringMat);
photonRing.rotation.x = Math.PI / 2;
group.add(photonRing);

// Main accretion disk
const diskGeom = new THREE.CylinderGeometry(1.28, 2.9, 0.06, 256, 1, true);
const diskMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: {
    time: { value: 0 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    uniform float time;

    vec3 palette(float t) {
      vec3 c1 = vec3(1.0, 0.952, 0.816); // #fff3d0
      vec3 c2 = vec3(1.0, 0.682, 0.231); // #ffae3b
      vec3 c3 = vec3(0.784, 0.345, 0.102); // #c8551a
      if (t < 0.5) return mix(c1, c2, t / 0.5);
      return mix(c2, c3, (t - 0.5) / 0.5);
    }

    void main() {
      vec2 p = vUv * 2.0 - 1.0;
      float r = length(p);
      float ang = atan(p.y, p.x);
      float inner = smoothstep(0.18, 0.48, r);
      float outer = 1.0 - smoothstep(0.72, 1.0, r);

      float radial = smoothstep(0.0, 0.18, r) * (1.0 - smoothstep(0.9, 1.1, r));
      float t = clamp((r - 0.08) / 0.92, 0.0, 1.0);
      vec3 col = palette(t);

      // Bright inner edge and fading outward
      float core = exp(-pow((r - 0.18) / 0.11, 2.0)) * 2.2;
      float glow = exp(-pow((r - 0.38) / 0.22, 2.0)) * 0.9;
      float edge = exp(-pow((r - 0.08) / 0.05, 2.0)) * 1.5;

      // Relativistic beaming: one side brighter
      float beam = 0.58 + 0.72 * (0.5 + 0.5 * cos(ang - 0.55));
      beam = mix(0.72, 1.55, beam);

      // Subtle streaking
      float streak = 0.92 + 0.08 * sin(40.0 * r - time * 0.7 + ang * 10.0);

      float alpha = (0.62 * inner + 0.85 * outer) * 0.95;
      alpha *= 1.0 - smoothstep(0.96, 1.15, r);
      alpha += edge * 0.55;
      alpha += core * 0.35;

      vec3 finalCol = col * (0.65 + 1.15 * beam) * streak;
      finalCol += vec3(1.0, 0.9, 0.7) * (core * 0.8 + glow * 0.35 + edge * 0.9);

      // Slightly darker far side of the disk
      float darken = 0.92 - 0.18 * sin(ang + 0.6);
      finalCol *= darken;

      gl_FragColor = vec4(finalCol, clamp(alpha, 0.0, 1.0));
    }
  `
});
const disk = new THREE.Mesh(diskGeom, diskMat);
disk.rotation.x = Math.PI / 2;
disk.scale.set(2.9, 1.0, 1.0);
group.add(disk);

// Lensing arcs above and below
function makeArc(y, z, sx, sy, opacity, color=0xfff1c7) {
  const g = new THREE.TorusGeometry(2.15, 0.05, 18, 200, Math.PI * 1.02);
  const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
  const arc = new THREE.Mesh(g, m);
  arc.rotation.x = Math.PI / 2;
  arc.position.set(0, y, z);
  arc.scale.set(sx, sy, 1);
  return arc;
}
const arcTop = makeArc(1.05, -0.32, 1.3, 0.62, 0.92, 0xfff3d0);
const arcBot = makeArc(-1.05, -0.32, 1.3, 0.62, 0.92, 0xfff3d0);
arcTop.rotation.z = -0.18;
arcBot.rotation.z = 0.18;
group.add(arcTop, arcBot);

// Secondary warped glow bands
function makeGlowBand(y, scaleY, opacity) {
  const g = new THREE.TorusGeometry(2.55, 0.12, 12, 180, Math.PI * 1.02);
  const m = new THREE.MeshBasicMaterial({ color: 0xff9e2d, transparent: true, opacity, blending: THREE.AdditiveBlending });
  const band = new THREE.Mesh(g, m);
  band.rotation.x = Math.PI / 2;
  band.position.y = y;
  band.scale.set(1.65, scaleY, 1);
  return band;
}
const glowTop = makeGlowBand(1.35, 0.36, 0.35);
const glowBot = makeGlowBand(-1.35, 0.36, 0.35);
group.add(glowTop, glowBot);

// Sparse starfield
const starCount = 900;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const r = 30 + Math.random() * 80;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
  starPos[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.cos(phi);
  starPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
const starGeom = new THREE.BufferGeometry();
starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xbfc7d4, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.55 });
const stars = new THREE.Points(starGeom, starMat);
scene.add(stars);

// Soft back haze
const hazeGeom = new THREE.SphereGeometry(20, 32, 32);
const hazeMat = new THREE.MeshBasicMaterial({ color: 0x050508, transparent: true, opacity: 0.18, side: THREE.BackSide });
const haze = new THREE.Mesh(hazeGeom, hazeMat);
scene.add(haze);

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
addEventListener('resize', onResize);

const clock = new THREE.Clock();

function animate() {
  const t = clock.getElapsedTime();
  diskMat.uniforms.time.value = t;
  group.rotation.y = t * 0.09;
  stars.rotation.y = t * 0.01;
  stars.rotation.x = Math.sin(t * 0.03) * 0.03;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
