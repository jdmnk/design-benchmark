<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua - Supermassive Black Hole</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000000; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@r160/build/three.module.js"
        }
    }
    </script>
    <script type="module">
    import * as THREE from 'three';

    try {
        // Initialize scene, camera, renderer
        const scene = new THREE.Scene();
        const w = window.innerWidth;
        const h = window.innerHeight;
        const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        
        renderer.setSize(w, h);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);
        
        // Position camera edge-on above disk plane (5 degrees above horizon)
        const blackHoleRadius = h * 0.14; // 28% of viewport height diameter
        const cameraDistance = blackHoleRadius * 15;
        camera.position.set(0, blackHoleRadius * 0.5, cameraDistance);
        camera.lookAt(0, 0, 0);

        // Black hole event horizon (perfectly black)
        const bhGeometry = new THREE.SphereGeometry(blackHoleRadius, 128, 128);
        const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
        scene.add(blackHole);

        // Create accretion disk texture
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        // Radial gradient for disk (inner hot white/yellow to outer orange)
        for (let x = 0; x < 1024; x++) {
            const t = x / 1024;
            let r, g, b;
            
            if (t < 0.4) {
                // Inner: hot white-yellow (#fff3d0)
                const lerp = t / 0.4;
                r = 255;
                g = 243 + (174 - 243) * lerp;
                b = 208 + (59 - 208) * lerp;
            } else if (t < 0.7) {
                // Middle: amber (#ffae3b)
                const lerp = (t - 0.4) / 0.3;
                r = 255;
                g = 174 + (107 - 174) * lerp;
                b = 59 + (26 - 59) * lerp;
            } else {
                // Outer: deep orange (#c8551a)
                const lerp = (t - 0.7) / 0.3;
                r = 200 + (50 - 200) * lerp;
                g = 85 + (30 - 85) * lerp;
                b = 26;
            }
            
            const color = Math.floor(r) + (Math.floor(g) << 8) + (Math.floor(b) << 16);
            const col = ('000000' + color.toString(16)).slice(-6);
            ctx.fillStyle = '#' + col;
            ctx.fillRect(x, 0, 1, 512);
        }
        
        // Add subtle noise
        const imgData = ctx.getImageData(0, 0, 1024, 512);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            if (Math.random() > 0.95) {
                const noise = Math.random() * 30;
                data[i] = Math.min(255, data[i] + noise);
                data[i+1] = Math.min(255, data[i+1] + noise * 0.7);
                data[i+2] = Math.min(255, data[i+2] + noise * 0.5);
            }
        }
        ctx.putImageData(imgData, 0, 0);
        
        const diskTexture = new THREE.CanvasTexture(canvas);
        diskTexture.magFilter = THREE.LinearFilter;
        diskTexture.minFilter = THREE.LinearFilter;

        // Front accretion disk (main horizontal band)
        const diskRadius = cameraDistance * 0.35;
        const diskGeometry = new THREE.CylinderGeometry(diskRadius, diskRadius, blackHoleRadius * 0.15, 256, 2);
        
        // Two-sided material with slight brightness modulation for relativistic beaming
        const diskMaterial = new THREE.MeshBasicMaterial({
            map: diskTexture,
            emissive: 0xff9944,
            emissiveIntensity: 1.4,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide
        });
        const disk = new THREE.Mesh(diskGeometry, diskMaterial);
        disk.rotation.x = Math.PI / 2;
        scene.add(disk);

        // Upper lensed disk arc (bent over top)
        const arcGeometry = new THREE.CylinderGeometry(diskRadius * 0.95, diskRadius * 0.95, blackHoleRadius * 0.1, 256, 2);
        const arcMaterial = new THREE.MeshBasicMaterial({
            map: diskTexture,
            emissive: 0xff8833,
            emissiveIntensity: 1.1,
            transparent: true,
            opacity: 0.7,
            side: THREE.DoubleSide
        });
        const upperArc = new THREE.Mesh(arcGeometry, arcMaterial);
        upperArc.rotation.x = Math.PI / 2 - 0.35;
        upperArc.position.y = blackHoleRadius * 3.5;
        scene.add(upperArc);

        // Lower lensed disk arc (bent under bottom, mirrored)
        const lowerArc = new THREE.Mesh(arcGeometry, arcMaterial);
        lowerArc.rotation.x = Math.PI / 2 + 0.35;
        lowerArc.position.y = -blackHoleRadius * 3.5;
        scene.add(lowerArc);

        // Photon ring (thin bright line hugging edge of sphere)
        const photonGeometry = new THREE.TorusGeometry(blackHoleRadius * 1.08, blackHoleRadius * 0.04, 64, 512);
        const photonMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            emissive: 0xffbb88,
            emissiveIntensity: 2.2,
            transparent: true,
            opacity: 0.95
        });
        const photonRing = new THREE.Mesh(photonGeometry, photonMaterial);
        photonRing.rotation.x = Math.PI / 2;
        scene.add(photonRing);

        // Starfield background
        const starsGeometry = new THREE.BufferGeometry();
        const starCount = 300;
        const positions = new Float32Array(starCount * 3);
        const colors = new Float32Array(starCount * 3);

        for (let i = 0; i < starCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const elevation = (Math.random() - 0.5) * Math.PI;
            const distance = (Math.random() * 0.5 + 0.5) * cameraDistance * 8;
            
            positions[i * 3] = Math.cos(elevation) * Math.cos(angle) * distance;
            positions[i * 3 + 1] = Math.sin(elevation) * distance;
            positions[i * 3 + 2] = Math.cos(elevation) * Math.sin(angle) * distance;
            
            const brightness = Math.random() * 0.5 + 0.2;
            colors[i * 3] = brightness;
            colors[i * 3 + 1] = brightness;
            colors[i * 3 + 2] = brightness * 0.95;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const starsMaterial = new THREE.PointsMaterial({
            size: 0.3,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            sizeAttenuation: true
        });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Render loop
        let startTime = Date.now();
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = (Date.now() - startTime) * 0.0001;
            
            // Slowly rotate disk and arcs
            disk.rotation.z = elapsed * 0.3;
            upperArc.rotation.z = elapsed * 0.3;
            lowerArc.rotation.z = elapsed * 0.3;
            photonRing.rotation.z = elapsed * 0.5;
            
            renderer.render(scene, camera);
        }

        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            const newW = window.innerWidth;
            const newH = window.innerHeight;
            camera.aspect = newW / newH;
            camera.updateProjectionMatrix();
            renderer.setSize(newW, newH);
        });

    } catch (error) {
        console.error('Error:', error);
        document.body.innerHTML = '<pre style="color:#f00; padding:20px; font-size:14px;">' + error.stack + '</pre>';
    }
    </script>
</body>
</html>
