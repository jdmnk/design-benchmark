<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua - Supermassive Black Hole</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@r160/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@r160/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            10000
        );
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        document.body.appendChild(renderer.domElement);

        // Camera positioned slightly above the disk plane (5-8 degrees)
        const cameraDistance = 3;
        const cameraHeight = cameraDistance * Math.tan(THREE.MathUtils.degToRad(6));
        camera.position.set(0, cameraHeight, cameraDistance);
        camera.lookAt(0, 0, 0);

        // Create starfield
        const starsGeometry = new THREE.BufferGeometry();
        const starCount = 1000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i + 1] = (Math.random() - 0.5) * 200;
            starPositions[i + 2] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.1,
            sizeAttenuation: true,
            opacity: 0.6
        });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Create black hole (event horizon)
        const blackHoleGeometry = new THREE.SphereGeometry(1, 128, 128);
        const blackHoleMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHole = new THREE.Mesh(blackHoleGeometry, blackHoleMaterial);
        scene.add(blackHole);

        // Create photon ring (thin bright line around black hole)
        const photonRingGeometry = new THREE.BufferGeometry();
        const photonRingPositions = [];
        const photonRingSegments = 256;
        for (let i = 0; i < photonRingSegments; i++) {
            const angle = (i / photonRingSegments) * Math.PI * 2;
            const radius = 1.05;
            photonRingPositions.push(
                Math.cos(angle) * radius,
                0,
                Math.sin(angle) * radius
            );
        }
        photonRingGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(photonRingPositions), 3));
        const photonRingMaterial = new THREE.LineBasicMaterial({ color: 0xffff99, linewidth: 2 });
        const photonRing = new THREE.Line(photonRingGeometry, photonRingMaterial);
        scene.add(photonRing);

        // Create accretion disk with gradient and relativistic beaming
        const diskGeometry = new THREE.BufferGeometry();
        const diskSegments = 512;
        const diskRadialSegments = 128;
        const positions = [];
        const colors = [];

        for (let r = 0; r < diskRadialSegments; r++) {
            const innerRadius = 1.1 + (r / diskRadialSegments) * 4;
            const outerRadius = 1.1 + ((r + 1) / diskRadialSegments) * 4;

            for (let i = 0; i < diskSegments; i++) {
                const angle = (i / diskSegments) * Math.PI * 2;
                const nextAngle = ((i + 1) / diskSegments) * Math.PI * 2;

                // Inner radius vertices
                positions.push(
                    Math.cos(angle) * innerRadius, 0.001, Math.sin(angle) * innerRadius,
                    Math.cos(nextAngle) * innerRadius, 0.001, Math.sin(nextAngle) * innerRadius
                );

                // Outer radius vertices
                positions.push(
                    Math.cos(angle) * outerRadius, 0.001, Math.sin(angle) * outerRadius,
                    Math.cos(nextAngle) * outerRadius, 0.001, Math.sin(nextAngle) * outerRadius
                );

                // Color gradient and relativistic beaming
                const t = r / diskRadialSegments;
                let color;
                if (t < 0.3) {
                    // Hot white-yellow inner
                    color = new THREE.Color(0xfff3d0);
                } else if (t < 0.6) {
                    // Amber middle
                    color = new THREE.Color(0xffae3b);
                } else {
                    // Deep orange outer
                    color = new THREE.Color(0xc8551a);
                }

                // Relativistic beaming: one side brighter
                const beamingFactor = 0.5 + 0.5 * Math.cos(angle);
                color.multiplyScalar(0.7 + 0.3 * beamingFactor);

                colors.push(
                    color.r, color.g, color.b,
                    color.r, color.g, color.b,
                    color.r, color.g, color.b,
                    color.r, color.g, color.b
                );
            }
        }

        diskGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        diskGeometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));

        const diskMaterial = new THREE.MeshBasicMaterial({
            vertexColors: true,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.95
        });
        const disk = new THREE.Mesh(diskGeometry, diskMaterial);
        scene.add(disk);

        // Create lensed disk arcs (above and below the black hole)
        const arcGeometry = new THREE.BufferGeometry();
        const arcPositions = [];
        const arcColors = [];
        const arcSegments = 256;

        // Top arc (lensed disk bending over the top)
        for (let i = 0; i < arcSegments; i++) {
            const angle = (i / arcSegments) * Math.PI * 2;
            const arcHeight = 1.3 + 0.8 * Math.sin(angle * 0.5);
            const arcRadius = 1.1 + 0.3 * Math.cos(angle);

            arcPositions.push(
                Math.cos(angle) * arcRadius,
                arcHeight,
                Math.sin(angle) * arcRadius
            );

            const color = new THREE.Color(0xffae3b);
            color.multiplyScalar(0.6 + 0.4 * Math.abs(Math.sin(angle * 0.5)));
            arcColors.push(color.r, color.g, color.b);
        }

        // Bottom arc (mirrored under the sphere)
        for (let i = 0; i < arcSegments; i++) {
            const angle = (i / arcSegments) * Math.PI * 2;
            const arcHeight = -(1.3 + 0.8 * Math.sin(angle * 0.5));
            const arcRadius = 1.1 + 0.3 * Math.cos(angle);

            arcPositions.push(
                Math.cos(angle) * arcRadius,
                arcHeight,
                Math.sin(angle) * arcRadius
            );

            const color = new THREE.Color(0xffae3b);
            color.multiplyScalar(0.5 + 0.3 * Math.abs(Math.sin(angle * 0.5)));
            arcColors.push(color.r, color.g, color.b);
        }

        arcGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(arcPositions), 3));
        arcGeometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(arcColors), 3));

        const arcMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            linewidth: 3,
            transparent: true,
            opacity: 0.8
        });
        const arcs = new THREE.Line(arcGeometry, arcMaterial);
        scene.add(arcs);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Slowly rotate the disk
            disk.rotation.y += 0.0002;
            arcs.rotation.y += 0.0002;
            photonRing.rotation.y += 0.0002;

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
