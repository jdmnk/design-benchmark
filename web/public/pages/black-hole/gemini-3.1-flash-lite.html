<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gargantua Simulation</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
<script type="module">
    import * as THREE from 'three';

    try {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // -- Event Horizon (The Black Void) --
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const eventHorizon = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(eventHorizon);

        // -- Accretion Disk (Procedural Texture) --
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(256, 256, 100, 256, 256, 256);
        grad.addColorStop(0, '#fff3d0');
        grad.addColorStop(0.2, '#ffae3b');
        grad.addColorStop(1, '#c8551a00');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 512);

        const diskTex = new THREE.CanvasTexture(canvas);
        const diskGeo = new THREE.RingGeometry(1.1, 4, 128, 1);
        const diskMat = new THREE.MeshBasicMaterial({
            map: diskTex,
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const disk = new THREE.Mesh(diskGeo, diskMat);
        disk.rotation.x = Math.PI / 2 + 0.1; // Slight tilt
        scene.add(disk);

        // -- Lensing Effect (The Arcs) --
        const createArc = (yOffset) => {
            const arcGeo = new THREE.TorusGeometry(1.6, 0.2, 16, 100, Math.PI);
            const arcMat = new THREE.MeshBasicMaterial({ color: 0xffae3b, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const arc = new THREE.Mesh(arcGeo, arcMat);
            arc.position.y = yOffset;
            arc.rotation.x = Math.PI / 2;
            return arc;
        };
        const upperArc = createArc(0.4);
        const lowerArc = createArc(-0.4);
        scene.add(upperArc, lowerArc);

        // -- Photon Ring --
        const photonRing = new THREE.Mesh(
            new THREE.RingGeometry(1.02, 1.05, 128),
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
        );
        photonRing.rotation.x = Math.PI / 2 + 0.1;
        scene.add(photonRing);

        // -- Starfield --
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1000;
        const pos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) pos[i] = (Math.random() - 0.5) * 100;
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.05, color: 0xffffff }));
        scene.add(stars);

        // -- Animation Loop --
        function animate() {
            requestAnimationFrame(animate);
            disk.rotation.z += 0.005;
            upperArc.rotation.z += 0.005;
            lowerArc.rotation.z += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

    } catch (e) {
        console.error("Rendering failed:", e);
    }
</script>
</body>
</html>
