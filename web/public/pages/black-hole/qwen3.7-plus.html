<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;background:#000;}
  canvas{display:block;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020204);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x020204, 1);
document.body.appendChild(renderer.domElement);

// Camera: 6 degrees above the disk plane
const camDist = 10.0;
const camAngle = THREE.MathUtils.degToRad(6.0);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, camDist * Math.sin(camAngle), camDist * Math.cos(camAngle));
camera.lookAt(0, 0, 0);

// Sphere radius chosen so black hole is ~28% of viewport height
const BH_RADIUS = 1.1;

// Black hole sphere
const bhGeo = new THREE.SphereGeometry(BH_RADIUS, 64, 64);
const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const bh = new THREE.Mesh(bhGeo, bhMat);
scene.add(bh);

// ----- Starfield -----
const starCount = 1800;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starCol = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  // distribute on a large sphere, but bias away from the equator (where disk is)
  let x, y, z;
  do {
    const u = Math.random() * 2 - 1;
    const theta = Math.random() * Math.PI * 2;
    const r = 180;
    x = r * Math.sqrt(1 - u*u) * Math.cos(theta);
    y = r * u;
    z = r * Math.sqrt(1 - u*u) * Math.sin(theta);
  } while (Math.abs(y) < 30); // avoid the bright disk plane
  starPos[i*3] = x; starPos[i*3+1] = y; starPos[i*3+2] = z;
  const b = 0.3 + Math.random() * 0.7;
  const tint = 0.8 + Math.random() * 0.2;
  starCol[i*3] = b * tint;
  starCol[i*3+1] = b * tint;
  starCol[i*3+2] = b;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
const starMat = new THREE.PointsMaterial({
  size: 0.6,
  vertexColors: true,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.85,
  depthWrite: false
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ----- Accretion Disk (horizontal plane) -----
const diskInner = BH_RADIUS * 1.35;
const diskOuter = BH_RADIUS * 4.2;
const diskGeo = new THREE.RingGeometry(diskInner, diskOuter, 256, 8);
// RingGeometry lies in XY by default; rotate so it's in XZ (horizontal)
diskGeo.rotateX(-Math.PI / 2);

const diskMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uInner: { value: diskInner },
    uOuter: { value: diskOuter }
  },
  vertexShader: `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vPos;
    uniform float uTime;
    uniform float uInner;
    uniform float uOuter;
    void main() {
      float r = length(vPos.xz);
      float t = clamp((r - uInner) / (uOuter - uInner), 0.0, 1.0);
      vec3 c1 = vec3(1.000, 0.953, 0.816); // #fff3d0
      vec3 c2 = vec3(1.000, 0.678, 0.231); // #ffae3b
      vec3 c3 = vec3(0.784, 0.333, 0.102); // #c8551a
      vec3 col = mix(c1, c2, smoothstep(0.0, 0.45, t));
      col = mix(col, c3, smoothstep(0.35, 1.0, t));

      // angular variation: noise-ish swirls + relativistic beaming
      float ang = atan(vPos.z, vPos.x);
      float spin = ang + uTime * 0.15 + r * 0.8;
      float swirl = 0.85 + 0.15 * sin(spin * 6.0) * sin(spin * 2.3 + 1.7);

      // beaming: approaching side brighter (negative x side when rotating +Y)
      float beam = 0.55 + 0.55 * (0.5 - 0.5 * cos(ang + uTime * 0.15));
      beam = pow(beam, 1.4);

      // radial falloff intensity
      float intensity = (1.0 - smoothstep(0.75, 1.0, t)) * smoothstep(0.0, 0.08, t);
      intensity *= (1.0 + 1.2 * (1.0 - t)); // brighter near inner edge

      col *= swirl * beam * intensity * 1.6;

      float alpha = intensity * (0.85 + 0.15 * swirl);
      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const disk = new THREE.Mesh(diskGeo, diskMat);
scene.add(disk);

// ----- Lensing arcs (top and bottom) -----
// These represent the far side of the disk bent over/under the black hole.
// We use thin half-tori in the vertical (XY) plane, wrapping around the sphere.
function makeLensingArc(signY) {
  // half torus: ring in XY plane, tubular direction goes around Y axis
  // Default TorusGeometry ring lies in XZ; rotate -90° around X to put ring in XY
  const majorR = BH_RADIUS * 1.02;
  const tubeR = BH_RADIUS * 0.12;
  const geo = new THREE.TorusGeometry(majorR, tubeR, 24, 160, Math.PI);
  geo.rotateX(-Math.PI / 2);
  // Now the half torus goes from +X (angle 0) through +Y (angle PI/2) to -X (angle PI)
  // For bottom arc, mirror Y
  if (signY < 0) {
    // reflect across X axis so arc goes below
    for (let i = 0; i < geo.attributes.position.count; i++) {
      const x = geo.attributes.position.getX(i);
      const y = geo.attributes.position.getY(i);
      const z = geo.attributes.position.getZ(i);
      // We want arc from +X through -Y to -X
      geo.attributes.position.setY(i, -y);
      geo.attributes.position.setZ(i, z);
    }
    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();
  }

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uSign: { value: signY } },
    vertexShader: `
      varying vec3 vPos;
      varying vec3 vNorm;
      void main() {
        vPos = position;
        vNorm = normal;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vPos;
      varying vec3 vNorm;
      uniform float uTime;
      uniform float uSign;
      void main() {
        // distance from origin in xz (radial distance from vertical axis)
        float rXZ = length(vPos.xz);
        float ang = atan(vPos.z, vPos.x);
        // color gradient: inner bright white-yellow, outer orange
        float t = clamp((rXZ - 1.05) / 0.4, 0.0, 1.0);
        vec3 c1 = vec3(1.00, 0.95, 0.82);
        vec3 c2 = vec3(1.00, 0.68, 0.23);
        vec3 c3 = vec3(0.78, 0.33, 0.10);
        vec3 col = mix(c1, c2, smoothstep(0.0, 0.5, t));
        col = mix(col, c3, smoothstep(0.4, 1.0, t));

        // swirl along the arc
        float swirl = 0.85 + 0.15 * sin(ang * 8.0 + uTime * 0.3);

        // beaming: one side brighter
        float beam = 0.55 + 0.55 * (0.5 - 0.5 * cos(ang + uTime * 0.15));
        beam = pow(beam, 1.3);

        // falloff at ends of the arc
        float endFade = 1.0 - smoothstep(0.75, 1.0, abs(vPos.x) / 1.15);

        col *= swirl * beam * 1.7;
        float alpha = endFade * (0.75 + 0.25 * swirl) * beam;
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  return new THREE.Mesh(geo, mat);
}

const topArc = makeLensingArc(1);
const bottomArc = makeLensingArc(-1);
const arcGroup = new THREE.Group();
arcGroup.add(topArc);
arcGroup.add(bottomArc);
scene.add(arcGroup);

// ----- Photon ring (thin bright ring hugging the sphere edge) -----
const photonGeo = new THREE.TorusGeometry(BH_RADIUS * 1.005, BH_RADIUS * 0.012, 12, 256);
photonGeo.rotateX(Math.PI / 2); // lay flat so it hugs equator
const photonMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vPos;
    uniform float uTime;
    void main() {
      float ang = atan(vPos.z, vPos.x);
      float flick = 0.9 + 0.1 * sin(ang * 30.0 + uTime * 2.0);
      vec3 col = vec3(1.0, 0.93, 0.78) * flick * 2.0;
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonRing = new THREE.Mesh(photonGeo, photonMat);
scene.add(photonRing);

// ----- Render loop -----
const clock = new THREE.Clock();
function animate() {
  const t = clock.getElapsedTime();
  diskMat.uniforms.uTime.value = t;
  topArc.material.uniforms.uTime.value = t;
  bottomArc.material.uniforms.uTime.value = t;
  photonMat.uniforms.uTime.value = t;
  // slow disk rotation
  disk.rotation.y = t * 0.08;
  // arcs follow disk rotation (lensed far side)
  arcGroup.rotation.y = t * 0.08;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch (e) {
  console.error(e);
  document.body.style.background = '#000';
}
</script>
</body>
</html>
