<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;width:100vw;height:100vh;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ---------- Scene / Camera / Renderer ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020204);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
// Elevation ~6 degrees above disk plane
const camDist = 24;
const elev = THREE.MathUtils.degToRad(6.0);
camera.position.set(0, camDist * Math.sin(elev), camDist * Math.cos(elev));
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- Sizes ----------
// Black hole apparent radius chosen so diameter ~28% of viewport height.
// fov=55 => half-height at distance d is d*tan(27.5). 2*R / (2*d*tan(27.5)) = 0.28
const halfFov = THREE.MathUtils.degToRad(55/2);
const targetApparent = 0.28;
const R = camDist * Math.tan(halfFov) * targetApparent; // ~1.64

const INNER = R * 1.45;   // inner edge of disk (just outside ISCO)
const OUTER = R * 5.2;    // outer edge of disk

// ---------- Starfield ----------
{
  const N = 1200;
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  for (let i=0;i<N;i++){
    // distribute on a far sphere
    const u = Math.random()*2-1;
    const t = Math.random()*Math.PI*2;
    const r = 900;
    const s = Math.sqrt(1-u*u);
    pos[i*3]   = r*s*Math.cos(t);
    pos[i*3+1] = r*u;
    pos[i*3+2] = r*s*Math.sin(t);
    const b = 0.3 + Math.random()*0.7;
    col[i*3]   = 0.8*b;
    col[i*3+1] = 0.85*b;
    col[i*3+2] = 1.0*b;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.BufferAttribute(col,3));
  const m = new THREE.PointsMaterial({size:1.6, sizeAttenuation:false, vertexColors:true, transparent:true, opacity:0.85, depthWrite:false});
  m.fog = false;
  scene.add(new THREE.Points(g,m));
}

// ---------- Event horizon (black sphere) ----------
const bhGeo = new THREE.SphereGeometry(R, 96, 96);
const bhMat = new THREE.MeshBasicMaterial({color:0x000000});
const bh = new THREE.Mesh(bhGeo, bhMat);
scene.add(bh);

// Slightly larger dark "shadow" halo to soften the edge against the disk
const shadowGeo = new THREE.SphereGeometry(R*1.015, 64, 64);
const shadowMat = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:1.0});
scene.add(new THREE.Mesh(shadowGeo, shadowMat));

// ---------- Accretion disk (flat, in XZ plane) ----------
const diskVert = `
  varying vec2 vUv;
  varying vec3 vWorldPos;
  void main(){
    vUv = uv;
    vec4 wp = modelMatrix * vec4(position,1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const diskFrag = `
  precision highp float;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  uniform float uInner;
  uniform float uOuter;
  uniform float uTime;

  // hash noise
  float hash(vec2 p){ return fract(sin(dot(p, vec2(41.3,289.1)))*43758.5); }
  float noise(vec2 p){
    vec2 i=floor(p), f=fract(p);
    float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
    vec2 u=f*f*(3.0-2.0*f);
    return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;
  }
  float fbm(vec2 p){
    float v=0.0, a=0.5;
    for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.0; a*=0.5; }
    return v;
  }

  void main(){
    vec2 p = vWorldPos.xz;
    float r = length(p);
    if (r < uInner*0.98 || r > uOuter) discard;

    float t = clamp((r - uInner)/(uOuter - uInner), 0.0, 1.0);

    // Color gradient: hot white-yellow -> amber -> deep orange
    vec3 cInner = vec3(1.000, 0.953, 0.816); // #fff3d0
    vec3 cMid   = vec3(1.000, 0.678, 0.231); // #ffae3b
    vec3 cOuter = vec3(0.784, 0.333, 0.102); // #c8551a
    vec3 col;
    if (t < 0.35) col = mix(cInner, cMid, t/0.35);
    else          col = mix(cMid,   cOuter, (t-0.35)/0.65);

    // Angular coordinate for beaming & texture
    float ang = atan(p.y, p.x);

    // Relativistic beaming: one side brighter (approaching side)
    // Approaching side at ang ~ -PI/2 (depending on rotation direction)
    float beam = 0.55 + 0.55 * (0.5 - 0.5*cos(ang + 3.14159*0.5));
    // extra hot spot on approaching side
    float spot = exp(-pow((ang + 1.5708),2.0)*1.2);
    beam += spot*0.6;

    // Turbulent swirl texture (rotates with disk)
    float swirl = ang + uTime*0.15;
    vec2 uv = vec2(cos(swirl), sin(swirl)) * r * 1.2 + vec2(uTime*0.2, 0.0);
    float n = fbm(uv);
    float streaks = fbm(vec2(ang*6.0 + uTime*0.3, r*0.6));
    float tex = 0.55 + 0.55*n + 0.35*streaks;

    // Radial falloff: bright at inner, fade at outer
    float rad = pow(1.0 - t, 1.6);
    float innerBoost = smoothstep(0.0, 0.15, 1.0-t) * 1.4;

    float intensity = rad * beam * tex * (0.6 + innerBoost*0.4);

    // Hot inner edge white boost
    col = mix(col, vec3(1.0,0.98,0.9), smoothstep(0.2,0.0,t)*0.6);

    // Slight vertical thickness fade (we view nearly edge-on, but disk has some depth)
    float y = vWorldPos.y;
    float thick = exp(-y*y*40.0);
    intensity *= thick;

    // Alpha
    float alpha = clamp(intensity, 0.0, 1.0);
    alpha *= smoothstep(uInner, uInner*1.05, r) * smoothstep(uOuter, uOuter*0.97, r);

    gl_FragColor = vec4(col * intensity * 1.6, alpha);
  }
`;

const diskGeo = new THREE.RingGeometry(INNER, OUTER, 256, 8);
const diskMat = new THREE.ShaderMaterial({
  vertexShader: diskVert,
  fragmentShader: diskFrag,
  uniforms: {
    uInner:{value:INNER},
    uOuter:{value:OUTER},
    uTime:{value:0}
  },
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false,
  side:THREE.DoubleSide
});
const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = -Math.PI/2;
scene.add(disk);

// ---------- Photon ring (hugging the edge of the sphere) ----------
const photonGeo = new THREE.TorusGeometry(R*1.012, R*0.012, 24, 256);
const photonMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color(1.0, 0.95, 0.82),
  transparent:true, opacity:1.0,
  blending:THREE.AdditiveBlending, depthWrite:false
});
const photon = new THREE.Mesh(photonGeo, photonMat);
photon.rotation.x = Math.PI/2; // lie in XZ plane
scene.add(photon);

// Outer softer photon glow ring
const photonGlowGeo = new THREE.TorusGeometry(R*1.04, R*0.04, 16, 256);
const photonGlowMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color(1.0, 0.75, 0.35),
  transparent:true, opacity:0.55,
  blending:THREE.AdditiveBlending, depthWrite:false
});
const photonGlow = new THREE.Mesh(photonGlowGeo, photonGlowMat);
photonGlow.rotation.x = Math.PI/2;
scene.add(photonGlow);

// ---------- Lensed arcs (top & bottom) ----------
// These represent the far side of the disk bent over/under the black hole.
// We build a tube following a curve that arches over the sphere silhouette.

function makeLensedArc(sign){
  // Curve: for z in [-outerArc, +outerArc], y = sign * sqrt(max(0, Rp^2 - z^2)) * scale
  // Plus we extend slightly past the sphere silhouette.
  const Rp = R * 1.75; // apparent photon-ring-like radius for the arc
  const zExtent = OUTER * 0.95;
  const pts = [];
  const N = 180;
  for (let i=0;i<=N;i++){
    const t = i/N;
    const z = -zExtent + t*(2*zExtent);
    const zz = Math.min(Math.abs(z), Rp*0.995);
    const yBase = Math.sqrt(Math.max(0.0, Rp*Rp - zz*zz));
    // Blend: when |z| > Rp, taper to 0 (the arc meets the disk plane)
    let y;
    if (Math.abs(z) <= Rp*0.95){
      y = sign * yBase;
    } else {
      // fade to disk plane
      const f = (Math.abs(z) - Rp*0.95)/(zExtent - Rp*0.95);
      y = sign * yBase * (1 - f);
    }
    pts.push(new THREE.Vector3(0, y, z));
  }
  const curve = new THREE.CatmullRomCurve3(pts);

  // Tube radius varies: thinnest at apex, thicker near the ends where it meets disk
  const tubeSegs = 220;
  const radSegs = 14;
  const geo = new THREE.TubeGeometry(curve, tubeSegs, R*0.02, radSegs, false);

  // Build per-vertex colors based on distance from sphere (brighter near sphere)
  const pos = geo.attributes.position;
  const colors = new Float32Array(pos.count*3);
  const tmp = new THREE.Vector3();
  for (let i=0;i<pos.count;i++){
    tmp.fromBufferAttribute(pos,i);
    const r = tmp.length();
    // distance from sphere surface
    const d = Math.max(0, r - R);
    const nd = d / (OUTER - R); // 0..~1
    const falloff = Math.exp(-nd*3.5);
    // color: inner white-yellow -> amber -> orange
    const cInner = [1.000, 0.953, 0.816];
    const cMid   = [1.000, 0.678, 0.231];
    const cOuter = [0.784, 0.333, 0.102];
    let rr,gg,bb;
    if (nd < 0.35){
      const k = nd/0.35;
      rr = cInner[0]*(1-k)+cMid[0]*k;
      gg = cInner[1]*(1-k)+cMid[1]*k;
      bb = cInner[2]*(1-k)+cMid[2]*k;
    } else {
      const k = (nd-0.35)/0.65;
      rr = cMid[0]*(1-k)+cOuter[0]*k;
      gg = cMid[1]*(1-k)+cOuter[1]*k;
      bb = cMid[2]*(1-k)+cOuter[2]*k;
    }
    const intensity = falloff * 1.8;
    colors[i*3]   = rr*intensity;
    colors[i*3+1] = gg*intensity;
    colors[i*3+2] = bb*intensity;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors:true,
    transparent:true,
    opacity:0.95,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    side:THREE.DoubleSide
  });
  return new THREE.Mesh(geo, mat);
}

const arcTop = makeLensedArc(+1);
const arcBot = makeLensedArc(-1);
scene.add(arcTop);
scene.add(arcBot);

// Extra bright thin inner arc hugging photon ring silhouette
function makeInnerHaloArc(sign){
  const Rp = R * 1.035;
  const zExtent = R * 1.05;
  const pts = [];
  const N = 160;
  for (let i=0;i<=N;i++){
    const t = i/N;
    const z = -zExtent + t*(2*zExtent);
    const zz = Math.min(Math.abs(z), Rp*0.998);
    const yBase = Math.sqrt(Math.max(0.0, Rp*Rp - zz*zz));
    let y;
    if (Math.abs(z) <= Rp*0.98){
      y = sign * yBase;
    } else {
      const f = (Math.abs(z) - Rp*0.98)/(zExtent - Rp*0.98);
      y = sign * yBase * (1 - f);
    }
    pts.push(new THREE.Vector3(0, y, z));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, 180, R*0.008, 10, false);
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(1.0, 0.96, 0.85),
    transparent:true, opacity:0.9,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  return new THREE.Mesh(geo, mat);
}
scene.add(makeInnerHaloArc(+1));
scene.add(makeInnerHaloArc(-1));

// ---------- Subtle front glow halo around sphere (Einstein-ring-like) ----------
{
  const haloGeo = new THREE.RingGeometry(R*1.02, R*1.35, 256, 1);
  const haloMat = new THREE.ShaderMaterial({
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide,
    uniforms:{},
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`
      varying vec2 vUv;
      void main(){
        // vUv.x is radial 0..1 across the ring
        float r = vUv.x;
        float a = exp(-r*6.0) * 0.55;
        vec3 col = mix(vec3(1.0,0.95,0.82), vec3(1.0,0.7,0.3), r);
        gl_FragColor = vec4(col*a, a);
      }
    `
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  // Orient ring to face camera? No — we want it as a circular halo in screen space around sphere.
  // Billboard: make it always face camera
  halo.onBeforeRender = function(renderer, scene, camera){
    this.quaternion.copy(camera.quaternion);
  };
  scene.add(halo);
}

// ---------- Animation ----------
const clock = new THREE.Clock();
function animate(){
  const t = clock.getElapsedTime();
  diskMat.uniforms.uTime.value = t;

  // Rotate disk and arcs slowly around Y
  const rot = t * 0.05;
  disk.rotation.z = rot; // in XZ plane after x-rotation, z-rot spins it
  arcTop.rotation.y = rot;
  arcBot.rotation.y = rot;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
