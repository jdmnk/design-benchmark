<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;width:100vw;height:100vh;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030305);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x030305, 1);
document.body.appendChild(renderer.domElement);

// --- Sizing: sphere diameter ~ 28% of viewport height ---
// We'll compute sphere radius from camera FOV and distance.
const vh = window.innerHeight;
const fovRad = THREE.MathUtils.degToRad(camera.fov);
// distance from camera to origin
const camDist = 9.0;
// desired sphere screen height = 0.28 * vh
// sphere world diameter = 2 * camDist * tan(fov/2) * 0.28
const sphereDiamWorld = 2 * camDist * Math.tan(fovRad/2) * 0.28;
const sphereR = sphereDiamWorld / 2;

// Camera ~6° above disk plane
const camAngle = THREE.MathUtils.degToRad(6);
camera.position.set(0, Math.sin(camAngle)*camDist, Math.cos(camAngle)*camDist);
camera.lookAt(0,0,0);

// --- Starfield ---
const starGeo = new THREE.BufferGeometry();
const starCount = 600;
const starPos = new Float32Array(starCount*3);
const starCol = new Float32Array(starCount*3);
for (let i=0;i<starCount;i++){
  const r = 200 + Math.random()*300;
  const th = Math.random()*Math.PI*2;
  const ph = Math.acos(2*Math.random()-1);
  starPos[i*3]   = r*Math.sin(ph)*Math.cos(th);
  starPos[i*3+1] = r*Math.sin(ph)*Math.sin(th);
  starPos[i*3+2] = r*Math.cos(ph);
  const b = 0.3 + Math.random()*0.5;
  starCol[i*3]   = b*0.9;
  starCol[i*3+1] = b*0.9;
  starCol[i*3+2] = b;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol,3));
const starMat = new THREE.PointsMaterial({ size: 0.6, vertexColors:true, sizeAttenuation:true, transparent:true, opacity:0.8 });
scene.add(new THREE.Points(starGeo, starMat));

// --- Event Horizon (black sphere) ---
const bhGeo = new THREE.SphereGeometry(sphereR, 64, 64);
const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const blackHole = new THREE.Mesh(bhGeo, bhMat);
scene.add(blackHole);

// --- Photon ring (thin bright ring hugging sphere edge) ---
// A torus in a vertical plane, very thin, with additive blending
const photonRingGeo = new THREE.TorusGeometry(sphereR*1.015, sphereR*0.012, 12, 128);
const photonRingMat = new THREE.MeshBasicMaterial({
  color: 0xffe8b0,
  transparent: true,
  opacity: 0.95,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonRing = new THREE.Mesh(photonRingGeo, photonRingMat);
// Torus lies in XY by default; we want it in vertical plane perpendicular to camera... 
// Actually we want the photon ring to be a circle in any vertical plane. Since camera looks along -Z,
// place it in XY plane (vertical) so it hugs the sphere silhouette.
photonRing.rotation.x = 0; // already in XY plane
scene.add(photonRing);

// Add a second softer outer photon ring
const photonRing2Geo = new THREE.TorusGeometry(sphereR*1.04, sphereR*0.025, 12, 128);
const photonRing2Mat = new THREE.MeshBasicMaterial({
  color: 0xffb060,
  transparent: true,
  opacity: 0.45,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonRing2 = new THREE.Mesh(photonRing2Geo, photonRing2Mat);
scene.add(photonRing2);

// --- Accretion disk (in XZ plane, horizontal) ---
const diskInner = sphereR * 1.35;
const diskOuter = sphereR * 4.2;

const diskVert = `
varying vec2 vUv;
varying vec3 vPos;
void main(){
  vUv = uv;
  vPos = position;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}`;

const diskFrag = `
uniform float uTime;
uniform float uInner;
uniform float uOuter;
varying vec2 vUv;
varying vec3 vPos;

void main(){
  // vPos is in disk local space (disk in XZ plane)
  float r = length(vPos.xz);
  float t = clamp((r - uInner)/(uOuter - uInner), 0.0, 1.0);

  // Angle around disk
  float ang = atan(vPos.z, vPos.x);

  // Color gradient: white-yellow -> amber -> deep orange
  vec3 inner = vec3(1.0, 0.953, 0.816);  // #fff3d0
  vec3 mid   = vec3(1.0, 0.678, 0.231);  // #ffae3b
  vec3 outer = vec3(0.784, 0.333, 0.102); // #c8551a

  vec3 col;
  if(t < 0.35){
    col = mix(inner, mid, t/0.35);
  } else {
    col = mix(mid, outer, (t-0.35)/0.65);
  }

  // Relativistic beaming: one side brighter (approaching side)
  // Boost based on angle; rotating pattern
  float beam = 0.75 + 0.55 * (0.5 + 0.5 * sin(ang + uTime*0.4));
  col *= beam;

  // Slight turbulence / mottling
  float turb = 0.85 + 0.15 * sin(ang*8.0 + uTime*0.6 + r*1.5);
  col *= turb;

  // Radial falloff: bright near inner edge, fades outward
  float radial = smoothstep(0.0, 0.15, t) * (1.0 - smoothstep(0.7, 1.0, t));
  radial = pow(radial, 0.6);

  // Boost inner edge
  float innerBoost = 1.0 + 1.2 * smoothstep(0.2, 0.0, t);
  col *= innerBoost;

  float alpha = radial * (0.6 + 0.4*beam);
  gl_FragColor = vec4(col, alpha);
}
`;

const diskGeo = new THREE.RingGeometry(diskInner, diskOuter, 180, 8);
const diskMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uInner: { value: diskInner },
    uOuter: { value: diskOuter }
  },
  vertexShader: diskVert,
  fragmentShader: diskFrag,
  transparent: true,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = -Math.PI/2; // lay in XZ plane
scene.add(disk);

// --- Gravitational lensing arcs ---
// The far side of the disk gets bent up over the top AND under the bottom of the black hole.
// We simulate this with two vertical torus-like arcs (thin bright bands) that go over/under the sphere.

function makeLensArc(radiusY, radiusZ, tubeR, length, yOffset, color, opacity){
  // Create a torus in vertical plane (XY plane), then we'll clip via shader / positioning
  // Use a thin torus centered at origin; the sphere will occlude the back portion naturally.
  const geo = new THREE.TorusGeometry(radiusY, tubeR, 16, 160, length);
  const mat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  // TorusGeometry's default ring is in XY plane, centered at origin.
  // We want it vertical, wrapping around the black hole.
  // Rotate so the torus ring lies in a plane that goes over the sphere.
  // Default torus ring lies in XY plane; we want it in a vertical plane perpendicular to camera view.
  // Camera looks along -Z. So vertical plane is XY. Torus already in XY — perfect for "over the top" arc.
  // But the torus is a full ring; we want only the arc that goes over (top half) or under (bottom half).
  // We'll use a partial torus via the `length` parameter (arc of the ring itself).
  // For the top arc: we want the part going over the top of the sphere.
  // A torus in XY plane centered at origin: the ring goes around. The "top" of the ring is at +Y.
  // We want an arc centered at the top, spanning maybe PI*0.9 of the ring.
  // Actually let's rebuild: we want the arc to go OVER the sphere, from one side (e.g., +Z side) over the top to the other side (-Z side).
  // That means the arc should be in the YZ plane (vertical, front-to-back).
  // Rotate torus 90° around X so ring goes from +Y over to -Z direction... hmm.
  // 
  // Simpler approach: create the torus in XY plane, then rotate so the ring lies in the YZ plane.
  // TorusGeometry ring lies in XY plane by default. Rotate 90° around Y axis -> ring lies in ZY plane.
  // Then the arc of the ring from angle 0 to length goes around in that vertical plane.
  mesh.rotation.y = Math.PI/2;
  // Now the ring lies in ZY plane. We want the arc to be centered at the TOP (+Y), spanning left-to-right.
  // The torus arc starts at angle 0 (default +X direction of the ring parameterization, which after rotation is +Z).
  // We need to rotate around... let's just rotate around the torus's own axis to center the arc on top.
  // After rotation.y = PI/2, the ring parameterization angle 0 points along +Z, and the ring goes around in the YZ plane.
  // The top of the ring (in world Y) corresponds to parameterization angle PI/2.
  // To center an arc of length `length` at the top, we need the arc to start at angle PI/2 - length/2.
  // Rotate the mesh around the axis perpendicular to the ring plane (which after our rotation is X axis).
  mesh.rotation.x = -(Math.PI/2 - length/2);
  mesh.position.y = yOffset;
  return mesh;
}

// Top halo arc: goes over the top of the sphere
const topArc = makeLensArc(
  sphereR * 1.55,  // major radius (distance from center to tube center)
  0, 0,
  Math.PI * 0.95,  // arc length
  0,
  0xffd890,
  0.85
);
scene.add(topArc);

// Softer outer halo on top
const topArc2 = makeLensArc(
  sphereR * 1.85,
  0, 0,
  Math.PI * 0.85,
  0,
  0xff9955,
  0.35
);
scene.add(topArc2);

// Bottom halo arc: mirrored under the sphere
const bottomArc = makeLensArc(
  sphereR * 1.55,
  0, 0,
  Math.PI * 0.95,
  0,
  0xffd890,
  0.8
);
// Rotate 180° around Z to flip it under
bottomArc.rotation.z = Math.PI;
scene.add(bottomArc);

const bottomArc2 = makeLensArc(
  sphereR * 1.85,
  0, 0,
  Math.PI * 0.85,
  0,
  0xff9955,
  0.35
);
bottomArc2.rotation.z = Math.PI;
scene.add(bottomArc2);

// --- Animate ---
const clock = new THREE.Clock();
function animate(){
  try {
    const t = clock.getElapsedTime();
    diskMat.uniforms.uTime.value = t;
    // Slow disk rotation
    disk.rotation.z = t * 0.05;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  } catch(e){
    console.error(e);
  }
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch(err){
  console.error(err);
  document.body.innerHTML = '<div style="color:#fff;padding:20px;">'+err.message+'</div>';
}
</script>
</body>
</html>
