<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; width: 100vw; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 300);
  // 6 degrees above disk plane, distance tuned so sphere ~= 28% of viewport height
  const camDist = 8.0;
  const camElev = 6 * Math.PI / 180;
  camera.position.set(0, camDist * Math.sin(camElev), camDist * Math.cos(camElev));
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // ---------- Event horizon (black sphere) ----------
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 96, 96),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(sphere);

  // ---------- Accretion disk ----------
  const diskVert = `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;

  const diskFrag = `
    varying vec3 vPos;
    uniform float time;
    void main() {
      vec2 p = vPos.xz;
      float r = length(p);
      float ang = atan(p.y, p.x) + time * 0.12;

      // Radial colour gradient (hot inner -> cool outer)
      vec3 inner = vec3(1.000, 0.953, 0.816); // #fff3d0
      vec3 mid   = vec3(1.000, 0.678, 0.231); // #ffae3b
      vec3 outer = vec3(0.784, 0.333, 0.102); // #c8551a
      float t = clamp((r - 1.30) / 3.20, 0.0, 1.0);
      vec3 col = mix(inner, mid, smoothstep(0.0, 0.45, t));
      col = mix(col, outer, smoothstep(0.30, 1.0, t));

      // Relativistic beaming: one side brighter
      float beam = 0.55 + 0.55 * (0.5 + 0.5 * sin(ang));

      // Subtle turbulence
      float turb = 0.82 + 0.18 * sin(ang * 11.0 + r * 4.0)
                       + 0.10 * sin(ang * 5.0 - r * 7.0 + time * 0.5);

      col *= beam * turb * 1.9;

      // Radial alpha (sharp inner edge, soft outer fade)
      float innerFade = smoothstep(1.30, 1.42, r);
      float outerFade = 1.0 - smoothstep(3.6, 4.6, r);
      float alpha = innerFade * outerFade;

      gl_FragColor = vec4(col, alpha);
    }
  `;

  const diskMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: diskVert,
    fragmentShader: diskFrag,
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });

  const diskGeo = new THREE.RingGeometry(1.30, 4.6, 320, 20);
  diskGeo.rotateX(-Math.PI / 2);
  const disk = new THREE.Mesh(diskGeo, diskMat);
  scene.add(disk);

  // Soft outer glow of the disk (larger, dimmer halo around the band)
  const glowDiskMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: diskVert,
    fragmentShader: `
      varying vec3 vPos;
      uniform float time;
      void main() {
        vec2 p = vPos.xz;
        float r = length(p);
        float ang = atan(p.y, p.x) + time * 0.12;
        vec3 col = vec3(1.0, 0.62, 0.22);
        float beam = 0.55 + 0.55 * (0.5 + 0.5 * sin(ang));
        col *= beam;
        float innerFade = smoothstep(1.25, 1.7, r);
        float outerFade = 1.0 - smoothstep(4.0, 6.0, r);
        float alpha = innerFade * outerFade * 0.35;
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const glowDiskGeo = new THREE.RingGeometry(1.25, 6.0, 160, 10);
  glowDiskGeo.rotateX(-Math.PI / 2);
  const glowDisk = new THREE.Mesh(glowDiskGeo, glowDiskMat);
  scene.add(glowDisk);

  // ---------- Gravitational lensing halo (lensed far-side disk) ----------
  // A thin torus in the XY plane (vertical) hugs the sphere. The black sphere
  // occludes its back half, leaving the bright upper and lower arcs visible —
  // the signature Gargantua halo.
  const haloVert = `
    varying vec3 vPos;
    void main() {
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;

  const haloFrag = `
    varying vec3 vPos;
    void main() {
      // Major radius of the halo torus
      const float R = 1.085;
      float yN = abs(vPos.y) / R;
      // Bright at top/bottom, dim at the sides (where near disk sits)
      float bright = 0.18 + 1.25 * pow(yN, 2.2);
      vec3 col = vec3(1.00, 0.88, 0.62) * bright * 1.6;
      gl_FragColor = vec4(col, 0.95);
    }
  `;

  const haloGeo = new THREE.TorusGeometry(1.085, 0.045, 40, 320);
  const haloMat = new THREE.ShaderMaterial({
    vertexShader: haloVert,
    fragmentShader: haloFrag,
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  // Default THREE.TorusGeometry lies in the XY plane — exactly what we want.
  scene.add(halo);

  // Softer, wider glow around the halo arcs
  const haloGlowGeo = new THREE.TorusGeometry(1.085, 0.16, 24, 200);
  const haloGlowMat = new THREE.ShaderMaterial({
    vertexShader: haloVert,
    fragmentShader: `
      varying vec3 vPos;
      void main() {
        const float R = 1.085;
        float yN = abs(vPos.y) / R;
        float bright = 0.10 + 0.90 * pow(yN, 2.0);
        vec3 col = vec3(1.0, 0.70, 0.35) * bright;
        gl_FragColor = vec4(col, 0.45);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const haloGlow = new THREE.Mesh(haloGlowGeo, haloGlowMat);
  scene.add(haloGlow);

  // ---------- Photon ring (thin bright ring hugging the shadow edge) ----------
  const photonGeo = new THREE.TorusGeometry(1.012, 0.009, 20, 320);
  const photonMat = new THREE.MeshBasicMaterial({
    color: 0xfff3d0,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const photon = new THREE.Mesh(photonGeo, photonMat);
  // In XY plane (default) — appears as a thin bright rim around the shadow
  scene.add(photon);

  // Slightly wider photon-ring glow
  const photonGlowGeo = new THREE.TorusGeometry(1.015, 0.028, 16, 256);
  const photonGlowMat = new THREE.MeshBasicMaterial({
    color: 0xffcc77,
    transparent: true,
    opacity: 0.55,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const photonGlow = new THREE.Mesh(photonGlowGeo, photonGlowMat);
  scene.add(photonGlow);

  // ---------- Starfield ----------
  const starCount = 1800;
  const starPos = new Float32Array(starCount * 3);
  const starSize = new Float32Array(starCount);
  const starBright = new Float32Array(starCount);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 90 + Math.random() * 20;
    starPos[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i * 3 + 2] = r * Math.cos(phi);
    starSize[i] = Math.random() * 0.8 + 0.2;
    starBright[i] = Math.random() * 0.7 + 0.3;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(starSize, 1));
  starGeo.setAttribute('bright', new THREE.BufferAttribute(starBright, 1));

  const starMat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `
      attribute float size;
      attribute float bright;
      varying float vBright;
      void main() {
        vBright = bright;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = size * 1.8;
      }
    `,
    fragmentShader: `
      varying float vBright;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        float a = smoothstep(0.5, 0.0, d);
        vec3 col = mix(vec3(0.75, 0.82, 1.0), vec3(1.0, 0.95, 0.85), vBright);
        gl_FragColor = vec4(col * vBright, a * 0.55);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // ---------- Animation ----------
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    diskMat.uniforms.time.value = t;
    glowDiskMat.uniforms.time.value = t;
    // Slow starfield drift
    stars.rotation.y = t * 0.003;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
} catch (err) {
  console.error(err);
  document.body.innerHTML = '<div style="color:#fff;padding:20px;font-family:monospace">Error: ' + err.message + '</div>';
}
</script>
</body>
</html>
