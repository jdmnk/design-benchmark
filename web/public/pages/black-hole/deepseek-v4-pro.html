<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua Black Hole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000008;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';

        try {
            // ─────────────────────────────────────
            // SCENE SETUP
            // ─────────────────────────────────────
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000008);
            scene.fog = null;

            // Camera: ~6.5° above the horizontal disk plane
            const cameraDistance = 7.2;
            const elevationDeg = 6.5;
            const elevationRad = elevationDeg * Math.PI / 180;
            const camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                120
            );
            camera.position.set(
                0,
                cameraDistance * Math.sin(elevationRad),
                cameraDistance * Math.cos(elevationRad)
            );
            camera.lookAt(0, 0, 0);

            // Renderer
            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: false,
                powerPreference: 'high-performance',
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.LinearToneMapping;
            document.body.appendChild(renderer.domElement);

            // ─────────────────────────────────────
            // BLACK HOLE SPHERE (event horizon)
            // ─────────────────────────────────────
            const sphereRadius = 1.5;
            const blackHoleGeom = new THREE.SphereGeometry(sphereRadius, 96, 96);
            const blackHoleMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(blackHoleGeom, blackHoleMat);
            scene.add(blackHole);

            // ─────────────────────────────────────
            // PHOTON RING – multi-layer fake bloom
            // ─────────────────────────────────────
            const photonRings = [];
            const photonRingDefs = [
                { radius: 1.515, tube: 0.018, opacity: 0.95, color: 0xffffff },
                { radius: 1.530, tube: 0.040, opacity: 0.40, color: 0xfffff8 },
                { radius: 1.555, tube: 0.085, opacity: 0.18, color: 0xfff8e0 },
                { radius: 1.590, tube: 0.150, opacity: 0.07, color: 0xffe8c0 },
            ];

            photonRingDefs.forEach((def) => {
                const geom = new THREE.TorusGeometry(def.radius, def.tube, 48, 180);
                const mat = new THREE.MeshBasicMaterial({
                    color: def.color,
                    transparent: true,
                    opacity: def.opacity,
                    depthWrite: false,
                });
                const ring = new THREE.Mesh(geom, mat);
                ring.rotation.x = Math.PI / 2; // horizontal plane
                ring.renderOrder = 1;
                ring.material.blending = THREE.AdditiveBlending;
                photonRings.push(ring);
                scene.add(ring);
            });

            // Innermost photon ring – non-additive, sharp
            const sharpPhotonGeom = new THREE.TorusGeometry(1.518, 0.012, 32, 180);
            const sharpPhotonMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.92,
                depthWrite: true,
            });
            const sharpPhotonRing = new THREE.Mesh(sharpPhotonGeom, sharpPhotonMat);
            sharpPhotonRing.rotation.x = Math.PI / 2;
            sharpPhotonRing.renderOrder = 0;
            scene.add(sharpPhotonRing);

            // ─────────────────────────────────────
            // ACCRETION DISK – canvas radial gradient
            // ─────────────────────────────────────
            function createDiskTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 16;
                const ctx = canvas.getContext('2d');

                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                // Inner: hot white-yellow → mid: amber → outer: deep orange
                gradient.addColorStop(0.00, '#fff8e0');
                gradient.addColorStop(0.06, '#fff3d0');
                gradient.addColorStop(0.20, '#ffe0a0');
                gradient.addColorStop(0.45, '#ffae3b');
                gradient.addColorStop(0.70, '#e87820');
                gradient.addColorStop(0.90, '#c8551a');
                gradient.addColorStop(1.00, '#8a2a0a');

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Add subtle bright streaks
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 30; i++) {
                    const x = Math.random() * canvas.width;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x + Math.random() * 30, canvas.height);
                    ctx.stroke();
                }

                return new THREE.CanvasTexture(canvas);
            }

            const diskTexture = createDiskTexture();
            diskTexture.wrapS = THREE.ClampToEdgeWrapping;
            diskTexture.wrapT = THREE.ClampToEdgeWrapping;
            diskTexture.colorSpace = THREE.SRGBColorSpace;

            // Main disk – RingGeometry in XZ plane
            const diskInner = 1.56;
            const diskOuter = 4.8;
            const diskGeom = new THREE.RingGeometry(diskInner, diskOuter, 256, 1);
            // Rotate from XY plane to XZ plane (horizontal)
            diskGeom.rotateX(-Math.PI / 2);

            const diskMat = new THREE.MeshBasicMaterial({
                map: diskTexture,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.88,
                depthWrite: true,
                color: 0xffffff,
            });
            const disk = new THREE.Mesh(diskGeom, diskMat);
            disk.renderOrder = 2;

            // Slight thickness: second layer offset in Y
            const diskGeom2 = new THREE.RingGeometry(diskInner, diskOuter, 256, 1);
            diskGeom2.rotateX(-Math.PI / 2);
            diskGeom2.translate(0, 0.008, 0);
            const diskMat2 = new THREE.MeshBasicMaterial({
                map: diskTexture,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.35,
                depthWrite: false,
                color: 0xffffff,
            });
            const disk2 = new THREE.Mesh(diskGeom2, diskMat2);
            disk2.renderOrder = 3;

            const diskGeom3 = new THREE.RingGeometry(diskInner, diskOuter, 256, 1);
            diskGeom3.rotateX(-Math.PI / 2);
            diskGeom3.translate(0, -0.008, 0);
            const diskMat3 = new THREE.MeshBasicMaterial({
                map: diskTexture,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.35,
                depthWrite: false,
                color: 0xffffff,
            });
            const disk3 = new THREE.Mesh(diskGeom3, diskMat3);
            disk3.renderOrder = 3;

            // ─────────────────────────────────────
            // RELATIVISTIC BEAMING – brighter half-disk
            // ─────────────────────────────────────
            function createBeamedDiskTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 16;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0.00, '#ffffff');
                gradient.addColorStop(0.08, '#fffef0');
                gradient.addColorStop(0.25, '#ffe8b0');
                gradient.addColorStop(0.50, '#ffc860');
                gradient.addColorStop(0.75, '#e87820');
                gradient.addColorStop(1.00, '#8a2a0a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                return new THREE.CanvasTexture(canvas);
            }

            const beamTex = createBeamedDiskTexture();
            beamTex.wrapS = THREE.ClampToEdgeWrapping;
            beamTex.wrapT = THREE.ClampToEdgeWrapping;
            beamTex.colorSpace = THREE.SRGBColorSpace;

            // Partial disk for beaming – only the approaching side (right/front)
            const beamDiskGeom = new THREE.RingGeometry(diskInner, diskOuter, 256, 1, 0, Math.PI);
            beamDiskGeom.rotateX(-Math.PI / 2);
            // This half-ring covers the +X side (approaching)
            // Rotate so the bright half faces the camera-relative direction
            beamDiskGeom.rotateY(Math.PI * 0.15);

            const beamDiskMat = new THREE.MeshBasicMaterial({
                map: beamTex,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.55,
                depthWrite: false,
                color: 0xffffff,
            });
            const beamDisk = new THREE.Mesh(beamDiskGeom, beamDiskMat);
            beamDisk.renderOrder = 4;

            // ─────────────────────────────────────
            // LENSED ARCS – far side bent over/under
            // ─────────────────────────────────────
            function createArcPath(radius, peakY, startOffsetZ, pointsCount) {
                const pts = [];
                const totalAngle = Math.PI * 1.05;
                const startAngle = -totalAngle / 2;
                const endAngle = totalAngle / 2;

                for (let i = 0; i <= pointsCount; i++) {
                    const t = i / pointsCount;
                    const angle = startAngle + t * totalAngle;
                    const x = radius * Math.cos(angle);
                    const z = radius * Math.sin(angle) + startOffsetZ;

                    // Height peaks at center (angle=0), falls off to sides
                    const frac = Math.abs(angle) / (totalAngle / 2);
                    // Smooth arch profile
                    const y = peakY * Math.pow(1 - frac, 1.8) * (1 - frac * frac * 0.3);

                    pts.push(new THREE.Vector3(x, y, z));
                }
                return new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
            }

            // Upper arc – curves over the top
            const upperArcPath = createArcPath(1.72, 0.62, 0.25, 120);
            const upperArcGeom = new THREE.TubeGeometry(upperArcPath, 100, 0.035, 20, false);
            const upperArcMat = new THREE.MeshBasicMaterial({
                color: 0xfffff0,
                transparent: true,
                opacity: 0.82,
                depthWrite: true,
            });
            const upperArc = new THREE.Mesh(upperArcGeom, upperArcMat);
            upperArc.renderOrder = 5;

            // Upper arc glow
            const upperArcGlowGeom = new THREE.TubeGeometry(upperArcPath, 100, 0.09, 20, false);
            const upperArcGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffffe0,
                transparent: true,
                opacity: 0.28,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });
            const upperArcGlow = new THREE.Mesh(upperArcGlowGeom, upperArcGlowMat);
            upperArcGlow.renderOrder = 6;

            // Lower arc – curves under the bottom
            const lowerArcPath = createArcPath(1.72, -0.62, 0.25, 120);
            const lowerArcGeom = new THREE.TubeGeometry(lowerArcPath, 100, 0.035, 20, false);
            const lowerArcMat = new THREE.MeshBasicMaterial({
                color: 0xfffff0,
                transparent: true,
                opacity: 0.78,
                depthWrite: true,
            });
            const lowerArc = new THREE.Mesh(lowerArcGeom, lowerArcMat);
            lowerArc.renderOrder = 5;

            const lowerArcGlowGeom = new THREE.TubeGeometry(lowerArcPath, 100, 0.09, 20, false);
            const lowerArcGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffffe0,
                transparent: true,
                opacity: 0.26,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });
            const lowerArcGlow = new THREE.Mesh(lowerArcGlowGeom, lowerArcGlowMat);
            lowerArcGlow.renderOrder = 6;

            // ─────────────────────────────────────
            // STARFIELD
            // ─────────────────────────────────────
            const starsCount = 2500;
            const starsGeom = new THREE.BufferGeometry();
            const starsPositions = new Float32Array(starsCount * 3);
            const starsColors = new Float32Array(starsCount * 3);

            for (let i = 0; i < starsCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 22 + Math.random() * 40;
                starsPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                starsPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                starsPositions[i * 3 + 2] = r * Math.cos(phi);

                const brightness = 0.15 + Math.random() * 0.55;
                const tint = Math.random();
                if (tint < 0.08) {
                    starsColors[i * 3] = 0.5 * brightness;
                    starsColors[i * 3 + 1] = 0.6 * brightness;
                    starsColors[i * 3 + 2] = 1.0 * brightness;
                } else if (tint < 0.18) {
                    starsColors[i * 3] = 1.0 * brightness;
                    starsColors[i * 3 + 1] = 0.85 * brightness;
                    starsColors[i * 3 + 2] = 0.55 * brightness;
                } else {
                    const w = brightness;
                    starsColors[i * 3] = w;
                    starsColors[i * 3 + 1] = w;
                    starsColors[i * 3 + 2] = w;
                }
            }

            starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            starsGeom.setAttribute('color', new THREE.BufferAttribute(starsColors, 3));
            const starsMat = new THREE.PointsMaterial({
                size: 0.07,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const stars = new THREE.Points(starsGeom, starsMat);
            stars.renderOrder = 10;
            scene.add(stars);

            // ─────────────────────────────────────
            // ASSEMBLE ACCRETION SYSTEM GROUP
            // ─────────────────────────────────────
            const accretionSystem = new THREE.Group();
            accretionSystem.add(disk);
            accretionSystem.add(disk2);
            accretionSystem.add(disk3);
            accretionSystem.add(beamDisk);
            accretionSystem.add(upperArc);
            accretionSystem.add(upperArcGlow);
            accretionSystem.add(lowerArc);
            accretionSystem.add(lowerArcGlow);
            scene.add(accretionSystem);

            // ─────────────────────────────────────
            // ANIMATION LOOP
            // ─────────────────────────────────────
            let clock = new THREE.Clock();
            let elapsed = 0;

            function animate() {
                requestAnimationFrame(animate);

                const dt = Math.min(clock.getDelta(), 0.1);
                elapsed += dt;

                // Slow rotation of the accretion system
                accretionSystem.rotation.y += 0.28 * dt;

                // Subtle precession/wobble of lensed arcs (they're in the group)
                // The group rotates uniformly – this is correct

                renderer.render(scene, camera);
            }

            // Start immediately
            animate();
            console.log('Gargantua black hole scene ready.');

            // ─────────────────────────────────────
            // RESIZE HANDLER
            // ─────────────────────────────────────
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Handle fullscreen / orientation changes gracefully
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }, 100);
            });

        } catch (err) {
            console.error('Black hole setup error:', err);
            // Fallback: ensure a dark canvas is shown
            document.body.style.background = '#000010';
            const fallbackCanvas = document.createElement('canvas');
            fallbackCanvas.width = window.innerWidth;
            fallbackCanvas.height = window.innerHeight;
            fallbackCanvas.style.display = 'block';
            const fctx = fallbackCanvas.getContext('2d');
            if (fctx) {
                fctx.fillStyle = '#000010';
                fctx.fillRect(0, 0, fallbackCanvas.width, fallbackCanvas.height);
                fctx.fillStyle = '#ffffff';
                fctx.font = '18px sans-serif';
                fctx.fillText('Scene setup incomplete – please refresh', 40, 60);
            }
            document.body.appendChild(fallbackCanvas);
        }
    </script>
</body>
</html>
