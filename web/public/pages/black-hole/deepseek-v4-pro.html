<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua - Supermassive Black Hole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000008;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        try {
            // ─────────────────────────────────────
            // SCENE SETUP
            // ─────────────────────────────────────
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000008);
            scene.fog = new THREE.Fog(0x000008, 25, 60);

            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: false,
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // ─────────────────────────────────────
            // CAMERA – ~6° above the horizontal disk plane
            // ─────────────────────────────────────
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            const elevationDeg = 6.5;
            const elevationRad = elevationDeg * Math.PI / 180;
            const camDistance = 9.5;
            camera.position.set(
                0,
                camDistance * Math.sin(elevationRad),
                camDistance * Math.cos(elevationRad)
            );
            camera.lookAt(0, 0, 0);

            // ─────────────────────────────────────
            // BLACK HOLE SPHERE (event horizon)
            // ─────────────────────────────────────
            const bhRadius = 1.38;
            const bhGeometry = new THREE.SphereGeometry(bhRadius, 160, 160);
            const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
            scene.add(blackHole);

            // ─────────────────────────────────────
            // PHOTON RING – ultra-thin bright ring at event horizon edge
            // ─────────────────────────────────────
            const photonRingRadius = bhRadius + 0.04;
            const photonRingTube = 0.025;
            const photonRingGeom = new THREE.TorusGeometry(photonRingRadius, photonRingTube, 32, 200);
            photonRingGeom.rotateX(-Math.PI / 2);
            const photonRingMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.95,
                depthWrite: true
            });
            const photonRing = new THREE.Mesh(photonRingGeom, photonRingMat);
            photonRing.renderOrder = 1;
            scene.add(photonRing);

            // Photon ring glow – additive layer
            const photonGlowGeom = new THREE.TorusGeometry(photonRingRadius, photonRingTube * 2.5, 32, 200);
            photonGlowGeom.rotateX(-Math.PI / 2);
            const photonGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.22,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const photonGlow = new THREE.Mesh(photonGlowGeom, photonGlowMat);
            photonGlow.renderOrder = 0;
            scene.add(photonGlow);

            // ─────────────────────────────────────
            // ACCRETION DISK GROUP (rotates around Y)
            // ─────────────────────────────────────
            const diskGroup = new THREE.Group();
            scene.add(diskGroup);

            // -- Main disk: flat ring with radial temperature gradient --
            const diskInner = bhRadius + 0.06;
            const diskOuter = 4.6;
            const diskGeom = new THREE.RingGeometry(diskInner, diskOuter, 300, 80);
            diskGeom.rotateX(-Math.PI / 2);

            const diskMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 }
                },
                vertexShader: /* glsl */ `
                    varying vec3 vWorldPos;
                    varying float vRadial;
                    varying vec2 vUv;
                    void main() {
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPos = worldPos.xyz;
                        vRadial = length(worldPos.xz);
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: /* glsl */ `
                    varying vec3 vWorldPos;
                    varying float vRadial;
                    varying vec2 vUv;
                    uniform float uTime;

                    void main() {
                        float rNorm = (vRadial - 1.44) / (4.6 - 1.44);
                        rNorm = clamp(rNorm, 0.0, 1.0);

                        // Temperature gradient: hot white-yellow inner → amber → deep orange outer
                        vec3 innerColor = vec3(1.0, 0.96, 0.82);
                        vec3 midColor   = vec3(1.0, 0.68, 0.23);
                        vec3 outerColor = vec3(0.78, 0.33, 0.10);

                        vec3 color;
                        if (rNorm < 0.25) {
                            color = mix(innerColor, midColor, rNorm / 0.25);
                        } else {
                            color = mix(midColor, outerColor, (rNorm - 0.25) / 0.75);
                        }

                        // Relativistic beaming: +x side (right from camera) ~25% brighter
                        float angle = atan(vWorldPos.x, vWorldPos.z);
                        float beaming = 1.0 + 0.28 * cos(angle);
                        color *= beaming;

                        // Slight inner-edge boost
                        float edgeBoost = 1.0 + 0.35 * exp(-rNorm * 8.0);
                        color *= edgeBoost;

                        // Falloff at outer edge
                        float alpha = 1.0;
                        if (rNorm > 0.92) alpha = smoothstep(1.0, 0.92, rNorm);

                        // Slight flicker / turbulence
                        float flicker = 1.0 + 0.03 * sin(vWorldPos.x * 12.0 + uTime * 3.0) * cos(vWorldPos.z * 9.0 - uTime * 2.5);
                        color *= flicker;

                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true,
                depthWrite: true,
                side: THREE.DoubleSide
            });
            const mainDisk = new THREE.Mesh(diskGeom, diskMaterial);
            mainDisk.renderOrder = 2;
            diskGroup.add(mainDisk);

            // -- Inner disk rim (bright thick torus at inner edge) --
            const innerRimRadius = diskInner + 0.02;
            const innerRimTube = 0.09;
            const innerRimGeom = new THREE.TorusGeometry(innerRimRadius, innerRimTube, 24, 200);
            innerRimGeom.rotateX(-Math.PI / 2);
            const innerRimMat = new THREE.MeshBasicMaterial({
                color: 0xfff8d0,
                transparent: true,
                opacity: 0.9,
                depthWrite: true
            });
            const innerRim = new THREE.Mesh(innerRimGeom, innerRimMat);
            innerRim.renderOrder = 3;
            diskGroup.add(innerRim);

            // Inner rim glow
            const innerRimGlowGeom = new THREE.TorusGeometry(innerRimRadius, innerRimTube * 2.2, 24, 200);
            innerRimGlowGeom.rotateX(-Math.PI / 2);
            const innerRimGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.18,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const innerRimGlow = new THREE.Mesh(innerRimGlowGeom, innerRimGlowMat);
            innerRimGlow.renderOrder = 1;
            diskGroup.add(innerRimGlow);

            // -- UPPER LENSING ARC (far-side disk bent over the top) --
            const arcMajorRadius = bhRadius + 0.32;
            const arcTubeRadius = 0.16;
            const arcSweep = Math.PI * 1.15; // ~207° arc
            const upperArcGeom = new THREE.TorusGeometry(arcMajorRadius, arcTubeRadius, 20, 180, arcSweep);
            upperArcGeom.rotateX(-Math.PI / 2);
            // Position the arc so its visible portion wraps over the far side (top)
            // The gap faces the camera (+z near side). Rotate around Y to center gap on +z.
            // Torus arc starts at +x; we rotate so the gap (missing portion) faces +z.
            upperArcGeom.rotateY(Math.PI * 0.45);

            const upperArcMat = new THREE.MeshBasicMaterial({
                color: 0xfff6d8,
                transparent: true,
                opacity: 0.85,
                depthWrite: true,
                side: THREE.DoubleSide
            });
            const upperArc = new THREE.Mesh(upperArcGeom, upperArcMat);
            upperArc.position.y = 0.38;
            upperArc.renderOrder = 4;
            diskGroup.add(upperArc);

            // Upper arc glow
            const upperArcGlowGeom = new THREE.TorusGeometry(arcMajorRadius, arcTubeRadius * 2.4, 20, 180, arcSweep);
            upperArcGlowGeom.rotateX(-Math.PI / 2);
            upperArcGlowGeom.rotateY(Math.PI * 0.45);
            const upperArcGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.2,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const upperArcGlow = new THREE.Mesh(upperArcGlowGeom, upperArcGlowMat);
            upperArcGlow.position.y = 0.38;
            upperArcGlow.renderOrder = 0;
            diskGroup.add(upperArcGlow);

            // -- LOWER LENSING ARC (mirrored under the bottom) --
            const lowerArcGeom = new THREE.TorusGeometry(arcMajorRadius, arcTubeRadius, 20, 180, arcSweep);
            lowerArcGeom.rotateX(-Math.PI / 2);
            lowerArcGeom.rotateY(Math.PI * 0.45);
            const lowerArcMat = new THREE.MeshBasicMaterial({
                color: 0xfff0d0,
                transparent: true,
                opacity: 0.8,
                depthWrite: true,
                side: THREE.DoubleSide
            });
            const lowerArc = new THREE.Mesh(lowerArcGeom, lowerArcMat);
            lowerArc.position.y = -0.38;
            lowerArc.renderOrder = 4;
            diskGroup.add(lowerArc);

            const lowerArcGlowGeom = new THREE.TorusGeometry(arcMajorRadius, arcTubeRadius * 2.4, 20, 180, arcSweep);
            lowerArcGlowGeom.rotateX(-Math.PI / 2);
            lowerArcGlowGeom.rotateY(Math.PI * 0.45);
            const lowerArcGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.18,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const lowerArcGlow = new THREE.Mesh(lowerArcGlowGeom, lowerArcGlowMat);
            lowerArcGlow.position.y = -0.38;
            lowerArcGlow.renderOrder = 0;
            diskGroup.add(lowerArcGlow);

            // -- Extra bright spot on the upper arc (lensing hot-spot) --
            const hotSpotGeom = new THREE.SphereGeometry(0.1, 16, 16);
            const hotSpotMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.9,
                depthWrite: true
            });
            const hotSpot = new THREE.Mesh(hotSpotGeom, hotSpotMat);
            hotSpot.position.set(0, 0.38 + arcTubeRadius * 1.1, arcMajorRadius * 0.55);
            hotSpot.renderOrder = 5;
            diskGroup.add(hotSpot);

            const hotSpot2 = new THREE.Mesh(hotSpotGeom.clone(), hotSpotMat.clone());
            hotSpot2.position.set(0, -0.38 - arcTubeRadius * 1.1, arcMajorRadius * 0.55);
            hotSpot2.renderOrder = 5;
            diskGroup.add(hotSpot2);

            // ─────────────────────────────────────
            // STARFIELD
            // ─────────────────────────────────────
            const starCount = 1800;
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount *3);
            const starSizes = new Float32Array(starCount);

            const starSpreadRadius = 35;
            for (let i = 0; i < starCount; i++) {
                // Random position in a large sphere, avoiding the central region
                let r, theta, phi;
                do {
                    r = starSpreadRadius * (0.35 + Math.random() * 0.65);
                    theta = Math.random() * Math.PI * 2;
                    phi = Math.acos(2 * Math.random() - 1);
                } while (r < 5.5); // Keep stars away from the black hole vicinity

                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                starPositions[i * 3] = x;
                starPositions[i * 3 + 1] = y;
                starPositions[i * 3 + 2] = z;

                // Dim, slightly warm/cool varied stars
                const brightness = 0.12 + Math.random() * 0.35;
                const tint = Math.random();
                if (tint < 0.15) {
                    // Slightly blue-ish
                    starColors[i * 3] = 0.7 * brightness;
                    starColors[i * 3 + 1] = 0.8 * brightness;
                    starColors[i * 3 + 2] = 1.0 * brightness;
                } else if (tint < 0.35) {
                    // Slightly yellow-ish
                    starColors[i * 3] = 1.0 * brightness;
                    starColors[i * 3 + 1] = 0.9 * brightness;
                    starColors[i * 3 + 2] = 0.65 * brightness;
                } else {
                    // White-ish
                    starColors[i * 3] = brightness;
                    starColors[i * 3 + 1] = brightness;
                    starColors[i * 3 + 2] = brightness;
                }
                starSizes[i] = 0.4 + Math.random() * 1.6;
            }

            const starGeom = new THREE.BufferGeometry();
            starGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeom.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeom.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

            // Small circular texture for stars
            const starTexCanvas = document.createElement('canvas');
            starTexCanvas.width = 32;
            starTexCanvas.height = 32;
            const starCtx = starTexCanvas.getContext('2d');
            const starGradient = starCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
            starGradient.addColorStop(0, 'rgba(255,255,255,1)');
            starGradient.addColorStop(0.08, 'rgba(255,255,255,0.85)');
            starGradient.addColorStop(0.4, 'rgba(255,255,255,0.25)');
            starGradient.addColorStop(1, 'rgba(255,255,255,0)');
            starCtx.fillStyle = starGradient;
            starCtx.fillRect(0, 0, 32, 32);
            const starTex = new THREE.CanvasTexture(starTexCanvas);
            starTex.needsUpdate = true;

            const starMaterial = new THREE.PointsMaterial({
                size: 0.25,
                map: starTex,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.85,
                sizeAttenuation: true
            });
            const starfield = new THREE.Points(starGeom, starMaterial);
            starfield.renderOrder = -1;
            scene.add(starfield);

            // ─────────────────────────────────────
            // SUBTLE AMBIENT GLOW AROUND BLACK HOLE
            // ─────────────────────────────────────
            const ambientGlowGeom = new THREE.SphereGeometry(bhRadius + 0.15, 64, 64);
            const ambientGlowMat = new THREE.MeshBasicMaterial({
                color: 0x110033,
                transparent: true,
                opacity: 0.06,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide
            });
            const ambientGlow = new THREE.Mesh(ambientGlowGeom, ambientGlowMat);
            ambientGlow.renderOrder = -2;
            scene.add(ambientGlow);

            // ─────────────────────────────────────
            // ANIMATION LOOP
            // ─────────────────────────────────────
            const clock = new THREE.Clock();
            let elapsedTotal = 0;

            function animate(timestamp) {
                requestAnimationFrame(animate);

                const dt = Math.min(clock.getDelta(), 0.1);
                elapsedTotal += dt;

                // Slow disk rotation
                const rotationSpeed = 0.13; // rad/s
                diskGroup.rotation.y += rotationSpeed * dt;

                // Update disk shader time uniform for flicker
                diskMaterial.uniforms.uTime.value = elapsedTotal;

                // Subtle photon ring pulsation
                const pulse = 1.0 + 0.04 * Math.sin(elapsedTotal * 2.7) * Math.cos(elapsedTotal * 1.9);
                photonRing.material.opacity = 0.92 + pulse * 0.04;
                photonGlow.material.opacity = 0.20 + pulse * 0.03;

                // Hot spots pulsate
                const hotPulse = 1.0 + 0.08 * Math.sin(elapsedTotal * 3.5 + 1.2);
                hotSpot.material.opacity = 0.85 * hotPulse;
                hotSpot2.material.opacity = 0.80 * hotPulse;

                renderer.render(scene, camera);
            }

            // ──────────────────────────────────────
            // RESIZE HANDLER
            // ──────────────────────────────────────
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ─────────────────────────────────────
            // START
            // ─────────────────────────────────────
            renderer.setAnimationLoop(null); // We use our own rAF loop
            requestAnimationFrame(animate);

            console.log('Gargantua scene initialized successfully.');

        } catch (err) {
            console.error('Scene initialization error:', err);
            // Fallback: ensure a dark canvas is shown
            const fallbackCanvas = document.createElement('canvas');
            fallbackCanvas.width = window.innerWidth;
            fallbackCanvas.height = window.innerHeight;
            fallbackCanvas.style.background = '#000008';
            document.body.appendChild(fallbackCanvas);
            const fctx = fallbackCanvas.getContext('2d');
            if (fctx) {
                fctx.fillStyle = '#000008';
                fctx.fillRect(0, 0, fallbackCanvas.width, fallbackCanvas.height);
                fctx.fillStyle = '#ffffff';
                fctx.font = '18px sans-serif';
                fctx.fillText('Scene loading issue – please refresh', 40, 60);
            }
        }
    </script>
</body>
</html>
