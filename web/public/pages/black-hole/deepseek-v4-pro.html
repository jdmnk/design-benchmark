<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua - Supermassive Black Hole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #010108;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        try {
            // ─────────────────────────────────────
            // SCENE, RENDERER, BACKGROUND
            // ─────────────────────────────────────
            const scene = new THREE.Scene();
            scene.background = new THREE.Color('#010108');
            scene.fog = null;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor('#010108', 1);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            // ─────────────────────────────────────
            // CAMERA – ~6° above the horizontal XZ plane
            // ─────────────────────────────────────
            const cameraDistance = 6.35;
            const elevationAngle = 6.5 * (Math.PI / 180);
            const cameraY = cameraDistance * Math.sin(elevationAngle);
            const cameraHoriz = cameraDistance * Math.cos(elevationAngle);
            const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 60);
            camera.position.set(0, cameraY, cameraHoriz);
            camera.lookAt(0, 0, 0);
            camera.up.set(0, 1, 0);

            // ─────────────────────────────────────
            // LIGHTING (minimal – most elements use emissive)
            // ─────────────────────────────────────
            const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
            scene.add(ambientLight);

            // ─────────────────────────────────────
            // BLACK HOLE SPHERE (event horizon)
            // ─────────────────────────────────────
            const sphereRadius = 1.0;
            const sphereGeom = new THREE.SphereGeometry(sphereRadius, 96, 72);
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0x000000, depthWrite: true });
            const blackSphere = new THREE.Mesh(sphereGeom, sphereMat);
            blackSphere.renderOrder = 0;
            scene.add(blackSphere);

            // ─────────────────────────────────────
            // PHOTON RING – thin bright ring at horizon edge
            // ─────────────────────────────────────
            const photonRingGroup = new THREE.Group();

            // Core photon ring
            const photonTorusGeom = new THREE.TorusGeometry(sphereRadius * 1.025, 0.012, 24, 180);
            const photonTorusMat = new THREE.MeshBasicMaterial({ color: '#ffffff', depthWrite: true });
            const photonRing = new THREE.Mesh(photonTorusGeom, photonTorusMat);
            photonRing.rotation.x = Math.PI / 2;
            photonRing.renderOrder = 1;
            photonRingGroup.add(photonRing);

            // Photon ring glow layer 1
            const photonGlow1Geom = new THREE.TorusGeometry(sphereRadius * 1.028, 0.045, 24, 180);
            const photonGlow1Mat = new THREE.MeshBasicMaterial({
                color: '#fffef0',
                transparent: true,
                opacity: 0.55,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const photonGlow1 = new THREE.Mesh(photonGlow1Geom, photonGlow1Mat);
            photonGlow1.rotation.x = Math.PI / 2;
            photonGlow1.renderOrder = 2;
            photonRingGroup.add(photonGlow1);

            // Photon ring glow layer 2 (softer, wider)
            const photonGlow2Geom = new THREE.TorusGeometry(sphereRadius * 1.035, 0.10, 32, 180);
            const photonGlow2Mat = new THREE.MeshBasicMaterial({
                color: '#ffe8c0',
                transparent: true,
                opacity: 0.25,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const photonGlow2 = new THREE.Mesh(photonGlow2Geom, photonGlow2Mat);
            photonGlow2.rotation.x = Math.PI / 2;
            photonGlow2.renderOrder = 3;
            photonRingGroup.add(photonGlow2);

            scene.add(photonRingGroup);

            // ─────────────────────────────────────
            // CANVAS TEXTURE FOR ACCRETION DISK
            // ─────────────────────────────────────
            const texCanvas = document.createElement('canvas');
            texCanvas.width = 1024;
            texCanvas.height = 256;
            const ctx = texCanvas.getContext('2d');

            // Draw radial gradient ring (top = inner edge, bottom = outer edge)
            const imgData = ctx.createImageData(1024, 256);
            for (let y = 0; y < 256; y++) {
                const v = y / 255; // 0 = inner edge, 1 = outer edge
                // Color interpolation: inner #fff3d0 → mid #ffae3b → outer #c8551a
                let r, g, b;
                if (v < 0.25) {
                    const t = v / 0.25;
                    r = 255;
                    g = 243 - (243 - 174) * t;
                    b = 208 - (208 - 59) * t;
                } else if (v < 0.7) {
                    const t = (v - 0.25) / 0.45;
                    r = 255 - (255 - 200) * t;
                    g = 174 - (174 - 85) * t;
                    b = 59 - (59 - 26) * t;
                } else {
                    const t = (v - 0.7) / 0.3;
                    r = 200 - (200 - 200) * t;
                    g = 85 - (85 - 85) * t;
                    b = 26;
                }
                r = Math.round(r);
                g = Math.round(g);
                b = Math.round(b);

                for (let x = 0; x < 1024; x++) {
                    const u = x / 1024;
                    // Relativistic beaming: brighter around u=0 (wraps at edges) and u near 0 and 1
                    // Peak brightness near u=0 and u=1 (the +X direction), dimmer at u=0.5 (-X)
                    let beamFactor;
                    const distFromEdge = Math.min(u, 1 - u);
                    if (distFromEdge < 0.35) {
                        beamFactor = 1.0 + 0.35 * (1 - distFromEdge / 0.35) * (1 - distFromEdge / 0.35);
                    } else {
                        const d = (distFromEdge - 0.35) / 0.15;
                        const t = Math.min(d, 1);
                        beamFactor = 1.0 - 0.22 * t;
                    }
                    beamFactor = Math.max(0.78, Math.min(1.35, beamFactor));

                    const idx = (y * 1024 + x) * 4;
                    imgData.data[idx] = Math.min(255, Math.round(r * beamFactor));
                    imgData.data[idx + 1] = Math.min(255, Math.round(g * beamFactor));
                    imgData.data[idx + 2] = Math.min(255, Math.round(b * beamFactor));
                    imgData.data[idx + 3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);

            const diskTexture = new THREE.CanvasTexture(texCanvas);
            diskTexture.colorSpace = THREE.SRGBColorSpace;
            diskTexture.wrapS = THREE.RepeatWrapping;
            diskTexture.wrapT = THREE.ClampToEdgeWrapping;
            diskTexture.magFilter = THREE.LinearFilter;
            diskTexture.minFilter = THREE.LinearMipmapLinearFilter;
            diskTexture.generateMipmaps = true;

            // ─────────────────────────────────────
            // ROTATING DISK GROUP
            // ─────────────────────────────────────
            const diskGroup = new THREE.Group();

            // Main accretion disk ring
            const diskInnerRadius = 1.55;
            const diskOuterRadius = 5.2;
            const diskGeom = new THREE.RingGeometry(diskInnerRadius, diskOuterRadius, 200, 12);
            // Modify UVs: RingGeometry already has u=angular, v=radial (0 inner, 1 outer)
            const diskMat = new THREE.MeshBasicMaterial({
                map: diskTexture,
                side: THREE.DoubleSide,
                depthWrite: true,
                color: '#ffffff',
            });
            const diskMesh = new THREE.Mesh(diskGeom, diskMat);
            diskMesh.rotation.x = -Math.PI / 2;
            diskMesh.renderOrder = 4;
            diskGroup.add(diskMesh);

            // Inner bright rim of disk
            const innerRimGeom = new THREE.TorusGeometry(diskInnerRadius, 0.025, 20, 200);
            const innerRimMat = new THREE.MeshBasicMaterial({
                color: '#fff8e0',
                depthWrite: true,
            });
            const innerRim = new THREE.Mesh(innerRimGeom, innerRimMat);
            innerRim.rotation.x = Math.PI / 2;
            innerRim.renderOrder = 5;
            diskGroup.add(innerRim);

            // Inner rim glow
            const innerRimGlowGeom = new THREE.TorusGeometry(diskInnerRadius, 0.08, 24, 200);
            const innerRimGlowMat = new THREE.MeshBasicMaterial({
                color: '#fff3c0',
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const innerRimGlow = new THREE.Mesh(innerRimGlowGeom, innerRimGlowMat);
            innerRimGlow.rotation.x = Math.PI / 2;
            innerRimGlow.renderOrder = 6;
            diskGroup.add(innerRimGlow);

            // Disk glow layer (additive, soft)
            const diskGlowGeom = new THREE.RingGeometry(diskInnerRadius - 0.1, diskOuterRadius + 0.15, 150, 8);
            const diskGlowMat = new THREE.MeshBasicMaterial({
                color: '#ffaa55',
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.DoubleSide,
            });
            const diskGlow = new THREE.Mesh(diskGlowGeom, diskGlowMat);
            diskGlow.rotation.x = -Math.PI / 2;
            diskGlow.renderOrder = 7;
            diskGroup.add(diskGlow);

            // Second broader glow
            const diskGlow2Geom = new THREE.RingGeometry(diskInnerRadius - 0.05, diskOuterRadius + 0.4, 120, 6);
            const diskGlow2Mat = new THREE.MeshBasicMaterial({
                color: '#ff8844',
                transparent: true,
                opacity: 0.09,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.DoubleSide,
            });
            const diskGlow2 = new THREE.Mesh(diskGlow2Geom, diskGlow2Mat);
            diskGlow2.rotation.x = -Math.PI / 2;
            diskGlow2.renderOrder = 8;
            diskGroup.add(diskGlow2);

            // ─────────────────────────────────────
            // GRAVITATIONAL LENSING ARCS
            // ─────────────────────────────────────
            // Upper arc – far side of disk bent over the top
            const upperArcPoints = [
                new THREE.Vector3(-4.0, 0.03, -2.8),
                new THREE.Vector3(-2.2, 0.55, -1.8),
                new THREE.Vector3(-0.8, 1.25, -0.5),
                new THREE.Vector3(0, 1.48, 0.15),
                new THREE.Vector3(0.8, 1.25, -0.5),
                new THREE.Vector3(2.2, 0.55, -1.8),
                new THREE.Vector3(4.0, 0.03, -2.8),
            ];
            const upperCurve = new THREE.CatmullRomCurve3(upperArcPoints, false, 'catmullrom', 0.6);
            const upperArcGeom = new THREE.TubeGeometry(upperCurve, 140, 0.035, 16, false);
            const upperArcMat = new THREE.MeshBasicMaterial({
                color: '#ffe8b0',
                depthWrite: true,
            });
            const upperArc = new THREE.Mesh(upperArcGeom, upperArcMat);
            upperArc.renderOrder = 9;
            diskGroup.add(upperArc);

            // Upper arc glow
            const upperArcGlowGeom = new THREE.TubeGeometry(upperCurve, 140, 0.10, 16, false);
            const upperArcGlowMat = new THREE.MeshBasicMaterial({
                color: '#ffd090',
                transparent: true,
                opacity: 0.40,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const upperArcGlow = new THREE.Mesh(upperArcGlowGeom, upperArcGlowMat);
            upperArcGlow.renderOrder = 10;
            diskGroup.add(upperArcGlow);

            // Upper arc broader glow
            const upperArcGlow2Geom = new THREE.TubeGeometry(upperCurve, 140, 0.20, 16, false);
            const upperArcGlow2Mat = new THREE.MeshBasicMaterial({
                color: '#ffaa55',
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const upperArcGlow2 = new THREE.Mesh(upperArcGlow2Geom, upperArcGlow2Mat);
            upperArcGlow2.renderOrder = 11;
            diskGroup.add(upperArcGlow2);

            // Lower arc – mirrored under the bottom
            const lowerArcPoints = [
                new THREE.Vector3(-4.0, -0.03, -2.8),
                new THREE.Vector3(-2.2, -0.55, -1.8),
                new THREE.Vector3(-0.8, -1.25, -0.5),
                new THREE.Vector3(0, -1.48, 0.15),
                new THREE.Vector3(0.8, -1.25, -0.5),
                new THREE.Vector3(2.2, -0.55, -1.8),
                new THREE.Vector3(4.0, -0.03, -2.8),
            ];
            const lowerCurve = new THREE.CatmullRomCurve3(lowerArcPoints, false, 'catmullrom', 0.6);
            const lowerArcGeom = new THREE.TubeGeometry(lowerCurve, 140, 0.035, 16, false);
            const lowerArcMat = new THREE.MeshBasicMaterial({
                color: '#ffe8b0',
                depthWrite: true,
            });
            const lowerArc = new THREE.Mesh(lowerArcGeom, lowerArcMat);
            lowerArc.renderOrder = 9;
            diskGroup.add(lowerArc);

            // Lower arc glow
            const lowerArcGlowGeom = new THREE.TubeGeometry(lowerCurve, 140, 0.10, 16, false);
            const lowerArcGlowMat = new THREE.MeshBasicMaterial({
                color: '#ffd090',
                transparent: true,
                opacity: 0.40,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const lowerArcGlow = new THREE.Mesh(lowerArcGlowGeom, lowerArcGlowMat);
            lowerArcGlow.renderOrder = 10;
            diskGroup.add(lowerArcGlow);

            // Lower arc broader glow
            const lowerArcGlow2Geom = new THREE.TubeGeometry(lowerCurve, 140, 0.20, 16, false);
            const lowerArcGlow2Mat = new THREE.MeshBasicMaterial({
                color: '#ffaa55',
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const lowerArcGlow2 = new THREE.Mesh(lowerArcGlow2Geom, lowerArcGlow2Mat);
            lowerArcGlow2.renderOrder = 11;
            diskGroup.add(lowerArcGlow2);

            // Additional bright spots where arcs meet the disk plane (far side connection points)
            const farLeftGlowGeom = new THREE.SphereGeometry(0.12, 16, 12);
            const farGlowMat = new THREE.MeshBasicMaterial({
                color: '#fff8d0',
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const farLeftGlow = new THREE.Mesh(farLeftGlowGeom, farGlowMat);
            farLeftGlow.position.set(-4.0, 0, -2.8);
            farLeftGlow.renderOrder = 12;
            diskGroup.add(farLeftGlow);

            const farRightGlow = new THREE.Mesh(farLeftGlowGeom.clone(), farGlowMat);
            farRightGlow.position.set(4.0, 0, -2.8);
            farRightGlow.renderOrder = 12;
            diskGroup.add(farRightGlow);

            scene.add(diskGroup);

            // ─────────────────────────────────────
            // STARFIELD
            // ─────────────────────────────────────
            const starCount = 900;
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starSizesArr = new Float32Array(starCount);

            for (let i = 0; i < starCount; i++) {
                // Random point on a large sphere (radius 14–28)
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const radius = 14 + Math.random() * 18;
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);

                // Slightly warm/cool variation
                const colorTemp = 0.7 + Math.random() * 0.3;
                const r = 0.85 * colorTemp + Math.random() * 0.15;
                const g = 0.88 * colorTemp + Math.random() * 0.12;
                const b = 0.95 + Math.random() * 0.05;
                starColors[i * 3] = r;
                starColors[i * 3 + 1] = g;
                starColors[i * 3 + 2] = b;

                starSizesArr[i] = 0.3 + Math.random() * 1.8;
            }

            const starGeom = new THREE.BufferGeometry();
            starGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeom.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeom.setAttribute('size', new THREE.BufferAttribute(starSizesArr, 1));

            // Create a small star sprite texture
            const starSpriteCanvas = document.createElement('canvas');
            starSpriteCanvas.width = 32;
            starSpriteCanvas.height = 32;
            const sctx = starSpriteCanvas.getContext('2d');
            const radialGrad = sctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            radialGrad.addColorStop(0, 'rgba(255,255,255,1)');
            radialGrad.addColorStop(0.06, 'rgba(255,255,255,0.95)');
            radialGrad.addColorStop(0.2, 'rgba(220,220,255,0.6)');
            radialGrad.addColorStop(0.5, 'rgba(120,120,180,0.15)');
            radialGrad.addColorStop(1, 'rgba(0,0,0,0)');
            sctx.fillStyle = radialGrad;
            sctx.fillRect(0, 0, 32, 32);
            const starSpriteTex = new THREE.CanvasTexture(starSpriteCanvas);
            starSpriteTex.needsUpdate = true;

            const starMaterial = new THREE.PointsMaterial({
                size: 0.35,
                map: starSpriteTex,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.75,
            });
            const starPoints = new THREE.Points(starGeom, starMaterial);
            starPoints.renderOrder = -1;
            scene.add(starPoints);

            // ─────────────────────────────────────
            // SUBTLE AMBIENT GLOW AROUND BLACK HOLE
            // ─────────────────────────────────────
            const ambientGlowGeom = new THREE.SphereGeometry(sphereRadius * 1.6, 48, 32);
            const ambientGlowMat = new THREE.MeshBasicMaterial({
                color: '#331100',
                transparent: true,
                opacity: 0.06,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const ambientGlow = new THREE.Mesh(ambientGlowGeom, ambientGlowMat);
            ambientGlow.renderOrder = -2;
            scene.add(ambientGlow);

            // ─────────────────────────────────────
            // ANIMATION LOOP
            // ─────────────────────────────────────
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.1);

                // Slow rotation of the disk and lensing arcs
                const rotationSpeed = 0.22; // radians per second
                diskGroup.rotation.y += rotationSpeed * dt;

                // Very subtle star twinkle via slight rotation
                starPoints.rotation.y += 0.015 * dt;
                starPoints.rotation.x += 0.006 * dt;

                renderer.render(scene, camera);
            }

            // ─────────────────────────────────────
            // RESIZE HANDLER
            // ─────────────────────────────────────
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ─────────────────────────────────────
            // START RENDER LOOP
            // ─────────────────────────────────────
            animate();

            console.log('Gargantua black hole scene initialized successfully.');
        } catch (err) {
            console.error('Scene initialization error:', err);
            // Fallback: ensure a dark canvas is shown
            const fallbackCanvas = document.createElement('canvas');
            fallbackCanvas.width = window.innerWidth;
            fallbackCanvas.height = window.innerHeight;
            fallbackCanvas.style.display = 'block';
            const fctx = fallbackCanvas.getContext('2d');
            fctx.fillStyle = '#010108';
            fctx.fillRect(0, 0, fallbackCanvas.width, fallbackCanvas.height);
            document.body.appendChild(fallbackCanvas);
        }
    </script>
</body>
</html>
