<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gargantua</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}
  canvas{display:block;}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

try {
  const PI = Math.PI;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  document.body.appendChild(renderer.domElement);

  // Sizing: sphere diameter = 28% of viewport height.
  // visible height at distance d=10 with fov=50 => 2*10*tan(25deg) = 9.326
  // diameter = 0.28 * 9.326 = 2.611 => radius = 1.3055
  const SPHERE_R = 1.3055;
  const CAM_DIST = 10;
  const camAngle = 6 * PI / 180; // 6 degrees above disk plane
  camera.position.set(0, CAM_DIST * Math.sin(camAngle), CAM_DIST * Math.cos(camAngle));
  camera.lookAt(0, 0, 0);

  // ---------- Event horizon (perfectly black sphere) ----------
  const horizon = new THREE.Mesh(
    new THREE.SphereGeometry(SPHERE_R, 64, 48),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  scene.add(horizon);

  // ---------- Accretion disk (horizontal plane) ----------
  const diskInner = SPHERE_R * 1.28;
  const diskOuter = SPHERE_R * 4.3;
  const diskGeo = new THREE.RingGeometry(diskInner, diskOuter, 320, 10);
  const diskMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0 },
      uInner: { value: diskInner },
      uOuter: { value: diskOuter }
    },
    vertexShader: `
      varying vec3 vPos;
      void main(){
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform float uInner;
      uniform float uOuter;
      varying vec3 vPos;
      void main(){
        float r = length(vPos.xy);
        float t = clamp((r - uInner) / (uOuter - uInner), 0.0, 1.0);

        // Radial color gradient: hot white-yellow -> amber -> deep orange
        vec3 cInner = vec3(1.0, 0.952, 0.815);   // #fff3d0
        vec3 cMid   = vec3(1.0, 0.682, 0.231);   // #ffae3b
        vec3 cOuter = vec3(0.784, 0.333, 0.102); // #c8551a
        vec3 col = mix(cInner, cMid, smoothstep(0.0, 0.35, t));
        col = mix(col, cOuter, smoothstep(0.35, 1.0, t));

        float ang = atan(vPos.y, vPos.x);

        // Relativistic beaming: right side (+x) brighter than left
        float beam = 0.30 + 0.70 * (0.5 + 0.5 * cos(ang));
        beam = pow(beam, 1.25);

        // Rotating brightness clumps so disk rotation is visible
        float rot = uTime * 0.22;
        float clump = 0.20 * sin(ang * 3.0 + rot * 3.0)
                    + 0.13 * sin(ang * 6.0 - rot * 2.0)
                    + 0.08 * sin(ang * 11.0 + rot * 4.5);
        float grain = 0.05 * sin(ang * 23.0 + rot * 7.0);

        // Soft inner/outer edges
        float edgeIn  = smoothstep(0.0, 0.05, t);
        float edgeOut = 1.0 - smoothstep(0.78, 1.0, t);
        float edge = edgeIn * edgeOut;

        float innerBoost = 1.0 + 0.7 * (1.0 - t);
        float brightness = beam * (0.85 + clump + grain) * edge * innerBoost;
        col *= brightness;

        float alpha = edge * 0.95;
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotation.x = -PI / 2; // lay flat -> horizontal (XZ) plane
  scene.add(disk);

  // ---------- Gravitational lensing arcs (vertical ring around sphere) ----------
  // A ring in the XY plane (facing camera) with brightness modulated by
  // |sin(angle)| produces the bright arc over the top and a dimmer mirror
  // arc under the bottom, while staying faint at the sides where it joins
  // the disk -- approximating the lensed far side of the disk.
  const haloInner = SPHERE_R * 1.02;
  const haloOuter = SPHERE_R * 1.78;
  const haloGeo = new THREE.RingGeometry(haloInner, haloOuter, 320, 8);
  const haloMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0 },
      uInner: { value: haloInner },
      uOuter: { value: haloOuter }
    },
    vertexShader: `
      varying vec3 vPos;
      void main(){
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform float uInner;
      uniform float uOuter;
      varying vec3 vPos;
      void main(){
        float r = length(vPos.xy);
        float t = clamp((r - uInner) / (uOuter - uInner), 0.0, 1.0);

        vec3 cInner = vec3(1.0, 0.95, 0.82);
        vec3 cMid   = vec3(1.0, 0.68, 0.23);
        vec3 cOuter = vec3(0.78, 0.33, 0.10);
        vec3 col = mix(cInner, cMid, smoothstep(0.0, 0.4, t));
        col = mix(col, cOuter, smoothstep(0.4, 1.0, t));

        float ang = atan(vPos.y, vPos.x);
        float topness = max(0.0,  sin(ang)); // 1 at top of ring
        float botness = max(0.0, -sin(ang)); // 1 at bottom of ring
        // Top arc bright, bottom arc dimmer, sides faint (connects to disk)
        float arc = topness * 1.0 + botness * 0.5;
        arc = pow(arc, 0.7) + 0.08;

        float edge = smoothstep(0.0, 0.06, t) * (1.0 - smoothstep(0.65, 1.0, t));
        float innerBoost = 1.0 + 0.5 * (1.0 - t);
        float brightness = arc * edge * innerBoost * 1.35;
        col *= brightness;

        float alpha = clamp(arc, 0.0, 1.0) * edge * 0.9;
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  // keep in XY plane (vertical, facing camera)
  scene.add(halo);

  // ---------- Photon ring (thin bright ring hugging the horizon) ----------
  const photonGeo = new THREE.RingGeometry(SPHERE_R * 1.005, SPHERE_R * 1.035, 320, 1);
  const photonMat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `
      varying vec3 vPos;
      void main(){
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vPos;
      void main(){
        gl_FragColor = vec4(1.0, 0.96, 0.88, 1.0);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  const photon = new THREE.Mesh(photonGeo, photonMat);
  scene.add(photon);

  // ---------- Sparse dim starfield ----------
  const starGeo = new THREE.BufferGeometry();
  const starCount = 2200;
  const positions = new Float32Array(starCount * 3);
  const colors    = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 80 + Math.random() * 40;
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    const b = 0.22 + Math.random() * 0.6;
    const tint = Math.random();
    colors[i*3]   = b;
    colors[i*3+1] = b * (0.85 + 0.15 * tint);
    colors[i*3+2] = b * (0.7 + 0.3 * tint);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  starGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  const starMat = new THREE.PointsMaterial({
    size: 0.16,
    sizeAttenuation: true,
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // ---------- Render loop ----------
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    diskMat.uniforms.uTime.value = t;
    haloMat.uniforms.uTime.value = t;
    renderer.render(scene, camera);
  }
  animate();

  // ---------- Resize ----------
  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
} catch(e){
  console.error(e);
}
</script>
</body>
</html>
