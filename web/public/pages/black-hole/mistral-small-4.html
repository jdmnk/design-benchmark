<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gargantua – Interstellar Black Hole</title>
  <style>
    body { margin: 0; overflow: hidden; background: #05050a; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    try {
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      // ---------- Scene setup ----------
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05050a);

      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 1000);
      camera.position.set(0, 0.4, 5.5);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x05050a, 1);
      document.body.appendChild(renderer.domElement);

      // ---------- Lightweight starfield ----------
      const starGeometry = new THREE.BufferGeometry();
      const starPositions = [];
      const starColors = [];
      const starCount = 2000;
      for (let i = 0; i < starCount; i++) {
        const x = (Math.random() - 0.5) * 40;
        const y = (Math.random() - 0.5) * 40;
        const z = (Math.random() - 0.5) * 40;
        starPositions.push(x, y, z);
        const c = Math.random() * 0.5 + 0.15;
        starColors.push(c, c, c);
      }
      starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
      starGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));
      const starMaterial = new THREE.PointsMaterial({
        size: 0.05,
        vertexColors: true,
        transparent: true,
        opacity: 0.75
      });
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      // ---------- Black hole sphere ----------
      const BH_RADIUS = 1.0;
      const sphereGeometry = new THREE.SphereGeometry(BH_RADIUS, 96, 96);
      const sphere = new THREE.Mesh(
        sphereGeometry,
        new THREE.MeshBasicMaterial({ color: 0x000000 })
      );
      scene.add(sphere);

      // ---------- Accretion disk ----------
      const diskGeometry = new THREE.TorusGeometry(2.5, 0.08, 128, 64);
      const position = diskGeometry.attributes.position;
      const colors = [];
      const color = new THREE.Color();

      for (let i = 0; i < position.count; i++) {
        const x = position.getX(i);
        const z = position.getZ(i);
        const majorRadius = Math.sqrt(x * x + z * z);

        if (majorRadius < 1.5) color.set('#fff3d0');
        else if (majorRadius < 2.2) color.set('#ffae3b');
        else color.set('#c8551a');

        if (position.getY(i) > 0) color.offsetHSL(0, 0, 0.28);
        colors.push(color.r, color.g, color.b);
      }
      diskGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      const diskMaterial = new THREE.MeshBasicMaterial({
        vertexColors: true,
        emissiveIntensity: 2.0,
        blending: THREE.AdditiveBlending,
        transparent: true,
        side: THREE.DoubleSide
      });
      const disk = new THREE.Mesh(diskGeometry, diskMaterial);
      scene.add(disk);

      // ---------- Photon ring ----------
      const photonRingGeometry = new THREE.TorusGeometry(BH_RADIUS * 1.03, BH_RADIUS * 0.03, 64, 64);
      const photonRingMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 4.5,
        blending: THREE.AdditiveBlending
      });
      const photonRing = new THREE.Mesh(photonRingGeometry, photonRingMaterial);
      scene.add(photonRing);

      // ---------- Gravitational lensing arcs ----------
      const arcMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 3.8,
        blending: THREE.AdditiveBlending
      });

      const upperArcGeometry = new THREE.TorusGeometry(3.5, 0.25, 64, 64, Math.PI * 1.1);
      upperArcGeometry.rotateX(Math.PI * 0.5);
      upperArcGeometry.rotateZ(Math.PI * -0.2);
      upperArcGeometry.translate(0, 1.8, 0);
      const upperArc = new THREE.Mesh(upperArcGeometry, arcMaterial);
      scene.add(upperArc);

      const lowerArcGeometry = new THREE.TorusGeometry(3.5, 0.25, 64, 64, Math.PI * 1.1);
      lowerArcGeometry.rotateX(Math.PI * 0.5);
      lowerArcGeometry.rotateZ(Math.PI * 0.2);
      lowerArcGeometry.translate(0, -1.8, 0);
      const lowerArc = new THREE.Mesh(lowerArcGeometry, arcMaterial);
      scene.add(lowerArc);

      // ---------- Animation ----------
      let diskRotation = 0;
      function animate() {
        requestAnimationFrame(animate);
        diskRotation += 0.0008;
        disk.rotation.y = diskRotation;
        upperArc.rotation.y = diskRotation * 0.8;
        lowerArc.rotation.y = diskRotation * 0.8;
        renderer.render(scene, camera);
      }
      animate();

      // ---------- Resize ----------
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    } catch (err) {
      console.error(err);
      const errMsg = document.createElement('div');
      errMsg.style.position = 'absolute';
      errMsg.style.top = '20px';
      errMsg.style.left = '20px';
      errMsg.style.color = 'red';
      errMsg.style.fontFamily = 'sans-serif';
      errMsg.style.fontSize = '16px';
      errMsg.textContent = 'Scene failed: ' + err.message;
      document.body.appendChild(errMsg);
    }
  </script>
</body>
</html>
