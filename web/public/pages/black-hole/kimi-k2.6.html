<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua - Supermassive Black Hole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body class="bg-black w-screen h-screen">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        try {
            
            // Scene setup
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020204);

            // Camera setup
            const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Position camera slightly above the disk plane (5-8 degrees)
            // Disk is on XZ plane (y=0). Camera looks from positive Z toward origin.
            // tan(6 degrees) ≈ 0.105. So y offset of 0.5 at distance ~5 gives ~5.7 degrees.
            camera.position.set(0, 0.5, 5);
            camera.lookAt(0, 0, 0);

            // Renderer setup
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // Black Hole Event Horizon
            // Diameter ~28% of viewport height. At camera dist 5, FOV 40.
            // height at z=0 is 2 * tan(20) * 5 ≈ 3.64. 28% of 3.64 ≈ 1.02.
            const bhRadius = 0.51;
            const bhGeometry = new THREE.SphereGeometry(bhRadius, 64, 64);
            const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
            scene.add(blackHole);

            // Accretion Disk
            // A thin disk in the XZ plane, extending well past the black hole
            const diskInnerRadius = bhRadius * 1.4;
            const diskOuterRadius = bhRadius * 8.0;

            // Create custom shader material for the disk to handle the color gradient
            // Inner: #fff3d0 (white-yellow), Mid: #ffae3b (amber), Outer: #c8551a (deep orange)
            const diskVertexShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                varying vec3 vNormal;
                
                void main() {
                    vUv = uv;
                    vPosition = position;
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const diskFragmentShader = `
                varying vec2 vUv;
                varying vec3 vPosition;
                varying vec3 vNormal;
                
                uniform float time;
                
                void main() {
                    // Calculate radial distance from center (in local space, disk is on XZ plane)
                    float r = length(vPosition.xz);
                    
                    // Normalize radius for gradient (0 at inner, 1 at outer)
                    float innerR = 0.7; // Approximate inner radius in local units
                    float outerR = 4.5; // Approximate outer radius
                    float t = clamp((r - innerR) / (outerR - innerR), 0.0, 1.0);
                    
                    // Color gradient
                    vec3 colorInner = vec3(1.0, 0.953, 0.816); // #fff3d0
                    vec3 colorMid = vec3(1.0, 0.682, 0.231);   // #ffae3b
                    vec3 colorOuter = vec3(0.784, 0.333, 0.102); // #c8551a
                    
                    vec3 color;
                    if (t < 0.5) {
                        color = mix(colorInner, colorMid, t * 2.0);
                    } else {
                        color = mix(colorMid, colorOuter, (t - 0.5) * 2.0);
                    }
                    
                    // Add brightness falloff - inner edge is much brighter
                    float brightness = 1.0 / (r * r * 0.5 + 0.1);
                    brightness = clamp(brightness, 0.0, 15.0);
                    
                    // Relativistic beaming: one side brighter
                    // In local space, X axis. Simulate doppler beaming.
                    float beaming = smoothstep(-3.0, 3.0, vPosition.x);
                    beaming = 0.7 + beaming * 0.6; // Range 0.7 to 1.3
                    
                    // Add some noise/texture variation
                    float noise = sin(r * 20.0 - time * 2.0) * 0.1 + 0.9;
                    
                    gl_FragColor = vec4(color * brightness * beaming * noise, 1.0);
                    
                    // Additive blending will be set on the material
                }
            `;

            const diskGeometry = new THREE.RingGeometry(diskInnerRadius, diskOuterRadius, 128, 1);
            // Rotate ring to lie on XZ plane (horizontal)
            diskGeometry.rotateX(-Math.PI / 2);
            
            const diskMaterial = new THREE.ShaderMaterial({
                vertexShader: diskVertexShader,
                fragmentShader: diskFragmentShader,
                uniforms: {
                    time: { value: 0 }
                },
                side: THREE.DoubleSide,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const accretionDisk = new THREE.Mesh(diskGeometry, diskMaterial);
            scene.add(accretionDisk);

            // Gravitational Lensing Arcs (Top and Bottom)
            // These simulate the far side of the disk being bent over and under the black hole
            const arcRadius = bhRadius * 1.35;
            const arcTube = 0.08;

            // Top arc
            const topArcGeometry = new THREE.TorusGeometry(arcRadius, arcTube, 32, 128, Math.PI);
            const arcMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffe4b5,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const topArc = new THREE.Mesh(topArcGeometry, arcMaterial);
            topArc.position.y = bhRadius * 0.3;
            topArc.rotation.x = Math.PI / 2;
            topArc.rotation.z = Math.PI; // Flip to arc over the top
            scene.add(topArc);

            // Bottom arc
            const bottomArc = new THREE.Mesh(topArcGeometry, arcMaterial);
            bottomArc.position.y = -bhRadius * 0.3;
            bottomArc.rotation.x = Math.PI / 2;
            scene.add(bottomArc);

            // Additional brighter inner arcs for stronger lensing effect
            const innerArcRadius = bhRadius * 1.15;
            const innerArcTube = 0.04;
            const innerArcGeometry = new THREE.TorusGeometry(innerArcRadius, innerArcTube, 32, 128, Math.PI * 0.8);
            const innerArcMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            const topInnerArc = new THREE.Mesh(innerArcGeometry, innerArcMaterial);
            topInnerArc.position.y = bhRadius * 0.15;
            topInnerArc.rotation.x = Math.PI / 2;
            topInnerArc.rotation.z = Math.PI * 1.1;
            scene.add(topInnerArc);

            const bottomInnerArc = new THREE.Mesh(innerArcGeometry, innerArcMaterial);
            bottomInnerArc.position.y = -bhRadius * 0.15;
            bottomInnerArc.rotation.x = Math.PI / 2;
            bottomInnerArc.rotation.z = -Math.PI * 0.1;
            scene.add(bottomInnerArc);

            // Photon Ring - thin bright ring hugging the event horizon
            const photonRingGeometry = new THREE.TorusGeometry(bhRadius * 1.02, 0.025, 32, 128);
            const photonRingMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const photonRing = new THREE.Mesh(photonRingGeometry, photonRingMaterial);
            photonRing.rotation.x = Math.PI / 2;
            scene.add(photonRing);

            // Second fainter photon ring for depth
            const photonRing2Geometry = new THREE.TorusGeometry(bhRadius * 1.06, 0.015, 32, 128);
            const photonRing2Material = new THREE.MeshBasicMaterial({
                color: 0xffcc66,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const photonRing2 = new THREE.Mesh(photonRing2Geometry, photonRing2Material);
            photonRing2.rotation.x = Math.PI / 2;
            scene.add(photonRing2);

            // Starfield
            const starCount = 1500;
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);

            for (let i = 0; i < starCount; i++) {
                // Distribute stars in a sphere around the scene
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const radius = 20 + Math.random() * 80;
                
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);
                
                starSizes[i] = Math.random() * 1.5 + 0.5;
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

            const starMaterial = new THREE.PointsMaterial({
                color: 0x8899aa,
                size: 0.08,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true
            });

            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // Animation
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                
                const elapsedTime = clock.getElapsedTime();
                
                // Rotate accretion disk slowly
                accretionDisk.rotation.y = elapsedTime * 0.15;
                
                // Update disk shader time
                diskMaterial.uniforms.time.value = elapsedTime;
                
                // Subtle rotation of arcs to match disk
                const arcRotation = elapsedTime * 0.15;
                topArc.rotation.z = Math.PI + arcRotation;
                bottomArc.rotation.z = arcRotation;
                topInnerArc.rotation.z = Math.PI * 1.1 + arcRotation;
                bottomInnerArc.rotation.z = -Math.PI * 0.1 + arcRotation;
                photonRing.rotation.z = arcRotation;
                photonRing2.rotation.z = arcRotation;
                
                // Very subtle star twinkle
                starMaterial.opacity = 0.5 + Math.sin(elapsedTime * 0.5) * 0.1;

                renderer.render(scene, camera);
            }

            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (error) {
            console.error('Error initializing black hole scene:', error);
            // Display error on page
            document.body.innerHTML = `
                <div class="flex items-center justify-center h-screen bg-black text-white">
                    <p>Error loading scene: ${error.message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
