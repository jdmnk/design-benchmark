<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMBERWAVE • 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0805;
  color: #f5e8d3;
  font-family: 'Inter', system_ui, sans-serif;
  overflow: hidden;
  height: 100vh;
  position: relative;
}

/* Cosmic desert background */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 50% 20%, #2a1f15 0%, transparent 60%),
    linear-gradient(#0a0805 0%, #110d09 100%);
}

/* Starfield */
.stars {
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(1px 1px at 25px 40px, #fff, transparent),
    radial-gradient(1px 1px at 120px 85px, #ffe4b3, transparent),
    radial-gradient(1px 1px at 310px 55px, #fff, transparent),
    radial-gradient(1px 1px at 480px 150px, #ffe4b3, transparent),
    radial-gradient(1px 1px at 190px 200px, #fff, transparent);
  background-size: 550px 250px;
  opacity: 0.6;
  pointer-events: none;
}

/* Canyon silhouette */
.canyon {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 240px;
  background: linear-gradient(#00000000, #0a0805);
  z-index: 1;
}
.canyon::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 180px;
  background: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1200 300%22><path fill=%22%230a0805%22 d=%22M0 300L80 160L180 240L260 120L340 210L420 90L520 195L610 70L720 180L800 100L910 210L1000 85L1100 165L1200 300Z%22/></svg>') no-repeat;
  background-size: cover;
  opacity: 0.95;
}

/* Ember particles */
.ember {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #ff6b35;
  border-radius: 50%;
  box-shadow: 0 0 6px #ff6b35;
  animation: ember-float 4s linear infinite;
  z-index: 2;
}
.ember:nth-child(1) { left: 12%; animation-duration: 3.2s; }
.ember:nth-child(2) { left: 28%; animation-duration: 5.1s; }
.ember:nth-child(3) { left: 51%; animation-duration: 3.8s; }
.ember:nth-child(4) { left: 67%; animation-duration: 4.4s; }
.ember:nth-child(5) { left: 83%; animation-duration: 3.5s; }

@keyframes ember-float {
  0% { transform: translateY(120px); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(-180px); opacity: 0; }
}

/* Main container */
.container {
  position: relative;
  z-index: 3;
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 40px 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Wordmark */
.wordmark {
  font-family: 'Anton', sans-serif;
  font-size: 138px;
  line-height: 0.82;
  letter-spacing: -9px;
  font-weight: 400;
  background: linear-gradient(180deg, #fff7e6 0%, #ff9a5e 45%, #c94a1f 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 40px rgba(255, 107, 53, 0.5);
  text-align: center;
  margin-bottom: 8px;
  position: relative;
  z-index: 4;
}

/* Ember underline on logo */
.wordmark::after {
  content: '';
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 78%;
  height: 6px;
  background: linear-gradient(to right, transparent, #ff6b35, transparent);
  box-shadow: 0 0 30px #ff6b35;
  z-index: 3;
}

/* Date & Location */
.meta {
  text-align: center;
  margin-bottom: 32px;
}
.meta-date {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 3px;
  color: #ff9a5e;
}
.meta-place {
  font-size: 15px;
  letter-spacing: 4px;
  color: #a38c6c;
  margin-top: 2px;
}

/* CTA */
.cta {
  align-self: center;
  margin-bottom: 42px;
  position: relative;
  z-index: 5;
}
.cta-button {
  font-family: 'Anton', sans-serif;
  font-size: 22px;
  padding: 16px 68px;
  background: linear-gradient(#ff6b35, #c94a1f);
  color: #0a0805;
  border: none;
  letter-spacing: 4px;
  box-shadow: 0 0 0 1px #ff9a5e,
              0 0 30px rgba(255, 107, 53, 0.6);
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
}
.cta-button:hover {
  box-shadow: 0 0 0 1px #ff9a5e,
              0 0 60px rgba(255, 107, 53, 0.9);
  transform: scale(1.02);
}

/* Lineup */
.lineup {
  text-align: center;
  z-index: 4;
}
.lineup-label {
  font-size: 11px;
  letter-spacing: 5px;
  color: #a38c6c;
  margin-bottom: 12px;
}
.lineup-grid {
  display: flex;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
}
.headliner {
  font-family: 'Anton', sans-serif;
  font-size: 29px;
  line-height: 1;
  letter-spacing: -1.5px;
  color: #fff7e6;
}
.support {
  font-size: 18px;
  font-weight: 600;
  color: #d9b38e;
  letter-spacing: -.5px;
}

/* Ticker */
.ticker {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(10, 8, 5, 0.85);
  padding: 10px 0;
  overflow: hidden;
  border-top: 1px solid #3d2a1f;
  z-index: 6;
}
.marquee {
  display: flex;
  white-space: nowrap;
  animation: marquee 14s linear infinite;
  font-size: 13px;
  letter-spacing: 6px;
  color: #ff9a5e;
}
.marquee span {
  padding: 0 40px;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>
<body>
  <!-- Stars -->
  <div class="stars"></div>
  
  <!-- Embers -->
  <div class="ember" style="top: 38%; animation-delay: 0s;"></div>
  <div class="ember" style="top: 28%; animation-delay: 1.2s;"></div>
  <div class="ember" style="top: 44%; animation-delay: 2.8s;"></div>
  <div class="ember" style="top: 31%; animation-delay: 0.6s;"></div>
  <div class="ember" style="top: 51%; animation-delay: 3.4s;"></div>
  
  <div class="container">
    <!-- Wordmark -->
    <h1 class="wordmark">EMBERWAVE</h1>
    
    <!-- Meta -->
    <div class="meta">
      <div class="meta-date">JUNE 18–20 2027</div>
      <div class="meta-place">ASH CANYON, NEVADA</div>
    </div>
    
    <!-- CTA -->
    <div class="cta">
      <button onclick="window.location='#tickets'" class="cta-button">GET TICKETS</button>
    </div>
    
    <!-- Lineup -->
    <div class="lineup">
      <div class="lineup-label">HEADLINERS</div>
      <div class="lineup-grid">
        <div>
          <div class="headliner">NOVA CULT</div>
          <div class="headliner" style="margin-top:4px">MOONBURN</div>
        </div>
        <div style="margin-top:14px; display:flex; flex-direction:column; justify-content:center; gap:9px;">
          <div class="support">Velvet Static • Dax Riviera</div>
          <div class="support">Cinder &amp; Ash • The Glass Dunes</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Canyon -->
  <div class="canyon"></div>
  
  <!-- Phase 2 Ticker -->
  <div class="ticker">
    <div class="marquee">
      <span>PHASE 2 LINEUP DROPS MARCH 2027 • PHASE 2 LINEUP DROPS MARCH 2027 • PHASE 2 LINEUP DROPS MARCH 2027</span>
    </div>
  </div>
</body>
</html>
