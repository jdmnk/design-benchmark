<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBERWAVE — June 18–20, 2027 · Ash Canyon, Nevada</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;700&family=Russo+One&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        /* ── BODY BACKGROUND – FIRST RULE ── */
        body {
            background: #0b0a0f;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Space Grotesk', 'Space Mono', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── CSS CUSTOM PROPERTIES ── */
        :root {
            --bg-deep: #0b0a0f;
            --canyon-dark: #1a0d06;
            --canyon-mid: #2d1408;
            --ember-core: #ff4d1c;
            --ember-glow: #ff7b38;
            --amber: #ff9a3c;
            --gold: #ffb800;
            --gold-soft: #f5c842;
            --purple-neon: #c040e0;
            --purple-deep: #7b20b0;
            --text-warm: #f3e5d0;
            --text-muted: #c4b5a0;
            --star-white: #fef9f0;
            --card-bg: rgba(20, 8, 2, 0.75);
        }

        /* ── GLOBAL RESETS ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* ── BACKGROUND LAYER: CANYON + STARS + GRAIN ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Star field */
        .stars {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(1px 1px at 8% 12%, var(--star-white) 40%, transparent),
                radial-gradient(1.5px 1.5px at 22% 7%, var(--star-white) 50%, transparent),
                radial-gradient(1px 1px at 35% 18%, var(--star-white) 35%, transparent),
                radial-gradient(2px 2px at 48% 5%, #ffe8d0 45%, transparent),
                radial-gradient(1px 1px at 62% 14%, var(--star-white) 40%, transparent),
                radial-gradient(1.5px 1.5px at 75% 9%, #fff5e8 50%, transparent),
                radial-gradient(1px 1px at 85% 16%, var(--star-white) 38%, transparent),
                radial-gradient(2px 2px at 15% 22%, #ffe0c8 42%, transparent),
                radial-gradient(1px 1px at 28% 28%, var(--star-white) 35%, transparent),
                radial-gradient(1.5px 1.5px at 55% 20%, #fff3e0 48%, transparent),
                radial-gradient(1px 1px at 68% 25%, var(--star-white) 40%, transparent),
                radial-gradient(1px 1px at 92% 11%, #fefaf2 45%, transparent),
                radial-gradient(2px 2px at 40% 3%, #ffe9d5 44%, transparent),
                radial-gradient(1.5px 1.5px at 78% 4%, var(--star-white) 50%, transparent),
                radial-gradient(1px 1px at 10% 30%, #fff7ec 38%, transparent),
                radial-gradient(1px 1px at 50% 24%, var(--star-white) 36%, transparent);
            opacity: 0.7;
        }

        /* Subtle grain/ texture overlay */
        .grain {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            opacity: 0.55;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* ── CANYON WALLS (SVG) ── */
        .canyon-walls {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        .canyon-walls svg {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* ── WAVE LINES ── */
        .wave-lines {
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0.3;
        }
        .wave-lines svg {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* ── EMBER PARTICLES ── */
        .embers-container {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }
        .ember {
            position: absolute;
            border-radius: 50%;
            animation: float-up var(--dur) var(--delay) infinite ease-out;
            opacity: 0;
            box-shadow: 0 0 var(--glow-spread) var(--glow-color);
        }
        .ember:nth-child(1) {
            --dur: 4.2s;
            --delay: 0s;
            --glow-spread: 8px;
            --glow-color: #ff6b2b;
            left: 12%;
            bottom: 8%;
            width: 5px;
            height: 5px;
            background: #ff7b38;
        }
        .ember:nth-child(2) {
            --dur: 5.8s;
            --delay: 0.7s;
            --glow-spread: 6px;
            --glow-color: #ff9a3c;
            left: 25%;
            bottom: 15%;
            width: 3px;
            height: 3px;
            background: #ffb800;
        }
        .ember:nth-child(3) {
            --dur: 3.9s;
            --delay: 1.4s;
            --glow-spread: 10px;
            --glow-color: #ff4d1c;
            left: 38%;

            height: 6px;
            background: #ff5e1f;

        .ember:nth-child(4) {

            --glow-spread: 7px;

        .ember:nth-child(6) {

        .ember:nth-child(7) {

        }
        .ember:nth-child(8) {
            --dur: 6.4s;

        }
        .ember:nth-child(9) {
            --dur: 4.9s;

            left: 42%;

            background: #ff7b38;
        }
        .ember:nth-child(10) {
            --dur: 5.5s;
            --delay: 0.5s;
            --glow-spread: 7px;
            --glow-color: #ff8c42;
            left: 55%;

        }
        .ember:nth-child(11) {
            --dur: 3.8s;
            --delay: 1.1s;
            --glow-spread: 12px;
            --glow-color: #ff3d00;

        }
        .ember:nth-child(12) {
            --dur: 7.0s;
            --delay: 2.8s;
            --glow-spread: 5px;
            --glow-color: #ffb800;
            left: 70%;

            width: 4px;

            background: #ffc107;
        }
        .ember:nth-child(13) {
            --dur: 4.4s;
            --delay: 3.6s;
            --glow-spread: 9px;
            --glow-color: #ff6b2b;
            left: 15%;
            bottom: 6%;
            width: 5px;
            height: 5px;
            background: #ff7b38;
        }
        .ember:nth-child(14) {
            --dur: 5.0s;
            --delay: 0.2s;
            --glow-spread: 8px;
            --glow-color: #ff9a3c;
            left: 48%;
            bottom: 16%;
            width: 3px;
            height: 3px;
            background: #ffa94d;
        }
        .ember:nth-child(15) {
            --dur: 6.8s;
            --delay: 4.0s;
            --glow-spread: 6px;
            --glow-color: #ff8c42;
            left: 82%;
            bottom: 8%;
            width: 4px;
            height: 4px;
            background: #e09040;
        }
        .ember:nth-child(16) {
            --dur: 3.3s;
            --delay: 1.6s;
            --glow-spread: 10px;
            --glow-color: #ff4500;
            left: 20%;
            bottom: 35%;
            width: 6px;
            height: 6px;
            background: #ff5e1f;
        }
        .ember:nth-child(17) {
            --dur: 5.7s;
            --delay: 4.4s;
            --glow-spread: 7px;
            --glow-color: #ffb800;
            left: 60%;
            bottom: 14%;
            width: 4px;
            height: 4px;
            background: #ffc107;
        }
        .ember:nth-child(18) {
            --dur: 4.1s;
            --delay: 2.2s;
            --glow-spread: 8px;
            --glow-color: #ff7b38;
            left: 33%;
            bottom: 7%;
            width: 5px;
            height: 5px;
            background: #ff8c42;
        }
        .ember:nth-child(19) {
            --dur: 6.2s;
            --delay: 3.0s;
            --glow-spread: 5px;
            --glow-color: #ff9a3c;
            left: 88%;
            bottom: 19%;
            width: 3px;
            height: 3px;
            background: #ffa94d;
        }
        .ember:nth-child(20) {
            --dur: 4.5s;
            --delay: 0.8s;
            --glow-spread: 11px;
            --glow-color: #ff3d00;
            left: 5%;
            bottom: 40%;
            width: 6px;
            height: 6px;
            background: #ff4d1c;
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            8% {
                opacity: 1;
            }
            45% {
                opacity: 0.85;
                transform: translateY(-120px) translateX(18px) scale(1.3);
            }
            70% {
                opacity: 0.4;
                transform: translateY(-280px) translateX(-12px) scale(0.7);
            }
            100% {
                opacity: 0;
                transform: translateY(-420px) translateX(8px) scale(0.2);
            }
        }

        /* ── MAIN CONTENT CONTAINER ── */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1050px;
            margin: 0 auto;
            padding: 30px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 780px;
            justify-content: flex-start;
        }

        /* ── WORDMARK: EMBERWAVE ── */
        .wordmark-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 10px;
            margin-bottom: 8px;
            text-align: center;
            z-index: 5;
        }
        .wordmark {
            font-family: 'Anton', 'Russo One', sans-serif;
            font-size: clamp(4.5rem, 9vw, 9.5rem);
            font-weight: 400;
            letter-spacing: 0.03em;
            line-height: 0.95;
            text-transform: uppercase;
            display: block;
            color: #f3e5d0;
            background: linear-gradient(180deg,
                    #ffb800 0%,
                    #ff7b38 18%,
                    #ff4d1c 40%,
                    #e0300c 55%,
                    #c01800 72%,
                    #ff5e1f 88%,
                    #ff9a3c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow:
                0 2px 0 rgba(200, 60, 10, 0.6),
                0 4px 0 rgba(180, 40, 5, 0.5),
                0 6px 0 rgba(150, 25, 2, 0.45),
                0 8px 2px rgba(120, 15, 1, 0.4),
                0 10px 4px rgba(90, 8, 0, 0.35),
                0 14px 8px rgba(50, 4, 0, 0.3),
                0 18px 14px rgba(30, 2, 0, 0.25),
                0 0 28px rgba(255, 80, 20, 0.5),
                0 0 50px rgba(255, 100, 35, 0.35),
                0 0 80px rgba(255, 140, 50, 0.22),
                0 0 120px rgba(255, 180, 40, 0.15);
            filter: drop-shadow(0 0 18px rgba(255, 90, 30, 0.55));
            animation: wordmark-glow 3.5s ease-in-out infinite;
            position: relative;
            z-index: 3;
        }

        @keyframes wordmark-glow {
            0%,
            100% {
                filter: drop-shadow(0 0 18px rgba(255, 90, 30, 0.55));
                -webkit-text-fill-color: transparent;
            }
            30% {
                filter: drop-shadow(0 0 32px rgba(255, 110, 40, 0.75));
                -webkit-text-fill-color: transparent;
            }
            55% {
                filter: drop-shadow(0 0 22px rgba(255, 70, 20, 0.65));
                -webkit-text-fill-color: transparent;
            }
            75% {
                filter: drop-shadow(0 0 38px rgba(255, 130, 45, 0.7));
                -webkit-text-fill-color: transparent;
            }
        }

        /* Wave underline accent beneath wordmark */
        .wordmark-wave {
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 110%;
            height: 22px;
            z-index: 0;
            opacity: 0.7;
        }
        .wordmark-wave svg {
            width: 100%;
            height: 100%;
        }

        /* ── DATE & PLACE ── */
        .date-location {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #f3e5d0;
            text-align: center;
            margin-top: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 4;
            text-shadow: 0 0 14px rgba(255, 150, 60, 0.45), 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .date-location .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ff9a3c;
            box-shadow: 0 0 10px #ff7b38, 0 0 20px rgba(255, 120, 40, 0.5);
            flex-shrink: 0;
            animation: dot-pulse 2.2s ease-in-out infinite;
        }
        @keyframes dot-pulse {
            0%,
            100% {
                box-shadow: 0 0 10px #ff7b38, 0 0 20px rgba(255, 120, 40, 0.5);
            }
            50% {
                box-shadow: 0 0 18px #ff9a3c, 0 0 34px rgba(255, 150, 50, 0.7);
            }
        }

        /* ── HEADLINER SECTION ── */
        .headliners-section {
            width: 100%;
            max-width: 850px;
            margin: 0 auto 22px;
            position: relative;
            z-index: 4;
            text-align: center;
        }
        .headliners-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #c4b5a0;
            margin-bottom: 10px;
            display: block;
            text-align: center;
            opacity: 0.8;
        }
        .headliners-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.4rem 2.8rem;
            justify-content: center;
            align-items: baseline;
        }
        .act {
            font-family: 'Russo One', 'Space Grotesk', sans-serif;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #f3e5d0;
            text-shadow: 0 0 8px rgba(255, 130, 45, 0.35), 0 1px 3px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            cursor: default;
            position: relative;
            display: inline-block;
            line-height: 1.2;
        }
        .act.headliner {
            font-size: 2.4rem;
            letter-spacing: 0.07em;
            color: #fff5e8;
            text-shadow:
                0 0 14px rgba(255, 100, 35, 0.5),
                0 0 28px rgba(255, 140, 50, 0.3),
                0 2px 5px rgba(0, 0, 0, 0.65);
            font-weight: 400;
        }
        .act.headliner::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff9a3c, #ff4d1c, #ff9a3c, transparent);
            border-radius: 1px;
            opacity: 0.7;
        }
        .act.support {
            font-size: 1.55rem;
            letter-spacing: 0.04em;
            color: #e8d5c0;
            text-shadow: 0 0 6px rgba(255, 100, 35, 0.25), 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        .act .act-glow {
            position: absolute;
            inset: -8px -14px;
            border-radius: 8px;
            background: radial-gradient(ellipse at center, rgba(255, 90, 30, 0.18) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            opacity: 0.8;
        }

        /* ── CTA BUTTON ── */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #1a0d05;
            background: linear-gradient(135deg,
                    #ffb800 0%,
                    #ff8c42 25%,
                    #ff5e1f 50%,
                    #ff7b38 75%,
                    #ffc107 100%);
            background-size: 200% 200%;
            animation: cta-shimmer 3s ease infinite;
            border: none;
            border-radius: 4px;
            padding: 16px 44px;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            z-index: 5;
            box-shadow:
                0 4px 0 #8a2508,
                0 6px 18px rgba(0, 0, 0, 0.5),
                0 0 36px rgba(255, 100, 35, 0.45),
                0 0 60px rgba(255, 140, 50, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            letter-spacing: 0.12em;
            margin-top: 4px;
            margin-bottom: 6px;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow:
                0 6px 0 #8a2508,
                0 10px 24px rgba(0, 0, 0, 0.55),
                0 0 44px rgba(255, 110, 40, 0.55),
                0 0 72px rgba(255, 150, 55, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        @keyframes cta-shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            40% {
                background-position: 100% 20%;
            }
            70% {
                background-position: 50% 100%;
            }
        }
        .cta-button .cta-arrow {
            display: inline-block;
            margin-left: 8px;
            font-size: 1.5rem;
            line-height: 1;
            animation: arrow-bounce 1.6s ease-in-out infinite;
        }
        @keyframes arrow-bounce {
            0%,
            100% {
                transform: translateX(0);
            }
            45% {
                transform: translateX(6px);
            }
            70% {
                transform: translateX(-2px);
            }
        }

        /* ── TICKER / BADGE ── */
        .ticker-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #f3e5d0;
            background: rgba(30, 10, 3, 0.8);
            border: 1.5px solid rgba(255, 140, 50, 0.45);
            border-radius: 3px;
            padding: 10px 28px;
            display: inline-block;
            text-align: center;
            position: relative;
            z-index: 5;
            box-shadow:
                0 0 18px rgba(255, 100, 35, 0.22),
                inset 0 0 14px rgba(255, 120, 40, 0.08);
            animation: badge-pulse 2.8s ease-in-out infinite;
            margin-top: 2px;
        }
        @keyframes badge-pulse {
            0%,
            100% {
                box-shadow: 0 0 18px rgba(255, 100, 35, 0.22), inset 0 0 14px rgba(255, 120, 40, 0.08);
                border-color: rgba(255, 140, 50, 0.45);
            }
            50% {
                box-shadow: 0 0 26px rgba(255, 120, 45, 0.35), inset 0 0 20px rgba(255, 140, 55, 0.14);
                border-color: rgba(255, 160, 60, 0.6);
            }
        }
        .ticker-badge .ticker-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff9a3c;
            margin: 0 8px;
            vertical-align: middle;
            animation: dot-pulse 2.2s ease-in-out infinite;
            box-shadow: 0 0 8px #ff7b38;
        }

        /* ── RESPONSIVE TWEASKS ── */
        @media (max-width: 768px) {
            .main-container {
                padding: 20px 20px 30px;
                min-height: 700px;
            }
            .wordmark {
                font-size: clamp(3rem, 7vw, 5.5rem);
            }
            .act.headliner {
                font-size: 1.7rem;
            }
            .act.support {
                font-size: 1.15rem;
            }
            .headliners-grid {
                gap: 0.8rem 1.4rem;
            }
            .cta-button {
                font-size: 1.1rem;
                padding: 13px 30px;
            }
            .date-location {
                font-size: 1rem;
            }
        }
        @media (max-width: 480px) {
            .wordmark {
                font-size: clamp(2.4rem, 6vw, 3.8rem);
            }
            .act.headliner {
                font-size: 1.35rem;
            }
            .act.support {
                font-size: 0.95rem;
            }
            .headliners-grid {
                gap: 0.5rem 1rem;
                flex-direction: column;
                align-items: center;
            }
            .cta-button {
                font-size: 1rem;
                padding: 12px 24px;
                letter-spacing: 0.08em;
            }
