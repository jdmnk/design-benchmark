<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMBERWAVE — June 18–20, 2027 · Ash Canyon, Nevada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       EMBERWAVE — Cosmic Desert Rave Visual System
       Built entirely from code. No images, no assets.
       ============================================================ */

    /* ── RESET & BASE ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #040202;
      color: #e8e0d8;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* ── GLOBAL LAYERS ── */
    .layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .layer-content { position: relative; z-index: 1; }

    /* ── STARFIELD ── */
    .starfield {
      background: #040202;
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: starPulse var(--dur) ease-in-out infinite alternate;
    }
    @keyframes starPulse {
      0% { opacity: 0.15; transform: scale(0.6); }
      50% { opacity: 0.9; transform: scale(1.2); }
      100% { opacity: 0.3; transform: scale(0.8); }
    }

    /* ── COSMIC DUST / NEBULA ── */
    .dust {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: dustDrift var(--drift) ease-in-out infinite alternate;
    }
    @keyframes dustDrift {
      0% { transform: translate(0, 0) scale(1); opacity: var(--base-o); }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.3); opacity: calc(var(--base-o) * 1.5); }
    }

    /* ── DEEP CANYON SILHOUETTE ── */
    .canyon-rim {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 340px;
      z-index: 2;
      pointer-events: none;
    }

    /* ── MESA WAVES ── */
    .mesa-waves {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      z-index: 3;
      pointer-events: none;
    }

    /* ── DUNE FOREGROUND ── */
    .dune-front {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      z-index: 4;
      pointer-events: none;
    }

    /* ── HORIZON GLOW (behind mesas) ── */
    .horizon-glow {
      position: fixed;
      bottom: 280px;
      left: -10%;
      right: -10%;
      height: 80px;
      background: radial-gradient(ellipse 80% 100% at 50% 100%,
        rgba(255, 80, 20, 0.35) 0%,
        rgba(255, 40, 60, 0.15) 40%,
        transparent 70%);
      z-index: 1;
      pointer-events: none;
      animation: horizonBreathe 6s ease-in-out infinite;
    }
    @keyframes horizonBreathe {
      0%, 100% { opacity: 0.7; transform: scaleX(1); }
      50% { opacity: 1; transform: scaleX(1.08); }
    }

    /* ── RING GATE (cosmic portal behind title) ── */
    .ring-gate {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      width: 520px;
      height: 520px;
      z-index: 0;
      pointer-events: none;
    }
    .ring-gate svg {
      width: 100%;
      height: 100%;
      animation: gateSpin 90s linear infinite;
    }
    @keyframes gateSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ── PARTICLE FLARES (embers drifting) ── */
    .ember {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }

    /* ── SCANLINES ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 900;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      mix-blend-mode: multiply;
    }

    /* ── GLASS REFLECTION ── */
    .glass-sheen {
      position: fixed;
      inset: 0;
      z-index: 901;
      pointer-events: none;
      background: linear-gradient(
        165deg,
        rgba(255,255,255,0.03) 0%,
        transparent 35%,
        transparent 65%,
        rgba(255,100,40,0.02) 100%
      );
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding-top: 22px;
      min-height: 100vh;
    }

    /* ── BADGE: PHASE 2 ── */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 42, 42, 0.08);
      border: 1px solid rgba(255, 60, 40, 0.25);
      padding: 5px 16px 5px 12px;
      border-radius: 100px;
      margin-bottom: 18px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff6b4a;
      position: relative;
      overflow: hidden;
    }
    .phase-badge .orb {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff3c28;
      box-shadow: 0 0 8px #ff3c28, 0 0 16px rgba(255,60,40,0.4);
      animation: orbPulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes orbPulse {
      0%, 100% { opacity: 0.5; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* ── TITLE LOCKUP ── */
    .title-lockup {
      position: relative;
      margin-bottom: 10px;
    }

    .title-deco {
      font-family: 'Syncopate', sans-serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 7.5vw, 5.8rem);
      line-height: 0.85;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #0a0a0a;
      text-shadow:
        -2px -2px 0 #ff2a2a,
        2px -2px 0 #ff5e3a,
        -2px 2px 0 #ff8a00,
        2px 2px 0 #ffaa33,
        0 0 40px rgba(255,60,30,0.35),
        0 0 80px rgba(255,80,20,0.15);
      animation: chromaticWobble 4.5s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    /* Second copy for glow depth */
    .title-glow {
      position: absolute;
      top: 0;
      left: 0;
      font-family: 'Syncopate', sans-serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 7.5vw, 5.8rem);
      line-height: 0.85;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: transparent;
      text-shadow:
        0 0 20px rgba(255,40,20,0.5),
        0 0 60px rgba(255,60,30,0.25),
        0 0 120px rgba(255,80,20,0.1);
      z-index: 1;
      pointer-events: none;
    }

    @keyframes chromaticWobble {
      0%, 100% {
        text-shadow:
          -2px -2px 0 #ff2a2a,
          2px -2px 0 #ff5e3a,
          -2px 2px 0 #ff8a00,
          2px 2px 0 #ffaa33,
          0 0 40px rgba(255,60,30,0.35),
          0 0 80px rgba(255,80,20,0.15);
      }
      25% {
        text-shadow:
          -3px -1px 0 #ff3c28,
          1px -3px 0 #ff7040,
          -1px 3px 0 #ff9500,
          3px 1px 0 #ffb040,
          0 0 50px rgba(255,60,30,0.4),
          0 0 100px rgba(255,80,20,0.2);
      }
      50% {
        text-shadow:
          -1px -3px 0 #ff1a1a,
          3px -1px 0 #ff5a2a,
          -3px 1px 0 #ff8000,
          1px 3px 0 #ffc040,
          0 0 45px rgba(255,60,30,0.38),
          0 0 90px rgba(255,80,20,0.18);
      }
      75% {
        text-shadow:
          -2px -2px 0 #ff2a2a,
          2px -2px 0 #ff5e3a,
          -2px 2px 0 #ff8a00,
          2px 2px 0 #ffaa33,
          0 0 40px rgba(255,60,30,0.35),
          0 0 80px rgba(255,80,20,0.15);
      }
    }

    /* ── SUBTITLE / DATE PLACE ── */
    .subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(0.68rem, 1.4vw, 0.88rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(232,224,216,0.55);
      margin-bottom: 6px;
      position: relative;
      z-index: 2;
    }
    .subtitle strong {
      color: rgba(255,180,120,0.9);
      font-weight: 500;
    }

    /* ── DECO BAR ── */
    .deco-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 16px;
      z-index: 2;
      position: relative;
    }
    .deco-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,120,60,0.5), transparent);
    }
    .deco-hex {
      width: 8px;
      height: 8px;
      border: 1px solid rgba(255,100,40,0.4);
      transform: rotate(45deg);
      animation: hexSpin 8s linear infinite;
    }
    @keyframes hexSpin {
      from { transform: rotate(45deg); }
      to { transform: rotate(405deg); }
    }

    /* ── CTA ── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 36px;
      background: transparent;
      border: 1.5px solid rgba(255,80,30,0.6);
      color: #ffb070;
      font-family: 'Syncopate', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      position: relative;
      z-index: 2;
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      cursor: pointer;
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,60,20,0.08);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: -1;
    }
    .cta:hover::before {
      transform: scaleX(1);
    }
    .cta:hover {
      border-color: rgba(255,120,50,0.9);
      color: #ffcc90;
      box-shadow:
        0 0 30px rgba(255,60,20,0.15),
        inset 0 0 30px rgba(255,60,20,0.05);
      letter-spacing: 0.32em;
    }
    .cta .arrow {
      transition: transform 0.35s ease;
    }
    .cta:hover .arrow {
      transform: translateX(4px);
    }

    /* ── LINEUP ── */
    .lineup {
      position: relative;
      z-index: 2;
      margin-top: 26px;
      padding-bottom: 340px;
    }

    .lineup-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232,224,216,0.25);
      margin-bottom: 14px;
      text-align: center;
    }

    .lineup-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .lineup-item {
      position: relative;
      font-family: 'Syncopate', sans-serif;
      text-transform: uppercase;
      line-height: 1.05;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: default;
    }

    /* Tier A — Massive */
    .tier-a {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #f5ebe0;
      text-shadow:
        0 1px 0 rgba(255,100,40,0.2),
        0 2px 20px rgba(255,60,20,0.08);
    }
    .tier-a:hover {
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,100,40,0.25),
        0 0 60px rgba(255,60,20,0.1),
        0 2px 0 rgba(255,100,40,0.15);
      transform: scale(1.02) translateX(6px);
    }

    /* Tier B — Medium */
    .tier-b {
      font-size: clamp(1.15rem, 2.8vw, 1.7rem);
      font-weight: 400;
      letter-spacing: 0.14em;
      color: rgba(220,200,180,0.75);
    }
    .tier-b:hover {
      color: rgba(255,210,170,0.95);
      text-shadow: 0 0 20px rgba(255,100,40,0.15);
      transform: scale(1.03) translateX(4px);
    }

    /* Tier C — Small */
    .tier-c {
      font-size: clamp(0.78rem, 1.6vw, 1.05rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      color: rgba(180,160,140,0.45);
    }
    .tier-c:hover {
      color: rgba(220,190,160,0.8);
      transform: scale(1.04) translateX(3px);
    }

    /* Stagger entry animation */
    .lineup-item {
      opacity: 0;
      transform: translateY(12px);
      animation: lineupReveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    .lineup-item:nth-child(1) { animation-delay: 0.15s; }
    .lineup-item:nth-child(2) { animation-delay: 0.25s; }
    .lineup-item:nth-child(3) { animation-delay: 0.35s; }
    .lineup-item:nth-child(4) { animation-delay: 0.45s; }
    .lineup-item:nth-child(5) { animation-delay: 0.55s; }
    .lineup-item:nth-child(6) { animation-delay: 0.65s; }

    @keyframes lineupReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── DIVIDER LINE ── */
    .h-divider {
      width: 30px;
      height: 1px;
      background: rgba(255,100,40,0.2);
      margin: 6px auto;
    }

    /* ── RESPONSIVE SAFETY ── */
    @media (max-width: 480px) {
      .hero { padding-top: 18px; }
      .phase-badge { font-size: 0.55rem; padding: 4px 12px 4px 10px; }
      .cta { padding: 10px 24px; font-size: 0.62rem; letter-spacing: 0.2em; }
      .canyon-rim { height: 200px; }
      .mesa-waves { height: 120px; }
      .dune-front { height: 50px; }
    }
  </style>
</head>
<body>

  <!-- ===== STARFIELD ===== -->
  <div class="starfield" id="starfield"></div>

  <!-- ===== COSMIC DUST ===== -->
  <div class="layer" id="dustLayer"></div>

  <!-- ===== HORIZON GLOW ===== -->
  <div class="horizon-glow"></div>

  <!-- ===== CANYON SILHOUETTE ===== -->
  <svg class="canyon-rim" viewBox="0 0 1440 340" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="mesaGrad1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#150c08"/>
        <stop offset="40%" stop-color="#0f0805"/>

    <path d="M0,200 L0,340 L1440,340 L1440,220 L1350,210 L1280,195 L1220,205 L1160,180 L1100,190 L1050,175 L1000,185 L940,160 L880,170 L820,155 L760,165 L700,140 L640,150 L580,135 L520,145 L460,130 L400,140 L340,125 L280,135 L220,115 L160,125 L100,140 L0,160 Z" fill="url(#mesaGrad1)"/>

    <path d="M0,260 L0,340 L1440,340 L1440,270 L1380,260 L1320,275 L1260,265 L1200,280 L1140,270 L1080,285 L1020,275 L960,290 L900,280 L840,295 L780,285 L720,300 L660,290 L600,305 L540,295 L480,310 L420,300 L360,315 L300,305 L240,320 L180,310 L120,325 L60,315 L0,330 Z" fill="#0a0503" opacity="0.85"/>

  <!-- ===== MESA WAVES ===== -->
  <svg class="mesa-waves" viewBox="0 0 1440 200" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,120 Q180,80 360,110 T720,90 T1080,115 T1440,85 L1440,200 L0,200 Z" fill="#0d0705" opacity="0.9"/>
    <path d="M0,150 Q240,115 480,145 T960,125 T1440,155 L1440,200 L0,200 Z" fill="#110906" opacity="0.95"/>
  </svg>

  <svg class="dune-front" viewBox="0 0 1440 90" preserveAspectRatio="none" aria-hidden="true">

  </svg>

  <!-- ===== EMBER PARTICLES ===== -->
  <div id="emberLayer"></div>

  <!-- ===== SCANLINES & GLASS ===== -->
  <div class="scanlines"></div>
  <div class="glass-sheen"></div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="layer-content">
    <header class="hero">

      <!-- Phase 2 Badge -->
      <div class="phase-badge">
        <span class="orb"></span>
        Phase 2 lineup — March 2027
      </div>

      <!-- Cosmic Ring Gate behind title -->
      <div class="ring-gate">
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,60,30,0.15)"/>
              <stop offset="50%" stop-color="rgba(255,120,40,0.08)"/>
              <stop offset="100%" stop-color="rgba(255,60,30,0.15)"/>
            </linearGradient>
            <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,180,80,0.06)"/>
              <stop offset="50%" stop-color="rgba(255,100,50,0.12)"/>
              <stop offset="100%" stop-color="rgba(255,180,80,0.06)"/>
            </linearGradient>
          </defs>
          <!-- Outer segmented ring -->
          <circle cx="200" cy="200" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="40 20 60 30 50 25" opacity="0.6"/>
          <!-- Inner segmented ring (counter) -->
          <circle cx="200" cy="200" r="160" fill="none" stroke="url(#ringGrad2)" stroke-width="1" stroke-dasharray="20 40 30 50 25 35" opacity="0.4"/>
          <!-- Thin accent ring -->
          <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(255,100,40,0.1)" stroke-width="0.5"/>

          <g opacity="0.25">
            <line x1="200" y1="20" x2="200" y2="40" stroke="#ff5e3a" stroke-width="1"/>

          </g>

          <circle cx="200" cy="10" r="2" fill="#ff5e3a" opacity="0.6"/>
          <circle cx="390" cy="200" r="2" fill="#ff8a00" opacity="0.5"/>

        </svg>
      </div>

      <!-- Wordmark -->
      <div class="title-lockup">
        <h1 class="title-deco">EMBERWAVE</h1>
        <span class="title-glow" aria-hidden="true">EMBERWAVE</span>
      </div>

      <!-- Date / Place -->
      <p class="subtitle">
        <strong>June 18–20, 2027</strong> &nbsp;·&nbsp; Ash Canyon, Nevada
      </p>

      <!-- Deco bar -->
      <div class="deco-bar">
        <div class="deco-line"></div>
        <div class="deco-hex"></div>
        <div class="deco-line"></div>
      </div>

      <!-- CTA -->
      <a href="#" class="cta">
        Get tickets
        <svg class="arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">

        </svg>
      </a>

      <!-- Lineup -->
      <section class="lineup" aria-label="Headliner lineup">
        <p class="lineup-label">/// Headliners</p>
        <ul class="lineup-list">
          <li class="lineup-item tier-a">NOVA CULT</li>
          <li class="lineup-item tier-b">Velvet Static</li>
          <li class="lineup-item tier-a">MOONBURN</li>
          <li class="h-divider"></li>
          <li class="lineup-item tier-b">Dax Riviera</li>
          <li class="lineup-item tier-c">Cinder &amp; Ash</li>
          <li class="lineup-item tier-c">The Glass Dunes</li>
        </ul>
      </section>

    </header>
  </div>

  <script>
    /* ===== STARFIELD GENERATOR ===== */
    (function() {
      const container = document.getElementById('starfield');
      const count = 180;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() < 0.08 ? 2.5 : Math.random() < 0.3 ? 1.8 : 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 70 + '%';
        star.style.setProperty('--dur', (2 + Math.random() * 5) + 's');
        star.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(star);
      }
    })();

    /* ===== COSMIC DUST / NEBULA GENERATOR ===== */
    (function() {
      const container = document.getElementById('dustLayer');
      const dusts = [
        { w: 500, h: 500, c: 'rgba(255, 50, 20, 0.08)',  l: '10%',  t: '5%',  tx: '30px',  ty: '-20px',  drift: '18s', baseO: '0.5' },
        { w: 400, h: 400, c: 'rgba(255, 120, 40, 0.06)', l: '70%',  t: '10%', tx: '-25px', ty: '15px',   drift: '22s', baseO: '0.4' },
        { w: 350, h: 350, c: 'rgba(255, 80, 60, 0.07)',  l: '40%',  t: '25%', tx: '20px',  ty: '30px',   drift: '15s', baseO: '0.45' },
        { w: 600, h: 300, c: 'rgba(255, 40, 20, 0.05)',  l: '80%',  t: '40%', tx: '-40px', ty: '-10px',  drift: '25s', baseO: '0.35' },
        { w: 300, h: 300, c: 'rgba(255, 160, 60, 0.04)', l: '15%',  t: '50%', tx: '15px',  ty: '-25px',  drift: '20s', baseO: '0.3' },
      ];
      dusts.forEach(d => {
        const el = document.createElement('div');
        el.className = 'dust';
        el.style.cssText = `
          width: ${d.w}px; height: ${d.h}px;
          left: ${d.l}; top: ${d.t};
          background: ${d.c};
          --tx: ${d.tx}; --ty: ${d.ty};
          --drift: ${d.drift}; --base-o: ${d.baseO};
        `;
        container.appendChild(el);
      });
    })();

    /* ===== EMBER PARTICLES ===== */
    (function() {
      const container = document.getElementById('emberLayer');
      const count = 30;
      for (let i = 0; i < count; i++) {
        const ember = document.createElement('div');
        ember.className = 'ember';
        const size = 1.5 + Math.random() * 2.5;
        ember.style.width = size + 'px';
        ember.style.height = size + 'px';
        ember.style.left = (Math.random() * 100) + '%';
        ember.style.bottom = (80 + Math.random() * 260) + 'px';
        const hue = 10 + Math.random() * 30;
        const sat = 80 + Math.random() * 20;
        const light = 50 + Math.random() * 30;
        ember.style.background = `hsl(${hue}, ${sat}%, ${light}%)`;
        ember.style.boxShadow = `0 0 ${4 + Math.random() * 6}px hsl(${hue}, ${sat}%, ${light}%)`;
        ember.style.opacity = 0.3 + Math.random() * 0.5;
        const duration = 8 + Math.random() * 14;
        const delay = Math.random() * 10;
        ember.style.animation = `emberFloat ${duration}s ease-in-out ${delay}s infinite`;
        container.appendChild(ember);
      }

      const style = document.createElement('style');
      style.textContent = `
        @keyframes emberFloat {
          0% { transform: translateY(0) translateX(0); opacity: 0; }
          10% { opacity: var(--start-o, 0.6); }
          50% { transform: translateY(-${60 + Math.random() * 100}px) translateX(${-20 + Math.random() * 40}px); }
          90% { opacity: 0.2; }
          100% { transform: translateY(-${120 + Math.random() * 180}px) translateX(${-40 + Math.random() * 80}px); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    })();
  </script>

</body>
</html>
