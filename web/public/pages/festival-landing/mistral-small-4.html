<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMBERWAVE | June 18-20, 2027 · Ash Canyon, Nevada</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ===== FIRST RULE: BACKGROUND ===== */
    body {
      background: #000;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: #f0f0e0;
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== ATMOSPHERIC BASE LAYER ===== */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg,
        #0a0400 0%,
        #1a0a1a 8%,
        #2a0f2a 15%,
        #3a143a 25%,
        #4a1a4a 35%,
        #6a2a6a 45%,
        #8a3a8a 55%,
        #a84a98 65%,
        #c85ab8 75%,
        #e86ac8 85%,
        #ff8ecf 100%);
      z-index: -2;
      pointer-events: none;
    }

    /* ===== SUBTLE SCAN LINES ===== */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: -1;
      opacity: 0.25;
    }

    /* ===== CANYON SILHOUETTES ===== */
    .canyon-bg {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50vh;
      z-index: -1;
      background: linear-gradient(to top,
        rgba(0,5,15,0.92) 0%,
        transparent 80%);
      mask-image: url('data:image/svg+xml;utf8,<svg width="1400" height="400" viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg"><path d="M0,400 L0,180 Q250,80 450,140 T850,200 T1200,160 L1400,400 Z" fill="black"/><path d="M0,400 Q100,360 250,380 T500,350 T750,370 T1000,340 T1250,360 L1400,400 Z" fill="black"/></svg>');
      -webkit-mask-image: url('data:image/svg+xml;utf8,<svg width="1400" height="400" viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg"><path d="M0,400 L0,180 Q250,80 450,140 T850,200 T1200,160 L1400,400 Z" fill="black"/><path d="M0,400 Q100,360 250,380 T500,350 T750,370 T1000,340 T1250,360 L1400,400 Z" fill="black"/></svg>');
      mask-repeat: no-repeat;
      mask-position: center bottom;
      mask-size: cover;
    }

    /* ===== MAIN LAYOUT ===== */
    .container {
      position: relative;
      min-height: 100vh;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 1;
    }

    /* ===== HERO SECTION ===== */
    .hero {
      margin-bottom: 3rem;
      z-index: 2;
    }

    .wordmark {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(4rem, 18vw, 11rem);
      line-height: 0.8;
      letter-spacing: -0.055em;
      text-transform: uppercase;
      margin: 0;
      position: relative;
      color: #fff;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.85),
        0 0 24px rgba(255, 140, 0, 0.8),
        0 0 48px rgba(255, 69, 0, 0.75),
        0 0 72px rgba(138, 43, 226, 0.45);
      animation: pulseGlow 6s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { text-shadow: 0 0 12px rgba(255,255,255,0.85), 0 0 24px rgba(255,140,0,0.8), 0 0 48px rgba(255,69,0,0.75); }
      50% { text-shadow: 0 0 18px rgba(255,255,255,1), 0 0 32px rgba(255,140,0,1), 0 0 60px rgba(255,69,0,1), 0 0 85px rgba(138,43,226,0.55); }
      100% { text-shadow: 0 0 22px rgba(255,255,255,1.15), 0 0 40px rgba(255,140,0,1.1), 0 0 75px rgba(255,69,0,1.05), 0 0 100px rgba(138,43,226,0.65); }
    }

    .wordmark::after {
      content: '✦ ✦ ✦';
      font-size: 1.3rem;
      color: #ff8c00;
      letter-spacing: 0.9em;
      display: block;
      margin-top: 0.6em;
      opacity: 0.85;
      animation: floatParticles 8s ease-in-out infinite;
    }

    @keyframes floatParticles {
      0%, 100% { transform: translateY(0); opacity: 0.85; }
      50% { transform: translateY(-20px); opacity: 1; }
    }

    .festival-info {
      font-size: 1.35rem;
      margin: 1.8rem 0;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.55);
    }

    /* ===== CALL-TO-ACTION ===== */
    .cta-button {
      background: linear-gradient(45deg,
        #ff4500,
        #ff8c00,
        #ffa500,
        #ff8c00,
        #ff4500);
      background-size: 400% 400%;
      color: #050505;
      padding: 1.2rem 3.5rem;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 50px;
      box-shadow: 0 0 30px rgba(255, 69, 0, 0.7),
                  0 0 50px rgba(255, 140, 0, 0.5);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin: 2rem 0 2.5rem;
      display: inline-block;
      position: relative;
      overflow: hidden;
      transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: 1;
    }

    .cta-button:hover {
      background-position: 100% 100%;
      transform: translateY(-10px) scale(1.06);
      box-shadow: 0 0 45px rgba(255, 69, 0, 0.9),
                  0 0 65px rgba(255, 140, 0, 0.7),
                  0 0 80px rgba(138, 43, 226, 0.45);
    }

    .cta-button:active {
      transform: translateY(4px) scale(0.98);
    }

    /* ===== LINEUP SECTION ===== */
    .lineup {
      margin: 3rem 0;
      max-width: 850px;
      width: 100%;
    }

    .headliners {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }

    .act {
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      margin: 0;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.45);
    }

    /* Visual hierarchy - headliners scaled appropriately */
    .act:nth-child(1) { font-size: clamp(2.2rem, 4.8vw, 3.2rem); } /* NOVA CULT - HEADLINER */
    .act:nth-child(2) { font-size: clamp(2rem, 4.4vw, 2.9rem); }   /* Velvet Static */
    .act:nth-child(3) { font-size: clamp(2rem, 4.4vw, 2.9rem); }   /* MOONBURN */
    .act:nth-child(4) { font-size: clamp(1.7rem, 3.8vw, 2.5rem); }  /* Dax Riviera */
    .act:nth-child(5) { font-size: clamp(1.7rem, 3.8vw, 2.5rem); }  /* Cinder & Ash */
    .act:nth-child(6) { font-size: clamp(1.7rem, 3.8vw, 2.5rem); }  /* The Glass Dunes */

    /* Glow effect for top 3 headliners */
    .act:nth-child(-n+3) {
      color: #fafafa;
      text-shadow:
        0 0 9px rgba(255, 255, 255, 0.75),
        0 0 18px rgba(255, 140, 0, 0.65);
    }

    /* ===== PHASE 2 MARQUEE ===== */
    .phase-announcement {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 94%;
      max-width: 600px;
    }

    .marquee {
      background: rgba(5, 3, 10, 0.82);
      padding: 0.9rem 1.6rem;
      border: 1px solid #ff4500;
      border-radius: 35px;
      color: #ff8c00;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      box-shadow: 0 0 20px rgba(255, 69, 0, 0.35);
      overflow: hidden;
    }

    .marquee-text {
      display: inline-block;
      animation: marqueeScroll 18s linear infinite;
    }

    @keyframes marqueeScroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* ===== RESPONSIVE ADJUSTMENTS ===== */
    @media (max-width: 768px) {
      .container {
        padding: 1.2rem 0.8rem;
      }
      .wordmark {
        font-size: clamp(3.5rem, 22vw, 9.5rem);
        letter-spacing: -0.05em;
      }
      .festival-info {
        font-size: 1.15rem;
        margin: 1.2rem 0;
      }
      .cta-button {
        padding: 1rem 2.8rem;
        font-size: 1.1rem;
      }
      .marquee {
        font-size: 0.9rem;
        padding: 0.8rem 1.4rem;
      }
    }

    @media (max-width: 480px) {
      .wordmark {
        font-size: clamp(3rem, 28vw, 8rem);
        line-height: 0.85;
      }
      .festival-info {
        font-size: 1rem;
        letter-spacing: 0.12em;
      }
      .cta-button {
        padding: 0.9rem 2rem;
        font-size: 1rem;
      }
      .act {
        font-size: 0.95em !important;
      }
      .headliners {
        gap: 1rem;
      }
    }

    /* Focus styles for accessibility */
    .cta-button:focus {
      outline: 2px solid #ff4500;
      outline-offset: 4px;
      box-shadow: 0 0 0 4px rgba(255, 69, 0, 0.3);
    }
  </style>
</head>
<body>
  <!-- Canyon background with SVG mask -->
  <div class="canyon-bg"></div>

  <div class="container">
    <header class="hero">
      <h1 class="wordmark">EMBERWAVE</h1>
      <p class="festival-info">June 18–20, 2027 · Ash Canyon, Nevada</p>
      <a href="#" class="cta-button">Get Tickets</a>
    </header>

    <main class="lineup">
      <div class="headliners">
        <h2 class="act">NOVA CULT</h2>
        <h3 class="act">Velvet Static</h3>
        <h3 class="act">MOONBURN</h3>
        <h4 class="act">Dax Riviera</h4>
        <h4 class="act">Cinder & Ash</h4>
        <h4 class="act">The Glass Dunes</h4>
      </div>
    </main>
  </div>

  <div class="phase-announcement">
    <div class="marquee">
      <div class="marquee-text">Phase 2 lineup — March 2027 &nbsp;&nbsp;&nbsp;</div>
    </div>
  </div>
</body>
</html>
