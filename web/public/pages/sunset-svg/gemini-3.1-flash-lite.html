<!DOCTYPE html>
<html style="margin:0; padding:0; height:100%; overflow:hidden; background:#000;">
<body style="margin:0; padding:0; height:100%;">
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a1a4a"/>
      <stop offset="40%" stop-color="#8b2d6a"/>
      <stop offset="70%" stop-color="#ff7e5f"/>
      <stop offset="100%" stop-color="#feb47b"/>
    </linearGradient>
    <radialGradient id="sunGlow">
      <stop offset="0%" stop-color="#fff5e0"/>
      <stop offset="20%" stop-color="#ffd56b"/>
      <stop offset="100%" stop-color="#ff7e5f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="800" fill="url(#skyGrad)"/>

  <!-- Clouds -->
  <g fill="#ffc3a0" opacity="0.6">
    <ellipse cx="300" cy="150" rx="120" ry="20" transform="rotate(-5 300 150)">
      <animate attributeName="cx" values="300; 350; 300" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="900" cy="220" rx="150" ry="25" transform="rotate(3 900 220)">
      <animate attributeName="cx" values="900; 850; 900" dur="25s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Sun -->
  <circle cx="640" cy="450" r="60" fill="url(#sunGlow)"/>

  <!-- Mountains -->
  <path d="M0 600 L200 350 L450 500 L640 300 L800 450 L1100 380 L1280 600 Z" fill="#2d1b4e"/>
  <path d="M0 700 L300 450 L640 550 L900 400 L1280 700 Z" fill="#1a0f2e"/>

  <!-- River -->
  <path d="M400 650 L580 800 L700 800 L880 650 Z" fill="#2a1e4a"/>
  
  <!-- Shimmer -->
  <path d="M620 650 L630 800 L650 800 L660 650 Z" fill="#ffcc80" opacity="0.4">
    <animate attributeName="opacity" values="0.2; 0.6; 0.2" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M635 650 L638 800 L642 800 L645 650 Z" fill="#fff" opacity="0.8"/>
</svg>
</body>
</html>
