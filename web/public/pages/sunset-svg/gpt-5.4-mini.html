<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunset Landscape</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .cloud {
    opacity: 0.55;
    filter: url(#softBlur);
  }
  .shimmer {
    filter: url(#riverGlow);
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a163f"/>
      <stop offset="28%" stop-color="#4a2d77"/>
      <stop offset="52%" stop-color="#b44d8c"/>
      <stop offset="75%" stop-color="#f08a5d"/>
      <stop offset="100%" stop-color="#ffd07a"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6cc" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffd87a" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#ff9f59" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff9f59" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a3d5e"/>
      <stop offset="30%" stop-color="#3e2b56"/>
      <stop offset="100%" stop-color="#1a203f"/>
    </linearGradient>

    <linearGradient id="riverShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2a8" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ffd36d" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#ff9e4f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff9e4f" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="0"/>
      <stop offset="35%" stop-color="#ffd9a0" stop-opacity="0.35"/>
      <stop offset="65%" stop-color="#fff0cc" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffd9a0" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="riverGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="sunBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Sky fills the top and entire canvas as base -->
  <rect x="0" y="0" width="1280" height="800" fill="url(#skyGrad)"/>

  <!-- Sun glow and sun -->
  <circle cx="640" cy="420" r="120" fill="url(#sunGlow)" filter="url(#sunBlur)"/>
  <circle cx="640" cy="438" r="36" fill="#fff4c8" opacity="0.98"/>
  <circle cx="640" cy="438" r="52" fill="#ffd77a" opacity="0.22"/>

  <!-- Warm clouds -->
  <g class="cloud" transform="translate(0,0)">
    <g>
      <ellipse cx="250" cy="165" rx="90" ry="24" fill="url(#cloudGrad)"/>
      <ellipse cx="310" cy="172" rx="120" ry="28" fill="url(#cloudGrad)"/>
      <ellipse cx="365" cy="162" rx="70" ry="20" fill="url(#cloudGrad)"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 20 0; 0 0" dur="24s" repeatCount="indefinite"/>
    </g>
    <g>
      <ellipse cx="870" cy="128" rx="100" ry="22" fill="url(#cloudGrad)"/>
      <ellipse cx="940" cy="136" rx="130" ry="30" fill="url(#cloudGrad)"/>
      <ellipse cx="1015" cy="126" rx="85" ry="20" fill="url(#cloudGrad)"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -18 0; 0 0" dur="28s" repeatCount="indefinite"/>
    </g>
    <g>
      <ellipse cx="560" cy="210" rx="78" ry="20" fill="url(#cloudGrad)"/>
      <ellipse cx="620" cy="218" rx="108" ry="26" fill="url(#cloudGrad)"/>
      <ellipse cx="690" cy="208" rx="76" ry="18" fill="url(#cloudGrad)"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 14 0; 0 0" dur="26s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Far mountains -->
  <path d="M0,500 L110,472 L190,448 L285,462 L380,430 L470,455 L560,414 L645,446 L740,428 L835,460 L925,440 L1010,468 L1110,450 L1280,485 L1280,800 L0,800 Z"
        fill="#2d2147" opacity="0.95"/>

  <!-- Middle mountains -->
  <path d="M0,560 L95,535 L180,500 L250,520 L350,482 L430,525 L525,470 L610,500 L705,462 L795,516 L885,480 L980,528 L1080,492 L1180,520 L1280,552 L1280,800 L0,800 Z"
        fill="#201833" opacity="0.98"/>

  <!-- Front mountain range with tallest central peak -->
  <path d="M0,625 L90,600 L170,616 L250,590 L335,605 L420,568 L500,585 L575,515 L640,455 L705,520 L780,565 L870,548 L950,585 L1035,560 L1120,600 L1215,585 L1280,610 L1280,800 L0,800 Z"
        fill="#160f25"/>

  <!-- Mountain highlight haze near horizon -->
  <path d="M0,520 C180,500 320,490 460,500 C560,506 690,505 820,496 C980,488 1105,494 1280,520 L1280,580 L0,580 Z"
        fill="#ffb56c" opacity="0.10"/>

  <!-- River base -->
  <path d="M500,800 C520,720 548,670 570,635 C595,595 620,560 640,520 C660,560 685,595 710,635 C732,670 760,720 780,800 Z"
        fill="url(#riverGrad)"/>

  <!-- River edges to create widening flow -->
  <path d="M500,800 C520,720 548,670 570,635 C595,595 620,560 640,520"
        fill="none" stroke="#7b5678" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round"/>
  <path d="M780,800 C760,720 732,670 710,635 C685,595 660,560 640,520"
        fill="none" stroke="#7b5678" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round"/>

  <!-- River reflection shimmer -->
  <path class="shimmer" d="M632,520 C626,565 624,605 625,650 C626,700 628,748 632,800
                             C636,748 638,700 639,650 C640,605 638,565 632,520 Z"
        fill="url(#riverShine)" opacity="0.75">
    <animate attributeName="opacity" values="0.55;0.85;0.55" dur="4.5s" repeatCount="indefinite"/>
  </path>

  <!-- Additional soft reflection streaks -->
  <path d="M620,545 C612,595 611,646 612,690" stroke="#ffd97f" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M650,540 C656,590 657,640 656,705" stroke="#fff1b0" stroke-opacity="0.16" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M638,535 C635,585 636,640 637,742" stroke="#ffb35f" stroke-opacity="0.15" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Foreground river banks -->
  <path d="M0,800 L0,700 C95,690 170,670 255,635 C330,605 396,585 462,586 C421,630 392,674 372,720 C340,776 318,800 318,800 Z"
        fill="#120d1f" opacity="0.9"/>
  <path d="M1280,800 L1280,700 C1185,690 1110,670 1025,635 C950,605 884,585 818,586 C859,630 888,674 908,720 C940,776 962,800 962,800 Z"
        fill="#120d1f" opacity="0.9"/>

  <!-- Subtle water texture strokes -->
  <g opacity="0.18">
    <path d="M520,760 C590,748 690,748 760,760" stroke="#9c7ea7" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M530,725 C600,714 680,714 750,725" stroke="#8d73a0" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M545,690 C610,680 670,680 735,690" stroke="#7d6a97" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M560,655 C615,648 665,648 720,655" stroke="#6f628d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
</body>
</html>
