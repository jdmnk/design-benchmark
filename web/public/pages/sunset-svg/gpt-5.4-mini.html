<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serene Sunset Landscape</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .cloud {
      opacity: 0.78;
      filter: url(#softBlur);
      animation: drift 38s linear infinite;
    }
    .cloud2 { animation-duration: 52s; animation-delay: -12s; opacity: 0.62; }
    .cloud3 { animation-duration: 44s; animation-delay: -22s; opacity: 0.55; }
    .shimmer {
      animation: shimmer 4.8s ease-in-out infinite;
      transform-origin: 640px 640px;
    }
    @keyframes drift {
      0%   { transform: translateX(-40px); }
      50%  { transform: translateX(20px); }
      100% { transform: translateX(-40px); }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.72; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect x="0" y="0" width="1280" height="800" fill="url(#skyGrad)"/>

  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12205e"/>
      <stop offset="28%" stop-color="#5b2d89"/>
      <stop offset="52%" stop-color="#c54f8d"/>
      <stop offset="74%" stop-color="#f18d5d"/>
      <stop offset="100%" stop-color="#f3c25c"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7cf" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffd97a" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#ffb55b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffb55b" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cloudWarm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd9c2" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#ffe7d0" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffbf86" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efb36f"/>
      <stop offset="16%" stop-color="#c36a62"/>
      <stop offset="45%" stop-color="#71456d"/>
      <stop offset="100%" stop-color="#1d274b"/>
    </linearGradient>

    <linearGradient id="riverHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3b5" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffd77c" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#ffd77c" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdca5" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffdca5" stop-opacity="0.22"/>
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <filter id="sunBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="riverBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- sun glow -->
  <circle cx="640" cy="470" r="92" fill="url(#sunGlow)" filter="url(#sunBlur)"/>
  <circle cx="640" cy="472" r="34" fill="#fff3c7" opacity="0.92"/>
  <circle cx="640" cy="472" r="24" fill="#ffe08a" opacity="0.8"/>

  <!-- clouds -->
  <g class="cloud">
    <path d="M160 150c30-26 78-24 107 2 18-13 46-10 60 6 24-7 49 5 58 25H130c9-20 19-24 30-33z" fill="url(#cloudWarm)"/>
    <path d="M760 138c28-22 74-22 102 3 16-10 37-8 50 7 21-5 43 6 51 22H730c8-19 17-24 30-32z" fill="url(#cloudWarm)"/>
  </g>
  <g class="cloud cloud2">
    <path d="M280 210c20-18 54-18 73 1 13-9 31-8 40 4 16-5 33 4 39 17H260c7-15 13-18 20-22z" fill="url(#cloudWarm)"/>
    <path d="M930 205c22-18 60-17 80 2 14-9 31-8 42 4 18-5 37 5 44 18H906c7-16 16-20 24-24z" fill="url(#cloudWarm)"/>
  </g>
  <g class="cloud cloud3">
    <path d="M520 175c18-15 48-14 64 2 10-7 24-6 32 3 14-4 30 3 36 14H500c6-13 11-16 20-19z" fill="url(#cloudWarm)"/>
  </g>

  <!-- atmosphere haze -->
  <rect x="0" y="340" width="1280" height="120" fill="url(#haze)"/>

  <!-- mountains back -->
  <path d="M0 510
           C120 460, 180 430, 270 448
           C340 462, 382 418, 454 392
           C520 368, 578 404, 640 390
           C706 376, 760 344, 832 382
           C900 418, 960 474, 1040 440
           C1130 402, 1200 424, 1280 396
           L1280 560 L0 560 Z"
        fill="#4f2a4f"/>

  <!-- mountains mid -->
  <path d="M0 560
           C88 512, 148 500, 224 520
           C294 538, 334 470, 408 442
           C470 418, 534 450, 600 426
           C656 406, 710 368, 768 392
           C826 416, 874 500, 942 472
           C1018 442, 1088 440, 1160 468
           C1212 490, 1240 500, 1280 486
           L1280 620 L0 620 Z"
        fill="#392142"/>

  <!-- main mountain front -->
  <path d="M0 620
           C96 585, 164 574, 248 596
           C310 612, 360 548, 430 504
           C490 466, 540 418, 640 410
           C742 420, 804 470, 860 518
           C930 582, 996 592, 1070 566
           C1140 540, 1210 542, 1280 568
           L1280 680 L0 680 Z"
        fill="#251830"/>

  <!-- tallest peak silhouette in front of sun -->
  <path d="M445 590
           L640 372
           L785 584
           C750 586, 718 578, 690 566
           C660 554, 628 548, 596 556
           C554 566, 506 582, 445 590 Z"
        fill="#1c1228"/>

  <!-- side ridge accents -->
  <path d="M0 676
           C110 650, 196 634, 274 644
           C360 656, 410 632, 460 606
           C522 574, 562 574, 640 590
           C720 606, 784 610, 842 592
           C908 570, 982 612, 1058 628
           C1142 646, 1212 642, 1280 628
           L1280 800 L0 800 Z"
        fill="#171223"/>

  <!-- river -->
  <path d="M545 800
           C548 738, 566 690, 592 650
           C616 612, 624 584, 618 548
           C610 512, 606 492, 640 470
           C674 492, 670 514, 662 550
           C656 584, 664 614, 688 650
           C714 690, 732 738, 735 800 Z"
        fill="url(#riverGrad)"/>

  <!-- river banks / foreground wedge -->
  <path d="M0 800
           L0 690
           C112 682, 206 664, 286 646
           C352 630, 410 634, 480 648
           C510 654, 528 662, 545 676
           C500 708, 464 744, 444 800 Z"
        fill="#2a182f"/>
  <path d="M1280 800
           L1280 690
           C1168 682, 1074 664, 994 646
           C928 630, 870 634, 800 648
           C770 654, 752 662, 735 676
           C780 708, 816 744, 836 800 Z"
        fill="#24142a"/>

  <!-- reflection shimmer -->
  <g class="shimmer" filter="url(#riverBlur)">
    <path d="M631 500
             C642 535, 648 568, 645 604
             C642 642, 644 684, 650 728
             C654 754, 656 778, 656 800
             L624 800
             C623 776, 620 750, 614 724
             C606 680, 604 638, 608 600
             C612 564, 618 532, 626 498 Z"
          fill="url(#riverHighlight)" opacity="0.9"/>
    <path d="M624 530 C638 556, 644 582, 642 612 C640 646, 642 688, 646 732"
          stroke="#fff1b0" stroke-width="10" stroke-linecap="round" opacity="0.42" fill="none"/>
    <path d="M614 562 C624 584, 628 610, 626 638 C624 668, 626 708, 630 748"
          stroke="#ffd97b" stroke-width="6" stroke-linecap="round" opacity="0.45" fill="none"/>
  </g>

  <!-- subtle water ripples -->
  <g opacity="0.22">
    <path d="M520 702c44-10 106-10 160 0" stroke="#ffcc82" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M500 736c54-12 128-12 200 0" stroke="#ffd59a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M486 768c62-10 146-10 230 0" stroke="#ffc66f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- foreground shore hints -->
  <path d="M150 720 C244 698, 320 690, 396 694 C348 718, 278 738, 196 748 Z" fill="#1f1022" opacity="0.65"/>
  <path d="M1130 720 C1040 698, 964 690, 884 694 C930 718, 1004 738, 1090 748 Z" fill="#1f1022" opacity="0.65"/>
</svg>
</body>
</html>
