<!DOCTYPE html>
<html>
<head>
<style>
  *{margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
</style>
</head>
<body>
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060818"/>
      <stop offset="10%" stop-color="#0e0c30"/>
      <stop offset="22%" stop-color="#26104a"/>
      <stop offset="34%" stop-color="#5c185e"/>
      <stop offset="46%" stop-color="#a02050"/>
      <stop offset="56%" stop-color="#cc4028"/>
      <stop offset="66%" stop-color="#e87520"/>
      <stop offset="78%" stop-color="#f4a020"/>
      <stop offset="90%" stop-color="#f8c830"/>
      <stop offset="100%" stop-color="#fada50"/>
    </linearGradient>

    <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4d0" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#ffc040" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#e87020" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c03010" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sunBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde8"/>
      <stop offset="30%" stop-color="#ffe890"/>
      <stop offset="60%" stop-color="#ffb848" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f09020" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a020" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f4a020" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fada50" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="cloudW1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e880a0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#f0a080" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#f8c888" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#f0a080" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e880a0" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cloudW2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c088b0" stop-opacity="0"/>
      <stop offset="25%" stop-color="#e090a0" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#f0b088" stop-opacity="0.48"/>
      <stop offset="75%" stop-color="#e090a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c088b0" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="riverBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#180a30"/>
      <stop offset="35%" stop-color="#221040"/>
      <stop offset="70%" stop-color="#140828"/>
      <stop offset="100%" stop-color="#0a0418"/>
    </linearGradient>

    <linearGradient id="riverReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc040" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#f09020" stop-opacity="0.65"/>
      <stop offset="45%" stop-color="#d06018" stop-opacity="0.35"/>
      <stop offset="75%" stop-color="#802040" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#301028" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="groundL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#140825"/>
      <stop offset="100%" stop-color="#080410"/>
    </linearGradient>

    <linearGradient id="groundR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140825"/>
      <stop offset="100%" stop-color="#080410"/>
    </linearGradient>

    <linearGradient id="mtBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a1858"/>
      <stop offset="100%" stop-color="#3a1248"/>
    </linearGradient>

    <linearGradient id="mtMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#30103e"/>
      <stop offset="100%" stop-color="#240c34"/>
    </linearGradient>

    <linearGradient id="mtFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#180a24"/>
      <stop offset="100%" stop-color="#100616"/>
    </linearGradient>

    <linearGradient id="shimmerLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#ffc858" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f09020" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1280" height="800" fill="url(#sky)"/>

  <!-- Horizon atmospheric haze -->
  <rect x="0" y="340" width="1280" height="240" fill="url(#haze)"/>

  <!-- Faint stars in upper sky -->
  <circle cx="95" cy="38" r="1.2" fill="#c8c0e0" opacity="0.5"/>
  <circle cx="310" cy="62" r="1" fill="#c8c0e0" opacity="0.4"/>
  <circle cx="580" cy="28" r="1.3" fill="#d0c8e8" opacity="0.45"/>
  <circle cx="780" cy="50" r="1" fill="#c8c0e0" opacity="0.35"/>
  <circle cx="1050" cy="35" r="1.1" fill="#c8c0e0" opacity="0.5"/>
  <circle cx="1180" cy="72" r="1" fill="#d0c8e8" opacity="0.4"/>
  <circle cx="180" cy="95" r="0.9" fill="#c8c0e0" opacity="0.3"/>
  <circle cx="940" cy="18" r="1.2" fill="#c8c0e0" opacity="0.45"/>

  <!-- Sun halo -->
  <circle cx="640" cy="370" r="240" fill="url(#sunHalo)"/>

  <!-- Sun body -->
  <circle cx="640" cy="370" r="58" fill="url(#sunBody)"/>

  <!-- Clouds -->
  <ellipse cx="230" cy="125" rx="185" ry="19" fill="url(#cloudW1)" opacity="0.55">
    <animateTransform attributeName="transform" type="translate" values="0,0;28,0;0,0" dur="48s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="940" cy="88" rx="200" ry="17" fill="url(#cloudW2)" opacity="0.45">
    <animateTransform attributeName="transform" type="translate" values="0,0;-22,0;0,0" dur="55s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="530" cy="185" rx="145" ry="13" fill="url(#cloudW1)" opacity="0.35">
    <animateTransform attributeName="transform" type="translate" values="0,0;16,0;0,0" dur="40s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1120" cy="155" rx="125" ry="11" fill="url(#cloudW2)" opacity="0.28">
    <animateTransform attributeName="transform" type="translate" values="0,0;-14,0;0,0" dur="36s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="700" cy="108" rx="100" ry="10" fill="url(#cloudW1)" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0;12,0;0,0" dur="42s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Back mountains (lightest, furthest) -->
  <path d="M0,480 L55,438 L110,455 L185,398 L255,420 L330,378 L405,400 L475,362 L540,382 L600,348 L640,338 L680,352 L740,342 L810,378 L880,355 L955,392 L1030,372 L1100,408 L1175,392 L1240,425 L1280,410 L1280,530 L0,530 Z" fill="url(#mtBack)"/>

  <!-- Middle mountains -->
  <path d="M0,515 L65,475 L135,490 L215,428 L295,450 L375,400 L445,420 L510,388 L570,370 L620,358 L640,362 L680,372 L740,395 L810,410 L885,398 L960,435 L1040,415 L1115,452 L1185,442 L1245,472 L1280,462 L1280,570 L0,570 Z" fill="url(#mtMid)"/>

  <!-- Front mountains (darkest, tallest peak at center) -->
  <path d="M0,565 L50,535 L115,548 L195,498 L275,518 L355,468 L420,488 L485,448 L545,425 L600,400 L628,388 L640,382 L652,388 L680,402 L740,432 L805,458 L875,475 L945,460 L1025,498 L1095,518 L1165,508 L1235,528 L1280,518 L1280,645 L0,645 Z" fill="url(#mtFront)"/>

  <!-- Left ground bank -->
  <path d="M0,630 L0,800 L360,800 L440,762 L500,708 L545,660 L575,630 Z" fill="url(#groundL)"/>

  <!-- Right ground bank -->
  <path d="M1280,630 L1280,800 L920,800 L840,762 L780,708 L735,660 L705,630 Z" fill="url(#groundR)"/>

  <!-- River -->
  <path d="M575,630 L705,630 L735,660 L780,708 L840,762 L920,800 L360,800 L440,762 L500,708 L545,660 Z" fill="url(#riverBase)"/>

  <!-- River sun reflection (warm shimmer) -->
  <path d="M598,630 L682,630 L710,660 L745,708 L790,762 L850,800 L430,800 L475,762 L520,708 L555,660 Z" fill="url(#riverReflect)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4.5s" repeatCount="indefinite"/>
  </path>

  <!-- River bright center shimmer line -->
  <path d="M624,630 L656,630 L668,660 L678,708 L698,762 L730,800 L550,800 L580,762 L598,708 L610,660 Z" fill="url(#shimmerLine)" opacity="0.4">
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="3.2s" repeatCount="indefinite"/>
  </path>

  <!-- River narrow bright core -->
  <path d="M634,630 L646,630 L654,660 L660,708 L672,762 L690,800 L590,800 L605,762 L614,708 L618,660 Z" fill="#ffe8a0" opacity="0.18">
    <animate attributeName="opacity" values="0.1;0.28;0.1" dur="2.8s" repeatCount="indefinite"/>
  </path>
</svg>
</body>
</html>
