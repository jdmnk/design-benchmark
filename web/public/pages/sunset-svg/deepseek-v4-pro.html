<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Serene Sunset · Mountain & River</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0f2e; }
    svg { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Sky vertical gradient: deep indigo → magenta/pink → warm orange/gold -->
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a1040" />
        <stop offset="28%" stop-color="#3e1b5e" />
        <stop offset="55%" stop-color="#b4416c" />
        <stop offset="78%" stop-color="#e87a4f" />
        <stop offset="100%" stop-color="#fdad4a" />
      </linearGradient>

      <!-- Sun soft radial glow -->
      <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#fffbe6" stop-opacity="1" />
        <stop offset="28%" stop-color="#ffd966" stop-opacity="0.95" />
        <stop offset="58%" stop-color="#f7923e" stop-opacity="0.65" />
        <stop offset="100%" stop-color="#e55b2b" stop-opacity="0" />
      </radialGradient>

      <!-- River horizontal shimmer (vertical reflection) -->
      <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7b4c2a" stop-opacity="0.9" />
        <stop offset="22%" stop-color="#e5943a" stop-opacity="0.8" />
        <stop offset="48%" stop-color="#fec260" stop-opacity="0.9" />
        <stop offset="75%" stop-color="#d1632c" stop-opacity="0.8" />
        <stop offset="100%" stop-color="#3a2010" stop-opacity="0.95" />
      </linearGradient>

      <!-- Sun reflection vertical shimmer -->
      <linearGradient id="sunReflection" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffe484" stop-opacity="0.85" />
        <stop offset="45%" stop-color="#f9b84a" stop-opacity="0.7" />
        <stop offset="100%" stop-color="#d15f2a" stop-opacity="0.2" />
      </linearGradient>

      <!-- Cloud gradient warm tint -->
      <linearGradient id="cloudWarm" x1="0" y1="0" x2="1" y2="0.3">
        <stop offset="0%" stop-color="#f5c5a3" stop-opacity="0.45" />
        <stop offset="35%" stop-color="#e6976b" stop-opacity="0.5" />
        <stop offset="70%" stop-color="#c95e5e" stop-opacity="0.35" />
        <stop offset="100%" stop-color="#97455c" stop-opacity="0.15" />
      </linearGradient>

      <!-- Mountain gradients for depth -->
      <linearGradient id="mountBack" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#36234a" />
        <stop offset="100%" stop-color="#1c1128" />
      </linearGradient>
      <linearGradient id="mountMid" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2b1b38" />
        <stop offset="100%" stop-color="#0f0818" />
      </linearGradient>
      <linearGradient id="mountFront" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1b1223" />
        <stop offset="100%" stop-color="#06040a" />
      </linearGradient>
    </defs>

    <!-- FULL SKY BACKGROUND (~55%) -->
    <rect x="0" y="0" width="1280" height="800" fill="url(#skyGrad)" />

    <!-- SOFT CLOUDS upper sky (drifting animation) -->
    <g>
      <!-- Cloud left group -->
      <ellipse cx="210" cy="170" rx="65" ry="28" fill="url(#cloudWarm)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 18,-5; 0,0" dur="24s" repeatCount="indefinite" />
      </ellipse>
      <ellipse cx="270" cy="155" rx="48" ry="22" fill="url(#cloudWarm)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 14,-4; 0,0" dur="22s" repeatCount="indefinite" />
      </ellipse>
      
      <!-- Cloud right group -->
      <ellipse cx="1020" cy="130" rx="80" ry="30" fill="url(#cloudWarm)">
        <animateTransform attributeName="transform" type="translate" values="0,0; -20,-7; 0,0" dur="28s" repeatCount="indefinite" />
      </ellipse>
      <ellipse cx="1100" cy="150" rx="55" ry="24" fill="url(#cloudWarm)">
        <animateTransform attributeName="transform" type="translate" values="0,0; -16,-5; 0,0" dur="26s" repeatCount="indefinite" />
      </ellipse>

      <!-- Far central thin cloud -->
      <ellipse cx="620" cy="100" rx="90" ry="18" fill="url(#cloudWarm)" opacity="0.5">
        <animateTransform attributeName="transform" type="translate" values="0,0; -8,-3; 0,0" dur="30s" repeatCount="indefinite" />
      </ellipse>
      <ellipse cx="700" cy="85" rx="60" ry="14" fill="url(#cloudWarm)" opacity="0.4">
        <animateTransform attributeName="transform" type="translate" values="0,0; -5,-2; 0,0" dur="25s" repeatCount="indefinite" />
      </ellipse>
    </g>

    <!-- SUN: low on horizon, centered, soft glow -->
    <circle cx="640" cy="440" r="62" fill="url(#sunGlow)" />
    <circle cx="640" cy="440" r="30" fill="#fffbea" opacity="0.95" />
    <circle cx="640" cy="440" r="22" fill="#ffe68f" opacity="1" />

    <!-- MOUNTAIN RANGE ( silhouettes, layered ) -->
    <!-- Back ridgeline (lightest silhouette) -->
    <path d="M0 480 L130 400 L280 460 L430 370 L570 440 L640 365 L710 440 L860 380 L990 460 L1130 390 L1280 470 L1280 800 L0 800 Z" fill="url(#mountBack)" opacity="0.9" />

    <!-- Middle ridgeline (taller central peak directly behind sun) -->
    <path d="M0 520 L160 440 L310 490 L470 410 L600 470 L640 380 L680 470 L810 420 L950 490 L1100 430 L1280 510 L1280 800 L0 800 Z" fill="url(#mountMid)" opacity="0.95" />

    <!-- Front ridgeline (darkest, closest) -->
    <path d="M0 570 L120 510 L270 545 L440 485 L580 530 L640 465 L700 530 L850 495 L990 550 L1140 500 L1280 555 L1280 800 L0 800 Z" fill="url(#mountFront)" />

    <!-- RIVER IN FOREGROUND (~bottom 20%, widening) -->
    <path d="M580 640 L700 640 L950 800 L330 800 Z" fill="url(#riverGrad)" opacity="0.95" />
    <!-- extra bank shape to integrate river smoothly -->
    <path d="M540 660 L600 640 L720 640 L820 800 L380 800 Z" fill="#2b1b18" opacity="0.5" />

    <!-- Sun reflection shimmer on river (vertical central band) -->
    <ellipse cx="640" cy="730" rx="42" ry="18" fill="url(#sunReflection)" opacity="0.9">
      <animate attributeName="ry" values="18; 22; 18" dur="3.2s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="640" cy="760" rx="48" ry="21" fill="url(#sunReflection)" opacity="0.75">
      <animate attributeName="ry" values="21; 25; 21" dur="3.8s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="640" cy="790" rx="60" ry="20" fill="url(#sunReflection)" opacity="0.55">
      <animate attributeName="ry" values="20; 26; 20" dur="4.1s" repeatCount="indefinite" />
    </ellipse>

    <!-- subtle shimmer streaks on water -->
    <line x1="610" y1="705" x2="670" y2="705" stroke="#ffe9a0" stroke-width="2.5" stroke-opacity="0.45" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.45; 0.7; 0.45" dur="2.7s" repeatCount="indefinite" />
    </line>
    <line x1="618" y1="745" x2="662" y2="745" stroke="#ffd78b" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.4; 0.65; 0.4" dur="3.1s" repeatCount="indefinite" />
    </line>
    <line x1="625" y1="775" x2="655" y2="775" stroke="#fbc26a" stroke-width="1.8" stroke-opacity="0.35" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.35; 0.55; 0.35" dur="2.9s" repeatCount="indefinite" />
    </line>
  </svg>
</body>
</html>
