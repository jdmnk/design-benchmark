<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunset Landscape</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#1a1a4e;overflow:hidden}
  svg{display:block;width:100%;height:100%}
</style>
</head>
<body>
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#15164a"/>
      <stop offset="0.22" stop-color="#3a1f5e"/>
      <stop offset="0.45" stop-color="#8a2d6e"/>
      <stop offset="0.68" stop-color="#d9534a"/>
      <stop offset="0.86" stop-color="#f5a04a"/>
      <stop offset="1"    stop-color="#ffd58a"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#fff3c4" stop-opacity="0.95"/>
      <stop offset="0.25" stop-color="#ffcf7a" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#f0894a" stop-opacity="0.22"/>
      <stop offset="1"   stop-color="#f0894a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#fffaf0"/>
      <stop offset="0.55" stop-color="#ffe39a"/>
      <stop offset="1"   stop-color="#ffb35a"/>
    </radialGradient>
    <linearGradient id="mtnBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a3f72" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#4a2050" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d1a45"/>
      <stop offset="1" stop-color="#221030"/>
    </linearGradient>
    <linearGradient id="mtnFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#180a22"/>
      <stop offset="1" stop-color="#080410"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3a1a3a"/>
      <stop offset="0.5" stop-color="#1c0e24"/>
      <stop offset="1"   stop-color="#0c0614"/>
    </linearGradient>
    <linearGradient id="reflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffe6a8" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#ff9a5a" stop-opacity="0.45"/>
      <stop offset="1"   stop-color="#d96a4a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ffb07a" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#ffcc9a" stop-opacity="0.75"/>
      <stop offset="0.7" stop-color="#f5a06a" stop-opacity="0.75"/>
      <stop offset="1"   stop-color="#d96a4a" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="softer" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- 1. Sky base (always paints first) -->
  <rect x="0" y="0" width="1280" height="800" fill="url(#sky)"/>

  <!-- 2. Sun atmospheric glow (sits low, behind mountains) -->
  <ellipse cx="640" cy="400" rx="360" ry="150" fill="url(#sunGlow)" filter="url(#softer)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="640" cy="400" rx="180" ry="80" fill="url(#sunGlow)" opacity="0.7"/>

  <!-- 3. Warm-tinted elongated clouds (drifting) -->
  <g filter="url(#soft)">
    <g>
      <ellipse cx="240" cy="150" rx="190" ry="13" fill="url(#cloud)"/>
      <ellipse cx="285" cy="168" rx="120" ry="9"  fill="url(#cloud)" opacity="0.7"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 70 0; 0 0" dur="42s" repeatCount="indefinite"/>
    </g>
    <g>
      <ellipse cx="980" cy="110" rx="230" ry="12" fill="url(#cloud)"/>
      <ellipse cx="1020" cy="128" rx="150" ry="8" fill="url(#cloud)" opacity="0.6"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -55 0; 0 0" dur="52s" repeatCount="indefinite"/>
    </g>
    <g>
      <ellipse cx="680" cy="240" rx="280" ry="11" fill="url(#cloud)" opacity="0.8"/>
      <ellipse cx="640" cy="252" rx="170" ry="7"  fill="url(#cloud)" opacity="0.5"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 45 0; 0 0" dur="60s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- 4. Sun core (low on horizon) -->
  <circle cx="640" cy="398" r="52" fill="url(#sunCore)" filter="url(#soft)"/>
  <circle cx="640" cy="398" r="42" fill="#fff5d6"/>

  <!-- 5. Back mountains (lightest, lowest silhouettes) -->
  <path d="M0,440 L0,420 L80,402 L170,384 L240,396 L320,362 L400,388 L470,356 L540,378 L620,350 L700,374 L780,358 L860,382 L950,362 L1040,386 L1130,372 L1210,390 L1280,380 L1280,440 Z" fill="url(#mtnBack)"/>

  <!-- 6. Mid mountains -->
  <path d="M0,460 L0,446 L70,440 L150,422 L230,436 L310,408 L390,432 L470,418 L540,428 L610,405 L680,422 L760,402 L840,428 L920,412 L1010,432 L1090,418 L1180,436 L1280,422 L1280,460 Z" fill="url(#mtnMid)"/>

  <!-- 7. Front mountains — tallest central peak at x=640, in front of sun -->
  <path d="M0,470 L0,462 L90,452 L180,442 L260,452 L340,432 L420,446 L500,420 L570,424 L640,408 L710,424 L780,446 L860,432 L940,446 L1020,436 L1110,452 L1200,440 L1280,454 L1280,470 Z" fill="url(#mtnFront)"/>

  <!-- 8. Foreground ground plane -->
  <rect x="0" y="462" width="1280" height="178" fill="#080410"/>

  <!-- 9. River — widens toward viewer -->
  <path d="M560,640 L720,640 L830,800 L450,800 Z" fill="url(#river)"/>
  <path d="M560,640 L720,640 L765,710 L515,710 Z" fill="#1a0a26" opacity="0.55"/>

  <!-- 10. Sun reflection shimmer down river center -->
  <g>
    <path d="M620,640 L660,640 L705,800 L575,800 Z" fill="url(#reflect)" opacity="0.85">
      <animate attributeName="opacity" values="0.65;0.95;0.65" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M632,640 L648,640 L678,800 L602,800 Z" fill="#fff5d6" opacity="0.55">
      <animate attributeName="opacity" values="0.35;0.8;0.35" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 11. Subtle horizontal ripples -->
  <g stroke="#ffcf7a" stroke-opacity="0.28" fill="none" stroke-width="1.4" stroke-linecap="round">
    <line x1="565" y1="678" x2="715" y2="678">
      <animate attributeName="x1" values="565;572;565" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="715;708;715" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="540" y1="718" x2="740" y2="718">
      <animate attributeName="x1" values="540;550;540" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="740;730;740" dur="7s" repeatCount="indefinite"/>
    </line>
    <line x1="505" y1="758" x2="775" y2="758">
      <animate attributeName="x1" values="505;518;505" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="775;762;775" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>

</svg>
</body>
</html>
